kind = "tests"
category = "functional"

[[tests]]
id = "T001"
short = "Bootstrap from clean state installs the installer and default packages"
long = '''
Validates the minimal happy path: on a machine with no Datadog software,
running the bootstrap command downloads the installer, installs it,
and then installs the default packages resolved from the environment.
'''
ref = ["FUN-015"]
initial = """
- No Datadog software is installed on the host.
- `DD_API_KEY` is set to a valid API key.
- `DD_SITE` is set (or defaults to datadoghq.com).
- The OCI registry is reachable.
"""

[[tests.steps]]
action = "Run the bootstrap command."
run = "datadog-installer bootstrap"

[[tests.steps]]
action = "Verify the installer package is present in the local repository."
run = "datadog-installer is-installed datadog-installer; echo $?"
expected = "0"

[[tests.steps]]
action = "Verify the default packages (as resolved by the environment) are installed."
run = "datadog-installer is-installed datadog-agent; echo $?"
expected = "0"

[[tests]]
id = "T002"
short = "Bootstrap with custom registry URL"
long = '''
Validates that the bootstrap process respects `DD_INSTALLER_REGISTRY_URL`
to pull the installer from a custom OCI registry instead of the default one.
'''
ref = ["FUN-015", "FUN-014"]
initial = """
- No Datadog software is installed on the host.
- `DD_API_KEY` is set.
- `DD_INSTALLER_REGISTRY_URL` is set to a custom registry URL.
- The custom registry hosts the installer image.
"""

[[tests.steps]]
action = "Run the bootstrap command with the custom registry configured."
run = "DD_INSTALLER_REGISTRY_URL=https://custom.registry.example datadog-installer bootstrap"

[[tests.steps]]
action = "Verify the installer package is installed."
run = "datadog-installer is-installed datadog-installer; echo $?"
expected = "0"

[[tests]]
id = "T003"
short = "Bootstrap fails gracefully when registry is unreachable"
long = '''
Validates that the bootstrap process fails cleanly when the OCI registry
cannot be reached, leaving no partial state on disk.
'''
ref = ["FUN-015"]
initial = """
- No Datadog software is installed on the host.
- `DD_API_KEY` is set.
- `DD_INSTALLER_REGISTRY_URL` points to an unreachable host.
"""

[[tests.steps]]
action = "Run the bootstrap command against the unreachable registry."
run = "DD_INSTALLER_REGISTRY_URL=https://unreachable.invalid datadog-installer bootstrap; echo $?"
expected = "1"

[[tests.steps]]
action = "Verify no installer package was left behind."
run = "datadog-installer is-installed datadog-installer; echo $?"
expected = "1"

[[tests]]
id = "T004"
short = "Bootstrap is idempotent"
long = '''
Validates that running the bootstrap command a second time on an already-bootstrapped
host does not break anything and leaves the system in a consistent state.
'''
ref = ["FUN-015"]
prereq = ["T001"]

[[tests.steps]]
action = "Run the bootstrap command again on the already-bootstrapped host."
run = "datadog-installer bootstrap; echo $?"
expected = "0"

[[tests.steps]]
action = "Verify all previously installed packages are still present."
run = "datadog-installer is-installed datadog-installer && datadog-installer is-installed datadog-agent; echo $?"
expected = "0"
