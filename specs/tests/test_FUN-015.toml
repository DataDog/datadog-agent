kind = "tests"
category = "functional"

[[tests]]
id = "T000"
short = "Install script bootstraps the installer on a virgin system"
long = '''
Validates the end-to-end entry point: on a host with no Datadog software at all,
the install script downloads the datadog-installer binary, verifies its integrity,
runs `setup --flavor default`, which bootstraps the installer into the local
repository and installs the default packages.
'''
ref = ["FUN-015"]
initial = """
- A Linux host (amd64 or arm64) with no Datadog software installed.
- `curl` and `sha256sum` are available.
- A valid Datadog API key is available.
"""

[[tests.steps]]
action = "Export the API key."
run = "export DD_API_KEY=<API key>"

[[tests.steps]]
action = "Download the install script."
run = "curl -L -o install_script_agent7.sh https://install.datadoghq.com/scripts/install_script_agent7.sh"

[[tests.steps]]
action = "Run the install script."
run = "bash install_script_agent7.sh"

[[tests.steps]]
action = "Verify the installer binary is installed in the repository."
run = "test -x /opt/datadog-packages/datadog-installer/stable/bin/installer/installer"

[[tests.steps]]
action = "Verify the installer reports itself as installed."
run = "datadog-installer is-installed datadog-installer"

[[tests.steps]]
action = "Verify the agent was installed as a default package."
run = "datadog-installer is-installed datadog-agent"

[[tests.steps]]
action = "Verify the temporary bootstrap binary was cleaned up."
run = "ls /opt/datadog-packages/tmp/installer"
expected = "No such file or directory"

[[tests]]
id = "T001"
short = "Bootstrap from initial state installs the installer and default packages"
long = '''
Validates the minimal happy path: given a host where the datadog-installer binary
has been placed (e.g. via the install script) but not yet set up, running bootstrap
downloads the installer OCI package, installs it to the local repository, then
uses the installed copy to install the default packages.
'''
ref = ["FUN-015"]
prereq = ["T000"]

[[tests.steps]]
action = "Run the bootstrap command."
run = "datadog-installer bootstrap"

[[tests.steps]]
action = "Verify the installer package is present in the local repository."
run = "datadog-installer is-installed datadog-installer"

[[tests.steps]]
action = "Verify the stable symlink points to a version directory."
run = "readlink /opt/datadog-packages/datadog-installer/stable"

[[tests.steps]]
action = "Verify the default packages (as resolved by the environment) are installed."
run = "datadog-installer is-installed datadog-agent"

[[tests]]
id = "T002"
short = "Bootstrap with custom registry URL"
long = '''
Validates that the bootstrap process respects `DD_INSTALLER_REGISTRY_URL`
to pull the installer OCI package from a custom registry instead of the default one.
'''
ref = ["FUN-015", "FUN-014"]
prereq = ["T000"]
initial = """
- `DD_INSTALLER_REGISTRY_URL` is set to a custom registry URL.
- The custom registry hosts the installer and agent images.
"""

[[tests.steps]]
action = "Run the bootstrap command with the custom registry configured."
run = "DD_INSTALLER_REGISTRY_URL=https://custom.registry.example datadog-installer bootstrap"

[[tests.steps]]
action = "Verify the installer package is installed."
run = "datadog-installer is-installed datadog-installer"

[[tests]]
id = "T003"
short = "Bootstrap fails gracefully when registry is unreachable"
long = '''
Validates that the bootstrap process fails cleanly when the OCI registry
cannot be reached, leaving no partial state on disk.
'''
ref = ["FUN-015"]
prereq = ["T000"]
initial = """
- `DD_INSTALLER_REGISTRY_URL` points to an unreachable host.
"""

[[tests.steps]]
action = "Run the bootstrap command against the unreachable registry. The command should fail."
run = "DD_INSTALLER_REGISTRY_URL=https://unreachable.invalid datadog-installer bootstrap"
expected = "could not download"

[[tests.steps]]
action = "Verify no installer package was left behind."
run = "ls /opt/datadog-packages/datadog-installer/stable"
expected = "No such file or directory"

[[tests]]
id = "T004"
short = "Bootstrap is idempotent"
long = '''
Validates that running the bootstrap command a second time on an already-bootstrapped
host succeeds and leaves the system in a consistent state.
'''
ref = ["FUN-015"]
prereq = ["T001"]

[[tests.steps]]
action = "Run the bootstrap command again on the already-bootstrapped host."
run = "datadog-installer bootstrap"

[[tests.steps]]
action = "Verify the installer is still present."
run = "datadog-installer is-installed datadog-installer"

[[tests.steps]]
action = "Verify the agent is still present."
run = "datadog-installer is-installed datadog-agent"
