kind = "tests"
category = "functional"

[[tests]]
id = "T010"
short = "Remove an installed package"
long = '''
Validates the happy path: remove a previously installed package by name,
verify it is no longer present.
'''
ref = ["FUN-002"]
prereq = ["T005"]

[[tests.steps]]
action = "Remove the installed package."
run = "datadog-installer remove datadog-agent"

[[tests.steps]]
action = "Verify the package is no longer installed. The command should exit with code 10."
run = "datadog-installer is-installed datadog-agent"

[[tests]]
id = "T011"
short = "Remove a package that is not installed"
long = '''
Validates behavior when attempting to remove a package that was never installed.
The command should fail with a non-zero exit code.
'''
ref = ["FUN-002"]
prereq = ["T001"]
initial = """
- The target package is not installed.
"""

[[tests.steps]]
action = "Attempt to remove a package that is not installed. The command should fail."
run = "datadog-installer remove datadog-nonexistent-package"
expected = "could not remove package"

[[tests]]
id = "T012"
short = "Remove then reinstall a package"
long = '''
Validates that a package can be cleanly reinstalled after removal,
confirming that removal does not leave behind state that prevents
a fresh installation.
'''
ref = ["FUN-002", "FUN-001"]
prereq = ["T010"]

[[tests.steps]]
action = "Reinstall the previously removed package."
run = "datadog-installer install oci://gcr.io/datadoghq/agent-package:latest"

[[tests.steps]]
action = "Verify the package is installed again."
run = "datadog-installer is-installed datadog-agent"
