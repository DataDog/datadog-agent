kind: requirements
category: architecture
requirements:
  - id: DDOT023
    short: Implemented as a Datadog Agent component
    long: |
      DDOT shall be implemented as a component within the Datadog Agent component framework,
      using fx dependency injection for lifecycle management and service wiring.
      This integration gives DDOT access to Agent-internal services (tagger, WorkloadMeta,
      configuration) without inter-process communication when running embedded.
    tags: [architecture, integration]
    ref: [DDOT001]

  - id: DDOT024
    short: Built on the upstream OTel Collector SDK without forking
    long: |
      DDOT shall be built on top of the upstream OpenTelemetry Collector SDK, extending it
      without maintaining a fork.
      Standard OTel Collector components (receivers, processors, exporters, extensions,
      connectors) shall remain usable in DDOT pipelines without modification.
    tags: [architecture, extensibility]
    ref: [DDOT001, OTELCOL001]

  - id: DDOT025
    short: Support embedded and standalone deployment modes
    long: |
      DDOT shall support two deployment modes:
        - Embedded: the OTel Collector pipeline runs inside the Datadog Agent process,
          with direct in-process access to the tagger, WorkloadMeta, and configuration.
        - Standalone: DDOT runs as an independent process and connects to the Datadog
          Agent via gRPC to access the tagger and WorkloadMeta.
      Both modes expose identical pipeline capabilities to the user.
    tags: [architecture, deployment]
    ref: [DDOT001, DDOT023]

  - id: DDOT026
    short: Stateless pipeline with in-memory buffering only
    long: |
      DDOT shall not persist in-flight telemetry to disk.
      Retry queues and in-flight buffers are maintained in memory only; telemetry that has
      not been successfully delivered before process termination is not recovered.
    tags: [architecture, reliability]
    ref: [DDOT001]

  - id: DDOT027
    short: Distributed as a single self-contained binary
    long: |
      DDOT shall be distributed as a single self-contained binary with no external runtime
      dependencies beyond the operating system (no separate interpreter, runtime, or
      dynamically linked library required at run time).
    tags: [architecture, distribution]
    ref: [DDOT001]

  - id: DDOT028
    short: Cross-platform support for Linux, Windows, and macOS
    long: |
      DDOT shall be buildable and runnable on Linux (amd64, arm64), Windows (amd64), and
      macOS (amd64, arm64) from a single codebase, without platform-specific source files
      for core pipeline functionality.
    tags: [architecture, platform]
    ref: [DDOT001]
