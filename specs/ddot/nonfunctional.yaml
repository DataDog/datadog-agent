kind: requirements
category: non-functional
requirements:
  - id: DDOT020
    short: Flare archive contains config, environment, and extension data
    long: |
      A DDOT flare archive shall include, at minimum:
        - `otel-response.json`: serialized responses from all enabled debug extensions
        - `build-info.txt`: DDOT version and build metadata
        - The OTel configuration as provided by the user
        - The effective runtime configuration after all merges and overrides
        - `environment.json`: relevant environment variable values
        - `debug-sources.json`: discovery information for debug extensions
          (names, types, URLs)
      This completeness requirement ensures that a flare contains sufficient information
      for Datadog support to diagnose configuration and runtime issues without requiring
      interactive access to the host.
    tags: [debug, reliability]
    ref: [DDOT016, OTELCOL007]

  - id: DDOT021
    short: Integrate Datadog continuous profiling via the ddprofiling extension
    long: |
      DDOT shall provide built-in integration with Datadog continuous profiling via the
      `ddprofiling` OTel extension.
      When enabled, the extension starts a Go profiler that collects CPU, heap, and
      goroutine profiles from the DDOT process and submits them to the Datadog profiling
      intake.
      The extension detects the execution environment (Fargate ECS, host) and attaches
      the appropriate tags to profiling data.
    tags: [observability, profiling]
    ref: [DDOT001, OTELCOL007]

  - id: DDOT022
    short: Flare HTTP endpoint requires bearer token authentication
    long: |
      The ddflare OTel extension's HTTP endpoint, which exposes runtime configuration and
      debug data, shall require a valid bearer token in the `Authorization` header.
      Requests without a valid token shall be rejected with an HTTP 401 Unauthorized
      response.
      This prevents unauthorized access to potentially sensitive configuration data from
      processes running on the same host.
    tags: [security]
    ref: [DDOT016, DDOT020, OTELCOL007]

  - id: DDOT032
    short: Flush in-flight telemetry on graceful shutdown
    long: |
      When DDOT receives a termination signal, it shall complete processing of in-flight
      telemetry and attempt to flush pending exporter queues before exiting, minimizing
      data loss.
    tags: [reliability]
    ref: [DDOT001]

  - id: DDOT033
    short: Never expose secrets in logs or diagnostic output
    long: |
      API keys, bearer tokens, and other credentials configured in DDOT shall never appear
      in plain text in log output or in flare archives.
      Sensitive values shall be redacted or omitted in all diagnostic output.
    tags: [security]
    ref: [DDOT007, DDOT020]

  - id: DDOT034
    short: Continue processing telemetry when non-critical enrichment fails
    long: |
      DDOT shall continue to process and export telemetry even when non-critical enrichment
      steps fail (e.g., the tagger is temporarily unavailable).
      Enrichment failures shall be logged but shall not cause the pipeline to stall or
      drop telemetry.
    tags: [reliability]
    ref: [DDOT014]

  - id: DDOT038
    short: Resolve the OpAmp hostname using the Datadog hostname resolution chain
    long: |
      When populating the `host.name` attribute for the OpAmp agent description,
      DDOT shall use the core Agent's hostname component, which follows the
      standard Datadog hostname resolution chain (agent config, cloud provider
      metadata, OS hostname).

      This ensures the hostname reported to the OpAmp server matches the one
      used by other Datadog products, allowing operators to correlate
      OpAmp-managed collectors with their Datadog infrastructure hosts.
    tags: [opamp, identity]
    ref: [DDOT037, OTELCOL038]
