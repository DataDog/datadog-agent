kind: tests
category: functional
tests:
- id: T015
  ref: [OTELCOL025]
  short: Start an OpAmp test server
  long: |
    Set up a minimal OpAmp server using the `opamp-go` library. This server acts
    as the management plane for all subsequent OpAmp tests and must be running
    before any of them are executed.
  initial: |
    Go is installed. A minimal server is written using the `opamp-go` library:
      go get github.com/open-telemetry/opamp-go@v0.23.0
    The server prints each incoming connection and message to stdout.
  steps:
    - action: Build and start the minimal OpAmp server
      run: |
        go build -o opamp-server . && ./opamp-server
      expected: |
        OpAMP Server listening on 0.0.0.0:4320

- id: T016
  ref: [OTELCOL025, OTELCOL026]
  short: Collector connects to the OpAmp server over WebSocket
  long: |
    Verify that the Collector establishes a WebSocket connection to the OpAmp server
    when the `opamp` extension is configured with a `ws:` endpoint. The server must
    receive an initial `AgentToServer` message containing the agent's instance UID,
    description, and declared capabilities.
  prereq: [T001, T015]
  steps:
    - action: Prepare a configuration with the opamp extension using WebSocket transport
      run: cat config.yaml
      sample_lang: yaml
      sample: |
        extensions:
          opamp:
            server:
              ws:
                endpoint: ws://127.0.0.1:4320/v1/opamp
        receivers:
          otlp:
            protocols:
              grpc:
        exporters:
          debug:
            verbosity: detailed
          datadog:
        service:
          extensions: [opamp]
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Start the otel-agent
      run: |
        DD_OTELCOLLECTOR_ENABLED=true DD_API_KEY=<key> DD_SITE=datadoghq.com \
          DD_CMD_PORT=0 DD_AGENT_IPC_PORT=-1 DD_AGENT_IPC_CONFIG_REFRESH_INTERVAL=0 \
          DD_ENABLE_METADATA_COLLECTION=false DD_HOSTNAME=<hostname> \
          DD_OTELCOLLECTOR_CONVERTER_FEATURES="health_check" \
          ./otel-agent --config file:config.yaml
      expected: |
        [...]
        [...] | info | extensions/extensions.go:44 | Extension is starting... | {"otelcol.component.id": "opamp", ...}
        [...] | info | extensions/extensions.go:61 | Extension started.       | {"otelcol.component.id": "opamp", ...}
        [...] | info | service@v0.147.0/service.go:264 | Everything is ready. Begin running and processing data.
    - action: Verify the OpAmp server received the agent connection and initial status report
      sample: |
        Agent connected
        Message from agent id: <instance-uid-hex>
        AgentDescription: identifying_attributes:{key:"service.name" value:{string_value:"otel-agent"}} \
          identifying_attributes:{key:"service.version" value:{string_value:"v0.147.0"}} \
          non_identifying_attributes:{key:"host.arch" value:{string_value:"arm64"}} \
          non_identifying_attributes:{key:"os.type" value:{string_value:"darwin"}}
        Health: healthy=true
        EffectiveConfig received
        Capabilities: 18437

- id: T017
  ref: [OTELCOL025, OTELCOL027]
  short: Collector connects to the OpAmp server over HTTP
  long: |
    Verify that the Collector can use the HTTP transport for OpAmp instead of
    WebSocket. The connection must be established and the initial `AgentToServer`
    message received by the server, using HTTP POST to `/v1/opamp`.
  prereq: [T001, T015]
  steps:
    - action: Prepare a configuration with the opamp extension using HTTP transport
      run: cat config.yaml
      sample_lang: yaml
      sample: |
        extensions:
          opamp:
            server:
              http:
                endpoint: http://127.0.0.1:4320/v1/opamp
        receivers:
          otlp:
            protocols:
              grpc:
        exporters:
          debug:
            verbosity: detailed
          datadog:
        service:
          extensions: [opamp]
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Start the otel-agent
      run: |
        DD_OTELCOLLECTOR_ENABLED=true DD_API_KEY=<key> DD_SITE=datadoghq.com \
          DD_CMD_PORT=0 DD_AGENT_IPC_PORT=-1 DD_AGENT_IPC_CONFIG_REFRESH_INTERVAL=0 \
          DD_ENABLE_METADATA_COLLECTION=false DD_HOSTNAME=<hostname> \
          DD_OTELCOLLECTOR_CONVERTER_FEATURES="health_check,zpages,pprof" \
          ./otel-agent --config file:config.yaml
      expected: |
        [...]
        [...] | OTELCOL | INFO | (...) | [...] | OpAMP connection established
        [...] | OTELCOL | INFO | (...) | [...] | Everything is ready. Begin running and processing data.
        [...]
    - action: Verify the OpAmp server received the connection via HTTP
      sample: |
        Agent connected, id: <instance-uid>
        AgentDescription: { ... otel-agent ... }

- id: T018
  ref: [OTELCOL028]
  short: OpAmp server receives agent identity and capabilities on connection
  long: |
    Verify that upon connection the Collector sends an `AgentDescription` containing
    its identity (agent type, version, OS) and a bitmask of declared OpAmp
    capabilities, so the server knows which features the agent supports before
    sending any commands.
  prereq: [T016]
  steps:
    - action: Inspect the agent description reported to the server at connection time
      sample: |
        AgentDescription:
          identifying_attributes:{key:"service.instance.id" value:{string_value:"<uuid>"}}
          identifying_attributes:{key:"service.name" value:{string_value:"otel-agent"}}
          identifying_attributes:{key:"service.version" value:{string_value:"v0.147.0"}}
          non_identifying_attributes:{key:"datadoghq.com/deployment_type" value:{string_value:"daemonset"}}
          non_identifying_attributes:{key:"datadoghq.com/site" value:{string_value:"datadoghq.com"}}
          non_identifying_attributes:{key:"host.arch" value:{string_value:"arm64"}}
          non_identifying_attributes:{key:"host.name" value:{string_value:"<hostname>"}}
          non_identifying_attributes:{key:"os.description" value:{string_value:"macOS 26.2"}}
          non_identifying_attributes:{key:"os.type" value:{string_value:"darwin"}}
        Capabilities: 18437

- id: T019
  ref: [OTELCOL030]
  short: Push a remote configuration and verify the agent applies it
  long: |
    Verify that when the OpAmp server pushes an `AgentRemoteConfig` message, the
    Collector applies the new configuration and reports success back to the server
    via `RemoteConfigStatus`. The change in behavior must be observable (e.g. a
    new exporter verbosity level takes effect without restarting the agent).
  prereq: [T016]
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: From the opamp-go server UI, push a new configuration that changes debug verbosity to `normal`
      sample_lang: yaml
      sample: |
        receivers:
          otlp:
            protocols:
              grpc:
        exporters:
          debug:
            verbosity: normal
          datadog:
        service:
          extensions: [opamp]
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Verify the agent log shows the configuration was received and applied
      sample: |
        [...] | OTELCOL | INFO | (...) | [...] | Received remote config from server
        [...] | OTELCOL | INFO | (...) | [...] | Starting otel-agent...
        [...] | OTELCOL | INFO | (...) | [...] | Everything is ready. Begin running and processing data.
    - action: Verify the server received a successful RemoteConfigStatus
      sample: |
        RemoteConfigStatus: { status: APPLIED, error_message: "" }
    - action: Send one trace and verify the debug exporter now uses normal (compact) verbosity
      run: telemetrygen traces --otlp-insecure --otlp-endpoint localhost:4317 --traces 1
      expected: |
        ... INFO	traces/worker.go:180	traces generated	{"worker": 0, "traces": 1}
    - action: Verify the compact one-liner output from the debug exporter (normal verbosity)
      sample: |
        ResourceTraces #0 [...] service.name=telemetrygen

- id: T020
  ref: [OTELCOL029]
  short: Collector sends periodic heartbeats to the OpAmp server
  long: |
    Verify that the Collector sends heartbeat messages at the configured interval
    so the server can detect unresponsive agents. The default interval is 30 seconds;
    the server may override it and the Collector must apply the new value.
  prereq: [T016]
  steps:
    - action: Wait 30 seconds and verify the server received at least one heartbeat
      sample: |
        Heartbeat received from agent <instance-uid>
    - action: From the server, set the heartbeat interval to 10 seconds
      sample: |
        OpAMPConnectionSettings: { heartbeat_interval_seconds: 10 }
    - action: Wait 10 seconds and verify heartbeats now arrive at the new interval
      sample: |
        Heartbeat received from agent <instance-uid>
        Heartbeat received from agent <instance-uid>

- id: T021
  ref: [OTELCOL031]
  short: Collector reports health status and effective configuration to the server
  long: |
    Verify that the Collector continuously reports its runtime health via
    `ComponentHealth` messages and, when the `ReportsEffectiveConfig` capability is
    declared, includes its currently active configuration in each `AgentToServer`
    message so the server can verify what is actually running.
  prereq: [T016]
  steps:
    - action: Verify the server shows the agent as healthy immediately after connection
      sample: |
        ComponentHealth: { healthy: true, last_error: "" }
    - action: Verify the server displays the agent's effective configuration
      sample: |
        EffectiveConfig:
          ConfigMap:
            config.yaml: |
              receivers:
                otlp: ...
              exporters:
                debug: ...
              service:
                extensions: [opamp]
                pipelines: ...
    - action: From the server, push an invalid configuration (e.g. referencing an undeclared component)
      sample_lang: yaml
      sample: |
        service:
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [nonexistent]
    - action: Verify the agent reports an unhealthy status and a RemoteConfigStatus error
      sample: |
        RemoteConfigStatus: { status: FAILED, error_message: "references unavailable exporters: nonexistent" }
        ComponentHealth: { healthy: false, last_error: "references unavailable exporters: nonexistent" }

- id: T022
  ref: [OTELCOL032]
  short: Collector sends its own metrics to an OTLP endpoint directed by the OpAmp server
  long: |
    Verify that when the OpAmp server pushes `OtlpMetricsConnectionSettings`, the
    Collector starts forwarding its internal performance metrics to the specified
    OTLP endpoint. A second Collector instance running locally acts as the metrics
    receiver and exposes them via the debug exporter.
  prereq: [T016]
  initial: |
    A second otel-agent instance is running as a local OTLP metrics sink, exposing
    an OTLP/gRPC receiver on port 5317 and a debug exporter:
      ./otel-agent --config file:sink.yaml
    where sink.yaml contains:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:5317
      exporters:
        debug:
          verbosity: normal
      service:
        pipelines:
          metrics:
            receivers: [otlp]
            exporters: [debug]
  steps:
    - action: From the server, push OtlpMetricsConnectionSettings pointing to the sink
      sample_lang: yaml
      sample: |
        OtlpMetricsConnectionSettings:
          destination_credentials:
            endpoint: localhost:5317
            tls:
              insecure: true
    - action: Verify the sink's debug exporter receives internal metrics from the agent
      sample: |
        ResourceMetrics #0
        Resource attributes:
             -> service.name: Str(otel-agent)
        ScopeMetrics #0
        Metric #0
            Name: otelcol_receiver_accepted_spans

- id: T023
  ref: [OTELCOL033]
  short: Server pushes a package update and the agent installs it
  long: |
    Verify that when the OpAmp server sends a `PackagesAvailable` message, the
    Collector downloads the package, verifies its hash, installs it, and reports
    the final installation status back to the server via `PackageStatuses`.
  prereq: [T015]
  steps:
    - action: From the server, advertise a new agent package version with a download URL and hash
      sample: |
        PackagesAvailable:
          packages:
            otel-agent:
              version: <new-version>
              download: { url: "http://...", content_hash: "<sha256>" }
    - action: Verify the agent downloads and installs the package
      sample: |
        [...] | OTELCOL | INFO | (...) | [...] | Downloading package otel-agent <new-version>
        [...] | OTELCOL | INFO | (...) | [...] | Package hash verified
        [...] | OTELCOL | INFO | (...) | [...] | Package otel-agent installed successfully
    - action: Verify the server receives a PackageStatuses report with status installed
      sample: |
        PackageStatuses:
          packages:
            otel-agent:
              installed_version: <new-version>
              status: Installed

- id: T024
  ref: [OTELCOL034]
  short: Server rotates the agent's TLS client certificate via OpAmp
  long: |
    Verify that when the OpAmp server pushes updated `OpAMPConnectionSettings`
    containing a new TLS client certificate, the Collector applies the new
    credentials and reports success via `ConnectionSettingsStatus`. Subsequent
    communication must use the new certificate.
  prereq: [T016]
  steps:
    - action: Generate a new client certificate and push it from the server
      sample: |
        OpAMPConnectionSettings:
          opamp:
            certificate:
              cert: <new-cert-pem>
              private_key: <new-key-pem>
    - action: Verify the agent log shows the new certificate was applied
      sample: |
        [...] | OTELCOL | INFO | (...) | [...] | OpAMP connection settings updated
    - action: Verify the server received a successful ConnectionSettingsStatus
      sample: |
        ConnectionSettingsStatus: { status: APPLIED, error_message: "" }
    - action: Verify the agent reconnects using the new certificate and remains operational
      sample: |
        [...] | OTELCOL | INFO | (...) | [...] | OpAMP connection established
        [...] | OTELCOL | INFO | (...) | [...] | Everything is ready. Begin running and processing data.

- id: T025
  ref: [OTELCOL025, OTELCOL026]
  short: Agent starts normally when the OpAmp server is unreachable
  long: |
    Verify that a missing or unreachable OpAmp server does not prevent the Collector
    from starting. The OpAmp connection is a management channel, not a data path;
    telemetry pipelines must become operational regardless. The Collector shall log
    the connection failure and retry in the background.
  prereq: [T001]
  initial: |
    No OpAmp server is running on port 4320.
  steps:
    - action: Start the otel-agent with the opamp extension configured but no server running
      run: |
        DD_OTELCOLLECTOR_ENABLED=true DD_API_KEY=<key> DD_SITE=datadoghq.com \
          DD_CMD_PORT=0 DD_AGENT_IPC_PORT=-1 DD_AGENT_IPC_CONFIG_REFRESH_INTERVAL=0 \
          DD_ENABLE_METADATA_COLLECTION=false DD_HOSTNAME=<hostname> \
          DD_OTELCOLLECTOR_CONVERTER_FEATURES="health_check,zpages,pprof" \
          ./otel-agent --config file:config.yaml
      expected: |
        [...] | error | opampextension@v0.147.0/logger.go:26 | Connection failed (dial tcp [::1]:4320: connect: connection refused), will retry. | {"otelcol.component.id": "opamp", ...}
        [...] | info  | service@v0.147.0/service.go:264      | Everything is ready. Begin running and processing data.
    - action: Verify the gRPC port is open and accepting telemetry despite the OpAmp failure
      run: nc -z localhost 4317 && echo "gRPC open"
      expected: gRPC open

- id: T026
  ref: [OTELCOL025, OTELCOL026]
  short: Agent reconnects to the OpAmp server after a disconnection
  long: |
    Verify that when the OpAmp server becomes unavailable and then restarts, the
    Collector detects the disconnection, retries using exponential back-off, and
    re-establishes the connection. Upon reconnection, the agent must send a new
    `AgentToServer` message to restore channel state.
  prereq: [T016]
  steps:
    - action: Stop the opamp server
      run: kill <server-pid>
    - action: Verify the agent logs a connection failure and begins retrying
      sample: |
        [...] | error | opampextension@v0.147.0/logger.go:26 | Connection failed (dial tcp [::1]:4320: connect: connection refused), will retry. | {"otelcol.component.id": "opamp", ...}
    - action: Restart the opamp server
      run: ./opamp-server
      expected: |
        OpAMP Server listening on 0.0.0.0:4320
    - action: Verify the agent reconnects and re-sends its identity to the server
      sample: |
        Agent connected
        Message from agent id: <same-instance-uid-hex>

- id: T027
  ref: [OTELCOL033]
  short: Package with mismatched hash is rejected
  long: |
    Verify that the Collector rejects a package whose downloaded content does not
    match the hash advertised in the `PackagesAvailable` message. No installation
    must take place, and the agent must report a `FAILED` status with an error
    message identifying the integrity failure.
  prereq: [T015]
  steps:
    - action: From the server, advertise a package with a hash that does not match the download URL content
      sample: |
        PackagesAvailable:
          packages:
            otel-agent:
              version: <new-version>
              download: { url: "http://...", content_hash: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" }
    - action: Verify the agent rejects the package after download
      sample: |
        [...] | OTELCOL | ERROR | (...) | [...] | Package hash verification failed
    - action: Verify the server receives a FAILED PackageStatuses with an error message
      sample: |
        PackageStatuses:
          packages:
            otel-agent:
              status: InstallFailed
              error_message: "hash mismatch: expected aaaaaa... got <actual>"
    - action: Verify the currently running agent version is unchanged
      run: ./otel-agent --version
      expected: <previous-version>

- id: T028
  ref: [OTELCOL034]
  short: Invalid TLS certificate pushed by server is rejected
  long: |
    Verify that when the OpAmp server pushes an `OpAMPConnectionSettings` containing
    a malformed or expired TLS certificate, the Collector rejects it, keeps using
    the existing credentials, and reports a `FAILED` `ConnectionSettingsStatus` with
    an error description.
  prereq: [T016]
  steps:
    - action: From the server, push a certificate with an invalid PEM payload
      sample: |
        OpAMPConnectionSettings:
          opamp:
            certificate:
              cert: "not-a-valid-pem"
              private_key: "not-a-valid-pem"
    - action: Verify the agent rejects the new credentials and logs an error
      sample: |
        [...] | OTELCOL | ERROR | (...) | [...] | Failed to apply OpAMP connection settings: invalid certificate
    - action: Verify the server received a FAILED ConnectionSettingsStatus
      sample: |
        ConnectionSettingsStatus: { status: FAILED, error_message: "invalid certificate" }
    - action: Verify the agent remains connected using its previous credentials
      sample: |
        Heartbeat received from agent <instance-uid>

- id: T029
  ref: [OTELCOL036]
  short: No telemetry is dropped during a hot reload triggered by remote config
  long: |
    Verify that applying a remote configuration change does not cause in-flight
    telemetry to be dropped. A continuous stream of spans is sent throughout the
    reload; the number of spans accepted by the receiver must equal the number
    exported, as reported by the Collector's internal Prometheus metrics.
  prereq: [T016]
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: Record the baseline span counters from the Prometheus metrics endpoint
      run: |
        curl -s http://localhost:8888/metrics | grep -E "otelcol_(receiver_accepted|exporter_sent)_spans"
      expected: |
        otelcol_receiver_accepted_spans_total{...} 0
        otelcol_exporter_sent_spans_total{...} 0
    - action: Start sending a continuous stream of traces for 20 seconds
      run: |
        telemetrygen traces --otlp-insecure --otlp-endpoint localhost:4317 \
          --duration 20s --rate 10 &
    - action: After 10 seconds, push a remote config change from the server (e.g. change debug verbosity)
      sample_lang: yaml
      sample: |
        exporters:
          debug:
            verbosity: normal
        service:
          extensions: [opamp]
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Wait for telemetrygen to finish, then query the span counters again
      run: |
        wait && curl -s http://localhost:8888/metrics | grep -E "otelcol_(receiver_accepted|exporter_sent)_spans"
    - action: Verify accepted span count equals exported span count (no data loss)
      sample: |
        otelcol_receiver_accepted_spans_total{...} N
        otelcol_exporter_sent_spans_total{...} N

- id: T030
  ref: [OTELCOL028]
  short: Instance UID is preserved across agent restarts
  long: |
    Verify that the Collector's `instance_uid` is stable across process restarts so
    that the OpAmp server can recognise it as the same agent after a restart. The
    UID reported in the first connection must match the UID reported after a stop
    and restart.
  prereq: [T016]
  steps:
    - action: Record the instance UID currently reported to the server
      sample: |
        Agent connected, id: <instance-uid>
    - action: Stop the otel-agent
      run: kill <agent-pid>
    - action: Restart the otel-agent with the same configuration
      run: |
        DD_OTELCOLLECTOR_ENABLED=true DD_API_KEY=<key> DD_SITE=datadoghq.com \
          DD_CMD_PORT=0 DD_AGENT_IPC_PORT=-1 DD_AGENT_IPC_CONFIG_REFRESH_INTERVAL=0 \
          DD_ENABLE_METADATA_COLLECTION=false DD_HOSTNAME=<hostname> \
          DD_OTELCOLLECTOR_CONVERTER_FEATURES="health_check" \
          ./otel-agent --config file:config.yaml
      expected: |
        [...] | info | extensions/extensions.go:61 | Extension started. | {"otelcol.component.id": "opamp", ...}
        [...] | info | service@v0.147.0/service.go:264 | Everything is ready. Begin running and processing data.
    - action: Verify the server sees a reconnection with the same instance UID
      sample: |
        Agent disconnected
        Agent connected
        Message from agent id: <same-instance-uid-hex-as-before>

- id: T031
  ref: [OTELCOL031]
  short: Effective configuration reported to the server reflects the latest applied config
  long: |
    Verify that after a remote configuration update is applied (T019), the effective
    configuration reported by the Collector in subsequent `AgentToServer` messages
    matches the newly active configuration, not the original one. This ensures the
    server always has an accurate view of what is actually running.
  prereq: [T019]
  steps:
    - action: Query the effective configuration currently shown by the server
      sample: |
        EffectiveConfig:
          ConfigMap:
            config.yaml: |
              exporters:
                debug:
                  verbosity: normal
              service:
                extensions: [opamp]
                pipelines:
                  traces:
                    receivers: [otlp]
                    exporters: [debug]
    - action: "Verify the effective config reflects `verbosity: normal` (the value pushed in T019) not the original `verbosity: detailed`"
      sample: |
        verbosity: normal

- id: T032
  ref: [OTELCOL030]
  short: Pushing an identical remote config does not trigger a pipeline restart
  long: |
    Verify that when the OpAmp server pushes a configuration whose content hash is
    identical to the currently active one, the Collector recognises the no-op and
    reports `APPLIED` immediately without reloading any pipeline components. No
    restart log lines should appear.
  prereq: [T019]
  steps:
    - action: Push the same configuration that was applied in T019 a second time
      sample_lang: yaml
      sample: |
        exporters:
          debug:
            verbosity: normal
        service:
          extensions: [opamp]
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Verify the server receives APPLIED status without any pipeline restart in the agent log
      sample: |
        RemoteConfigStatus: { status: APPLIED, error_message: "" }
    - action: Verify no pipeline restart occurred
      sample: The agent log does not contain a second `Starting otel-agent...` line after the initial startup.
