kind: tests
category: functional
tests:
- id: T001
  ref: [OTELCOL010]
  short: Receive OTLP traces over gRPC on the default port
  long: |
    Verify that the Collector accepts OTLP trace data sent over gRPC on the default
    port 4317 and routes it through the configured pipeline to the exporter.
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: |
        Create a minimal Collector configuration with the OTLP gRPC receiver, a debug
        exporter, and a Datadog exporter (required to activate Datadog-specific
        initialization, see DDOT036):
      sample_lang: yaml
      sample: |
        receivers:
          otlp:
            protocols:
              grpc:
        exporters:
          debug:
            verbosity: detailed
          datadog:
            api:
              key: ${env:DD_API_KEY}
              site: ${env:DD_SITE}
        connectors:
          datadog/connector:
        service:
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug, datadog, datadog/connector]
            metrics:
              receivers: [otlp, datadog/connector]
              exporters: [datadog]
    - action: Start the Collector with this configuration
      run: |
        DD_OTELCOLLECTOR_ENABLED=true DD_API_KEY=<key> DD_SITE=datadoghq.com \
          DD_CMD_PORT=0 DD_AGENT_IPC_PORT=0 DD_AGENT_IPC_CONFIG_REFRESH_INTERVAL=0 \
          DD_ENABLE_METADATA_COLLECTION=false DD_HOSTNAME=<hostname> \
          ./otel-agent --config config.yaml
    - action: |
        Wait ~15 seconds for the Collector to reach a stable state, then in a
        separate terminal send a single test trace to the default gRPC port:
      run: telemetrygen traces --otlp-insecure --otlp-endpoint localhost:4317 --traces 1
    - action: |
        Verify that the debug exporter output contains the received spans, including
        `Trace ID`, `Span ID`, `Name`, and at least one resource attribute
        (`service.name`):
      expected: |
        ResourceSpans #0
        Resource SchemaURL: https://opentelemetry.io/schemas/1.38.0
        Resource attributes:
             -> service.name: Str(telemetrygen)
        ScopeSpans #0
        InstrumentationScope telemetrygen
        Span #0
            Trace ID       : ...
            Parent ID      : ...
            ID             : ...
            Name           : okey-dokey-0
            Kind           : Server
            Start time     : ...
            End time       : ...
            Status code    : Unset
        Attributes:
             -> network.peer.address: Str(1.2.3.4)
             -> peer.service: Str(telemetrygen-client)
        Span #1
            Trace ID       : ...
            Parent ID      :
            ID             : ...
            Name           : lets-go
            Kind           : Client

- id: T002
  ref: [OTELCOL010]
  short: Receive all three signal types over gRPC
  long: |
    Verify that the OTLP gRPC receiver accepts traces, metrics, and logs independently,
    each routed through its own pipeline, via a single shared receiver instance.
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: |
        Create a Collector configuration with three pipelines (traces, metrics, logs)
        all reading from the same OTLP gRPC receiver:
      sample_lang: yaml
      sample: |
        receivers:
          otlp:
            protocols:
              grpc:
        exporters:
          debug:
            verbosity: detailed
        service:
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
            metrics:
              receivers: [otlp]
              exporters: [debug]
            logs:
              receivers: [otlp]
              exporters: [debug]
    - action: Start the Collector with this configuration
      run: ./ddot --config config.yaml
    - action: Send one test trace, one metric, and one log record
      run: |
        telemetrygen traces  --otlp-insecure --otlp-endpoint localhost:4317 --traces 1
        telemetrygen metrics --otlp-insecure --otlp-endpoint localhost:4317 --metrics 1
        telemetrygen logs    --otlp-insecure --otlp-endpoint localhost:4317 --logs 1
    - action: |
        Verify the Collector output contains one span, one metric data point,
        and one log record.

- id: T003
  ref: [OTELCOL010]
  short: Receive OTLP traces over gRPC on a custom port
  long: |
    Verify that the OTLP gRPC receiver can be configured to listen on a port other
    than the default 4317.
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: |
        Create a Collector configuration overriding the gRPC endpoint to port 14317:
      sample_lang: yaml
      sample: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:14317
        exporters:
          debug:
            verbosity: detailed
        service:
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Start the Collector with this configuration
      run: ./ddot --config config.yaml
    - action: Confirm the default port 4317 is not open
      run: nc -z localhost 4317
      expected: Connection refused
    - action: Send a test trace to the custom port
      run: telemetrygen traces --otlp-insecure --otlp-endpoint localhost:14317 --traces 1
    - action: Verify the span appears in the Collector output.
