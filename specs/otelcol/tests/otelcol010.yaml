kind: tests
category: functional
tests:
- id: T002
  ref: [OTELCOL010]
  short: Receive traces, metrics, and logs over gRPC on the default port
  long: |
    Using the agent started in T001 (which exposes gRPC on port 4317), verify that the
    OTLP gRPC receiver accepts all three signal types, routing each through its own
    pipeline. Each signal is sent and verified independently in sequence.
  prereq: [T001]
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: Send one trace (two spans) to the gRPC port
      run: telemetrygen traces --otlp-insecure --otlp-endpoint localhost:4317 --traces 1
      expected: |
        ... INFO	traces/worker.go:180	traces generated	{"worker": 0, "traces": 1}
    - action: Verify the debug exporter output in the Collector logs contains both spans
      sample: |
        ResourceSpans #0
        Resource SchemaURL: https://opentelemetry.io/schemas/1.38.0
        Resource attributes:
             -> service.name: Str(telemetrygen)
        ScopeSpans #0
        ScopeSpans SchemaURL:
        InstrumentationScope telemetrygen
        Span #0
            Trace ID       : ...
            Parent ID      : ...
            ID             : ...
            Name           : okey-dokey-0
            Kind           : Server
            Start time     : ...
            End time       : ...
            Status code    : Unset
            Status message :
        Attributes:
             -> network.peer.address: Str(1.2.3.4)
             -> peer.service: Str(telemetrygen-client)
        Span #1
            Trace ID       : ...
            Parent ID      :
            ID             : ...
            Name           : lets-go
            Kind           : Client
        Attributes:
             -> network.peer.address: Str(1.2.3.4)
             -> peer.service: Str(telemetrygen-server)
    - action: Send one metric
      run: telemetrygen metrics --otlp-insecure --otlp-endpoint localhost:4317 --metrics 1
      expected: |
        ... INFO	metrics/worker.go:243	metrics generated	{"worker": 0, "metrics": 1}
    - action: Verify the debug exporter output contains the metric data point
      sample: |
        ResourceMetrics #0
        Resource SchemaURL: https://opentelemetry.io/schemas/1.38.0
        Resource attributes:
             -> service.name: Str(telemetrygen)
        ScopeMetrics #0
        ScopeMetrics SchemaURL:
        InstrumentationScope
        Metric #0
        Descriptor:
             -> Name: gen
             -> Description:
             -> Unit:
             -> DataType: Gauge
        NumberDataPoints #0
        StartTimestamp: 1970-01-01 00:00:00 +0000 UTC
        Timestamp: ...
        Value: 0
    - action: Send one log record
      run: telemetrygen logs --otlp-insecure --otlp-endpoint localhost:4317 --logs 1
      expected: |
        ... INFO	logs/worker.go:120	logs generated	{"worker": 0, "logs": 1}
    - action: Verify the debug exporter output contains the log record
      sample: |
        ResourceLog #0
        Resource SchemaURL: https://opentelemetry.io/schemas/1.38.0
        Resource attributes:
             -> service.name: Str(telemetrygen)
        ScopeLogs #0
        ScopeLogs SchemaURL:
        InstrumentationScope
        LogRecord #0
        ObservedTimestamp: 1970-01-01 00:00:00 +0000 UTC
        Timestamp: ...
        SeverityText: Info
        SeverityNumber: Info(9)
        Body: Str(the message)
        Attributes:
             -> app: Str(server)
        Trace ID:
        Span ID:
        Flags: 0

- id: T003
  ref: [OTELCOL010]
  short: Receive OTLP traces over gRPC on a custom port
  long: |
    Verify that the OTLP gRPC receiver can be configured to listen on a non-default port,
    and that the default port 4317 is not opened in that case.
  prereq: [T001]
  initial: |
    The `telemetrygen` tool is available:
      go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
  steps:
    - action: Prepare a configuration with the gRPC endpoint overridden to port 14317
      run: cat config.yaml
      sample_lang: yaml
      sample: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:14317
        exporters:
          debug:
            verbosity: detailed
          datadog:
        service:
          pipelines:
            traces:
              receivers: [otlp]
              exporters: [debug]
    - action: Restart the otel-agent with this configuration and verify startup
      sample: |
        [...]
        ... | OTELCOL | INFO | (...) | [...]endpoint:0.0.0.0:14317 | Starting GRPC server
        ... | OTELCOL | INFO | (...) | ... | Everything is ready. Begin running and processing data.
        [...]
    - action: Confirm the default port 4317 is not open
      run: nc -z localhost 4317
      expected: Connection refused
    - action: Send a test trace to port 14317
      run: telemetrygen traces --otlp-insecure --otlp-endpoint localhost:14317 --traces 1
      expected: |
        ... INFO	traces/worker.go:180	traces generated	{"worker": 0, "traces": 1}
    - action: Verify both spans appear in the debug exporter output
      sample: |
        Span #0
            Name           : okey-dokey-0
            Kind           : Server
        Span #1
            Name           : lets-go
            Kind           : Client
