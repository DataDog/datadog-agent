kind: requirements
category: functional
requirements:
  - id: OTELCOL010
    short: Receive OTLP telemetry over gRPC
    long: |
      The user shall be able to send traces, metrics, and logs from any OpenTelemetry SDK
      or instrumented application to the Collector using the OTLP/gRPC transport.
      The Collector shall accept unary gRPC requests on the OTLP receiver endpoint (default
      port 4317) and process the received data through the configured pipelines.
    tags: [input, otlp, grpc]
    ref: [OTELCOL004, OTELCOL009]

  - id: OTELCOL011
    short: Receive OTLP telemetry over HTTP
    long: |
      The user shall be able to send traces, metrics, and logs from any OpenTelemetry SDK
      or instrumented application to the Collector using the OTLP/HTTP transport, with
      either protobuf or JSON encoding.
      The Collector shall accept HTTP POST requests on the OTLP receiver endpoint (default
      port 4318) at the signal-specific paths (/v1/traces, /v1/metrics, /v1/logs) and
      process the received data through the configured pipelines.
    tags: [input, otlp, http]
    ref: [OTELCOL004, OTELCOL009]

  - id: OTELCOL012
    short: Load configuration from a YAML file
    long: |
      The user shall be able to supply the Collector with a YAML configuration file that
      declares the components (receivers, processors, exporters, extensions, connectors)
      and the pipelines that connect them.
      The Collector shall read the file at startup and use it as the source of truth for
      its runtime behavior.
      The default configuration file location is /etc/<otel-directory>/config.yaml; an
      alternative path can be provided via the --config flag.
    tags: [config]

  - id: OTELCOL013
    short: Substitute environment variables in configuration
    long: |
      The user shall be able to reference environment variables anywhere in the
      configuration file using the ${env:VARIABLE_NAME} syntax.
      The Collector shall substitute these references with the corresponding environment
      variable values at startup.
      A default value may be provided using the ${env:VARIABLE_NAME:-default} syntax, and
      will be used when the variable is not set.
    tags: [config]
    ref: [OTELCOL012]

  - id: OTELCOL014
    short: Merge multiple configuration sources
    long: |
      The user shall be able to provide more than one configuration source to the
      Collector, including YAML files, inline YAML strings, environment variables, and
      HTTP/HTTPS URIs.
      The Collector shall merge all provided sources in the order they are specified; later
      sources take precedence over earlier ones for overlapping keys.
      Multiple sources are specified by repeating the --config flag on the command line.
    tags: [config]
    ref: [OTELCOL012]

  - id: OTELCOL015
    short: Filter telemetry using OTTL expressions
    long: |
      The user shall be able to configure the Collector to drop spans, metric data points,
      or log records that match a condition expressed in OTTL (OpenTelemetry Transformation
      Language).
      Filtering is applied via the filter processor; data matching the specified condition
      is dropped before reaching downstream processors and exporters.
    tags: [processing, filter]
    ref: [OTELCOL005]

  - id: OTELCOL016
    short: Add, modify, or delete telemetry attributes
    long: |
      The user shall be able to configure the Collector to insert, update, delete, or
      replace attributes on spans, metric data points, or log records as they flow through
      a pipeline.
      This is achieved via the attributes processor (for span and metric attributes) or
      the resource processor (for resource-level attributes).
    tags: [processing, attributes]
    ref: [OTELCOL005]

  - id: OTELCOL017
    short: Enrich telemetry with resource attributes from the environment
    long: |
      The user shall be able to configure the Collector to automatically detect and attach
      metadata from the host, cloud provider, or Kubernetes environment to telemetry
      resource attributes.
      This enrichment is provided by the resource detection processor and the Kubernetes
      attributes processor, and does not require changes to the instrumented application.
    tags: [processing, enrichment]
    ref: [OTELCOL005]

  - id: OTELCOL018
    short: Export processed telemetry to a downstream OTLP endpoint
    long: |
      The user shall be able to configure the Collector to forward processed traces,
      metrics, and logs to any downstream endpoint that accepts the OTLP protocol, using
      either OTLP/gRPC or OTLP/HTTP transport.
    tags: [output, otlp]
    ref: [OTELCOL006, OTELCOL009]
