kind = "requirements"
category = "functional"

[[requirements]]
id = "RF023"
short = "OCI package download and install"
long = '''
The fleet installer shall download OCI images from a package registry and
install them to the local package repository.

During download, the installer shall:
1. Resolve the package URL to a registry reference
2. Download the OCI image, with up to 3 retries on network failure
3. Extract layers by media type:
   - application/vnd.datadog.package.layer.v1.tar+zstd for binaries
   - application/vnd.datadog.package.config.layer.v1.tar+zstd for configuration
4. Create the package in the local repository with a stable symlink

If the same package and version is already installed, the installer shall skip
the operation (unless ForceInstall is used).

Pre-install and post-install hooks shall be called for each package to perform
package-specific setup (service registration, user configuration, etc.).
'''
tags = ["lifecycle:install", "installer:fleet"]
ref = ["RF027", "RD003"]

[[requirements]]
id = "RF024"
short = "Experiment lifecycle"
long = '''
The fleet installer shall support an experiment workflow for safe package
upgrades:

1. InstallExperiment: download and install a candidate version alongside the
   stable version, linked via an "experiment" symlink.
2. RemoveExperiment: delete the experiment version and revert to stable.
3. PromoteExperiment: promote the experiment to stable, updating the stable
   symlink and the packages database.

On Windows, starting an experiment shall launch a background watchdog process
that monitors the agent and installer services. If either service crashes during
the experiment window (configurable, default 60 minutes), the watchdog shall
automatically invoke RemoveExperiment to restore the stable version.

The watchdog timeout is configurable via the registry key
HKLM\SOFTWARE\Datadog\Datadog Agent\WatchdogTimeout.
'''
tags = ["lifecycle:upgrade", "feature:experiment", "installer:fleet"]
ref = ["RF010", "RF025", "RD004"]

[[requirements]]
id = "RF025"
short = "Config experiment lifecycle"
long = '''
The fleet installer shall support configuration experiments:

1. InstallConfigExperiment: apply configuration changes to an experiment
   directory. Secrets in the operations shall be decrypted before writing.
2. RemoveConfigExperiment: remove the experiment configuration and revert to
   the stable configuration.
3. PromoteConfigExperiment: promote the experiment configuration to stable.

On Windows, config experiments use the "fleet_policies_dir" registry key to
point the agent at the stable or experiment configuration directory. A watchdog
monitors for service crashes and reverts to stable configuration on failure.
'''
tags = ["feature:experiment", "feature:config", "installer:fleet"]
ref = ["RF024"]

[[requirements]]
id = "RF026"
short = "Extension management"
long = '''
The fleet installer shall support package extensions -- optional add-on layers
within OCI packages that can be independently managed.

Operations:
- InstallExtensions: download the OCI image and extract only the extension
  layers matching the requested extension names (identified by annotation).
- RemoveExtensions: remove the specified extensions from the package.
- SaveExtensions: persist the current extension state to disk for backup.
- RestoreExtensions: restore previously saved extensions after a package
  reinstall.

Extensions shall be preserved across package upgrades. When a package is
upgraded, the installer shall save extensions before removal and restore them
after installation.

After installing or removing agent extensions, the agent shall be restarted.
'''
tags = ["feature:extension", "installer:fleet"]
ref = ["RD005"]

[[requirements]]
id = "RF027"
short = "Disk space check before install"
long = '''
Before installing a package, the installer shall verify that sufficient disk
space is available on the partition hosting the packages directory.

The required space is the reported package size plus a 10 MiB overhead. If the
package does not report a size, a default estimate of 2 GiB shall be used.

If insufficient space is available, the installer shall fail with a
"not enough disk space" error before attempting extraction.
'''
tags = ["lifecycle:install", "installer:fleet"]
ref = ["RF023"]

[[requirements]]
id = "RF028"
short = "Garbage collection"
long = '''
The fleet installer shall perform garbage collection to reclaim disk space:

1. Remove old package versions that are no longer referenced by stable or
   experiment symlinks.
2. Remove temporary files and directories older than 24 hours from the
   installer's temp directory.

Garbage collection shall call async pre-remove hooks for each package version
being removed to allow package-specific cleanup (e.g. unregistering .NET
libraries from the GAC).
'''
tags = ["installer:fleet"]
ref = ["RF023"]

[[requirements]]
id = "RF036"
short = "Default package resolution"
long = '''
The fleet installer shall resolve which packages to install by default based on
the runtime environment.

Each known package has a release status, optional per-site overrides, and an
optional condition function. A package is included in the default set when:
1. It is marked as released (globally, for the current site, or when remote
   updates are enabled), AND
2. Its condition function returns true (e.g. APM injection is enabled, DDOT
   is enabled), AND
3. It has not been explicitly excluded via DefaultPackagesInstallOverride.

Packages can also be force-included or force-excluded via overrides regardless
of release status.

Version selection follows this precedence:
1. Explicit version override (DefaultPackagesVersionOverride)
2. Package-specific version function (e.g. pinned versions for CentOS 6)
3. Default major version from the package defaults table
4. "latest"
'''
tags = ["lifecycle:install", "installer:fleet", "component:apm"]
ref = ["RF023", "RF031"]

[[requirements]]
id = "RF037"
short = "Registry mirror and fallback"
long = '''
The fleet installer shall support registry mirrors and fallback registries for
OCI package downloads.

When a mirror is configured (via installer.mirror), all registry requests shall
be transparently rewritten to the mirror host. The mirror transport rewrites the
host, scheme, and optionally the path prefix while preserving the OCI API
request structure.

When the primary registry is unreachable, the installer shall attempt fallback
registries in order. Default registries:
- Production: install.datadoghq.com, with gcr.io/datadoghq as fallback
- Staging: install.datad0g.com

Authentication methods: Docker config (default), GCR service account, or
explicit username/password. The method is configurable via
installer.registry.auth.
'''
tags = ["lifecycle:install", "installer:fleet"]
ref = ["RF023", "RA009"]

[[requirements]]
id = "RF038"
short = "Remote config driven operations"
long = '''
The fleet daemon shall receive and process instructions from the Datadog remote
configuration service to manage packages and configuration.

When the daemon receives a catalog update, it shall compare the desired state
with the current installed state and trigger install, experiment, or config
experiment operations as needed.

Operations are processed sequentially through a request queue. Each operation
is persisted in the task database so that its status can be reported back to
the remote config service. The daemon reports the current package state,
config state, and any errors to the remote config service on each refresh
interval.

The daemon also supports catalog and config overrides via the local API,
allowing local clients to take precedence over remote config.
'''
tags = ["installer:fleet"]
ref = ["RA004", "RA005", "RF024", "RF025"]

[[requirements]]
id = "RF039"
short = "Service management during lifecycle"
long = '''
The installer shall manage agent services at the appropriate points during
package lifecycle operations.

- Install: services shall be started after post-install hooks complete.
  When DD_INSTALL_ONLY=1 is set, services shall not be started.
- Upgrade: services shall be stopped before replacing binaries and restarted
  after post-install hooks complete.
- Uninstall: services shall be stopped before removing binaries and service
  registrations.
- Experiment start: the experiment version's services shall be started after
  swapping the experiment symlink.
- Experiment stop: services shall be reverted to the stable version.
- Config experiment: services shall be restarted to pick up the new
  configuration.

On Windows, service-stopping hooks spawn detached background processes to
avoid blocking the daemon's Fx shutdown timeout.
'''
tags = ["lifecycle:install", "lifecycle:upgrade", "lifecycle:uninstall", "installer:fleet", "installer:msi"]
ref = ["RF001", "RF007", "RF013", "RF024"]

[[requirements]]
id = "RF040"
short = "Install script"
long = '''
The fleet installer shall provide install scripts (shell for Linux/macOS,
PowerShell for Windows) as an alternative entry point for automated
deployments.

The install script shall:
1. Download and bootstrap the fleet installer binary
2. Resolve the default set of packages to install based on environment
   variables (DD_API_KEY, DD_SITE, DD_APM_INSTRUMENTATION_ENABLED,
   DD_APM_INSTRUMENTATION_LIBRARIES, etc.)
3. Install each resolved package
4. Configure the agent with the provided API key and site

The script shall be idempotent: running it again on an already-installed host
shall update packages to the resolved versions without losing configuration.
'''
tags = ["lifecycle:install", "installer:fleet"]
ref = ["RF036", "RF001"]
