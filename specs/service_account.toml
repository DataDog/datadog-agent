kind = "requirements"
category = "functional"

[[requirements]]
id = "RF016"
short = "User account format support"
client_statement = '''
I need to specify the agent service account in various formats depending on
whether it is a local, domain, or built-in account.
'''
long = '''
The installer shall support the following user account formats for the
DDAGENTUSER_NAME parameter:

Local accounts:
- user
- .\user
- MACHINENAME\user

Domain accounts:
- DOMAIN\user
- domain.fqdn\user

Built-in accounts:
- LocalSystem
- SYSTEM
- NT AUTHORITY\SYSTEM

Group Managed Service Accounts (gMSA):
- DOMAIN\account$

The installer shall resolve ambiguous formats (user, .\user) to local accounts
on workgroup hosts and domain clients, and to domain accounts on domain
controllers.
'''
tags = ["account", "account:local", "account:domain", "account:gmsa", "installer:msi"]
ref = ["RF017", "RF021"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-017"

[[requirements]]
id = "RF017"
short = "Auto-create local accounts"
client_statement = '''
I want to install the agent on a workgroup host without having to manually
create a service account first.
'''
long = '''
On workgroup hosts and domain clients, the installer shall create a local user
account if the specified DDAGENTUSER_NAME does not exist.

On domain controllers, the installer shall not create domain accounts. If the
specified account does not exist on a domain controller, the installer shall
report an error.
'''
tags = ["account:local", "account:domain", "installer:msi"]
ref = ["RF016", "RF018"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-018"

[[requirements]]
id = "RF018"
short = "Existing account handling"
client_statement = '''
I am upgrading and the service account already exists. I should not have to
provide the password again.
'''
long = '''
When the specified user account already exists and no password is provided:
- For local accounts: the installer shall reset the password to a random value
  and store it in the LSA secret store.
- For domain accounts: the installer shall not change the password.
- For gMSA accounts: no password handling is required.

When a password is explicitly provided, the installer shall use it regardless of
account type.
'''
tags = ["account:local", "account:domain", "account:gmsa", "installer:msi"]
ref = ["RF016", "RF012"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-019"

[[requirements]]
id = "RF019"
short = "Account preservation on uninstall"
client_statement = '''
I do not want the agent uninstall to delete the service account, because user
profiles cannot be cleaned up without a reboot.
'''
long = '''
The installer shall never delete the ddagentuser account on uninstall.

Deleting the user account without deleting its profile (which requires a reboot)
would cause profile accumulation on the host. The account is therefore left in
place.
'''
tags = ["lifecycle:uninstall", "account", "installer:msi"]
ref = ["RF013"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-020"

[[requirements]]
id = "RF020"
short = "Change service account"
client_statement = '''
I want to change the user account under which the agent services run.
'''
long = '''
The installer shall allow changing the ddagentuser of an already installed agent.

When a new DDAGENTUSER_NAME is provided during an upgrade or repair, the
installer shall:
1. Create the new account if it does not exist (for local accounts)
2. Configure the new account with the required permissions and group memberships
3. Update all agent service credentials to run under the new account
4. Update file ACLs on the configuration directory for the new account
'''
tags = ["account", "installer:msi"]
ref = ["RF016"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-012"

[[requirements]]
id = "RF021"
short = "Domain controller behavior"
client_statement = '''
I am installing the agent on a domain controller and need the account resolution
to behave correctly for my environment.
'''
long = '''
On domain controllers, the installer shall apply special account resolution
rules:

- Ambiguous formats (user, .\user) shall resolve to domain accounts, not local
  machine accounts.
- Machine-local account formats (MACHINENAME\user) shall produce an error,
  because domain controllers do not have a local SAM database for user accounts.
- Domain account formats (DOMAIN\user, domain.fqdn\user) shall work normally.
'''
tags = ["account:domain", "installer:msi"]
ref = ["RF016", "RF017"]
[requirements.properties]
source = "https://datadoghq.atlassian.net/wiki/spaces/AW/pages/2962820711#REQ-017"
