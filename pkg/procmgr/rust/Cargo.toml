[package]
name = "dd-procmgrd"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "dd-procmgrd"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
log.workspace = true
nix = { workspace = true, features = ["signal", "process"] }
prost.workspace = true
prost-types.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_yaml.workspace = true
simple_logger = { workspace = true, features = ["timestamps"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "process", "fs", "time", "sync"] }
tokio-stream = { workspace = true, features = ["net"] }
tonic = { workspace = true, features = ["transport"] }
tonic-reflection.workspace = true

[dev-dependencies]
hyper-util.workspace = true
nix = { workspace = true, features = ["signal", "process", "user"] }
tempfile.workspace = true
tower.workspace = true

[build-dependencies]
protoc-gen-prost.workspace = true
protoc-gen-tonic.workspace = true
tonic-build.workspace = true
