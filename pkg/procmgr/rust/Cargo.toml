[package]
name = "dd-procmgrd"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "dd_procmgrd"
path = "src/lib.rs"
doctest = false

[[bin]]
name = "dd-procmgrd"
path = "src/bins/dd-procmgrd.rs"

[[bin]]
name = "dd-procmgr"
path = "src/bins/dd-procmgr.rs"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
hyper-util = { workspace = true, features = ["tokio"] }
log.workspace = true
nix = { workspace = true, features = ["signal", "process"] }
prost.workspace = true
prost-types.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_yaml.workspace = true
dd-agent-log.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "process", "fs", "time", "sync"] }
tokio-stream = { workspace = true, features = ["net"] }
tonic = { workspace = true, features = ["transport"] }
tonic-reflection.workspace = true
tower.workspace = true
uuid.workspace = true

[dev-dependencies]
nix = { workspace = true, features = ["signal", "process", "user"] }
tempfile.workspace = true

[build-dependencies]
protoc-gen-prost.workspace = true
protoc-gen-tonic.workspace = true
tonic-build.workspace = true
