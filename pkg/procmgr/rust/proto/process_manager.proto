syntax = "proto3";

package datadog.procmgr;

option go_package = "github.com/DataDog/datadog-agent/pkg/proto/pbgo/procmgr";

service ProcessManager {
  rpc List (ListRequest) returns (ListResponse);
  rpc Describe (DescribeRequest) returns (DescribeResponse);
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
}

enum ProcessState {
  UNKNOWN = 0;
  CREATED = 1;
  STARTING = 2;
  RUNNING = 3;
  STOPPING = 4;
  STOPPED = 5;
  CRASHED = 6;
  EXITED = 7;
  FAILED = 8;
}

message ListRequest {}

message Process {
  string name = 1;
  uint32 pid = 2;
  string command = 3;
  repeated string args = 4;
  ProcessState state = 5;
}

message ListResponse {
  repeated Process processes = 1;
}

message DescribeRequest {
  string name = 1;
}

message ProcessDetail {
  string name = 1;
  string description = 2;
  uint32 pid = 3;
  ProcessState state = 4;
  string command = 5;
  repeated string args = 6;
  string working_dir = 7;
  map<string, string> env = 8;
  string restart_policy = 9;
  string stdout = 10;
  string stderr = 11;
  bool auto_start = 12;
  string condition_path_exists = 13;
  repeated string after = 14;
  repeated string before = 15;
}

message DescribeResponse {
  ProcessDetail detail = 1;
}

message GetStatusRequest {}

message GetStatusResponse {
  bool ready = 1;
  string version = 2;
  uint64 uptime_seconds = 3;
  uint32 total_processes = 4;
  uint32 running_processes = 5;
  uint32 stopped_processes = 6;
  uint32 failed_processes = 7;
  uint32 created_processes = 8;
  uint32 exited_processes = 9;
  uint32 starting_processes = 10;
  uint32 stopping_processes = 11;
  string config_path = 12;
}
