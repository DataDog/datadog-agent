[package]
name = "system-probe-lite"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = []
java-archives = ["dep:zip", "dep:walkdir"]
spring = ["java-archives", "dep:yaml-rust2"]
jee = ["java-archives", "dep:quick-xml"]

[lib]
name = "dd_discovery"
crate-type = ["rlib", "staticlib"]

[[bin]]
name = "system-probe-lite"
path = "src/main.rs"

[[bin]]
name = "disco"
path = "src/bin/disco.rs"

[target.'cfg(target_os = "linux")'.dependencies]
caps = { workspace = true }

[dependencies]
anyhow.workspace = true
cap-std.workspace = true
clap.workspace = true
elf.workspace = true
glob-match.workspace = true
http-body-util.workspace = true
hyper.workspace = true
hyper-util.workspace = true
log.workspace = true
lru.workspace = true
memchr.workspace = true
nom.workspace = true
normalize-path.workspace = true
phf.workspace = true
quick-xml = { workspace = true, optional = true }
rmp-serde.workspace = true
serde.workspace = true
serde_json.workspace = true
dd-agent-log.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread", "signal"] }
uzers.workspace = true
walkdir = { workspace = true, optional = true }
yaml-rust2 = { workspace = true, optional = true }
zip = { workspace = true, optional = true }

[dev-dependencies]
dircpy.workspace = true
walkdir.workspace = true
yaml-rust2.workspace = true
memmap2.workspace = true
nix.workspace = true
scopeguard.workspace = true
temp-env.workspace = true
tempfile.workspace = true
