syntax = "proto3";

package datadog.api.v1;

import "datadog/remoteconfig/remoteconfig.proto";

// Minimal client-side subset of the agent's AgentSecure service: only the unary
// remote-config fetch that system-probe-lite needs. The fully-qualified service
// and method names must match the agent's (datadog.api.v1.AgentSecure /
// ClientGetConfigs) so the gRPC call routes to the real server.
service AgentSecure {
  rpc ClientGetConfigs(datadog.config.ClientGetConfigsRequest) returns (datadog.config.ClientGetConfigsResponse);
}
