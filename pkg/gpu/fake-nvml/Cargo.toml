[package]
name = "fake-nvml"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Fake NVML shared library for Datadog Agent GPU check development and integration testing"

[lib]
name = "fake_nvml"
crate-type = ["cdylib"]

# serde + serde_yaml are used to parse the GPU architecture spec at startup.
# The spec file is embedded into the binary via include_str! so the shared
# library stays self-contained and does not need to read from disk at runtime.
[dependencies]
serde = { workspace = true }
serde_yaml = { workspace = true }
