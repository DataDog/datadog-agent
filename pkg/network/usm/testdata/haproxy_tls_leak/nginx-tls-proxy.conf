worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream backend_api {
        server 172.30.0.20:80;
        keepalive 32;
    }

    upstream backend_blackbox {
        server 172.30.0.30:80;
        keepalive 32;
    }

    server {
        listen 8443 ssl;
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # API endpoints -> backend_api
        location /v1/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /conviva/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /device/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /redfish/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Blackbox endpoints -> backend_blackbox
        location /elemental/ {
            proxy_pass http://backend_blackbox;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /probe {
            proxy_pass http://backend_blackbox;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /metrics {
            proxy_pass http://backend_blackbox;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Default -> round-robin between both
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}