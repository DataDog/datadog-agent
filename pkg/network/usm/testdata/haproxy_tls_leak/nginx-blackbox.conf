server {
    listen 80;
    server_name localhost;

    location /elemental/alerts {
        return 200 '{"service":"blackbox-exporter","endpoint":"elemental_alerts"}';
        add_header Content-Type application/json;
    }

    location /elemental/channelstatus {
        return 200 '{"service":"blackbox-exporter","endpoint":"elemental_channelstatus"}';
        add_header Content-Type application/json;
    }

    location /elemental/stats {
        return 200 '{"service":"blackbox-exporter","endpoint":"elemental_stats"}';
        add_header Content-Type application/json;
    }

    location /probe {
        return 200 '{"service":"blackbox-exporter","endpoint":"probe"}';
        add_header Content-Type application/json;
    }

    location /metrics {
        return 200 '{"service":"blackbox-exporter","endpoint":"metrics"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"service":"backend-blackbox","endpoint":"default"}';
        add_header Content-Type application/json;
    }
}