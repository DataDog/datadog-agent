server {
    listen 80;
    server_name localhost;

    location /v1/btc/pasithea_image_url_json {
        return 200 '{"service":"sre-graphics","endpoint":"pasithea_image_url_json"}';
        add_header Content-Type application/json;
    }

    location /v1/nfl/scores {
        return 200 '{"service":"sre-graphics","endpoint":"nfl_scores"}';
        add_header Content-Type application/json;
    }

    location /v1/graphics/render {
        return 200 '{"service":"sre-graphics","endpoint":"render"}';
        add_header Content-Type application/json;
    }

    location /conviva/health {
        return 200 '{"service":"conviva","endpoint":"health"}';
        add_header Content-Type application/json;
    }

    location /device/status {
        return 200 '{"service":"device-mgmt","endpoint":"status"}';
        add_header Content-Type application/json;
    }

    location /redfish/v1/info {
        return 200 '{"service":"redfish","endpoint":"info"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"service":"backend-api","endpoint":"default"}';
        add_header Content-Type application/json;
    }
}