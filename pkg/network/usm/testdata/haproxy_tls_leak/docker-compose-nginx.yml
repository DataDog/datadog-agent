networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    networks:
      testnet:
        ipv4_address: 172.30.0.10
    ports:
      - "8443:8443"
    volumes:
      - ./nginx-tls-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - backend-api
      - backend-blackbox

  backend-api:
    image: nginx:alpine
    container_name: backend-api
    networks:
      testnet:
        ipv4_address: 172.30.0.20
    volumes:
      - ./nginx-api.conf:/etc/nginx/conf.d/default.conf:ro

  backend-blackbox:
    image: nginx:alpine
    container_name: backend-blackbox
    networks:
      testnet:
        ipv4_address: 172.30.0.30
    volumes:
      - ./nginx-blackbox.conf:/etc/nginx/conf.d/default.conf:ro

  traffic:
    image: python:3.11-slim
    container_name: traffic-generator
    networks:
      testnet:
        ipv4_address: 172.30.0.40
    volumes:
      - ./persistent-client.py:/app/persistent-client.py:ro
    entrypoint: ["python3", "/app/persistent-client.py"]
    depends_on:
      - nginx-proxy