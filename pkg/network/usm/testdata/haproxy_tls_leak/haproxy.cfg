global
    maxconn 4096

defaults
    mode http
    timeout connect 5s
    timeout client 300s
    timeout server 300s
    option http-keep-alive

frontend https_in
    bind *:8443 ssl crt /etc/haproxy/certs/server.pem
    default_backend be_default

    # Route based on path prefix to different backends
    acl is_api path_beg /v1/btc /v1/nfl /v1/graphics
    acl is_blackbox path_beg /elemental /probe /metrics
    acl is_conviva path_beg /conviva /device /redfish

    use_backend be_api if is_api
    use_backend be_api if is_conviva
    use_backend be_blackbox if is_blackbox

backend be_api
    server api1 172.30.0.20:80

backend be_blackbox
    server blackbox1 172.30.0.30:80

backend be_default
    balance roundrobin
    server api1 172.30.0.20:80
    server blackbox1 172.30.0.30:80
