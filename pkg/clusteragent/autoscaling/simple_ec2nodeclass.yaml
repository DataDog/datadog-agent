apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default-test
  annotations:
    kubernetes.io/description: "General purpose EC2NodeClass for running Amazon Linux 2 nodes"
spec:
  role: "KarpenterNodeRole-celene-kind" # replace with your cluster name
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "celene-kind" # replace with your cluster name
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "celene-kind" # replace with your cluster name
  amiSelectorTerms:
    - alias: al2023@v20240625 # Amazon Linux 2023
