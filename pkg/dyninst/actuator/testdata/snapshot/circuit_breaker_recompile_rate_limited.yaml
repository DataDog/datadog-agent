      cpu: 5s
    - hit_cnt: 5
      throttled_cnt: 0
      cpu: 100ns
    - hit_cnt: 5
      throttled_cnt: 0
      cpu: 100ns
state:
  currently_loading: <nil>
  queued_programs: '[]'
  processes:
    1001: Attached (prog 1)
  programs:
