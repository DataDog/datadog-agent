        when: {dsl: '@return == 1', json: {eq: [{ref: '@return'}, 1]}}
        capture: {maxReferenceDepth: 1}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 7
        Message: return value selector (e.g., @return.r0) must be used for multi-value returns
