Issues:
    - probe_definition:
        id: condErr_bad_field
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condStructArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: x.NoSuchField == 42
            json: {eq: [{getmember: [{ref: x}, NoSuchField]}, 42]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 8
        Message: 'condition type exploration failed: failed to resolve field "NoSuchField" in expression "x.NoSuchField": type "main.condFields" has no NoSuchField field'
    - probe_definition:
        id: condErr_bad_json
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt32}
        tags: ['issue:UnsupportedFeature']
        when: {dsl: '???', json: {not_a_valid_op: [x]}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 3
        Message: 'unsupported condition expression type: *exprlang.UnsupportedExpr'
    - probe_definition:
        id: condErr_bare_ref
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt32}
        tags: ['issue:UnsupportedFeature']
        when: {dsl: x, json: {ref: x}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 3
        Message: 'unsupported condition expression type: *exprlang.RefExpr'
    - probe_definition:
        id: condErr_int8_overflow
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt8}
        tags: ['issue:ConditionExpressionUnresolvable']
        when: {dsl: x == 128, json: {eq: [{ref: x}, 128]}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 8
        Message: 'failed to resolve condition: condition: literal 128 out of range for int8 (8-bit)'
    - probe_definition:
        id: condErr_map
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condMapArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when: {dsl: x == 1, json: {eq: [{ref: x}, 1]}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 8
        Message: 'failed to resolve condition: eq: unsupported LHS type *ir.GoMapType for equality comparison'
    - probe_definition:
        id: condErr_rhs_ref
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condReturnAndLocal}
        tags: ['issue:ConditionExpressionUnresolvable']
        when: {dsl: a == b, json: {eq: [{ref: a}, {ref: b}]}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 8
        Message: 'failed to resolve condition: unsupported condition RHS type: *exprlang.RefExpr (only literals are supported)'
    - probe_definition:
        id: condErr_slice
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condSliceArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when: {dsl: x == 1, json: {eq: [{ref: x}, 1]}}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: true
      issue:
        Kind: 8
        Message: 'failed to resolve condition: eq: unsupported LHS type *ir.GoSliceHeaderType for equality comparison'
    - probe_definition:
        id: condErr_string_vs_int
        version: 0
        type: LOG_PROBE
