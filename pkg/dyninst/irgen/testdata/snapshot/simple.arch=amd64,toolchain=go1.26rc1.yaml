Issues:
    - probe_definition:
        id: anyIntArray_atValue_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntArray}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json: {any: [{ref: xs}, {eq: [{ref: '@value'}, 1]}]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: any/all predicate body: @value is only valid for map collections'
    - probe_definition:
        id: anyIntSlice_atKey_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntSlice}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json: {any: [{ref: xs}, {eq: [{ref: '@key'}, 1]}]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: any/all predicate body: @key is only valid for map collections'
    - probe_definition:
        id: anyIntSlice_nested_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntSlice}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json:
                any:
                    - ref: xs
                    - any: [{ref: '@it'}, {eq: [{ref: '@it'}, 1]}]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: nested any/all is not supported'
    - probe_definition:
        id: anyIntSlice_outerScope_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntSlice}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json: {any: [{ref: xs}, {eq: [{ref: tag}, match]}]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: any/all predicate body may only reference @it (and @key/@value for maps), got "tag"'
    - probe_definition:
        id: anyOversizedSlice_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllOversizedSlice}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json:
                any:
                    - ref: xs
                    - eq: [{getmember: [{ref: '@it'}, I32]}, 1]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: any/all over a slice with element size 328 exceeds the 256-byte per-iteration scratch budget'
    - probe_definition:
        id: captureFilter_condition_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntSlice}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: filter(xs, {@it == 42})
            json: {filter: [{ref: xs}, {eq: [{ref: '@it'}, 42]}]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should_never_render
        segments: [should_never_render]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: 'unsupported condition expression type: *exprlang.FilterExpr'
    - probe_definition:
        id: captureFilter_len_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntSlice}
        tags: ['issue:UnsupportedFeature']
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: ""
        segments: []
        captureSnapshot: false
        captureExpressions:
            - name: lenOfFilter
              expr:
                dsl: len(filter(xs, {@it == 42}))
                json:
                    len: {filter: [{ref: xs}, {eq: [{ref: '@it'}, 42]}]}
      issue:
        Kind: 3
        Message: 'filter is not composable: filter(...) is only allowed as the top-level expression of a capture or message template segment, not nested inside another operator'
    - probe_definition:
        id: condCompound_eq_of_eq
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt32}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (x == 1) == true
            json: {eq: [{eq: [{ref: x}, 1]}, true]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (x == 1) == true
        segments: [(x == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_eq_of_eq_return
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condMultiReturn}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (@return.r0 == 1) == true
            json:
                eq: [{eq: [{getmember: [{ref: '@return'}, r0]}, 1]}, true]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (@return.r0 == 1) == true
        segments: [(@return.r0 == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_or_bad_leaf
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condStructArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: x.I32 == 300 || x.missingField == 7
            json:
                or:
                    - eq: [{getmember: [{ref: x}, I32]}, 300]
                    - eq: [{getmember: [{ref: x}, missingField]}, 7]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: x.I32 == 300 || x.missingField == 7 [tag={tag}]
        segments:
            - x.I32 == 300 || x.missingField == 7 [tag=
            - json: {ref: tag}
              dsl: tag
            - ']'
