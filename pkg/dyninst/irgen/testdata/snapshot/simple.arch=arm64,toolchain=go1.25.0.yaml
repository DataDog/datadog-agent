Issues:
    - probe_definition:
        id: condCompound_eq_of_eq
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt32}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (x == 1) == true
            json: {eq: [{eq: [{ref: x}, 1]}, true]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (x == 1) == true
        segments: [(x == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_eq_of_eq_return
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condMultiReturn}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (@return.r0 == 1) == true
            json:
                eq: [{eq: [{getmember: [{ref: '@return'}, r0]}, 1]}, true]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (@return.r0 == 1) == true
        segments: [(@return.r0 == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_or_bad_leaf
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condStructArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: x.I32 == 300 || x.missingField == 7
            json:
                or:
                    - eq: [{getmember: [{ref: x}, I32]}, 300]
                    - eq: [{getmember: [{ref: x}, missingField]}, 7]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: x.I32 == 300 || x.missingField == 7 [tag={tag}]
        segments:
            - x.I32 == 300 || x.missingField == 7 [tag=
            - json: {ref: tag}
              dsl: tag
            - ']'
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'condition type exploration failed: failed to resolve field "missingField" in expression "x.missingField": type "main.condFields" has no missingField field'
    - probe_definition:
        id: condCompound_split_carry_overflow
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condStructArg}
        tags: ['issue:ConditionCarryTooLarge']
        when:
            dsl: x.I8==1 && x.I16==2 && x.I32==3 && x.I64==4 && x.U8==5 && x.U16==6 && x.U32==7 && x.U64==8 && x.B==true && @duration>0.0
            json:
                and:
                    - eq: [{getmember: [{ref: x}, I8]}, 1]
                    - and:
                        - eq: [{getmember: [{ref: x}, I16]}, 2]
                        - and:
                            - eq: [{getmember: [{ref: x}, I32]}, 3]
                            - and:
                                - eq: [{getmember: [{ref: x}, I64]}, 4]
                                - and:
                                    - eq: [{getmember: [{ref: x}, U8]}, 5]
                                    - and:
                                        - eq: [{getmember: [{ref: x}, U16]}, 6]
                                        - and:
                                            - eq: [{getmember: [{ref: x}, U32]}, 7]
                                            - and:
                                                - eq: [{getmember: [{ref: x}, U64]}, 8]
                                                - and:
                                                    - eq: [{getmember: [{ref: x}, B]}, true]
                                                    - gt: [{ref: '@duration'}, 0]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: split_carry_overflow
        segments: [split_carry_overflow]
        captureSnapshot: false
      issue:
        Kind: 9
        Message: split condition has more than 8 entry-side leaves; condition_state cannot represent more
    - probe_definition:
