Issues:
    - probe_definition:
        id: anyIntArray_atValue_err
        version: 0
        type: LOG_PROBE
        where: {methodName: main.anyAllIntArray}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: ""
            json: {any: [{ref: xs}, {eq: [{ref: '@value'}, 1]}]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: should be rejected
        segments: [should be rejected]
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'failed to resolve condition: any/all predicate body: @value is only valid for map collections'
    - probe_definition:
        id: anyIntSlice_atKey_err
