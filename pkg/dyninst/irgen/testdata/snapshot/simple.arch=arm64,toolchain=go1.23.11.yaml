Issues:
    - probe_definition:
        id: condCompound_eq_of_eq
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condInt32}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (x == 1) == true
            json: {eq: [{eq: [{ref: x}, 1]}, true]}
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (x == 1) == true
        segments: [(x == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_eq_of_eq_return
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condMultiReturn}
        tags: ['issue:UnsupportedFeature']
        when:
            dsl: (@return.r0 == 1) == true
            json:
                eq: [{eq: [{getmember: [{ref: '@return'}, r0]}, 1]}, true]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: (@return.r0 == 1) == true
        segments: [(@return.r0 == 1) == true]
        captureSnapshot: false
      issue:
        Kind: 3
        Message: condition leaf LHS may not be a boolean expression (*exprlang.EqExpr); use the inner expression directly
    - probe_definition:
        id: condCompound_or_bad_leaf
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condStructArg}
        tags: ['issue:ConditionExpressionUnresolvable']
        when:
            dsl: x.I32 == 300 || x.missingField == 7
            json:
                or:
                    - eq: [{getmember: [{ref: x}, I32]}, 300]
                    - eq: [{getmember: [{ref: x}, missingField]}, 7]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: x.I32 == 300 || x.missingField == 7 [tag={tag}]
        segments:
            - x.I32 == 300 || x.missingField == 7 [tag=
            - json: {ref: tag}
              dsl: tag
            - ']'
        captureSnapshot: false
      issue:
        Kind: 8
        Message: 'condition type exploration failed: failed to resolve field "missingField" in expression "x.missingField": type "main.condFields" has no missingField field'
    - probe_definition:
        id: condCompound_return_and_param
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condReturnAndLocal}
        tags: ['issue:ConditionVariableUnavailable']
        when:
            dsl: '@return == 2 && a == 1'
            json:
                and: [{eq: [{ref: '@return'}, 2]}, {eq: [{ref: a}, 1]}]
        capture: {maxReferenceDepth: 1}
        sampling: {snapshotsPerSecond: 10}
        template: '@return == 2 && a == 1'
        segments: ['@return == 2 && a == 1']
        captureSnapshot: false
      issue:
        Kind: 7
        Message: compound condition references variables from multiple event kinds (Return and Entry)
    - probe_definition:
        id: condContains_absent_int
        version: 0
        type: LOG_PROBE
        where: {methodName: main.condContainsMap}
        tags:
            - issue:ConditionExpressionUnresolvable@arch=amd64,toolchain=go1.23.11
            - issue:ConditionExpressionUnresolvable@arch=arm64,toolchain=go1.23.11
