  template: "containsSubstr={contains(tag, \"x\")} tag={tag}"
  segments:
    - str: "containsSubstr="
    - json: { contains: [{ref: "tag"}, "x"] }
      dsl: 'contains(tag, "x")'
    - str: " tag="
    - json: {ref: "tag"}
      dsl: "tag"
  sampling:
    snapshotsPerSecond: 10

# Capture: predicate body references outer scope. The capture entry is
# skipped — the snapshot still loads, but the expression is invalid.
- id: captureAny_outerScope_err
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  captureExpressions:
    - name: "any_outer"
      expr:
        dsl: 'any(xs, {tag == "match"})'
        json: { any: [{ref: "xs"}, {eq: [{ref: "tag"}, "match"]}] }
  sampling:
    snapshotsPerSecond: 10

# Capture: nested any in body. Rejected the same way as condition position.
- id: captureAny_nested_err
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  captureExpressions:
    - name: "any_nested"
      expr:
        dsl: "any(xs, {any(@it, {@it == 1})})"
        json:
          any:
            - {ref: "xs"}
            - {any: [{ref: "@it"}, {eq: [{ref: "@it"}, 1]}]}
  sampling:
    snapshotsPerSecond: 10

# ---------------------------------------------------------------------------
# Negative — runtime eval errors. The probe loads cleanly; the snapshot
# carries an evaluationErrors entry / {error: ...} substring when the body
# faults at runtime.
# ---------------------------------------------------------------------------

# Template: any over a 5000-elem slice with no match — loop hits the
# 4096-element cap and trips eval_error. Segment renders {error: ...}.
- id: templateAnyIntSlice_toolarge
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  template: "anyTooLarge={any(xs, {@it == -1})} tag={tag}"
  segments:
    - str: "anyTooLarge="
    - json: { any: [{ref: "xs"}, {eq: [{ref: "@it"}, -1]}] }
      dsl: "any(xs, {@it == -1})"
    - str: " tag="
    - json: {ref: "tag"}
      dsl: "tag"
  sampling:
    snapshotsPerSecond: 10

# Regression: a template segment that traps the iteration cap (any over the
# 5000-elem slice for "toolarge" tag) must NOT leak condition_eval_error
# into the probe's `when:` check. We use a small slice for the condition
# branch (tag == "toolarge"), which would fail to fire if EXPR_PREPARE
# didn't clear the flag.
- id: regression_condEvalErrorIsolation
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  when:
    dsl: 'tag == "toolarge"'
    json: { eq: [{ref: "tag"}, "toolarge"] }
  template: "isolation={any(xs, {@it == -1})} tag={tag}"
  segments:
    - str: "isolation="
    - json: { any: [{ref: "xs"}, {eq: [{ref: "@it"}, -1]}] }
      dsl: "any(xs, {@it == -1})"
    - str: " tag="
    - json: {ref: "tag"}
      dsl: "tag"
  sampling:
    snapshotsPerSecond: 10

# Capture: any over slice of *int with predicate that derefs @it. The
# `unguarded_nil` input contains a nil pointer; the body faults at runtime
# and the capture entry surfaces an evaluationError row rather than a
# value.
- id: captureAnyPtrIntSlice_unguarded
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllPtrIntSlice
  captureExpressions:
    - name: "anyDeref"
      expr:
        dsl: "any(xs, {@it == 1})"
        json: { any: [{ref: "xs"}, {eq: [{ref: "@it"}, 1]}] }
  sampling:
    snapshotsPerSecond: 10

# Capture: filter() over a slice with an equality predicate.
- id: captureFilterIntSlice_eq42
  type: LOG_PROBE
  captureSnapshot: false
