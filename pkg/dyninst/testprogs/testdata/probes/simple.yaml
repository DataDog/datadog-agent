    - json: {ref: "b"}
      dsl: "b"
  sampling:
    snapshotsPerSecond: 10

# Unconditional snapshot for control (fires on both calls).
- id: condReturnAndLocal_nocond
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condReturnAndLocal
  sampling:
    snapshotsPerSecond: 10

