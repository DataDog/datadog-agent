# --- issue probes: ordering against unsupported LHS types must be rejected
# at IR generation time (UnsupportedFeature). Each probe references a
# disallowed combination so the snapshot test asserts the failure path. ---

# Ordering against null: null is only comparable with eq/ne.
- id: condInequality_null
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condNullPtr
  when:
    dsl: "p < nil"
    json: {lt: [{ref: "p"}, null]}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:ConditionExpressionUnresolvable"

# Ordering on bool: bools accept only eq/ne.
- id: condInequality_bool
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condBool
  when:
    dsl: "x < true"
    json: {lt: [{ref: "x"}, true]}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:ConditionExpressionUnresolvable"

# Ordering on float: deferred (IEEE-754 NaN/signed-zero semantics).
# Targets `x.F64` on condStructArg rather than the float64 parameter on
# condFloat64 — eBPF can't read floating-point registers, so a bare
# float64 parameter is ConditionVariableUnavailable before we reach the
# ordering check. Pulling F64 out of an addressable struct keeps it
# reachable via memory and forces the compiler to surface the
# ordering-rejection error.
- id: condInequality_float
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condStructArg
  when:
    dsl: "x.F64 < 1.0"
    json: {lt: [{getmember: [{ref: "x"}, "F64"]}, 1.0]}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:ConditionExpressionUnresolvable"

