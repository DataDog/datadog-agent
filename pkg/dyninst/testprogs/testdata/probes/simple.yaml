# Out-of-bounds index on slice in condition: s[5] == 42 on []int{1, 2, 3}.
# The bounds check fires at BPF runtime, aborting the condition expression.
# ConditionBegin sets condition_eval_error=true; the abort prevents
# ConditionCheck from clearing it, so the probe fires with a condition
# evaluation error (same as nil-deref in a condition).
- id: indexErr_slice_oob_cond
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.intSliceArg
  when:
    dsl: "s[5] == 42"
    json: {eq: [{index: [{ref: "s"}, 5]}, 42]}
  template: "matched"
  segments:
    - str: "matched"
  sampling:
    snapshotsPerSecond: 10

