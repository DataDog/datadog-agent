# ==========================================================================
# Condition tests: error cases
#
# These probes should fail at analysis or resolution time and produce issues.
# ==========================================================================

# when JSON fails to parse (invalid expression).
- id: condErr_bad_json
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condInt32
  when:
    dsl: "???"
    json: {not_a_valid_op: ["x"]}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:UnsupportedFeature"

# when expression is not an EqExpr (bare ref).
- id: condErr_bare_ref
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condInt32
  when:
    dsl: "x"
    json: {ref: "x"}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:UnsupportedFeature"

# when LHS root variable doesn't match any subprogram variable.
- id: condErr_unknown_var
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condInt32
  when:
    dsl: "nonexistent == 42"
    json: {eq: [{ref: "nonexistent"}, 42]}
  sampling:
    snapshotsPerSecond: 10
  tags:
    - "issue:ConditionVariableUnavailable"

# Condition on a slice variable (unsupported LHS type).
- id: condErr_slice
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condSliceArg
  when:
    dsl: "x == 1"
    json: {eq: [{ref: "x"}, 1]}
