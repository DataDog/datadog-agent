# --- Map index expression tests ---
# Map index expressions require swisstable maps (Go 1.24+). On Go 1.23 and
# earlier, maps use the old hmap implementation and index lookups are not
# supported. Integration tests are skipped for those versions; the condition
# probe (mapIndex_stringKey_cond) additionally has an issue tag because
# irgen rejects the condition outright.

# Capture expression: map[int]string index with int key
- id: mapIndex_intKey_capture
  tags:
    - "skip_integration:arch=amd64,toolchain=go1.23.11"
    - "skip_integration:arch=arm64,toolchain=go1.23.11"
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.mapIndexIntKey
  captureExpressions:
    - name: "m_2"
      expr:
        dsl: "m[2]"
        json: {index: [{ref: "m"}, 2]}
  sampling:
    snapshotsPerSecond: 10

