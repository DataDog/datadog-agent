# --- Index expression error cases ---

# Out-of-bounds index on array: s[3] on [3]int.
# The probe should compile successfully. At runtime, the eBPF reads past the
# array, which will either read garbage or fail the probe_read. The evaluation
# error surfaces in the snapshot output, not at IR generation time.
- id: indexErr_array_oob_capture
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.intArrayArg
  captureExpressions:
    - name: "s_3"
      expr:
        dsl: "s[3]"
        json: {index: [{ref: "s"}, 3]}
  sampling:
    snapshotsPerSecond: 10

# Out-of-bounds index on array in template
- id: indexErr_array_oob_template
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.intArrayArg
  template: "s[3]: {s[3]}"
  segments:
    - str: "s[3]: "
    - json: {index: [{ref: "s"}, 3]}
      dsl: "s[3]"
  sampling:
    snapshotsPerSecond: 10

# Out-of-bounds index on array in condition: currently fails the probe at
# IR generation because condition resolution errors are fatal. This matches
# the existing behavior for all condition expression failures. A future
# refactor should make this a runtime eval error (Java behavior: condition
# returns false + conditionErrors).
- id: indexErr_array_oob_cond
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.intArrayArg
  when:
