  sampling:
    snapshotsPerSecond: 10

# ---------------------------------------------------------------------------
# filter() over collections with element types that need nested pointer
# chasing. These exercise the sm->offset handoff between
# EmitFilterSliceElementOp / EmitFilterMapElementOp and the subsequent
# CallOp for the element's type handler.
# ---------------------------------------------------------------------------

# filter() over []string — string elements need data-pointer chasing.
# Uses @it == "match" (not !isEmpty) so the ExprReadString op advances
# sm->offset past cur_loop_it_start + 16, breaking the coincidental
# alignment with the 16-byte data-item header that masked the sm->offset
# bug with the !isEmpty predicate.
- id: captureFilterStringSlice_match
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllStringSlice
  capture:
    maxReferenceDepth: 20
  captureExpressions:
    - name: "matches"
      expr:
        dsl: 'filter(xs, {@it == "alpha"})'
        json: { filter: [{ref: "xs"}, {eq: [{ref: "@it"}, "alpha"]}] }
    - name: "tag"
      expr:
        dsl: "tag"
        json: {ref: "tag"}
  sampling:
    snapshotsPerSecond: 10

# filter() over []condFields — condFields contains a string field (S),
# so the element type handler needs to chase the string data pointer.
# maxReferenceDepth: 5 ensures the chase actually runs (default depth
# causes notCapturedReason:depth which masks the sm->offset bug).
- id: captureFilterStructSlice_I32gt0
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllStructSlice
  capture:
    maxReferenceDepth: 20
  captureExpressions:
    - name: "matches"
      expr:
        dsl: "filter(xs, {@it.I32 > 0})"
        json: { filter: [{ref: "xs"}, {gt: [{getmember: [{ref: "@it"}, "I32"]}, 0]}] }
    - name: "tag"
      expr:
        dsl: "tag"
        json: {ref: "tag"}
  sampling:
    snapshotsPerSecond: 10

# filter() over map[string]int — map with string keys needs key chasing.
# hmap (go1.23) is unsupported for filter.
- id: captureFilterIntMap_valueGt0
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntMap
  capture:
    maxReferenceDepth: 20
  tags:
    - "issue:UnsupportedFeature@arch=amd64,toolchain=go1.23.11"
    - "issue:UnsupportedFeature@arch=arm64,toolchain=go1.23.11"
  captureExpressions:
    - name: "matches"
      expr:
        dsl: "filter(m, {@value > 0})"
        json: { filter: [{ref: "m"}, {gt: [{ref: "@value"}, 0]}] }
    - name: "tag"
      expr:
        dsl: "tag"
        json: {ref: "tag"}
  sampling:
    snapshotsPerSecond: 10
