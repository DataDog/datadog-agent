# ==========================================================================
# Condition tests: nil pointer in condition dereference chain
#
# condNilPtrStruct is called twice:
#   1. Non-nil pointer matching condition → normal snapshot, no eval error
#   2. Nil pointer → condition eval error (treated as pass), snapshot emitted
#
# Both calls should produce snapshots. The nil-pointer call should additionally
# have an evaluationErrors entry for the condition expression.
# ==========================================================================

# Condition on pointer-to-struct field: fires for both calls (match + nil eval error).
- id: condNilPtr_cond
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.condNilPtrStruct
  when:
    dsl: "x.I32 == 300"
    json: {eq: [{getmember: [{ref: "x"}, "I32"]}, 300]}
  template: "condNilPtr {tag}"
  segments:
    - str: "condNilPtr "
    - json: {ref: "tag"}
      dsl: "tag"
  sampling:
    snapshotsPerSecond: 10

# Unconditional snapshot on condNilPtrStruct for control (fires on both calls).
- id: condNilPtr_nocond
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condNilPtrStruct
  sampling:
    snapshotsPerSecond: 10

