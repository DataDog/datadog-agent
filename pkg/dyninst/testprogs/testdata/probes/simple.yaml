# ==========================================================================
# Inequality conditions: lt / le / gt / ge / ne
#
# One representative type per kind class — the BPF op decoder branches on
# (op, kind), so covering signed int / unsigned int / string / struct-field
# exercises every code path. Floats and bools accept only eq/ne in this
# revision; ordering is rejected via the issue probes at the bottom.
#
# Calls: condInt32 / condUint32 are called with (42, "match") and
# (7, "miss"); condString with ("hello", "match") and ("other", "miss");
# condStructArg with I32=300 then I32=3. Each probe below fires on
# exactly one of the two calls — the threshold is chosen so half the
# matches go each way, giving end-to-end coverage of which side is
# "less".
# ==========================================================================

# --- int32 ---
- id: condInt32_lt
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.condInt32
  when:
