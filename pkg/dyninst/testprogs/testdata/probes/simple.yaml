# Capture: filter() over a swiss map with a @value predicate. hmap support is
# rejected by irgen with IssueKindUnsupportedFeature; the go1.23 toolchains
# carry the unsupported tag because they still use hmap.
- id: captureFilterIntMap_valueEq42
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntMap
  tags:
    - "issue:UnsupportedFeature@arch=amd64,toolchain=go1.23.11"
    - "issue:UnsupportedFeature@arch=arm64,toolchain=go1.23.11"
  captureExpressions:
    - name: "valueIs42"
      expr:
        dsl: "filter(m, {@value == 42})"
        json: { filter: [{ref: "m"}, {eq: [{ref: "@value"}, 42]}] }
  sampling:
    snapshotsPerSecond: 10

# Capture: len() composed with filter() is unsupported (filter is leaf-only)
# and surfaces as IssueKindUnsupportedFeature.
- id: captureFilter_len_err
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  tags:
    - "issue:UnsupportedFeature"
  captureExpressions:
    - name: "lenOfFilter"
      expr:
        dsl: "len(filter(xs, {@it == 42}))"
        json: { len: { filter: [{ref: "xs"}, {eq: [{ref: "@it"}, 42]}] } }
  sampling:
    snapshotsPerSecond: 10

# Condition: filter() in probe condition position is unsupported and surfaces
# as IssueKindUnsupportedFeature.
- id: captureFilter_condition_err
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  when:
    dsl: "filter(xs, {@it == 42})"
    json: { filter: [{ref: "xs"}, {eq: [{ref: "@it"}, 42]}] }
  template: "should_never_render"
  segments:
