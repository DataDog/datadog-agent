# ==========================================================================
# Condition tests: line probes
# ==========================================================================

# Line probe with condition on 'n', capture expression on 'tag'.
- id: condLine_cond
  tags:
    # For whatever reason, the location lists of the line probe are bad
    # on 1.23.
    - "skip_integration:arch=arm64,toolchain=go1.23.11"
    - "skip_integration:arch=amd64,toolchain=go1.23.11"
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.condLine
    sourceFile: main.go
    lines:
      - "754"
  when:
    dsl: "n == 7"
    json: {eq: [{ref: "n"}, 7]}
  captureExpressions:
    - name: "tag_val"
      expr:
        dsl: "tag"
        json: {ref: "tag"}
  sampling:
    snapshotsPerSecond: 10

# Line probe without condition (fires on both calls).
- id: condLine_nocond
  tags:
    # For whatever reason, the location lists of the line probe are bad
    # on 1.23.
    - "skip_integration:arch=arm64,toolchain=go1.23.11"
    - "skip_integration:arch=amd64,toolchain=go1.23.11"
  type: LOG_PROBE
  captureSnapshot: true
  where:
    methodName: main.condLine
    sourceFile: main.go
    lines:
      - "754"
  sampling:
    snapshotsPerSecond: 10

