# Capture: filter() over a slice with a > predicate that selects most elements
# but not all (so the output is bounded and reasonable to snapshot).
- id: captureFilterIntSlice_positive
  type: LOG_PROBE
  captureSnapshot: false
  where:
    methodName: main.anyAllIntSlice
  captureExpressions:
