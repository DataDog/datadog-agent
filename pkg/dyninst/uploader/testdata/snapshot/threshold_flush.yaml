config:
  max_items: 3
  max_size_bytes: 50
  idle_flush_ms: 100
  max_buffer_ms: 200
events:
  - !enqueue {value: "a"}
  - !enqueue {value: "b"}
  - !enqueue {value: "c"}
  - !batch-outcome {id: 0, success: true}
  - !stop {}
---
now: 0ms
event: !enqueue {value: "a"}
effects:
  - !reset-timer {ts: 100ms (+100ms)}
state:
  batch_len: 1
  buffer_deadline: 200ms
  current_size: 3
  idle_deadline: 100ms
---
now: 0ms
event: !enqueue {value: "b"}
effects:
  - !reset-timer {ts: 100ms (+0ms)}
state:
  batch_len: 2
  buffer_deadline: 200ms
  current_size: 6
  idle_deadline: 100ms
---
now: 0ms
event: !enqueue {value: "c"}
effects:
  - !send-batch {id: 0, items: 3, bytes: 9}
  - !reset-timer {}
state:
  batch_len: 0
  current_size: 0
  inflight: [0]
---
now: 0ms
event: !batch-outcome {id: 0, success: true}
state:
  batch_len: 0
  current_size: 0
metrics:
  batches_sent: 1 (+1)
  bytes_sent: 9 (+9)
  items_sent: 3 (+3)
---
now: 0ms
event: !stop {}
state:
  batch_len: 0
  current_size: 0
