config:
  max_items: 10
  max_size_bytes: 50
  idle_flush_ms: 100
  max_buffer_ms: 200
events:
  - !enqueue {value: "p"}
  - !enqueue {value: "q"}
  - !stop {} 
---
now: 0ms
event: !enqueue {value: "p"}
effects:
  - !reset-timer {ts: 100ms (+100ms)}
state:
  batch_len: 1
  buffer_deadline: 200ms
  current_size: 3
  idle_deadline: 100ms
---
now: 0ms
event: !enqueue {value: "q"}
effects:
  - !reset-timer {ts: 100ms (+0ms)}
state:
  batch_len: 2
  buffer_deadline: 200ms
  current_size: 6
  idle_deadline: 100ms
---
now: 0ms
event: !stop {}
state:
  batch_len: 2
  current_size: 6
