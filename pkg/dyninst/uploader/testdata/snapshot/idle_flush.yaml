config:
  max_items: 10
  max_size_bytes: 50
  idle_flush_ms: 100
  max_buffer_ms: 1000
events:
  - !enqueue {value: "x"}
  - !timer-fired {} 
  - !batch-outcome {id: 0, success: true}
---
now: 0ms
event: !enqueue {value: "x"}
effects:
  - !reset-timer {ts: 100ms (+100ms)}
state:
  batch_len: 1
  buffer_deadline: 1000ms
  current_size: 3
  idle_deadline: 100ms
---
now: 100ms
event: !timer-fired {}
effects:
  - !send-batch {id: 0, items: 1, bytes: 3}
  - !reset-timer {}
state:
  batch_len: 0
  current_size: 0
  inflight: [0]
---
now: 100ms
event: !batch-outcome {id: 0, success: true}
state:
  batch_len: 0
  current_size: 0
metrics:
  batches_sent: 1 (+1)
  bytes_sent: 3 (+3)
  items_sent: 1 (+1)
