  - !add-fragment {key: k2, side: entry, seq: 0, final: true, expect_return: true, bytes: 64}
  - !add-fragment {key: k1, side: return, seq: 0, final: true, expect_return: false, bytes: 32}
  - !add-fragment {key: k2, side: return, seq: 0, final: true, expect_return: false, bytes: 32}
