# Entry is complete; a RETURN_LOST notification arrives. Buffer emits the
# entry alone, flagged ReturnLost=true.
config: {}
ops:
  - !add-fragment {key: k1, side: entry, seq: 0, final: true, expect_return: true, bytes: 64}
  - !note-return-lost {key: k1}
---
op: !add-fragment {key: k1, side: entry, seq: 0, final: true, expect_return: true, bytes: 64}
state:
  budget_used: 64
  bytes: 64
  tree_size: 1
---
op: !note-return-lost {key: k1}
readys:
  - {key: k1, entry_frags: 1, entry_bytes: 64, return_frags: 0, return_bytes: 0, return_lost: true}
state:
  budget_used: 0
  bytes: 0
  tree_size: 0
