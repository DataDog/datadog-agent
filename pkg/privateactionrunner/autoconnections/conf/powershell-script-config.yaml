schemaId: script-credentials-v1
runPredefinedPowershellScript:
  helloWorld:
    script: |
      Write-Output "Hello World"
  
  # Example with parameters
  greet:
    script: |
      Write-Output "Call parameter {{ parameters.name }} !"
    parameterSchema:
      properties:
        name:
          type: string
      required:
        - name

  # Example showing environment variable
  showEnv:
    script: |
      Write-Output "This vm name is $env:COMPUTERNAME"
    allowedEnvVars:
      - COMPUTERNAME

  # Example restarting a Windows service
  restartService:
    script: |
      Restart-Service -Name {{ parameters.serviceName }} -Force
      Write-Output "Restart triggered for service '{{ parameters.serviceName }}' at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
    parameterSchema:
      properties:
        serviceName:
          type: string
      required:
        - serviceName
