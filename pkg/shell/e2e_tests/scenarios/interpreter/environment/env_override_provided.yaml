description: Script can assign variables that exist as parent env vars without inheriting them.
input:
  envs:
    MY_VAR: parent_value
  # language=bash
  script: |+
    echo "${MY_VAR:-unset}"
    MY_VAR=script_value
    echo "$MY_VAR"
expected:
  stdout: |+
    unset
    script_value
  stderr: ""
  exit_code: 0
