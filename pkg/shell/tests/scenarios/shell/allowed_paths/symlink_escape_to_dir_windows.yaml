description: Symlink inside allowed dir pointing to directory outside is blocked by os.Root (Windows paths)
target_os: [windows]
setup:
  files:
    - path: secret/data.txt
      content: "secret"
    - path: allowed/escape_dir
      symlink: ../secret
input:
  allowed_paths: ["allowed"]
  # language=bash
  script: |+
    cat allowed/escape_dir/data.txt
expect:
  stdout: ""
  stderr: "cat: allowed/escape_dir/data.txt: openat escape_dir\\data.txt: path escapes from parent\n"
  exit_code: 1
