test_against_local_shell: false
description: Input redirect cannot read file outside allowed paths
setup:
  files:
    - path: allowed/ok.txt
      content: "ok"
    - path: secret/data.txt
      content: "secret"
input:
  allowed_paths: ["allowed"]
  # language=sh
  script: |+
    cat < secret/data.txt
expect:
  stdout: ""
  stderr_contains: ["permission denied"]
  exit_code: 1
