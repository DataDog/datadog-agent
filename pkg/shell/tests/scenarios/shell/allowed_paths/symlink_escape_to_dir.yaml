test_against_local_shell: false
description: Symlink inside allowed dir pointing to directory outside is blocked by os.Root
target_os: [linux, darwin]
setup:
  files:
    - path: secret/data.txt
      content: "secret"
    - path: allowed/escape_dir
      symlink: ../secret
input:
  allowed_paths: ["allowed"]
  script: |+
    cat allowed/escape_dir/data.txt
expect:
  stdout: ""
  stderr: "cat: allowed/escape_dir/data.txt: openat escape_dir/data.txt: path escapes from parent\n"
  exit_code: 1
