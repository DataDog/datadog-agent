description: Input redirection correctly reads multiline file content.
setup:
  files:
    - path: multi.txt
      content: "line one\nline two\nline three\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat < multi.txt
expect:
  stdout: "line one\nline two\nline three\n"
  stderr: ""
  exit_code: 0
