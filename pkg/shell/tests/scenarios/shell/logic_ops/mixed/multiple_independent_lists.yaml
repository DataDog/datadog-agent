description: Multiple independent and-or lists on separate lines.
input:
  script: |+
    true && echo "line1"
    false || echo "line2"
    true && false || echo "line3"
    false && echo "skip" || true && echo "line4"
expect:
  stdout: |+
    line1
    line2
    line3
    line4
  stderr: ""
  exit_code: 0
