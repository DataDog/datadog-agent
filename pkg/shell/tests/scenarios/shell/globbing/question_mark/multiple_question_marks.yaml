description: Multiple question marks match exact number of characters.
setup:
  files:
    - path: ab.txt
      content: ""
    - path: cd.txt
      content: ""
    - path: a.txt
      content: ""
    - path: abc.txt
      content: ""
input:
  allowed_paths: ["$DIR"]
  # language=sh
  script: |+
    echo ??.txt
expect:
  stdout: |+
    ab.txt cd.txt
  stderr: ""
  exit_code: 0
