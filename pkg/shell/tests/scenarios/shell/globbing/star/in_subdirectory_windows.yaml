description: Star glob matches files in a subdirectory (Windows paths).
target_os: [windows]
setup:
  files:
    - path: sub/x.txt
      content: ""
    - path: sub/y.txt
      content: ""
input:
  allowed_paths: ["$DIR"]
  # language=sh
  script: |+
    echo sub/*.txt
expect:
  stdout: |+
    sub\x.txt sub\y.txt
  stderr: ""
  exit_code: 0
