description: Bracket glob with negation excludes specified characters.
setup:
  files:
    - path: a.txt
      content: ""
    - path: b.txt
      content: ""
    - path: c.txt
      content: ""
input:
  allowed_paths: ["$DIR"]
  # language=sh
  script: |+
    echo [!a].txt
expect:
  stdout: |+
    b.txt c.txt
  stderr: ""
  exit_code: 0
