description: File content piped from cat to cat transfers correctly.
setup:
  files:
    - path: data.txt
      content: |+
        line one
        line two
input:
  allowed_paths: ["$DIR"]
  # language=sh
  script: |+
    cat data.txt | cat
expect:
  stdout: |+
    line one
    line two
  stderr: ""
  exit_code: 0
