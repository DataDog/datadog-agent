test_against_local_shell: false
description: Break with non-numeric argument produces an error on each iteration.
input:
  # language=bash
  script: |+
    for i in a b c; do
      break abc
    done
expect:
  stdout: ""
  stderr: |+
    break: abc: numeric argument required
    break: abc: numeric argument required
    break: abc: numeric argument required
  exit_code: 2
