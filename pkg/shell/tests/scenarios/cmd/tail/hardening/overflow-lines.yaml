# Verifies that an astronomically large -n value is clamped rather than causing OOM or panic.
description: tail -n with an overflow-sized count on a small file returns the whole file without OOM.
setup:
  files:
    - path: input.txt
      content: "a\nb\nc\n"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -n 99999999999999999999 input.txt
expect:
  stdout: "a\nb\nc\n"
  stderr: ""
  exit_code: 0
