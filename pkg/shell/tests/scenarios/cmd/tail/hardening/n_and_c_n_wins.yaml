# Hardening: when both -n and -c given, -n wins (last flag wins semantics)
description: tail -c 1 -n 2 uses lines mode (-n overrides -c).
setup:
  files:
    - path: f.txt
      content: "a\nb\nc\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 1 -n 2 f.txt
expect:
  stdout: "b\nc\n"
  stderr: ""
  exit_code: 0
