# Derived from GNU coreutils tail.pl test n-3
description: tail -n +3 outputs from line 3 to EOF.
setup:
  files:
    - path: f.txt
      content: "a\nb\nc\nd\ne\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -n +3 f.txt
expect:
  stdout: "c\nd\ne\n"
  stderr: ""
  exit_code: 0
