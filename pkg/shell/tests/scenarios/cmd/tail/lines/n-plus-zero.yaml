# Derived from GNU coreutils tail.pl test n-4: +0 is a synonym for +1 (output all lines).
description: tail -n +0 outputs all lines (synonym for -n +1).
setup:
  files:
    - path: input.txt
      content: "y\ny\ny\ny\ny\n"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -n +0 input.txt
expect:
  stdout: "y\ny\ny\ny\ny\n"
  stderr: ""
  exit_code: 0
