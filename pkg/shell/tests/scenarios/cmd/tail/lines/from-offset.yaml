description: tail -n +2 outputs lines starting from line 2 (skips the first line).
setup:
  files:
    - path: input.txt
      content: "a\nb\nc\nd\ne\n"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -n +2 input.txt
expect:
  stdout: "b\nc\nd\ne\n"
  stderr: ""
  exit_code: 0
