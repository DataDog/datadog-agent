# Edge case: single-line file
description: tail on a single-line file outputs that line.
setup:
  files:
    - path: f.txt
      content: "hello\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail f.txt
expect:
  stdout: "hello\n"
  stderr: ""
  exit_code: 0
