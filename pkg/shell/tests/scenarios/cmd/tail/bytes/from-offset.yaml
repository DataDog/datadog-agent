# Derived from GNU coreutils tail.pl test obs-plus-c1 (modernised to -c +N form).
description: tail -c +2 outputs all bytes starting from byte offset 2.
setup:
  files:
    - path: input.txt
      content: "abcd"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c +2 input.txt
expect:
  stdout: "bcd"
  stderr: ""
  exit_code: 0
