# Derived from GNU coreutils tail.pl test c2-minus: -c2 -- still works with end-of-flags marker.
description: tail -c 2 -- file returns the last 2 bytes even with explicit end-of-flags marker.
setup:
  files:
    - path: input.txt
      content: "abcd\n"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 2 -- input.txt
expect:
  stdout: "d\n"
  stderr: ""
  exit_code: 0
