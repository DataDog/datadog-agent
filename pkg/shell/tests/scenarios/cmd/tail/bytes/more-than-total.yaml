# Derived from GNU coreutils tail.pl test obs-c4.
description: tail -c requesting more bytes than the file has returns the entire file.
setup:
  files:
    - path: input.txt
      content: "abcd"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 9 input.txt
expect:
  stdout: "abcd"
  stderr: ""
  exit_code: 0
