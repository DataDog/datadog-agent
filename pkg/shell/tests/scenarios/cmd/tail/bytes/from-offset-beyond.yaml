# Derived from GNU coreutils tail.pl test obs-plus-c2 (modernised to -c +N form).
description: tail -c +8 on a 4-byte file produces no output (offset is past end of file).
setup:
  files:
    - path: input.txt
      content: "abcd"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c +8 input.txt
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
