# Derived from GNU coreutils tail.pl: large -c outputs full file
description: tail -c N where N exceeds file size outputs the entire file.
setup:
  files:
    - path: f.txt
      content: "abcd"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 9999 f.txt
expect:
  stdout: "abcd"
  stderr: ""
  exit_code: 0
