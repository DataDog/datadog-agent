# Derived from GNU coreutils tail.pl test c-2
description: tail -c 2 outputs the last 2 bytes of a file.
setup:
  files:
    - path: f.txt
      content: "abcd\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 2 f.txt
expect:
  stdout: "d\n"
  stderr: ""
  exit_code: 0
