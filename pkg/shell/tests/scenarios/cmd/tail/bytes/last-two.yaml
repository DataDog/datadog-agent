# Derived from GNU coreutils tail.pl test c2.
description: tail -c 2 returns the last 2 bytes of a file.
setup:
  files:
    - path: input.txt
      content: "abcd\n"
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 2 input.txt
expect:
  stdout: "d\n"
  stderr: ""
  exit_code: 0
