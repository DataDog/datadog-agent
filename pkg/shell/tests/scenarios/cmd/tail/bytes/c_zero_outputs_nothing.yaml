# Derived from GNU coreutils tail.pl: -c 0 outputs nothing
description: tail -c 0 outputs nothing.
setup:
  files:
    - path: f.txt
      content: "abc\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    tail -c 0 f.txt
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
