# --no-filename: suppress filename prefix even when multiple files are given.
description: grep --no-filename suppresses the filename prefix with multiple files.
setup:
  files:
    - path: a.txt
      content: "match\nno\n"
      chmod: 0644
    - path: b.txt
      content: "no\nmatch too\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep --no-filename match a.txt b.txt
expect:
  stdout: "match\nmatch too\n"
  stderr: ""
  exit_code: 0
