# -r (recursive search) is not implemented; rejected with exit code 2.
description: grep rejects the -r flag as unsupported.
setup:
  files:
    - path: f.txt
      content: "hello\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep -r pattern f.txt
expect:
  stdout: ""
  stderr_contains: ["grep:"]
  exit_code: 2
