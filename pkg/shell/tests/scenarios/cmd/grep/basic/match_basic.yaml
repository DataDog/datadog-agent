# Basic pattern match - lines containing the pattern are printed.
description: grep prints lines matching a pattern.
setup:
  files:
    - path: f.txt
      content: "alpha\nbeta\ngamma\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep beta f.txt
expect:
  stdout: "beta\n"
  stderr: ""
  exit_code: 0
