test_against_local_shell: false
description: When all files are missing, cat reports errors for each file (Windows).
target_os: [windows]
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    cat missing1.txt missing2.txt
expect:
  stdout: ""
  stderr_contains:
    - "cat: missing1.txt:"
    - "cat: missing2.txt:"
    - "The system cannot find the file specified."
  exit_code: 1
