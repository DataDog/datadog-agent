test_against_local_shell: false
description: Input redirect from a nonexistent file fails at the redirect level, not cat itself, so the error has no "cat:" prefix (Windows).
target_os: [windows]
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat < nonexistent.txt
expect:
  stdout: ""
  stderr_contains:
    - "nonexistent.txt"
    - "The system cannot find the file specified."
  exit_code: 1
