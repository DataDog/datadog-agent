test_against_local_shell: false
description: Cat failure does not stop script execution; the exit code is from the last command (Windows).
target_os: [windows]
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat nonexistent.txt
    echo hello
expect:
  stdout: |+
    hello
  stderr_contains:
    - "cat: nonexistent.txt:"
    - "The system cannot find the file specified."
  exit_code: 0
