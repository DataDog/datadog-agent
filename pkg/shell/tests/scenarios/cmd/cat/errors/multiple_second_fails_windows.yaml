test_against_local_shell: false
description: When the second of multiple files fails, the first file is output before the error (Windows).
target_os: [windows]
setup:
  files:
    - path: existing.txt
      content: |+
        hello world
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  # language=sh
  script: |+
    cat existing.txt nonexistent.txt
expect:
  stdout: |+
    hello world
  stderr_contains:
    - "cat: nonexistent.txt:"
    - "The system cannot find the file specified."
  exit_code: 1
