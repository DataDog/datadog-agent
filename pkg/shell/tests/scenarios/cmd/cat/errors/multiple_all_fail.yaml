description: When all files are missing, cat stops at the first failure without attempting the rest.
target_os: [linux, darwin]
input:
  allowed_paths: ["$DIR"]
  # language=bash
  script: |+
    cat missing1.txt missing2.txt
expect:
  stdout: ""
  stderr_contains:
    - "cat: missing1.txt:"
    - "no such file or directory"
  exit_code: 1
