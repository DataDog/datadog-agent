            - FI_DEV_PERF_POLICY_THERMAL
            - FI_DEV_GET_GPU_RECOVERY_ACTION
    support:
      - device_modes: [physical]
        unsupported_fields: []
      - device_modes: [mig, vgpu]
        capabilities:
          nvlink: 0
        unsupported_fields: []
    unsupported_device_modes:
      - mig
  ampere:
