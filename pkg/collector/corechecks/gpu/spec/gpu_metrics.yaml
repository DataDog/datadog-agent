  errors.ecc.corrected.total:
    metadata:
      metric_type: gauge
      description: >-
        Corrected ECC (Error Correcting Code) errors indicate GPU memory
        corruption that was detected and successfully corrected by the hardware.
        While these errors do not immediately impact application correctness,
        recurring corrected errors can be an early sign of degrading memory or
        underlying hardware issues.
    tagsets:
      - device
    custom_tags:
      - memory_location
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  errors.ecc.uncorrected.total:
    metadata:
      metric_type: gauge
      description: >-
        Uncorrectable ECC (Error Correcting Code) errors indicate GPU memory
        corruption that could not be automatically fixed. These errors can lead
        to data corruption, application crashes, or incorrect computation
        results.
    tagsets:
      - device
    custom_tags:
      - memory_location
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
