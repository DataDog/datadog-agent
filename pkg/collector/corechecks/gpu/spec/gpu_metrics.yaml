    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.speed.video:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the video encoder/decoder
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.video.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the video encoder/decoder
    tagsets:
