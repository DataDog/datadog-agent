# GPU metric specification for the GPU corecheck.
# Schema:
# - metric_prefix: string prepended to all emitted metric names
# - metrics.<metric_name>:
#   - metadata:
#       - metric_type: Datadog metric type used for metadata.csv generation
#       - unit (optional): unit string, optionally with per-unit suffix like byte/second
#       - description: metric description used for metadata.csv generation
#   - tagsets: list of tagset names declared in tags.yaml
#   - custom_tags (optional): additional dynamic tag names declared in tags.yaml (e.g., memory_location)
#   - workload_only (optional): true when the metric is only guaranteed while a workload is active
#   - support:
#       - unsupported_architectures: [<architecture_name>, ...] (the list of architectures that do not support the metric)
#       - device_modes: {mig: bool, physical: bool, vgpu: bool} (a map describing whether each device mode supports the metric)
metric_prefix: gpu
metrics:
  clock.speed.graphics:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the graphics domain
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.graphics.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the graphics domain
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.speed.memory:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the memory
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.memory.max:
