# GPU metric specification for the GPU corecheck.
# Schema:
# - metric_prefix: string prepended to all emitted metric names
# - tagsets.<tagset_name>: represents a set of tags that are common to a group of metrics.
#   - tags: list of tag keys attached to that tagset
# - metrics.<metric_name>:
#   - tagsets: list of tagset names declared under root tagsets
#   - custom_tags (optional): additional dynamic tag keys (e.g., memory_location for errors.ecc.corrected.total)
#   - support:
#       - unsupported_architectures: [<architecture_name>, ...] (the list of architectures that do not support the metric)
#       - device_modes: {mig: bool, physical: bool, vgpu: bool} (a map describing whether each device mode supports the metric)
metric_prefix: gpu
tagsets:
  container:
    tags:
      - kube_container_name
  device:
    tags:
      - gpu_uuid
      - gpu_device
      - gpu_vendor
      - gpu_driver_version
  process:
    tags:
      - pid
      - nspid
metrics:
  clock.speed.graphics:
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.graphics.max:
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
