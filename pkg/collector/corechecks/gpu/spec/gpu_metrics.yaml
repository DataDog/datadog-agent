# GPU metric specification for the GPU corecheck.
# Schema:
# - metric_prefix: string prepended to all emitted metric names
# - metrics.<metric_name>:
#   - metadata:
#       - metric_type: Datadog metric type used for metadata.csv generation
#       - unit (optional): unit string, optionally with per-unit suffix like byte/second
#       - description: metric description used for metadata.csv generation
#   - tagsets: list of tagset names declared in tags.yaml
#   - custom_tags (optional): additional dynamic tag names declared in tags.yaml (e.g., memory_location)
#   - workload_only (optional): true when the metric is only guaranteed while a workload is active
#   - support:
#       - unsupported_architectures: [<architecture_name>, ...] (the list of architectures that do not support the metric)
#       - device_modes: {mig: bool, physical: bool, vgpu: bool} (a map describing whether each device mode supports the metric)
#       - capabilities_required (optional): {nvlink: <min_generation>, c2c: <bool>} (hardware capabilities required for the metric)
metric_prefix: gpu
metrics:
  clock.speed.graphics:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the graphics domain
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.graphics.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the graphics domain
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.speed.memory:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the memory
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.memory.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the memory
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.speed.sm:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the Streaming Multiprocessor
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.sm.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the Streaming Multiprocessor
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.speed.video:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Current clock speed for the video encoder/decoder
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: true
  clock.speed.video.max:
    metadata:
      metric_type: gauge
      unit: megahertz
      description: Maximum clock speed for the video encoder/decoder
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.applications_clocks_setting:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled due to application settings
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.display_clock_setting:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled due to display clock settings
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.gpu_idle:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled due to the GPU being idle
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.hw_power_brake_slowdown:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled due to an external power brake assertion
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.hw_slowdown:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled by hardware slowdown
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.hw_thermal_slowdown:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled by hardware thermal slowdown
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.none:
    metadata:
      metric_type: gauge
      description: GPU clocks that are not throttled
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.sw_power_cap:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled to avoid exceeding power limits
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.sw_thermal_slowdown:
    metadata:
      metric_type: gauge
      description: GPU clocks that are throttled to avoid exceeding temperature limits
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttle_reasons.sync_boost:
    metadata:
      metric_type: gauge
      description:
        GPU clocks that are throttled to match clock speed of another GPU
        in the current sync boost group
      aggregation: sensor_data
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  clock.throttled_while_active:
    metadata:
      metric_type: gauge
      description: Whether the GPU clock is throttled for a reason other than the GPU being idle
      aggregation: sensor_data
    tagsets:
      - device
    custom_tags:
      - throttle_reason
    validator:
      values: [0, 1]
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  core.limit:
    metadata:
      metric_type: gauge
      unit: core
      description: Number of GPU cores that the process/container/device has available
      used_in_dd_ui: true
      aggregation: absolute_usage
    tagsets:
      - device
      - process
      - container
    validator:
      range:
        min: 0
        max: 1000000
    support:
      unsupported_architectures: []
      device_modes:
        mig: true
        physical: true
        vgpu: true
  decoder_active:
    metadata:
      metric_type: gauge
      unit: percent
      description: Percentage of time the decoder was active
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  device.total:
    metadata:
      metric_type: gauge
      description: Number of GPU devices found in the host
      used_in_dd_ui: true
      aggregation: absolute_usage
    tagsets:
      - device
    validator:
      values: [1]
    support:
      unsupported_architectures: []
      device_modes:
        mig: true
        physical: true
        vgpu: true
  device.unhealthy:
    metadata:
      metric_type: gauge
      description: Whether the GPU device is unhealthy
      aggregation: absolute_usage
    tagsets:
      - device
    validator:
      values: [0, 1]
    support:
      unsupported_architectures: []
      device_modes:
        mig: true
        physical: true
        vgpu: true
  dram_active:
    metadata:
      metric_type: gauge
      unit: percent
      description: Percentage of time the DRAM was active
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: true
  encoder_active:
    metadata:
      metric_type: gauge
      unit: percent
      description: Percentage of time the encoder was active
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: false
        physical: true
        vgpu: false
  errors.ecc.corrected.total:
    metadata:
      metric_type: gauge
      description: >-
        Corrected ECC (Error Correcting Code) errors indicate GPU memory
        corruption that was detected and successfully corrected by the hardware.
        While these errors do not immediately impact application correctness,
        recurring corrected errors can be an early sign of degrading memory or
        underlying hardware issues. The counter reports errors seen for the entire
        lifetime of the device.
      aggregation: lifetime_error
    tagsets:
      - device
    custom_tags:
      - memory_location
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  errors.ecc.uncorrected.total:
    metadata:
      metric_type: gauge
      used_in_dd_ui: true
      description: >-
        Uncorrectable ECC (Error Correcting Code) errors indicate GPU memory
        corruption that could not be automatically fixed. These errors can lead
        to data corruption, application crashes, or incorrect computation
        results. The counter reports errors seen for the entire lifetime of the device.
      aggregation: lifetime_error
    tagsets:
      - device
    custom_tags:
      - memory_location
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
  errors.ecc.sram.threshold_exceeded:
    metadata:
      metric_type: gauge
      description: Whether the SRAM ECC error threshold has been exceeded
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
      device_modes:
        mig: false
        physical: true
        vgpu: true
  errors.ecc.sram.uncorrected_by_subtype.total:
    metadata:
      metric_type: gauge
      description: >-
        Aggregate SRAM uncorrectable ECC errors split by subtype. The counter reports errors seen for the entire
        lifetime of the device.
    tagsets:
      - device
    custom_tags:
      - memory_location
      - error_subtype
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
      device_modes:
        mig: false
        physical: true
        vgpu: true
  ecc.repair_pending.channel:
    metadata:
      metric_type: gauge
      description: Whether a channel repair is pending due to ECC errors
    tagsets:
      - device
    support:
      unsupported_architectures:
        - pascal
        - volta
        - turing
      device_modes:
        mig: false
        physical: true
        vgpu: false
  ecc.repair_pending.tpc:
    metadata:
      metric_type: gauge
      description: Whether a TPC repair is pending due to ECC errors
    tagsets:
      - device
    support:
      unsupported_architectures:
        - pascal
        - volta
        - turing
      device_modes:
        mig: false
        physical: true
        vgpu: false
  errors.xid.total:
    metadata:
      metric_type: gauge
      used_in_dd_ui: true
      description: >-
        XID errors are NVIDIA driver error codes that indicate GPU hardware or
        software issues like thermal throttling to hardware defects.
        Investigate these errors immediately as they often precede total GPU
        failures. The counter reports XID errors received since the Agent started
        collecting events for this device.
      aggregation: lifetime_error
    tagsets:
      - device
    custom_tags:
      - origin
      - type
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  fan_speed:
    metadata:
      metric_type: gauge
      unit: percent
      description: Configured fan speed as a percentage of its maximum
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  fp16_active:
    metadata:
      metric_type: gauge
      unit: percent
      description:
        Percentage of the time that the 16-bit floating point calculation
        engine was active. Only for Hopper and newer GPUs
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
        - ampere
        - ada
      device_modes:
        mig: true
        physical: true
        vgpu: false
  fp32_active:
    metadata:
      metric_type: gauge
      unit: percent
      description:
        Percentage of the time that the 32-bit floating point calculation
        engine was active. Only for Hopper and newer GPUs
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
        - ampere
        - ada
      device_modes:
        mig: true
        physical: true
        vgpu: false
  fp64_active:
    metadata:
      metric_type: gauge
      unit: percent
      description:
        Percentage of the time that the 64-bit floating point calculation
        engine was active. Only for Hopper and newer GPUs
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
        - ampere
        - ada
      device_modes:
        mig: true
        physical: true
        vgpu: false
  gr_engine_active:
    metadata:
      metric_type: gauge
      unit: percent
      description: Percentage of time that the graphics engine was active
      used_in_dd_ui: true
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: true
        physical: true
        vgpu: true
  integer_active:
    metadata:
      metric_type: gauge
      unit: percent
      description:
        Percentage of the time that the integer calculation engine was
        active. Only for Hopper and newer GPUs
      aggregation: relative_activity
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
        - ampere
        - ada
      device_modes:
        mig: true
        physical: true
        vgpu: false
  memory.bar1.free:
    metadata:
      metric_type: gauge
      unit: byte
      description: Unallocated BAR1 memory (in bytes)
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.bar1.total:
    metadata:
      metric_type: gauge
      unit: byte
      description: Total BAR1 memory (in bytes).
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.bar1.used:
    metadata:
      metric_type: gauge
      unit: byte
      description: Allocated used memory (in bytes)
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.free:
    metadata:
      metric_type: gauge
      unit: byte
      description: Unallocated device memory (in bytes).
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.limit:
    metadata:
      metric_type: gauge
      unit: byte
      description: The maximum amount of memory a process/container/device could allocate
      used_in_dd_ui: true
      aggregation: absolute_usage
    tagsets:
      - device
      - process
      - container
    validator:
      range:
        min: 0
        max: 1000000000000 # 1 TB (bytes)
    support:
      unsupported_architectures: []
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.reserved:
    metadata:
      metric_type: gauge
      unit: byte
      description: Device memory (in bytes) reserved for system use (driver or firmware)..
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.utilization:
    metadata:
      metric_type: gauge
      unit: fraction
      description: Ratio of used memory compared to total memory
    tagsets:
      - device
    validator:
      range:
        min: 0
        max: 1
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
      device_modes:
        mig: true
        physical: true
        vgpu: true
  memory.temperature:
    metadata:
      metric_type: gauge
      unit: degree celsius
      description: Temperature of the memory chip
      aggregation: sensor_data
    tagsets:
      - device
    support:
      unsupported_architectures:
        - fermi
        - kepler
        - maxwell
        - pascal
        - volta
        - turing
        - ada
      device_modes:
        mig: false
        physical: true
        vgpu: false
  device.needs_recovery:
    metadata:
      metric_type: gauge
      description: >-
        Whether the GPU requires a recovery action (e.g. reset or reboot) as
        reported by NVML's GPU recovery action field. 0 means no action is
        needed, 1 means a recovery action is required. The recovery_action tag
        indicates the specific action.
      aggregation: absolute_usage
    tagsets:
      - device
    custom_tags:
      - recovery_action
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
  nvlink.count.active:
    metadata:
      metric_type: gauge
      description: Number of active nvlinks for the device
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
      capabilities_required:
        nvlink: 1
  nvlink.count.inactive:
    metadata:
      metric_type: gauge
      description: Number of inactive nvlinks for the device
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
      capabilities_required:
        nvlink: 1
  nvlink.count.total:
    metadata:
      metric_type: gauge
      description: Number of total nvlinks for the device
      aggregation: absolute_usage
    tagsets:
      - device
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: true
      capabilities_required:
        nvlink: 1
  nvlink.ber.effective:
    metadata:
      metric_type: gauge
      description: Per-link effective bit error rate for the NVLink port
      aggregation: lifetime_error
    tagsets:
      - device
      - nvlink
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 5
  nvlink.ber.symbol:
    metadata:
      metric_type: gauge
      description: Per-link symbol bit error rate for the NVLink port
    tagsets:
      - device
      - nvlink
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 5
  nvlink.errors.crc.data:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink data CRC error counter for the NVLink port. The counter
        reports the device lifetime total reported by NVML.
    tagsets:
      - device
      - nvlink
    validator:
      range:
        min: 0
        max: 1000000000000000
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 1
  nvlink.errors.crc.flit:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink flow control CRC error counter for the NVLink port. The
        counter reports the device lifetime total reported by NVML.
    tagsets:
      - device
      - nvlink
    validator:
      range:
        min: 0
        max: 1000000000000000
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 1
  nvlink.errors.buffer.overrun:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink buffer overrun error counter for the NVLink port. The
        counter reports the device lifetime total reported by NVML.
      aggregation: lifetime_error
    tagsets:
      - device
      - nvlink
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 5
  nvlink.errors.ecc:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink ECC error counter for the NVLink port. The counter
        reports the device lifetime total reported by NVML.
      aggregation: lifetime_error
    tagsets:
      - device
      - nvlink
    validator:
      range:
        min: 0
        max: 1000000000000000
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 1
  nvlink.errors.effective:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink effective error counter for the NVLink port. The counter
        reports the device lifetime total reported by NVML.
      aggregation: lifetime_error
    tagsets:
      - device
      - nvlink
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 5
  nvlink.errors.local.link.integrity:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink local link integrity error counter for the NVLink port.
        The counter reports the device lifetime total reported by NVML.
    tagsets:
      - device
      - nvlink
    support:
      unsupported_architectures: []
      device_modes:
        mig: false
        physical: true
        vgpu: false
      capabilities_required:
        nvlink: 5
  nvlink.errors.malformed.packet:
    metadata:
      metric_type: gauge
      description: >-
        Per-link NVLink malformed packet error counter for the NVLink port. The
        counter reports the device lifetime total reported by NVML.
    tagsets:
      - device
