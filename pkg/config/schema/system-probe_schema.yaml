            node_type: setting
            type: boolean
            default: false
          hierarchy:
            node_type: setting
            type: string
            default: v1
          pressure_levels:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
          thresholds:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
      offset_guess_threshold:
        node_type: setting
        type: number
        default: 400
      process_config:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            env_vars:
            - DD_SYSTEM_PROBE_PROCESS_ENABLED
            tags: []
      process_service_inference:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            platform_default:
              windows: true
              other: false
          use_improved_algorithm:
            node_type: setting
            type: boolean
            default: false
          use_windows_service_name:
            node_type: setting
            type: boolean
            default: true
      remote_config_btf_enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_REMOTE_CONFIG_BTF_ENABLED
        tags: []
      runtime_compiler_output_dir:
        node_type: setting
        type: string
        default: /var/tmp/datadog-agent/system-probe/build
        env_vars:
        - DD_RUNTIME_COMPILER_OUTPUT_DIR
        tags: []
      source_excludes:
        node_type: setting
        type: object
        default: {}
        additionalProperties:
          items:
            type: string
          type: array
      telemetry_enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_TELEMETRY_ENABLED
        tags: []
      telemetry_perf_buffer_emit_per_cpu:
        node_type: setting
        type: boolean
        default: false
      windows:
        node_type: section
        type: object
        properties:
          enable_monotonic_count:
            node_type: setting
            type: boolean
            default: false
      yum_repos_dir:
        node_type: setting
        type: string
        default: /etc/yum.repos.d
        env_vars:
        - DD_YUM_REPOS_DIR
        tags: []
      zypper_repos_dir:
        node_type: setting
        type: string
        default: /etc/zypp/repos.d
        env_vars:
        - DD_ZYPPER_REPOS_DIR
        tags: []
  log_file:
    node_type: setting
    type: string
    default: ${log_path}/system-probe.log
    visibility: public
    description: The full path to the file where system-probe logs are written.
    tags: []
