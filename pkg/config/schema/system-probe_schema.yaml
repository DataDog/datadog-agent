properties:
  system_probe_config:
    node_type: section
    title: System Probe Configuration
    type: object
    visibility: public
    description: |-
      Enter specific configurations for your System Probe data collection.
      Uncomment this parameter and the one below to enable them.
    tags: []
    properties:
      sysprobe_socket:
        node_type: setting
        type: string
        env_vars:
        - DD_SYSPROBE_SOCKET
        visibility: public
        description: |-
          On Windows: the TCP address where system probes are accessed.
          On Unix: the full path to the location of the unix socket where system probes are accessed.
        tags: []
        platform_default:
          linux: ${run_path}/sysprobe.sock
          darwin: /opt/datadog-agent/run/sysprobe.sock
          windows: \\.\pipe\dd_system_probe
      log_file:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: The full path to the file where system-probe logs are written.
        example: /var/log/datadog/system-probe.log
        tags: []
      language_detection:
        node_type: section
        type: object
        visibility: public
        description: |-
          Enter specific configurations for language detection
          Uncomment this parameter and the one below to enable them.
        tags: []
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: '[Beta] Enables language detection via binary analysis in
              the system probe.'
            example: 'false'
            tags: []
      health_port:
        node_type: setting
        type: number
        default: 0
        env_vars:
        - DD_SYSTEM_PROBE_HEALTH_PORT
        visibility: public
        description: |-
          The Agent can expose its health check on a dedicated HTTP port.
          This is useful for orchestrators that support HTTP probes.
          Default is 0 (disabled). Set a valid port number (example: 5558) to enable.
        example: '0'
        tags: []
      adjusted:
        node_type: setting
        type: boolean
        default: false
        tags:
        - no-env
      allow_prebuilt_fallback:
        node_type: setting
        env_vars:
        - DD_ALLOW_PREBUILT_FALLBACK
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      allow_precompiled_fallback:
        node_type: setting
        env_vars:
        - DD_ALLOW_PRECOMPILED_FALLBACK
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      allow_runtime_compiled_fallback:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_ALLOW_RUNTIME_COMPILED_FALLBACK
        tags: []
      apt_config_dir:
        node_type: setting
        type: string
        default: /etc/apt
        env_vars:
        - DD_APT_CONFIG_DIR
        tags: []
      attach_kprobes_with_kprobe_events_abi:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ATTACH_KPROBES_WITH_KPROBE_EVENTS_ABI
        tags: []
      bpf_debug:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_CONFIG_BPF_DEBUG
        - BPF_DEBUG
        tags: []
      bpf_dir:
        node_type: setting
        type: string
        default: ${install_path}/embedded/share/system-probe/ebpf
        env_vars:
        - DD_SYSTEM_PROBE_BPF_DIR
        tags: []
      btf_output_dir:
        node_type: setting
        type: string
        default: /var/tmp/datadog-agent/system-probe/btf
        env_vars:
        - DD_SYSTEM_PROBE_BTF_OUTPUT_DIR
        tags: []
      btf_path:
        node_type: setting
        type: string
        default: ''
        env_vars:
        - DD_SYSTEM_PROBE_BTF_PATH
        tags: []
      closed_channel_size:
        node_type: setting
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      closed_connection_flush_threshold:
        node_type: setting
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      collect_dns_domains:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_COLLECT_DNS_DOMAINS
        tags: []
      collect_dns_stats:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_COLLECT_DNS_STATS
        tags: []
      collect_local_dns:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_COLLECT_LOCAL_DNS
        tags: []
      conntrack_max_state_size:
        node_type: setting
        type: number
        default: 131072
      conntrack_rate_limit:
        node_type: setting
        type: number
        default: 500
      debug_port:
        node_type: setting
        type: number
        default: 0
      dest_excludes:
        node_type: setting
        type: object
        default: {}
        additionalProperties:
          items:
            type: string
          type: array
      disable_dns_inspection:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_DNS_INSPECTION
        tags: []
      disable_ipv6:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_IPV6_TRACING
        tags: []
      disable_tcp:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_TCP_TRACING
        tags: []
      disable_thp:
        node_type: setting
        type: boolean
        default: true
      disable_udp:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_UDP_TRACING
        tags: []
      dns_timeout_in_s:
        node_type: setting
        type: number
        default: 15
      enable_co_re:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_ENABLE_CO_RE
        tags: []
      enable_conntrack:
        node_type: setting
        type: boolean
        default: true
      enable_conntrack_all_namespaces:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_ENABLE_CONNTRACK_ALL_NAMESPACES
        tags: []
      enable_kernel_header_download:
        node_type: setting
        env_vars:
        - DD_ENABLE_KERNEL_HEADER_DOWNLOAD
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      enable_oom_kill:
        node_type: setting
        type: boolean
        default: false
      enable_runtime_compiler:
        node_type: setting
        env_vars:
        - DD_ENABLE_RUNTIME_COMPILER
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
      enable_tcp_queue_length:
        node_type: setting
        type: boolean
        default: false
      enable_tracepoints:
        node_type: setting
        type: boolean
        default: false
      enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_ENABLED
        tags: []
      excluded_linux_versions:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      expected_tags_duration:
        node_type: setting
        type: number
        default: 30m0s
        env_vars:
        - DD_SYSTEM_PROBE_EXPECTED_TAGS_DURATION
        format: duration
        tags:
        - golang_type:duration
      external:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_EXTERNAL
        tags: []
      http_idle_connection_ttl_in_s:
        node_type: setting
        type: number
        default: 30
      http_map_cleaner_interval_in_s:
        node_type: setting
        type: number
        default: 300
      internal_profiling:
        node_type: section
        type: object
        properties:
          api_key:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_API_KEY
            - DD_API_KEY
            tags: []
          block_profile_rate:
            node_type: setting
            type: number
            default: 0
          cpu_duration:
            node_type: setting
            type: number
            default: 1m0s
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_CPU_DURATION
            format: duration
            tags:
            - golang_type:duration
          custom_attributes:
            node_type: setting
            type: array
            default:
            - module
            - rule_id
            items:
              type: string
          delta_profiles:
            node_type: setting
            type: boolean
            default: true
          enable_block_profiling:
            node_type: setting
            type: boolean
            default: false
          enable_goroutine_stacktraces:
            node_type: setting
            type: boolean
            default: false
          enable_mutex_profiling:
            node_type: setting
            type: boolean
            default: false
          enabled:
            node_type: setting
            type: boolean
            default: false
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_ENABLED
            tags: []
          env:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_ENV
            - DD_ENV
            tags: []
          extra_tags:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          mutex_profile_fraction:
            node_type: setting
            type: number
            default: 0
          period:
            node_type: setting
            type: number
            default: 5m0s
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_PERIOD
            format: duration
            tags:
            - golang_type:duration
          profile_dd_url:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_DD_URL
            - DD_APM_INTERNAL_PROFILING_DD_URL
            tags: []
          site:
            node_type: setting
            type: string
            default: datadoghq.com
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_SITE
            - DD_SITE
            tags: []
          unix_socket:
            node_type: setting
            type: string
            default: ''
      kernel_header_dirs:
        node_type: setting
        type: array
