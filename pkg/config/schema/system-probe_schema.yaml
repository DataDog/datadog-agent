  event_monitoring_config:
    node_type: section
    type: object
    visibility: public
    description: Configuration for the Event Monitoring module, which monitors kernel-level
      security events.
    tags: []
    properties:
      custom_sensitive_words:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_EVENT_MONITORING_CONFIG_CUSTOM_SENSITIVE_WORDS
        - DD_RUNTIME_SECURITY_CONFIG_CUSTOM_SENSITIVE_WORDS
        items:
          type: string
        visibility: public
        description: |-
          Define your own list of sensitive data to be merged with the default one.
          Read more on Datadog documentation:
          https://docs.datadoghq.com/graphing/infrastructure/process/#process-arguments-scrubbing
        example: |2-

            - 'personal_key'
            - '*token'
            - 'sql*'
            - '*pass*d*'
        tags: []
      custom_sensitive_regexps:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_EVENT_MONITORING_CONFIG_CUSTOM_SENSITIVE_REGEXPS
        - DD_RUNTIME_SECURITY_CONFIG_CUSTOM_SENSITIVE_REGEXPS
        items:
          type: string
        visibility: public
        description: List of regular expressions matching process arguments that should
          be redacted.
        example: |2-

            - 'gh-[a-zA-Z0-9]+'

          # @param envs_with_value - list of strings - optional - default: ["LD_PRELOAD", "LD_LIBRARY_PATH", "PATH", "HISTSIZE", "HISTFILESIZE", "GLIBC_TUNABLES", "SSH_CLIENT"]
          # @env DD_EVENT_MONITORING_CONFIG_ENVS_WITH_VALUE - space-separated list of strings - optional - default: 'LD_PRELOAD LD_LIBRARY_PATH PATH HISTSIZE HISTFILESIZE GLIBC_TUNABLES SSH_CLIENT'
          # @env DD_RUNTIME_SECURITY_CONFIG_ENVS_WITH_VALUE - space-separated list of strings - optional - default: 'LD_PRELOAD LD_LIBRARY_PATH PATH HISTSIZE HISTFILESIZE GLIBC_TUNABLES SSH_CLIENT'
          # Define your own list of non-sensitive environment variable names whose value will not be
          # concealed by the runtime security module.
          # Default: LD_PRELOAD, LD_LIBRARY_PATH, PATH, HISTSIZE, HISTFILESIZE, GLIBC_TUNABLES, OTEL_SERVICE_NAME, DD_SERVICE

          envs_with_value:
            - LD_PRELOAD
            - LD_LIBRARY_PATH
            - PATH
            - HISTSIZE
            - HISTFILESIZE
            - OTEL_SERVICE_NAME
            - DD_SERVICE
        tags: []
      network:
        node_type: section
        type: object
        visibility: public
        description: Network section is used to configure Cloud Workload Security
          (CWS) network features.
        tags: []
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_ENABLED
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_ENABLED
            visibility: public
            description: Set to true to activate the CWS network detections.
            example: 'true'
            tags: []
          classifier_handle:
            node_type: setting
            type: number
            default: 0
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_CLASSIFIER_HANDLE
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_CLASSIFIER_HANDLE
            tags: []
          classifier_priority:
            node_type: setting
            type: number
            default: 10
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_CLASSIFIER_PRIORITY
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_CLASSIFIER_PRIORITY
            tags: []
          extra_private_ip_ranges:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_EXTRA_PRIVATE_IP_RANGES
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_EXTRA_PRIVATE_IP_RANGES
            items:
              type: string
            tags: []
          flow_monitor:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                env_vars:
                - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_ENABLED
                - DD_RUNTIME_SECURITY_CONFIG_NETWORK_FLOW_MONITOR_ENABLED
                tags: []
              period:
                node_type: setting
                type: string
                default: 10s
                env_vars:
                - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_PERIOD
                - DD_RUNTIME_SECURITY_CONFIG_NETWORK_FLOW_MONITOR_PERIOD
                tags: []
              sk_storage:
                node_type: section
                type: object
                properties:
                  enabled:
                    node_type: setting
                    type: boolean
                    default: false
                    env_vars:
                    - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_SK_STORAGE_ENABLED
