$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/DataDog/schema/main/agent/agent_telemetry.yaml.schema.json
node_type: section
type: object
properties:
  additional_endpoints:
    node_type: setting
    type: array
    default: []
    items:
      type: object
  batch_max_concurrent_send:
    node_type: setting
    type: integer
    default: 0
  batch_max_content_size:
    node_type: setting
    type: integer
    default: 5000000
  batch_max_size:
    node_type: setting
    type: integer
    default: 1000
  batch_wait:
    node_type: setting
    type: number
    default: 5
    tags:
    - golang_type:float64
  compression_kind:
    node_type: setting
    type: string
    default: zstd
  compression_level:
    node_type: setting
    type: integer
    default: 1
    comment: |-
      default compression first setup inside the next bindEnvAndSetLogsConfigKeys() function ...
      ... and overridden by the following two lines - do not switch these 3 lines order
  connection_reset_interval:
    node_type: setting
    type: integer
    default: 0
  dd_url:
    node_type: setting
    type: string
    default: ''
  dev_mode_no_ssl:
    node_type: setting
    type: boolean
    default: false
    tags:
    - no-env
  enabled:
    node_type: setting
    type: boolean
    default: true
    comment: Agent Telemetry
  errortracking:
    node_type: section
    type: object
    properties:
      bouncer_window_seconds:
        node_type: setting
        type: integer
        default: 900
      buffer_size:
        node_type: setting
        type: integer
        default: 2048
      enabled:
        node_type: setting
        type: boolean
        default: false
        comment: |-
          experimental error log forwarding to telemetry. Use-sites must
          additionally gate on pkg/config/utils.IsAgentTelemetryEnabled so
          gov/FIPS exclusion is inherited from the parent agent_telemetry flag.
      flush_interval_seconds:
        node_type: setting
        type: integer
        default: 60
      shutdown_drain_timeout_seconds:
        node_type: setting
        type: integer
        default: 5
      startup_jitter_seconds:
        node_type: setting
        type: integer
        default: 0
  input_chan_size:
    node_type: setting
    type: integer
    default: 100
  logs_dd_url:
    node_type: setting
    type: string
    default: ''
  logs_no_ssl:
    node_type: setting
    type: boolean
    default: false
  sender_backoff_base:
    node_type: setting
    type: number
    default: 1
    tags:
    - golang_type:float64
  sender_backoff_factor:
    node_type: setting
    type: number
    default: 2
    tags:
    - golang_type:float64
  sender_backoff_max:
    node_type: setting
    type: number
    default: 120
    tags:
    - golang_type:float64
  sender_recovery_interval:
    node_type: setting
    type: integer
    default: 2
  sender_recovery_reset:
    node_type: setting
    type: boolean
    default: false
  startup_trace_sampling:
    node_type: setting
    type: integer
    default: 0
  use_compression:
    node_type: setting
    type: boolean
    default: true
  use_v2_api:
    node_type: setting
    type: boolean
    default: true
  zstd_compression_level:
    node_type: setting
    type: integer
    default: 1
