$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/DataDog/schema/main/agent/system-probe.yaml.schema.json
title: System Probe configuration schema
description: The schema to validate the system-probe.yaml configuration for the DataDog
  Agent
properties:
  system_probe_config:
    node_type: section
    title: System Probe Configuration
    type: object
    visibility: public
    description: |-
      Enter specific configurations for your System Probe data collection.
      Uncomment this parameter and the one below to enable them.
    tags: []
    properties:
      sysprobe_socket:
        node_type: setting
        type: string
        env_vars:
        - DD_SYSPROBE_SOCKET
        visibility: public
        description: |-
          On Windows: the TCP address where system probes are accessed.
          On Unix: the full path to the location of the unix socket where system probes are accessed.
        platform_default:
          linux: ${run_path}/sysprobe.sock
          darwin: ${run_path}/sysprobe.sock
          aix: ${run_path}/sysprobe.sock
          windows: \\.\pipe\dd_system_probe
      log_file:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: The full path to the file where system-probe logs are written.
        example: /var/log/datadog/system-probe.log
      language_detection:
        node_type: section
        type: object
        visibility: public
        description: |-
          Enter specific configurations for language detection
          Uncomment this parameter and the one below to enable them.
        tags: []
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: '[Beta] Enables language detection via binary analysis in
              the system probe.'
      health_port:
        node_type: setting
        type: integer
        default: 0
        env_vars:
        - DD_SYSTEM_PROBE_HEALTH_PORT
        visibility: public
        description: |-
          The Agent can expose its health check on a dedicated HTTP port.
          This is useful for orchestrators that support HTTP probes.
          Default is 0 (disabled). Set a valid port number (example: 5558) to enable.
        tags:
        - golang_type:int64
      adjusted:
        node_type: setting
        type: boolean
        default: false
        tags:
        - no-env
      allow_prebuilt_fallback:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ALLOW_PREBUILT_FALLBACK
      allow_precompiled_fallback:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ALLOW_PRECOMPILED_FALLBACK
      allow_runtime_compiled_fallback:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_ALLOW_RUNTIME_COMPILED_FALLBACK
      apt_config_dir:
        node_type: setting
        type: string
        default: /etc/apt
        env_vars:
        - DD_APT_CONFIG_DIR
      attach_kprobes_with_kprobe_events_abi:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ATTACH_KPROBES_WITH_KPROBE_EVENTS_ABI
      bpf_debug:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_CONFIG_BPF_DEBUG
        - BPF_DEBUG
      bpf_dir:
        node_type: setting
        type: string
        default: ${install_path}/embedded/share/system-probe/ebpf
        env_vars:
        - DD_SYSTEM_PROBE_BPF_DIR
      btf_output_dir:
        node_type: setting
        type: string
        default: /var/tmp/datadog-agent/system-probe/btf
        env_vars:
        - DD_SYSTEM_PROBE_BTF_OUTPUT_DIR
        tags:
        - generate_const:defaultBTFOutputDir
      btf_path:
        node_type: setting
        type: string
        default: ''
        env_vars:
        - DD_SYSTEM_PROBE_BTF_PATH
      closed_channel_size:
        node_type: setting
        type: integer
        default: 0
      closed_connection_flush_threshold:
        node_type: setting
        type: integer
        default: 0
      collect_dns_domains:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_COLLECT_DNS_DOMAINS
      collect_dns_stats:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_COLLECT_DNS_STATS
      collect_local_dns:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_COLLECT_LOCAL_DNS
      conntrack_max_state_size:
        node_type: setting
        type: integer
        default: 131072
      conntrack_rate_limit:
        node_type: setting
        type: integer
        default: 500
      debug_port:
        node_type: setting
        type: integer
        default: 0
      dest_excludes:
        node_type: setting
        type: object
        default: {}
        additionalProperties:
          items:
            type: string
          type: array
      disable_dns_inspection:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_DNS_INSPECTION
      disable_ipv6:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_IPV6_TRACING
      disable_tcp:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_TCP_TRACING
      disable_thp:
        node_type: setting
        type: boolean
        default: true
      disable_udp:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_DISABLE_UDP_TRACING
      dns_timeout_in_s:
        node_type: setting
        type: integer
        default: 15
      enable_co_re:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_ENABLE_CO_RE
      enable_conntrack:
        node_type: setting
        type: boolean
        default: true
      enable_conntrack_all_namespaces:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_ENABLE_CONNTRACK_ALL_NAMESPACES
      enable_kernel_header_download:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ENABLE_KERNEL_HEADER_DOWNLOAD
      enable_oom_kill:
        node_type: setting
        type: boolean
        default: false
      enable_runtime_compiler:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ENABLE_RUNTIME_COMPILER
      enable_tcp_queue_length:
        node_type: setting
        type: boolean
        default: false
      enable_tracepoints:
        node_type: setting
        type: boolean
        default: false
      enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_ENABLED
      excluded_linux_versions:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      expected_tags_duration:
        node_type: setting
        type: string
        default: 30m0s
        env_vars:
        - DD_SYSTEM_PROBE_EXPECTED_TAGS_DURATION
        format: duration
        tags:
        - golang_type:duration
      external:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_EXTERNAL
      http_idle_connection_ttl_in_s:
        node_type: setting
        type: integer
        default: 30
      http_map_cleaner_interval_in_s:
        node_type: setting
        type: integer
        default: 300
      internal_profiling:
        node_type: section
        type: object
        properties:
          api_key:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_API_KEY
            - DD_API_KEY
          block_profile_rate:
            node_type: setting
            type: integer
            default: 0
          cpu_duration:
            node_type: setting
            type: string
            default: 1m0s
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_CPU_DURATION
            format: duration
            tags:
            - golang_type:duration
          custom_attributes:
            node_type: setting
            type: array
            default:
            - module
            - rule_id
            items:
              type: string
          delta_profiles:
            node_type: setting
            type: boolean
            default: true
          enable_block_profiling:
            node_type: setting
            type: boolean
            default: false
          enable_goroutine_stacktraces:
            node_type: setting
            type: boolean
            default: false
          enable_mutex_profiling:
            node_type: setting
            type: boolean
            default: false
          enabled:
            node_type: setting
            type: boolean
            default: false
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_ENABLED
          env:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_ENV
            - DD_ENV
          extra_tags:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          mutex_profile_fraction:
            node_type: setting
            type: integer
            default: 0
          period:
            node_type: setting
            type: string
            default: 5m0s
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_PERIOD
            format: duration
            tags:
            - golang_type:duration
          profile_dd_url:
            node_type: setting
            type: string
            default: ''
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_DD_URL
            - DD_APM_INTERNAL_PROFILING_DD_URL
          site:
            node_type: setting
            type: string
            default: datadoghq.com
            env_vars:
            - DD_SYSTEM_PROBE_INTERNAL_PROFILING_SITE
            - DD_SITE
            tags:
            - generate_const:DefaultSite
          unix_socket:
            node_type: setting
            type: string
            default: ''
      kernel_header_dirs:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_KERNEL_HEADER_DIRS
        items:
          type: string
      kernel_header_download_dir:
        node_type: setting
        type: string
        default: /var/tmp/datadog-agent/system-probe/kernel-headers
        env_vars:
        - DD_KERNEL_HEADER_DOWNLOAD_DIR
      log_level:
        node_type: setting
        type: string
        default: ''
      max_closed_connections_buffered:
        node_type: setting
        type: integer
        default: 0
        tags:
        - golang_type:int64
      max_connection_state_buffered:
        node_type: setting
        type: integer
        default: 75000
      max_conns_per_message:
        node_type: setting
        type: integer
        default: 600
        tags:
        - generate_const:defaultConnsMessageBatchSize
      max_dns_stats:
        node_type: setting
        type: integer
        default: 20000
      max_tracked_connections:
        node_type: setting
        type: integer
        default: 65536
        tags:
        - golang_type:int64
      memory_controller:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          hierarchy:
            node_type: setting
            type: string
            default: v1
          pressure_levels:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
          thresholds:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
      offset_guess_threshold:
        node_type: setting
        type: integer
        default: 400
        tags:
        - generate_const:defaultOffsetThreshold
        - golang_type:int64
      process_config:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            env_vars:
            - DD_SYSTEM_PROBE_PROCESS_ENABLED
      process_service_inference:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            platform_default:
              windows: true
              other: false
          use_improved_algorithm:
            node_type: setting
            type: boolean
            default: false
          use_windows_service_name:
            node_type: setting
            type: boolean
            default: true
      remote_config_btf_enabled:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_REMOTE_CONFIG_BTF_ENABLED
      runtime_compiler_output_dir:
        node_type: setting
        type: string
        default: /var/tmp/datadog-agent/system-probe/build
        env_vars:
        - DD_RUNTIME_COMPILER_OUTPUT_DIR
        tags:
        - generate_const:defaultRuntimeCompilerOutputDir
      source_excludes:
        node_type: setting
        type: object
        default: {}
        additionalProperties:
          items:
            type: string
          type: array
      telemetry_enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_TELEMETRY_ENABLED
      telemetry_perf_buffer_emit_per_cpu:
        node_type: setting
        type: boolean
        default: false
      windows:
        node_type: section
        type: object
        properties:
          enable_monotonic_count:
            node_type: setting
            type: boolean
            default: false
      yum_repos_dir:
        node_type: setting
        type: string
        default: /etc/yum.repos.d
        env_vars:
        - DD_YUM_REPOS_DIR
      zypper_repos_dir:
        node_type: setting
        type: string
        default: /etc/zypp/repos.d
        env_vars:
        - DD_ZYPPER_REPOS_DIR
  log_file:
    node_type: setting
    type: string
    default: ${log_path}/system-probe.log
    visibility: public
    description: The full path to the file where system-probe logs are written.
  network_config:
    node_type: section
    title: System Probe Network Configuration
    type: object
    visibility: public
    description: Configuration for the Network Performance Monitoring (NPM) module.
    tags: []
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLED
        visibility: public
        description: |-
          Set to true to enable the Network Module of the System Probe

          Please note that enabling the Network Module, on Windows, of the System
          Probe will result in a kernel driver being loaded.
      dns_monitoring_ports:
        node_type: setting
        type: array
        default:
        - 53
        items:
          type: integer
        visibility: public
        description: A list of ports that should be monitored for DNS traffic.
      allow_netlink_conntracker_fallback:
        node_type: setting
        type: boolean
        default: true
      cert_collection_map_cleaner_interval:
        node_type: setting
        type: string
        default: 30s
        format: duration
        tags:
        - golang_type:duration
      closed_buffer_wakeup_count:
        node_type: setting
        type: integer
        default: 4
      closed_channel_size:
        node_type: setting
        type: integer
        default: 500
      closed_connection_flush_threshold:
        node_type: setting
        type: integer
        default: 0
      collect_tcp_v4:
        node_type: setting
        type: boolean
        default: true
        tags:
        - no-env
      collect_tcp_v6:
        node_type: setting
        type: boolean
        default: true
        tags:
        - no-env
      collect_udp_v4:
        node_type: setting
        type: boolean
        default: true
        tags:
        - no-env
      collect_udp_v6:
        node_type: setting
        type: boolean
        default: true
        tags:
        - no-env
      conntrack_init_timeout:
        node_type: setting
        type: string
        default: 10s
        format: duration
        tags:
        - golang_type:duration
      direct_send:
        node_type: setting
        type: boolean
        default: false
      dns_recorded_query_types:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      enable_cert_collection:
        node_type: setting
        type: boolean
        default: false
      enable_cilium_lb_conntracker:
        node_type: setting
        type: boolean
        default: true
      enable_co_re:
        node_type: setting
        type: boolean
        default: true
      enable_connection_rollup:
        node_type: setting
        type: boolean
        default: false
      enable_dns_by_querytype:
        node_type: setting
        type: boolean
        default: false
      enable_ebpf_conntracker:
        node_type: setting
        type: boolean
        default: true
      enable_ebpfless:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_ENABLE_EBPFLESS
        - DD_NETWORK_CONFIG_ENABLE_EBPFLESS
      enable_fentry:
        node_type: setting
        type: boolean
        default: false
      enable_gateway_lookup:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLE_GATEWAY_LOOKUP
      enable_http_monitoring:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLE_HTTP_MONITORING
      enable_https_monitoring:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLE_HTTPS_MONITORING
      enable_protocol_classification:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_ENABLE_PROTOCOL_CLASSIFICATION
      enable_ringbuffers:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLE_RINGBUFFERS
      enable_root_netns:
        node_type: setting
        type: boolean
        default: true
      enable_sk_tracer:
        node_type: setting
        type: boolean
        default: false
      enable_tcp_failed_connections:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_ENABLE_FAILED_CONNS
      http_max_request_fragment:
        node_type: setting
        type: integer
        default: 512
      http_notification_threshold:
        node_type: setting
        type: integer
        default: 512
      http_replace_rules:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_HTTP_REPLACE_RULES
        env_parser: json
        items:
          additionalProperties:
            type: string
          type: object
      ignore_conntrack_init_failure:
        node_type: setting
        type: boolean
        default: false
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_IGNORE_CONNTRACK_INIT_FAILURE
      max_failed_connections_buffered:
        node_type: setting
        type: integer
        default: 0
        tags:
        - golang_type:int64
      max_http_stats_buffered:
        node_type: setting
        type: integer
        default: 100000
        env_vars:
        - DD_SYSTEM_PROBE_NETWORK_MAX_HTTP_STATS_BUFFERED
      max_tracked_http_connections:
        node_type: setting
        type: integer
        default: 1024
  service_monitoring_config:
    $ref: system-probe-usm.yaml
  ping:
    node_type: section
    title: System Probe Ping Configuration
    type: object
    visibility: public
    description: Configuration for the Ping module, which sends ICMP probes to monitor
      host reachability.
    tags: []
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable the Ping Module of the System Probe
  traceroute:
    node_type: section
    title: System Probe Traceroute Configuration
    type: object
    visibility: public
    description: Configuration for the Traceroute module, which maps the network path
      to a destination host.
    tags: []
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable the Traceroute Module of the System Probe
  runtime_security_config:
    $ref: system-probe-cws.yaml
  event_monitoring_config:
    node_type: section
    type: object
    visibility: public
    description: Configuration for the Event Monitoring module, which monitors kernel-level
      security events.
    tags: []
    properties:
      custom_sensitive_words:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_EVENT_MONITORING_CONFIG_CUSTOM_SENSITIVE_WORDS
        - DD_RUNTIME_SECURITY_CONFIG_CUSTOM_SENSITIVE_WORDS
        items:
          type: string
        visibility: public
        description: |-
          Define your own list of sensitive data to be merged with the default one.
          Read more on Datadog documentation:
          https://docs.datadoghq.com/graphing/infrastructure/process/#process-arguments-scrubbing
        example: |2-

            - 'personal_key'
            - '*token'
            - 'sql*'
            - '*pass*d*'
      custom_sensitive_regexps:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_EVENT_MONITORING_CONFIG_CUSTOM_SENSITIVE_REGEXPS
        - DD_RUNTIME_SECURITY_CONFIG_CUSTOM_SENSITIVE_REGEXPS
        items:
          type: string
        visibility: public
        description: List of regular expressions matching process arguments that should
          be redacted.
        example: |2-

            - 'gh-[a-zA-Z0-9]+'

          # @param envs_with_value - list of strings - optional - default: ["LD_PRELOAD", "LD_LIBRARY_PATH", "PATH", "HISTSIZE", "HISTFILESIZE", "GLIBC_TUNABLES", "SSH_CLIENT"]
          # @env DD_EVENT_MONITORING_CONFIG_ENVS_WITH_VALUE - space-separated list of strings - optional - default: 'LD_PRELOAD LD_LIBRARY_PATH PATH HISTSIZE HISTFILESIZE GLIBC_TUNABLES SSH_CLIENT'
          # @env DD_RUNTIME_SECURITY_CONFIG_ENVS_WITH_VALUE - space-separated list of strings - optional - default: 'LD_PRELOAD LD_LIBRARY_PATH PATH HISTSIZE HISTFILESIZE GLIBC_TUNABLES SSH_CLIENT'
          # Define your own list of non-sensitive environment variable names whose value will not be
          # concealed by the runtime security module.
          # Default: LD_PRELOAD, LD_LIBRARY_PATH, PATH, HISTSIZE, HISTFILESIZE, GLIBC_TUNABLES, OTEL_SERVICE_NAME, DD_SERVICE

          envs_with_value:
            - LD_PRELOAD
            - LD_LIBRARY_PATH
            - PATH
            - HISTSIZE
            - HISTFILESIZE
            - OTEL_SERVICE_NAME
            - DD_SERVICE
      network:
        node_type: section
        type: object
        visibility: public
        description: Network section is used to configure Cloud Workload Security
          (CWS) network features.
        tags: []
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_ENABLED
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_ENABLED
            visibility: public
            description: Set to true to activate the CWS network detections.
          classifier_handle:
            node_type: setting
            type: integer
            default: 0
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_CLASSIFIER_HANDLE
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_CLASSIFIER_HANDLE
          classifier_priority:
            node_type: setting
            type: integer
            default: 10
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_CLASSIFIER_PRIORITY
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_CLASSIFIER_PRIORITY
          extra_private_ip_ranges:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_EVENT_MONITORING_CONFIG_NETWORK_EXTRA_PRIVATE_IP_RANGES
            - DD_RUNTIME_SECURITY_CONFIG_NETWORK_EXTRA_PRIVATE_IP_RANGES
            items:
              type: string
          flow_monitor:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                env_vars:
                - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_ENABLED
                - DD_RUNTIME_SECURITY_CONFIG_NETWORK_FLOW_MONITOR_ENABLED
              period:
                node_type: setting
                type: string
                default: 10s
                env_vars:
                - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_PERIOD
                - DD_RUNTIME_SECURITY_CONFIG_NETWORK_FLOW_MONITOR_PERIOD
              sk_storage:
                node_type: section
                type: object
                properties:
                  enabled:
                    node_type: setting
                    type: boolean
                    default: false
                    env_vars:
                    - DD_EVENT_MONITORING_CONFIG_NETWORK_FLOW_MONITOR_SK_STORAGE_ENABLED
