                type: integer
                default: 2
              sender_recovery_reset:
                node_type: setting
                type: boolean
                default: false
              use_compression:
                node_type: setting
                type: boolean
                default: true
              use_v2_api:
                node_type: setting
                type: boolean
                default: true
              zstd_compression_level:
                node_type: setting
                type: integer
                default: 1
