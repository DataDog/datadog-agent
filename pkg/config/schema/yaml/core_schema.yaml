$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/DataDog/schema/main/agent/datadog.yaml.schema.json
title: DataDog Agent configuration schema
description: The schema to validate the datadog.yaml configuration for the DataDog
  Agent
properties:
  api_key:
    node_type: setting
    title: Basic Configuration
    type: string
    default: ''
    visibility: public
    description: |-
      The Datadog API key used by your Agent to submit metrics and events to Datadog.
      Create a new API key here: https://app.datadoghq.com/organization-settings/api-keys .
      Read more about API keys here: https://docs.datadoghq.com/account_management/api-app-keys/#api-keys .
    tags:
    - template_section:Common
  app_key:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      The application key used to access Datadog's programmatic API.
      Create a new application key here: https://app.datadoghq.com/organization-settings/application-keys .
      Read more about application keys here: https://docs.datadoghq.com/account_management/api-app-keys/#application-keys .
    tags:
    - template_section:Common
  site:
    node_type: setting
    type: string
    default: datadoghq.com
    visibility: public
    description: |-
      The site of the Datadog intake to send Agent data to.
      The site parameter must be set to enable your agent with Remote Configuration.
      Set to 'datadoghq.eu' to send data to the EU site.
      Set to 'us3.datadoghq.com' to send data to the US3 site.
      Set to 'us5.datadoghq.com' to send data to the US5 site.
      Set to 'ap1.datadoghq.com' to send data to the AP1 site.
      Set to 'ddog-gov.com' to send data to the US1-FED site.
    tags:
    - template_section:Common
    comment: Agent
  infrastructure_mode:
    node_type: setting
    type: string
    default: full
    visibility: public
    description: |-
      Controls which integrations and metadata the Agent collects.
      Valid values:
        - full: default server/host-monitoring behavior (all checks allowed).
        - basic: minimal host-level metrics only.
        - end_user_device: tuned for end-user-device (EUDM) laptops and desktops.
        - cloud_cost_only: Cloud Cost Management lightweight tagging.
        - none: disables infrastructure checks.
    tags:
    - template_section:Common
    comment: |-
      Infrastructure mode
      The infrastructure mode is used to determine the features that are available to the agent.
      The possible values are: full, basic, end_user_device, cloud_cost_only, none.
  dd_url:
    node_type: setting
    type: string
    default: https://app.datadoghq.com
    env_vars:
    - DD_DD_URL
    - DD_URL
    visibility: public
    description: |-
      The host of the Datadog intake server to send metrics to, only set this option
      if you need the Agent to send metrics to a custom URL, it overrides the site
      setting defined in "site". It does not affect APM, Logs, Remote Configuration, or Live Process intake which have their
      own "*_dd_url" settings.
      If DD_DD_URL and DD_URL are both set, DD_DD_URL is used in priority.
    tags:
    - template_section:Common
  proxy:
    node_type: section
    type: object
    visibility: public
    description: |-
      If you need a proxy to connect to the Internet, provide it here (default:
      disabled). Refer to https://docs.datadoghq.com/agent/proxy/ to understand how to use these settings.
      For Logs proxy information, refer to https://docs.datadoghq.com/agent/proxy/#proxy-for-logs
    tags:
    - template_section:Common
    properties:
      https:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: |-
          @env DD_PROXY_HTTPS - string - optional - default: ""
          The proxy to use for HTTPS requests
        example: http://<USERNAME>:<PASSWORD>@<PROXY_SERVER_FOR_HTTPS>:<PORT>
        tags:
        - no-env
      http:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: |-
          @env DD_PROXY_HTTP - string - optional - default: ""
          The proxy to use for HTTP requests
        example: http://<USERNAME>:<PASSWORD>@<PROXY_SERVER_FOR_HTTP>:<PORT>
        tags:
        - no-env
      no_proxy:
        node_type: setting
        type: array
        default: []
        items:
          type: string
        visibility: public
        description: |-
          @env DD_PROXY_NO_PROXY - space-separated list of strings - optional - default: []
          A list of hosts for which the proxy setting should not be used
        example: |2-

            - <HOSTNAME-1>
            - <HOSTNAME-2>
        tags:
        - no-env
  skip_ssl_validation:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Setting this option to "true" tells the Agent to skip validation
      of SSL/TLS certificates.
    tags:
    - template_section:Common
  sslkeylogfile:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      sslkeylogfile specifies a destination for TLS master secrets
      in NSS key log format to allow external programs
      such as Wireshark to decrypt TLS connections.
      For more details, see https://developer.mozilla.org/en-US/docs/Mozilla/Projects/NSS/Key_Log_Format.
      Use of sslkeylogfile compromises security and should only be
      used for debugging.
    tags:
    - template_section:Common
  min_tls_version:
    node_type: setting
    type: string
    default: tlsv1.2
    visibility: public
    description: |-
      This option defines the minimum TLS version that will be used when
      submitting data to the Datadog intake specified in "site" or "dd_url".
      This parameter defaults to "tlsv1.2".
      Possible values are: tlsv1.0, tlsv1.1, tlsv1.2, tlsv1.3; values are case-
      insensitive.
    tags:
    - template_section:Common
    comment: Configuration for TLS for outgoing connections
  hostname:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: Force the hostname name for the Agent. By default, the Agent auto-detects
      its hostname.
    example: <HOSTNAME_NAME>
    tags:
    - template_section:Common
  hostname_file:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      In some environments, auto-detection of the hostname is not adequate and
      environment variables cannot be used to set the value. In such cases, the
      file on the host can also be used provide an appropriate value. If
      'hostname' value has been set to a non-empty value, this option is ignored.
    example: /var/lib/cloud/data/instance-id
    tags:
    - template_section:Common
  hostname_fqdn:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      When the Agent relies on the OS to determine the hostname, make it use the
      FQDN instead of the short hostname. Recommended value: true
      More information at https://dtdg.co/flag-hostname-fqdn
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: |-
      if/when the default is changed to true, make the default platform
      dependent; default should remain false on Windows to maintain backward
      compatibility with Agent5 behavior/win
  hostname_trust_uts_namespace:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      By default the Agent does not trust the hostname value retrieved from non-root UTS namespace,
      as it's usually a generated name, unrelated to the host (e.g. when running in a container).
      When enabled, the Agent will trust the value retrieved from non-root UTS namespace instead of failing
      hostname resolution.
      (Linux only)
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: |-
      By default the Agent does not trust the hostname value retrieved from non-root UTS namespace.
      When enabled, the Agent will trust the value retrieved from non-root UTS namespace instead of failing
      hostname resolution.
      (Linux only)
  host_aliases:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      List of host aliases to report in addition to any aliases collected
      automatically from cloud providers.
      More information at
      https://docs.datadoghq.com/agent/faq/how-datadog-agent-determines-the-hostname/?tab=agentv6v7#host-aliases
    example: |2-

        - <ALIAS-1>
        - <ALIAS-2>
    tags:
    - template_section:Common
    - full-agent-only:true
  tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      List of host tags. Attached in-app to every metric, event, log, trace, and service check emitted by this Agent.

      This configuration value merges with `DD_EXTRA_TAGS`, allowing some
      tags to be set in a configuration file (`tags`), and additional tags to be added
      with an environment variable (`DD_EXTRA_TAGS`).

      Learn more about tagging: https://docs.datadoghq.com/tagging/
    example: |2-

        - team:infra
        - <TAG_KEY>:<TAG_VALUE>
    tags:
    - template_section:Common
  extra_tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      List of host tags. Attached in-app to every metric, event, log, trace, and service check emitted by this Agent.

      This configuration value merges with `tags`, allowing some
      tags to be set in a configuration file (`tags`), and additional tags to be added
      with an environment variable (`DD_EXTRA_TAGS`).

      Learn more about tagging: https://docs.datadoghq.com/tagging/
    example: |2-

        - region:northerly
        - <TAG_KEY>:<TAG_VALUE>
    tags:
    - template_section:Common
  env:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      The environment name where the agent is running. Attached in-app to every
      metric, event, log, trace, and service check emitted by this Agent.
    example: <environment name>
    tags:
    - template_section:Common
  remote_updates:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Enable remote upgrades and configuration changes for the Agent.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: Installer configuration
  process_manager:
    node_type: section
    type: object
    visibility: public
    description: |-
      When true (see `enabled` below), the Datadog process manager daemon (dd-procmgrd) is enabled for this host install.
      On Windows, the core Agent starts the Windows service `dd-procmgr-service` when this option is true.
      On Linux, dd-procmgrd is started by systemd (`datadog-agent-procmgr.service` linked to the main Agent unit);
      This setting is ignored on Linux and does not enable or disable the systemd unit.
    tags:
    - template_section:Common
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: true
        visibility: public
        description: |-
          When true (Windows only), the core Agent starts the dd-procmgr-service Windows service.
          On Linux, the process manager daemon is started by systemd; this option is ignored.
        comment: |-
          Process manager (dd-procmgrd): on Windows the core agent starts dd-procmgr-service when enabled.
          On Linux, dd-procmgrd is managed by systemd (datadog-agent-procmgr.service); this setting is ignored there.
  tag_value_split_separator:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      Split tag values according to a given separator. Only applies to host tags,
      and tags coming from container integrations. It does not apply to tags on dogstatsd metrics,
      and tags collected by other integrations.

      Example use-case:

       With a raw collected tag "foo:1;2;3", using the following configuration:

       tag_value_split_separator:
         foo: ;

       results in the raw tag being transformed into "foo:1", "foo:2", "foo:3" tags
    example: |2-

        <TAG_KEY>: <SEPARATOR>
    tags:
    - template_section:Common
  checks_tag_cardinality:
    node_type: setting
    type: string
    default: low
    visibility: public
    description: |-
      Configure the level of granularity of tags to send for checks metrics and events. Choices are:
        * low: add tags about low-cardinality objects (clusters, hosts, deployments, container images, ...)
        * orchestrator: add tags about pod, (in Kubernetes), or task (in ECS or Mesos) -level of cardinality
        * high: add tags about high-cardinality objects (individual containers, user IDs in requests, ...)
      WARNING: sending container tags for checks metrics may create more metrics
      (one per container instead of one per host). This may impact your custom metrics billing.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: |-
      Set defaults for config keys that may be accessed but aren't relevant in serverless environments
      to avoid "config key is unknown" and "unable to cast nil" warnings
  dogstatsd_tag_cardinality:
    node_type: setting
    type: string
    default: low
    visibility: public
    description: |-
      Configure the level of granularity of tags to send for DogStatsD metrics and events. Choices are:
        * low: add tags about low-cardinality objects (clusters, hosts, deployments, container images, ...)
        * orchestrator: add tags about pod, (in Kubernetes), or task (in ECS or Mesos) -level of cardinality
        * high: add tags about high-cardinality objects (individual containers, user IDs in requests, ...)

      WARNING: sending container tags for dogstatsd metrics may create more metrics
      (one per container instead of one per host). This may impact your custom metrics billing.
    tags:
    - template_section:Common
    - full-agent-only:true
  histogram_aggregates:
    node_type: setting
    type: array
    default:
    - max
    - median
    - avg
    - count
    items:
      type: string
    visibility: public
    description: |-
      Configure which aggregated value to compute.
      Possible values are: min, max, median, avg, sum and count.
    tags:
    - template_section:Common
  histogram_percentiles:
    node_type: setting
    type: array
    default:
    - '0.95'
    items:
      type: string
    visibility: public
    description: |-
      Configure which percentiles are computed by the Agent. It must be a list of float between 0 and 1.
      Warning: percentiles must be specified as yaml strings
    tags:
    - template_section:Common
  histogram_copy_to_distribution:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Copy histogram values to distributions for true global distributions (in beta)
      Note: This increases the number of custom metrics created.
    tags:
    - template_section:Common
  histogram_copy_to_distribution_prefix:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: A prefix to add to distribution metrics created when histogram_copy_to_distributions
      is true
    example: '"<PREFIX>"'
    tags:
    - template_section:Common
  aggregator_stop_timeout:
    node_type: setting
    type: integer
    default: 2
    visibility: public
    description: |-
      When stopping the agent, the Aggregator will try to flush out data ready for
      aggregation (metrics, events, ...). Data are flushed to the Forwarder in order
      to be sent to Datadog, therefore the Agent might take at most
      'aggregator_stop_timeout'+'forwarder_stop_timeout' seconds to exit.

      You can set the maximum amount of time, in seconds, allocated to the
      Aggregator to do so. You can disable this feature by setting
      'aggregator_stop_timeout' to 0.
    tags:
    - template_section:Common
  aggregator_buffer_size:
    node_type: setting
    type: integer
    default: 100
    visibility: public
    description: |-
      The default buffer size for the aggregator use a sane value for most of the
      use cases, however, it could be useful to manually set it in order to trade
      RSS usage with better performances.
    tags:
    - template_section:Common
  forwarder_timeout:
    node_type: setting
    type: integer
    default: 20
    visibility: public
    description: Forwarder timeout in seconds
    tags:
    - template_section:Common
  use_v3_api:
    node_type: section
    type: object
    visibility: public
    description: Controls the use of the v3 metrics intake.
    tags:
    - template_section:Common
    properties:
      series:
        node_type: section
        type: object
        visibility: public
        description: Controls the use of the v3 metrics intake for non-distribution
          metrics (series).
        tags:
        - template_section:Common
        properties:
          enabled:
            node_type: setting
            type: string
            default: 'true'
            visibility: public
            description: |-
              Global default for the non-distribution metrics intake version. Accepted values:
                - true: v3 for every destination except Observability Pipelines Worker.
                - datadog_only: v3 only when the destination URL is a Datadog endpoint.
                - false: v2 everywhere.
          endpoints:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
            visibility: public
            description: |-
              Per-URL override map for non-distribution metrics intake version. The URL
              must match exactly what was configured under `dd_url` or `additional_endpoints`.
              Accepted values:
                - true: v3 for every destination except Observability Pipelines Worker.
                - datadog_only: v3 only when the destination URL is a Datadog endpoint.
                - false: v2 everywhere.
  forwarder_retry_queue_payloads_max_size:
    node_type: setting
    type: integer
    default: 15728640
    visibility: public
    description: |-
      It defines the maximum size in bytes of all the payloads in the forwarder's retry queue.
      The actual memory used is greater than the payloads size as there are extra fields like HTTP headers,
      but no more than 2.5 times the payload size. The default is 15MB.
    tags:
    - template_section:Common
  forwarder_num_workers:
    node_type: setting
    type: integer
    default: 1
    visibility: public
    description: The number of workers used by the forwarder.
    tags:
    - template_section:Common
  forwarder_stop_timeout:
    node_type: setting
    type: integer
    default: 2
    visibility: public
    description: |-
      When stopping the agent, the Forwarder will try to flush all new
      transactions (not the ones in retry state).  New transactions will be created
      as the Aggregator flush it's internal data too, therefore the Agent might take
      at most 'aggregator_stop_timeout'+'forwarder_stop_timeout' seconds to exit.

      You can set the maximum amount of time, in seconds, allocated to the
      Forwarder to send those transactions.  You can disable this feature by setting
      'forwarder_stop_timeout' to 0.
    tags:
    - template_section:Common
  forwarder_http_protocol:
    node_type: setting
    type: string
    default: auto
    visibility: public
    description: The transport type to use for sending logs. Possible values are "auto"
      or "http1".
    tags:
    - template_section:Common
  forwarder_max_concurrent_requests:
    node_type: setting
    type: integer
    default: 10
    visibility: public
    description: |-
      The maximum number of concurrent requests that each worker can have queued up
      at any one time. If the connection is over HTTP/1 each request will be waiting
      for the previous request to complete before sending the next one. With HTTP/2
      each request can be sent before waiting for the response.
    tags:
    - template_section:Common
  forwarder_storage_max_size_in_bytes:
    node_type: setting
    type: integer
    default: 0
    visibility: public
    description: |-
      When the retry queue of the forwarder is full, `forwarder_storage_max_size_in_bytes`
      defines the amount of disk space the Agent can use to store transactions on the disk.
      When `forwarder_storage_max_size_in_bytes` is `0`, the transactions are never stored on the disk.
    example: '50000000'
    tags:
    - template_section:Common
    comment: 0 means disabled. This is a BETA feature.
  forwarder_storage_max_disk_ratio:
    node_type: setting
    type: number
    default: 0.8
    visibility: public
    description: |-
      `forwarder_storage_max_disk_ratio` defines the disk capacity limit for storing transactions.
      `0.8` means the Agent can store transactions on disk until `forwarder_storage_max_size_in_bytes`
      is reached or when the disk mount for `forwarder_storage_path` exceeds 80% of the disk capacity,
      whichever is lower.
    tags:
    - golang_type:float64
    - template_section:Common
    comment: Do not store transactions on disk when the disk usage exceeds 80% of
      the disk capacity. Use 80% as some applications do not behave well when the
      disk space is very small.
  forwarder_outdated_file_in_days:
    node_type: setting
    type: integer
    default: 10
    visibility: public
    description: |-
      This value specifies how many days the overflow transactions will remain valid before
      being discarded. During the Agent restart, if a retry file contains transactions that were
      created more than `forwarder_outdated_file_in_days` days ago, they are removed.
    tags:
    - template_section:Common
  forwarder_high_prio_buffer_size:
    node_type: setting
    type: integer
    default: 100
    visibility: public
    description: |-
      Defines the size of the high prio buffer.
      Increasing the buffer size can help if payload drops occur due to high prio buffer being full.
    tags:
    - template_section:Common
    comment: Forwarder channels buffer size
  forwarder_low_prio_buffer_size:
    node_type: setting
    type: integer
    default: 100
    visibility: public
    description: Defines the size of the low prio buffer.
    tags:
    - template_section:Common
  forwarder_requeue_buffer_size:
    node_type: setting
    type: integer
    default: 100
    visibility: public
    description: Defines the size of the requeue prio buffer.
    tags:
    - template_section:Common
  forwarder_backoff_base:
    node_type: setting
    type: integer
    default: 2
    visibility: public
    description: |-
      Defines the rate of exponential growth, and the first retry interval range.
      Do not set a lower value than the default. You may increase it if you use a proxy that benefits from a
      higher rate of exponential growth.
    tags:
    - template_section:Common
  forwarder_backoff_max:
    node_type: setting
    type: integer
    default: 64
    visibility: public
    description: |-
      Defines the maximum number of seconds to wait for a retry.
      Do not set a lower value than the default. You may increase it if you use a proxy that benefits from a
      higher maximum backoff time.
    tags:
    - template_section:Common
  cloud_provider_metadata:
    node_type: setting
    type: array
    default:
    - aws
    - gcp
    - azure
    - alibaba
    - oracle
    - ibm
    items:
      type: string
    visibility: public
    description: |-
      This option restricts which cloud provider endpoint will be used by the
      agent to retrieve metadata. By default the agent will try # AWS, GCP, Azure
      and alibaba providers. Some cloud provider are not enabled by default to not
      trigger security alert when querying unknown IP (for example, when enabling
      Tencent on AWS).
      Setting an empty list will disable querying any cloud metadata endpoints
      (falling back on system metadata). Disabling metadata for the cloud provider in which an Agent runs may result in
      duplicated hosts in your Datadog account and missing Autodiscovery features

      Possible values are:
      "aws"     AWS EC2, ECS/Fargate
      "gcp"     Google Cloud Provider
      "azure"   Azure
      "alibaba" Alibaba
      "tencent" Tencent
      "oracle"  Oracle Cloud
      "ibm"     IBM Cloud
    tags:
    - template_section:Common
  collect_ec2_tags:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Collect AWS EC2 custom tags as host tags.
      Requires one of:
       - `collect_ec2_tags_use_imds: true` and configuration of the
         EC2 instance to allow tags in instance metadata; or
       - configuration of the EC2 instance to have an IAM role with
         the `EC2:DescribeTags` permission.
      See docs for further details:
      https://docs.datadoghq.com/integrations/faq/how-do-i-pull-my-ec2-tags-without-using-the-aws-integration/
    tags:
    - template_section:Common
    - full-agent-only:true
  collect_ec2_instance_info:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Extend host tags with AWS EC2 instance information. The added tags are:
       - region
       - instance-type
       - aws_account
       - image
       - availability-zone

      This should only be enabled when the Datadog AWS integration cannot be enabled (see
      https://docs.datadoghq.com/integrations/amazon_web_services/ for more information on the AWS integration).
      Using the AWS integration is recommended as it offers more features and a better integration with the AWS environment.
    tags:
    - template_section:Common
    - full-agent-only:true
  exclude_ec2_tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      EC2 tags to exclude from being converted into host tags. This does not impact tags collected by the AWS Integration
      (see https://docs.datadoghq.com/integrations/amazon_web_services/ for more information on the AWS integration).

      This requires 'collect_ec2_tags' setting to be set to true.
    tags:
    - template_section:Common
    - full-agent-only:true
  collect_ec2_tags_use_imds:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Use instance metadata service (IMDS) instead of EC2 API to collect AWS EC2 custom tags.

      This requires 'collect_ec2_tags' setting to be set to true.
    tags:
    - template_section:Common
    - full-agent-only:true
  ec2_metadata_timeout:
    node_type: setting
    type: integer
    default: 300
    visibility: public
    description: Timeout in milliseconds on calls to the AWS EC2 metadata endpoints.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: value in milliseconds
  ec2_prefer_imdsv2:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      If this flag is true then the agent will request EC2 metadata using IMDS v2,
      which offers additional security for accessing metadata. However, in some
      situations (such as a containerized agent on a plain EC2 instance) it may
      require additional configuration on the AWS side. See the AWS guidelines
      for further details:
      https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html#instance-metadata-transition-to-version-2
    tags:
    - template_section:Common
    - full-agent-only:true
  ec2_prioritize_instance_id_as_hostname:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      On EC2, prefer the instance ID as the Agent hostname even when the OS hostname does not match
      the known generic EC2 prefixes. By default, the Agent uses the instance ID if the OS hostname
      has a generic EC2 prefix to avoid merging multiple instances under one host. This is useful
      when using custom images that share the same system hostname.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: used to bypass the hostname detection logic and force the EC2 instance
      ID as a hostname.
  collect_gce_tags:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Collect Google Cloud Engine metadata as host tags
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: GCE
  exclude_gce_tags:
    node_type: setting
    type: array
    default:
    - bosh_settings
    - cli-cert
    - common-psm1
    - configure-sh
    - containerd-configure-sh
    - disable-address-manager
    - disable-legacy-endpoints
    - enable-oslogin
    - gce-container-declaration
    - google-container-manifest
    - ipsec-cert
    - k8s-node-setup-psm1
    - kube-env
    - kubeconfig
    - kubelet-config
    - serial-port-logging-enable
    - shutdown-script
    - ssh-keys
    - sshKeys
    - ssl-cert
    - startup-script
    - user-data
    - windows-keys
    - windows-startup-script-ps1
    items:
      type: string
    visibility: public
    description: |-
      Google Cloud Engine metadata attribute to exclude from being converted into
      host tags -- only applicable when collect_gce_tags is true.
    tags:
    - template_section:Common
    - full-agent-only:true
  gce_send_project_id_tag:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Send the project ID host tag with the `project_id:` tag key in addition to
      the `project:` tag key.
    tags:
    - template_section:Common
    - full-agent-only:true
  gce_metadata_timeout:
    node_type: setting
    type: integer
    default: 1000
    visibility: public
    description: Timeout in milliseconds on calls to the GCE metadata endpoints.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: value in milliseconds
  collect_gpu_tags:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Collect GPU related host tags
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: GPU
  gpu:
    $ref: gpu.yaml
  azure_metadata_timeout:
    node_type: setting
    type: integer
    default: 300
    visibility: public
    description: Timeout in milliseconds on calls to the Azure metadata endpoints.
    tags:
    - template_section:Common
    - full-agent-only:true
  azure_hostname_style:
    node_type: setting
    type: string
    default: os
    visibility: public
    description: |-
      Changes how agent hostname is set on Azure virtual machines.

      Possible values:
        "os" - use the hostname reported by the operating system (default)
        "name" - use the instance name
        "name_and_resource_group" - use a combination of the instance name and resource group name
        "full" - use a combination of the instance name, resource group name and subscription id
        "vmid" - use the instance id
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: Azure
  azure_metadata_api_version:
    node_type: setting
    type: string
    default: '2021-02-01'
    visibility: public
    description: |-
      The API version to use when querying the Azure Instance Metadata Service (IMDS).
      Change this if you need to use a different API version for compatibility reasons.
    tags:
    - template_section:Common
    - full-agent-only:true
  scrubber:
    node_type: section
    type: object
    visibility: public
    description: Configuration for scrubbing sensitive information from the Agent's
      logs, configuration and flares.
    tags:
    - template_section:Common
    properties:
      additional_keys:
        node_type: setting
        type: array
        default: []
        items:
          type: string
        visibility: public
        description: |-
          By default, the Agent removes known sensitive keys from Agent and integrations YAML configs before
          including them in the flare.
          Use this parameter to define additional sensitive keys that the Agent should scrub from
          the YAML files included in the flare.
        example: |2-

            - "sensitive_key_1"
            - "sensitive_key_2"
  no_proxy_nonexact_match:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Enable more flexible no_proxy matching. See https://godoc.org/golang.org/x/net/http/httpproxy#Config
      for more information on accepted matching criteria.
    tags:
    - template_section:Common
  use_proxy_for_cloud_metadata:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      By default cloud provider IP's are added to the transport's `no_proxy` list.
      Use this parameter to remove them from the `no_proxy` list.
    tags:
    - template_section:Common
  inventories_configuration_enabled:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      By default the Agent sends its own configuration to Datadog to be displayed in the `Agent Configuration` section of the host
      detail panel. See https://docs.datadoghq.com/infrastructure/list/#agent-configuration for more information.

      The Agent configuration is scrubbed of any sensitive information.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: controls the agent configurations
  metadata_ip_resolution_from_hostname:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      By default, the Agent uses the first interface in the list of network interfaces to determine the IP address of the host.
      If you set this option to true, the Agent tries to resolve the host name to determine the host's IP address.
      If this is unsuccessful, the Agent falls back to the default behavior.
      This option is useful when the first interface is not the one you want to use to determine the host's IP address, or when
      you define the hostname in the /etc/hosts configuration file.
    tags:
    - template_section:Common
    - full-agent-only:true
    comment: resolve the hostname to get the IP address
  auto_exit:
    node_type: section
    type: object
    visibility: public
    description: 'Configuration for the automatic exit mechanism: the Agent stops
      when some conditions are met.'
    tags:
    - template_section:Common
    properties:
      noprocess:
        node_type: section
        type: object
        visibility: public
        description: |-
          Configure the `noprocess` automatic exit method.
          Detect when no other processes (non-agent) are running to trigger automatic exit. `HOST_PROC` is taken into account when gathering processes.
          Feature is only supported on POSIX systems.
        tags:
        - template_section:Common
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enable the `noprocess` method
          excluded_processes:
            node_type: setting
            type: array
            default: []
            items:
              type: string
            visibility: public
            description: List of regular expressions to exclude extra processes (on
              top of built-in list).
      validation_period:
        node_type: setting
        type: integer
        default: 60
        visibility: public
        description: |-
          Time (in seconds) delay during which the auto exit validates that the selected method continuously detects an exit condition, before exiting.
          The value is verified every 30s. By default, three consecutive checks need to return true to trigger an automatic exit.
        comment: Auto exit configuration
  remote_configuration:
    $ref: remote_configuration.yaml
  fips:
    node_type: section
    type: object
    visibility: public
    description: Uncomment this parameter and the one below to enable them.
    tags:
    - template_section:Common
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: |-
          This feature is in BETA.

          Enable the use of the FIPS proxy to send data to the DataDog backend. Enabling this will force all outgoing traffic
          from the Agent to the local proxy.
          It's important to note that enabling this will not make the Datadog Agent FIPS compliant, but will force all outgoing
          traffic to a local FIPS compliant proxy. The FIPS proxy need to be installed locally in addition to the agent.

          When setting this to true the following settings would be overridden, ignoring the values from the
          configuration:
          - dd_url
          - apm_config.apm_dd_url
          - apm_config.profiling_dd_url
          - apm_config.telemetry.dd_url
          - process_config.process_dd_url
          - logs_config.use_http
          - logs_config.logs_no_ssl
          - logs_config.logs_dd_url
          - database_monitoring.metrics.dd_url
          - database_monitoring.activity.dd_url
          - database_monitoring.samples.dd_url
          - compliance_config.endpoints.dd_url
          - runtime_security_config.endpoints.dd_url
          - network_devices.metadata.dd_url

          The agent will also ignore 'proxy.*' settings and environment variables related to proxy (HTTP_PROXY, HTTPS_PROXY,
          DD_PROXY_HTTP and DD_PROXY_HTTPS).
        comment: Fips
      local_address:
        node_type: setting
        type: string
        default: localhost
        visibility: public
        description: The local address that the FIPS proxy will bind ports on.
      https:
        node_type: setting
        type: boolean
        default: true
      port_range_start:
        node_type: setting
        type: integer
        default: 9803
      tls_verify:
        node_type: setting
        type: boolean
        default: true
  observability_pipelines_worker:
    node_type: section
    type: object
    visibility: public
    description: |-
      Configuration for forwarding telemetry to an Observability Pipelines Worker instead of Datadog.
      https://www.datadoghq.com/product/observability-pipelines/
      Note: This config is interchangeable with `vector`
    tags:
    - template_section:Common
    properties:
      metrics:
        node_type: section
        type: object
        visibility: public
        description: Specific configurations for metrics
        tags:
        - template_section:Common
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enables forwarding of metrics to an Observability Pipelines
              Worker
          url:
            node_type: setting
            type: string
            default: ''
            visibility: public
            description: URL endpoint for the Observability Pipelines Worker to send
              metrics to
            example: '"http://127.0.0.1:8080"'
          use_v3_api:
            node_type: section
            type: object
            properties:
              series:
                node_type: setting
                type: boolean
                default: false
      logs:
        node_type: section
        type: object
        visibility: public
        description: Specific configurations for logs
        tags:
        - template_section:Common
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enables forwarding of logs to an Observability Pipelines
              Worker
          url:
            node_type: setting
            type: string
            default: ''
            visibility: public
            description: URL endpoint for the Observability Pipelines Worker to send
              logs to
            example: '"http://127.0.0.1:8080"'
          dual_ship:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              When false (default), the Observability Pipelines Worker replaces the primary
              Datadog logs intake as the sole destination. When true, logs are sent to BOTH
              the primary Datadog intake and the Observability Pipelines Worker, which is
              useful for evaluating OPW without interrupting the existing flow of telemetry
              to Datadog.
            comment: "dual_ship is logs-only: there is no equivalent dual-shipping\
              \ code path for metrics, so\nthese keys live outside bindVectorOptions\
              \ to avoid registering an unused metrics variant.\n\ndual_ship: when\
              \ false (default), OPW replaces the primary Datadog endpoint and is\
              \ the only\ndestination logs are shipped to. When true, Datadog remains\
              \ the primary endpoint and OPW is\nadded as an additional endpoint \u2014\
              \ intended for operators evaluating OPW without interrupting\nthe existing\
              \ flow of telemetry to Datadog.\n\ndual_ship_reliable: when dual_ship=true,\
              \ controls whether the OPW additional endpoint applies\nbackpressure\
              \ to the main pipeline on failure (true) or is best-effort (false, the\
              \ default).\nBest-effort is the safer default: an unreachable OPW must\
              \ not block delivery to Datadog."
          dual_ship_reliable:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              Only meaningful when `dual_ship` is true. When false (default), the OPW
              destination is treated as best-effort: failures to OPW do not apply
              backpressure to the main pipeline, so an unhealthy OPW cannot stall delivery
              to Datadog. Set to true to make the OPW destination reliable, meaning its
              failures participate in flow control just like the primary Datadog endpoint.
      traces:
        node_type: section
        type: object
        visibility: public
        description: Specific configurations for traces
        tags:
        - template_section:Common
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enables forwarding of traces to an Observability Pipelines
              Worker
            comment: Vector options for traces
          url:
            node_type: setting
            type: string
            default: ''
            visibility: public
            description: URL endpoint for the Observability Pipelines Worker to send
              traces to
            example: '"http://127.0.0.1:8080"'
  confd_path:
    node_type: setting
    title: Advanced Configuration
    type: string
    default: ${conf_path}/conf.d
    visibility: public
    description: |-
      The path containing check configuration files. By default, uses the conf.d folder
      located in the Agent configuration folder.
    tags:
    - template_section:Agent
  additional_checksd:
    node_type: setting
    type: string
    default: ${conf_path}/checks.d
    visibility: public
    description: |-
      Additional path indicating where to search for Python checks. By default, uses the checks.d folder
      located in the Agent configuration folder.
    tags:
    - template_section:Agent
  expvar_port:
    node_type: setting
    type: integer
    default: 5000
    visibility: public
    description: The port for the go_expvar server.
    tags:
    - template_section:Agent
    - full-agent-only:true
    comment: Go_expvar server port
  cmd_port:
    node_type: setting
    type: integer
    default: 5001
    visibility: public
    description: The port on which the IPC api listens.
    tags:
    - template_section:Agent
  GUI_port:
    node_type: setting
    type: integer
    visibility: public
    description: |-
      The port for the browser GUI to be served.
      Setting 'GUI_port: -1' turns off the GUI completely
      Default is:
       * Windows & macOS : `5002`
       * Linux: `-1`
    tags:
    - template_section:Agent
    platform_default:
      linux: -1
      other: 5002
    comment: Agent GUI access port
  GUI_session_expiration:
    node_type: setting
    type: integer
    default: 0
    visibility: public
    description: |-
      The duration after which a GUI session will expire.
      Setting 'GUI_SESSION_EXPIRATION: 0' disable session expiration.
      Default is "0s" (sessions do not expire).
    example: <SESSION_EXPIRATION_DURATION>
    tags:
    - template_section:Agent
  health_port:
    node_type: setting
    type: integer
    default: 0
    visibility: public
    description: |-
      The Agent can expose its health check on a dedicated http port.
      This is useful for orchestrators that support http probes.
      Default is 0 (disabled), set a valid port number (eg. 5555) to enable.
    tags:
    - golang_type:int64
    - template_section:Agent
  check_runners:
    node_type: setting
    type: integer
    default: 4
    visibility: public
    description: |-
      The `check_runners` refers to the number of concurrent check runners available for check instance execution.
      The scheduler attempts to spread the instances over the collection interval and will _at most_ be
      running the number of check runners instances concurrently.
      Setting the value to 1 would result in checks running sequentially.

      This is a sensitive setting, and we do NOT recommend changing the default number
      of check runners in the general case. The level of concurrency has effects on
      the Agent's: RSS memory, CPU load, resource contention overhead, etc.
    tags:
    - golang_type:int64
    - template_section:Agent
  enable_metadata_collection:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      Metadata collection should always be enabled, except if you are running several
      agents/dsd instances per host. In that case, only one Agent should have it on.
      WARNING: disabling it on every Agent leads to display and billing issues.
    tags:
    - template_section:Agent
  enable_gohai:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Enable the gohai collection of systems data.
    tags:
    - template_section:Agent
  enable_signing_metadata_collection:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Enable the Linux package signing medatada collection.
    tags:
    - template_section:Agent
  server_timeout:
    node_type: setting
    type: integer
    default: 30
    visibility: public
    description: IPC api server timeout in seconds.
    tags:
    - template_section:Agent
    - full-agent-only:true
    comment: IPC API server timeout
  procfs_path:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Some environments may have the procfs file system mounted in a miscellaneous
      location. The procfs_path configuration parameter provides a mechanism to
      override the standard default location: '/proc' - this setting trickles down to
      integrations and affect their behavior if they rely on the psutil python package.
    example: <PROCFS_PATH>
    tags:
    - template_section:Agent
  disable_py3_validation:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Disable Python3 validation of python checks.
    tags:
    - template_section:CoreAgent
  python3_linter_timeout:
    node_type: setting
    type: integer
    default: 120
    visibility: public
    description: Timeout in seconds for validation of compatibility with python 3
      when running python 2.
    tags:
    - template_section:CoreAgent
    - full-agent-only:true
    comment: |-
      Python 3 linter timeout, in seconds
      NOTE: linter is notoriously slow, in the absence of a better solution we
      can only increase this timeout value. Linting operation is async.
  memtrack_enabled:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Enables tracking of memory allocations made from the python runtime
      loader.
    tags:
    - template_section:CoreAgent
  tracemalloc_debug:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Enables debugging with tracemalloc for python checks.
      Please note that when this option is enabled the number of check runners is overridden to 1.
    tags:
    - template_section:CoreAgent
  tracemalloc_include:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Comma-separated list of Python checks to enable tracemalloc for when `tracemalloc_debug` is true.
      By default, all Python checks are enabled.
    example: <TRACEMALLOC_INCLUDE>
    tags:
    - template_section:CoreAgent
  tracemalloc_exclude:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Comma-separated list of Python checks to disable tracemalloc for when `tracemalloc_debug` is true.
      By default, all Python checks are enabled. This setting takes precedence over `tracemalloc_include`.
    example: <TRACEMALLOC_EXCLUDE>
    tags:
    - template_section:CoreAgent
  windows_use_pythonpath:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Whether to honour the value of the PYTHONPATH env var when set on Windows.
      Disabled by default, so we only load Python libraries bundled with the Agent.
    tags:
    - template_section:CoreAgent
    - full-agent-only:true
    comment: Whether to honour the value of PYTHONPATH, if set, on Windows. On other
      OSes we always do.
  secret_backend_type:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      `secret_backend_type` is the type of backend where secrets are stored.
      Supported backends are: "aws.secrets", "aws.ssm", "azure.keyvault", "hashicorp.vault",
      "file.json", "file.yaml"
      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management

      This option is ignored if 'secret_backend_command' is set.
    example: <BACKEND_TYPE>
    tags:
    - template_section:Agent
    - full-agent-only:true
    comment: secrets backend
  secret_backend_config:
    node_type: setting
    type: object
    default: {}
    visibility: public
    description: |-
      The section contains configuration required by `secret_backend_type` to resolve secrets.
      The necessary configuration depends upon which type is used.
      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management
    example: |2-

        <KEY_1>: <VALUE_1>
    tags:
    - golang_type:map[string]interface{}
    - template_section:Agent
    - full-agent-only:true
  multi_secret_backends:
    node_type: setting
    type: object
    default: {}
    visibility: public
    description: |-
      `multi_secret_backends` defines named secret backends for routing. Each entry specifies a `type`
      and optional `config`. Use `ENC[backendID;secretKey]` handles to route secrets to the named backend.
      This option is ignored if `secret_backend_command` or `secret_backend_type` is set.
      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management
    example: |2-

        <backend_name>:
          type: <backend_type>
          config:
            <KEY_1>: <VALUE_1>
    tags:
    - golang_type:map[string]interface{}
    - template_section:Agent
    - full-agent-only:true
  secret_refresh_interval:
    node_type: setting
    type: integer
    default: 0
    visibility: public
    description: |-
      `secret_refresh_interval` is the interval (in seconds) at which api/app key secrets are refreshed. A 0 value means the feature is disabled.
      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management/#refreshing-apiapp-keys-at-runtime
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_refresh_on_api_key_failure_interval:
    node_type: setting
    type: integer
    default: 0
    visibility: public
    description: |-
      `secret_refresh_on_api_key_failure_interval` is the time in minutes between two secret refreshes
      triggered by the Agent using an invalid or expired API key (HTTP error code 403 received or the
      health probe failing). This rate limits how often the secrets are refreshed in response to errors.
      Set to 0 to disable the refresh.

      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management/#refreshing-apiapp-keys-at-runtime
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_refresh_scatter:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      `secret_refresh_scatter`, if set to true, will randomize the first secret refresh. `secret_refresh_interval` needs to be set
      for this to take effect. This prevents a fleet of Agents from refreshing their secrets at the same time.
      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management/#refreshing-apiapp-keys-at-runtime
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_backend_command:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      `secret_backend_command` is the path to your custom script to execute to fetch secrets.
      The executable must have specific rights that differ on Windows and Linux.

      This option take precedence over `secret_backend_type`.

      For more information see: https://docs.datadoghq.com/agent/configuration/secrets-management
    example: <COMMAND_PATH>
    tags:
    - template_section:Agent
  secret_backend_arguments:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      If secret_backend_command is set, specify here a list of arguments to give to the command at each run.

      This option take precedence over `secret_backend_type`.
    example: |2-

        - <ARGUMENT_1>
        - <ARGUMENT_2>
    tags:
    - template_section:Agent
  secret_backend_output_max_size:
    node_type: setting
    type: integer
    default: 1048576
    visibility: public
    description: The size in bytes of the buffer used to store the command answer
      (apply to both stdout and stderr)
    tags:
    - template_section:Agent
  secret_backend_timeout:
    node_type: setting
    type: integer
    default: 30
    visibility: public
    description: The timeout to execute the command in second
    tags:
    - template_section:Agent
  secret_backend_skip_checks:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Disable fetching secrets for check configurations
    tags:
    - template_section:Agent
  secret_backend_remove_trailing_line_break:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Remove trailing line breaks from secrets returned by the secret_backend_command. Some secret management tools automatically
      add a line break when exporting secrets through files.
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_scope_integration_to_their_k8s_namespace:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      When using `k8s_secret@` notation to pull secrets from Kubernetes, you can limit integration to only be able to access
      their own namespace by setting this setting to true.
      The limitation will only apply integration's config and secret using `k8s_secret@` secrets.

      This setting is incompatible with 'secret_allowed_k8s_namespace' and 'secret_image_to_handle'

      See https://docs.datadoghq.com/agent/configuration/secrets-management for more information on using Kubernetes
      secrets in your configuration.
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_allowed_k8s_namespace:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      When using `k8s_secret@` notation to pull secrets from Kubernetes, you can limit all integrations to only be able to access
      a list of specific namespace.
      The limitation will only apply integration's config and secret using `k8s_secret@` secrets.

      This setting is incompatible with 'secret_scope_integration_to_their_k8s_namespace' and 'secret_image_to_handle'

      See https://docs.datadoghq.com/agent/configuration/secrets-management for more information on using Kubernetes
      secrets in your configuration.
    tags:
    - template_section:Agent
    - full-agent-only:true
  secret_image_to_handle:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      items:
        type: string
      type: array
    visibility: public
    description: |-
      When using `k8s_secret@` notation to pull secrets from Kubernetes, you can fully control which Kubernetes secret can
      be access by which image. Any secrets using the `k8s_secret@` prefix not listed for the image being monitored will
      not be resolved.
      The limitation will only apply integration's config and secret using `k8s_secret@` secrets.

      This setting is incompatible with 'secret_scope_integration_to_their_k8s_namespace' and 'secret_image_to_handle'

      See https://docs.datadoghq.com/agent/configuration/secrets-management for more information on using Kubernetes
      secrets in your configuration.
    example: |2-

        webserver:
          - "k8s_secret@prod/weserver/db_password"
          - "k8s_secret@prod/weserver/db_password"
        <Kubernetes image name>:
          - "<full secret handle>"
          - ...
    tags:
    - template_section:Agent
    - full-agent-only:true
