  network_path:
    node_type: section
    title: Network Path Dynamic Test Configuration
    type: object
    visibility: public
    description: Network Path configuration
    tags:
    - full-agent-only:true
    - platform_only:windows,linux
    - template_section:CoreAgent
    properties:
      connections_monitoring:
        node_type: section
        type: object
        visibility: public
        description: Configurations for Network Path Dynamic Test for monitoring network
          connections via Network Path.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enables Network Path Dynamic Test for monitoring network
              connections via Network Path.
            example: 'true'
            comment: Network Path
      collector:
        node_type: section
        type: object
        visibility: public
        description: |-
          Configuration related to Network Path Collector used for Network Path Dynamic Test
          to monitor network traffic connections on the host.
        tags:
        - template_section:CoreAgent
        properties:
          workers:
            node_type: setting
            type: integer
            default: 4
            visibility: public
            description: The number of concurrent workers available for network path
              execution.
          timeout:
            node_type: setting
            type: integer
            default: 1000
            visibility: public
            description: The timeout in milliseconds for a network path test.
          max_ttl:
            node_type: setting
            type: integer
            default: 30
            visibility: public
            description: The maximum TTL (Time To Live) for traceroute tests.
          pathtest_ttl:
            node_type: setting
            type: string
            default: 70m
            visibility: public
            description: |-
              The duration (time-to-live) a connection will be monitored when it's not seen anymore.
              The TTL is reset each time the connection is seen again.
              With 30min interval, 70m will allow running a test 3 times (t0, t30, t60).
            comment: with 30min interval, 70m will allow running a test 3 times (t0,
              t30, t60)
          pathtest_interval:
            node_type: setting
            type: string
            default: 30m
            visibility: public
            description: The traceroute run interval for monitored connections.
          filters:
            node_type: setting
            type: array
            default: []
            items:
              additionalProperties:
                type: string
              type: object
            visibility: public
            description: |-
              Custom filters to include or exclude specific destinations from network path collection.
              Filters support matching by domain (with wildcard or regex) and by IP address (single IP or CIDR notation).
              Filters are applied sequentially, the last matching filter takes precedence.
              In end_user_device infrastructure mode, user-defined filters are appended to the default SaaS filters below.
            example: |2-


                # ===== Filter syntax examples =====

                # Exclude single domain
                # - match_domain: 'api.slack.com'
                #   type: exclude

                # Exclude domain using wildcard (default strategy)
                # - match_domain: '*.datadoghq.com'      # translates to regex '.*\.datadoghq\.com'
                #   type: exclude
                # - match_domain: '*.zoom.us'
                #   match_domain_strategy: wildcard      # use wildcard to match domain (default)
                #   type: exclude

                # Exclude single IP or using CIDR notation
                # - match_ip: 10.10.10.10
                #   type: exclude
                # - match_ip: 10.20.0.0/24
                #   type: exclude

                # Exclude using regex
                # - match_domain: '.*\.zoom\.us'
                #   match_domain_strategy: regex         # use regex to match domain
                #   type: exclude

                # Include specific domain
                # - match_domain: 'api.datadoghq.com'
                #   type: include
          traceroute_queries:
            node_type: setting
            type: integer
            default: 3
            visibility: public
            description: The number of traceroute queries for static path tests.
          e2e_queries:
            node_type: setting
            type: integer
            default: 50
            visibility: public
            description: The number of end-to-end queries for static path tests.
          input_chan_size:
            node_type: setting
            type: integer
            default: 1000
            visibility: public
            description: The size of the input channel buffer.
          processing_chan_size:
            node_type: setting
            type: integer
            default: 1000
            visibility: public
            description: The size of the processing channel buffer.
          pathtest_contexts_limit:
            node_type: setting
            type: integer
            default: 1000
            visibility: public
            description: The maximum number of pathtest contexts that can be maintained.
          dest_excludes:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              items:
                type: string
              type: array
          disable_intra_vpc_collection:
            node_type: setting
            type: boolean
            default: false
          disable_source_public_ip_collection:
            node_type: setting
            type: boolean
            default: false
          disable_windows_driver:
            node_type: setting
            type: boolean
            default: false
          flush_interval:
            node_type: setting
            type: string
            default: 10s
          icmp_mode:
            node_type: setting
            type: string
            default: ''
          monitor_ip_without_domain:
            node_type: setting
            type: boolean
            default: false
          pathtest_max_burst_duration:
            node_type: setting
            type: string
            default: 30s
          pathtest_max_per_minute:
            node_type: setting
            type: integer
            default: 150
          reverse_dns_enrichment:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
              timeout:
                node_type: setting
                type: integer
                default: 5000
          source_excludes:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              items:
                type: string
              type: array
          tcp_method:
            node_type: setting
            type: string
            default: ''
          tcp_syn_paris_traceroute_mode:
            node_type: setting
            type: boolean
            default: false
      forwarder:
        node_type: section
        type: object
        properties:
          additional_endpoints:
            node_type: setting
            type: array
            default: []
            items:
              type: object
          batch_max_concurrent_send:
            node_type: setting
            type: integer
            default: 0
          batch_max_content_size:
            node_type: setting
            type: integer
            default: 5000000
          batch_max_size:
            node_type: setting
            type: integer
            default: 1000
          batch_wait:
            node_type: setting
            type: number
            default: 5
            tags:
            - golang_type:float64
          compression_kind:
            node_type: setting
            type: string
            default: zstd
          compression_level:
            node_type: setting
            type: integer
            default: 6
          connection_reset_interval:
            node_type: setting
            type: integer
            default: 0
          dd_url:
            node_type: setting
            type: string
            default: ''
          dev_mode_no_ssl:
            node_type: setting
            type: boolean
            default: false
            tags:
            - no-env
          input_chan_size:
            node_type: setting
            type: integer
            default: 100
          logs_dd_url:
            node_type: setting
            type: string
            default: ''
          logs_no_ssl:
            node_type: setting
