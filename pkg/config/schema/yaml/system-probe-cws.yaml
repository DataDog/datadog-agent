$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/DataDog/schema/main/agent/system-probe-cws.yaml.schema.json
node_type: section
title: Security Agent Runtime Configuration
type: object
visibility: public
description: Settings to sent logs to Datadog are fetched from section `logs_config`
tags: []
properties:
  enabled:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to true to enable Cloud Workload Security (CWS).
  fim_enabled:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to true to enable the File Integrity Monitoring (FIM) feature
      of Cloud Workload Security (CWS).
  socket:
    node_type: setting
    type: string
    visibility: public
    description: |-
      On Windows: the TCP address where the security runtime module is accessed.
      On Unix: the full path to the location of the unix socket where security runtime module is accessed.
    platform_default:
      windows: localhost:3335
      other: ${install_path}/run/runtime-security.sock
  policies:
    node_type: section
    type: object
    visibility: public
    description: Policy files
    tags: []
    properties:
      dir:
        node_type: setting
        type: string
        visibility: public
        description: Path from where the policy files are loaded
        platform_default:
          other: /etc/datadog-agent/runtime-security.d
          windows: ${conf_path}/runtime-security.d
      monitor:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          per_rule_enabled:
            node_type: setting
            type: boolean
            default: false
          report_internal_policies:
            node_type: setting
            type: boolean
            default: false
      rule_cache_enabled:
        node_type: setting
        type: boolean
        default: true
  activity_dump:
    node_type: section
    type: object
    visibility: public
    description: Activity dump section configures if/how the Agent sends activity
      dumps to Datadog
    tags: []
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: true
        visibility: public
        description: Set to true to activate the security profiles feature.
      traced_cgroups_count:
        node_type: setting
        type: integer
        default: 5
        visibility: public
        description: Defines the number of concurrent cgroups to be traced.
      dump_duration:
        node_type: setting
        type: string
        default: 900s
        visibility: public
        description: Defines the duration of cgroups learning phase. Minimum value
          is 10m.
        example: 30m
      auto_suppression:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
      cgroup_differentiate_args:
        node_type: setting
        type: boolean
        default: false
      cgroup_dump_timeout:
        node_type: setting
        type: integer
        default: 900
      cgroup_wait_list_timeout:
        node_type: setting
        type: string
        default: 4500s
      cleanup_period:
        node_type: setting
        type: string
        default: 30s
      load_controller_period:
        node_type: setting
        type: string
        default: 60s
      local_storage:
        node_type: section
        type: object
        properties:
          compression:
            node_type: setting
            type: boolean
            default: false
          formats:
            node_type: setting
            type: array
            default:
            - profile
            items:
              type: string
          max_dumps_count:
            node_type: setting
            type: integer
            default: 100
          output_directory:
            node_type: setting
            type: string
            default: ${run_path}/runtime-security/profiles
      max_dump_count_per_workload:
        node_type: setting
        type: integer
        default: 25
      max_dump_size:
        node_type: setting
        type: integer
        default: 1750
      min_timeout:
        node_type: setting
        type: string
        default: 10m
      rate_limiter:
        node_type: setting
        type: integer
        default: 500
      silent_workloads:
        node_type: section
        type: object
        properties:
          delay:
            node_type: setting
            type: string
            default: 10s
          ticker:
            node_type: setting
            type: string
            default: 10s
      syscall_monitor:
        node_type: section
        type: object
        properties:
          period:
            node_type: setting
            type: string
            default: 60s
      tag_rules:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
      tags_resolution_period:
        node_type: setting
        type: string
        default: 60s
      trace_systemd_cgroups:
        node_type: setting
        type: boolean
        default: false
      traced_event_types:
        node_type: setting
        type: array
        default:
        - exec
        - open
        - dns
        - imds
        items:
          type: string
      workload_deny_list:
        node_type: setting
        type: array
        default: []
        items:
          type: string
  cmd_socket:
    node_type: setting
    type: string
    default: ''
  compliance_module:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
  container_exclude:
    node_type: setting
    type: array
    default: []
    items:
      type: string
  container_include:
    node_type: setting
    type: array
    default: []
    items:
      type: string
  cookie_cache_size:
    node_type: setting
    type: integer
    default: 100
  direct_send_from_system_probe:
    node_type: setting
    type: boolean
    default: false
  ebpfless:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
      socket:
        node_type: setting
        type: string
        default: localhost:5678
  enforcement:
    node_type: section
    type: object
    properties:
      disarmer:
        node_type: section
        type: object
        properties:
          container:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
              max_allowed:
                node_type: setting
                type: integer
                default: 5
              period:
                node_type: setting
                type: string
                default: 1m
          executable:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
              max_allowed:
                node_type: setting
                type: integer
                default: 5
              period:
                node_type: setting
                type: string
                default: 1m
      enabled:
        node_type: setting
        type: boolean
        default: true
      exclude_binaries:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      raw_syscall:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
      rule_source_allowed:
        node_type: setting
        type: array
        default:
        - file
        - remote-config
        items:
          type: string
  env_as_tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
  etw_events_channel_size:
    node_type: setting
    type: integer
    default: 16384
    tags:
    - no-env
  event_grpc_server:
    node_type: setting
    type: string
    default: ''
  event_retry_queue_threshold:
    node_type: setting
    type: integer
    default: 512
  event_sampling:
    node_type: section
    type: object
    properties:
      bind:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          rate:
            node_type: setting
            type: integer
            default: 500
      connect:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          rate:
            node_type: setting
            type: integer
            default: 500
      dns:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          rate:
            node_type: setting
            type: integer
            default: 500
      open:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          rate:
            node_type: setting
            type: integer
            default: 500
  event_server:
    node_type: section
    type: object
    properties:
      burst:
        node_type: setting
        type: integer
        default: 40
      rate:
        node_type: setting
        type: integer
        default: 10
      retention:
        node_type: setting
        type: string
        default: 6s
  exclude_pause_container:
    node_type: setting
    type: boolean
    default: true
  file_metadata_resolver:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
  hash_resolver:
    node_type: section
    type: object
    properties:
      cache_size:
        node_type: setting
        type: integer
        default: 500
      enabled:
        node_type: setting
        type: boolean
        default: true
      event_types:
        node_type: setting
        type: array
        default:
        - exec
        - open
        items:
          type: string
      hash_algorithms:
        node_type: setting
        type: array
        default:
        - sha1
        - sha256
        - ssdeep
        items:
          type: string
      max_file_size:
        node_type: setting
        type: integer
        default: 5242880
      max_hash_rate:
        node_type: setting
        type: integer
        default: 500
      replace:
        node_type: setting
        type: object
        default: {}
        additionalProperties:
          type: string
  imds_ipv4:
    node_type: setting
    type: string
    default: 169.254.169.254
  internal_monitoring:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
  log_patterns:
    node_type: setting
    type: array
    default: []
    items:
      type: string
  log_tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
  network_monitoring:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
  on_demand:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: true
      rate_limiter:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
  reduced_proc_pid_cache_size:
    node_type: setting
    type: boolean
    default: false
  remote_configuration:
    node_type: section
    type: object
    properties:
      dump_policies:
        node_type: setting
        type: boolean
        default: false
      enabled:
        node_type: setting
        type: boolean
        default: true
  sbom:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
      enrichment_interval:
        node_type: setting
        type: string
        default: 1m
      forward_interval:
        node_type: setting
        type: string
        default: 20s
      generate_policies:
        node_type: setting
        type: boolean
        default: false
      host:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
      refresh_interval:
        node_type: setting
        type: string
        default: 3s
      workloads_cache_size:
        node_type: setting
        type: integer
        default: 10
  security_profile:
    node_type: section
    type: object
    properties:
      anomaly_detection:
        node_type: section
        type: object
        properties:
          default_minimum_stable_period:
            node_type: setting
            type: string
            default: 900s
          enabled:
            node_type: setting
            type: boolean
            default: true
          event_types:
            node_type: setting
            type: array
            default:
            - exec
            items:
              type: string
          minimum_stable_period:
            node_type: section
            type: object
            properties:
              dns:
                node_type: setting
                type: string
                default: 900s
              exec:
                node_type: setting
                type: string
                default: 900s
          rate_limiter:
            node_type: section
            type: object
            properties:
              num_events_allowed:
                node_type: setting
                type: integer
                default: 10
              num_keys:
                node_type: setting
                type: integer
                default: 256
              period:
                node_type: setting
                type: string
                default: 1m
          silent_rule_events:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
          tag_rules:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
          unstable_profile_size_threshold:
            node_type: setting
            type: integer
            default: 5000000
          unstable_profile_time_threshold:
            node_type: setting
            type: string
            default: 1h
          workload_warmup_period:
            node_type: setting
            type: string
            default: 180s
      auto_suppression:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
          event_types:
            node_type: setting
            type: array
            default:
            - exec
            - dns
            items:
              type: string
      cache_size:
        node_type: setting
        type: integer
        default: 10
      dir:
        node_type: setting
        type: string
        default: ${run_path}/runtime-security/profiles
      dns_match_max_depth:
        node_type: setting
        type: integer
        default: 3
      enabled:
        node_type: setting
        type: boolean
        default: true
      max_count:
        node_type: setting
        type: integer
        default: 400
      max_image_tags:
        node_type: setting
        type: integer
        default: 20
      node_eviction_timeout:
        node_type: setting
        type: string
        default: 0s
      profile_cleanup_delay:
        node_type: setting
        type: string
        default: 60m
      v2:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          event_types:
            node_type: setting
            type: array
            default:
            - exec
            - dns
            - bind
            - connect
            - open
            items:
              type: string
          excluded_images:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          max_dump_size:
            node_type: setting
            type: integer
            default: 5120
          sample_refresh_period:
            node_type: setting
            type: string
            default: 30s
      watch_dir:
        node_type: setting
        type: boolean
        default: true
  self_test:
    node_type: section
    type: object
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: true
      send_report:
        node_type: setting
        type: boolean
        default: true
  syscalls:
    node_type: section
    type: object
    properties:
      capture_all_errors:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
  sysctl:
    node_type: section
    type: object
    properties:
      ebpf:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
      enabled:
        node_type: setting
        type: boolean
        default: true
      snapshot:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
          ignored_base_names:
            node_type: setting
            type: array
            default:
            - netdev_rss_key
            - stable_secret
            items:
              type: string
          kernel_compilation_flags:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          period:
            node_type: setting
            type: string
            default: 1h
  use_secruntime_track:
    node_type: setting
    type: boolean
    default: true
  user_sessions:
    node_type: section
    type: object
    properties:
      cache_size:
        node_type: setting
        type: integer
        default: 1024
      ssh:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
  windows_filename_cache_max:
    node_type: setting
    type: integer
    default: 16384
    tags:
    - no-env
  windows_probe_block_on_channel_send:
    node_type: setting
    type: boolean
    default: false
    tags:
    - no-env
  windows_registry_cache_max:
    node_type: setting
    type: integer
    default: 4096
    tags:
    - no-env
  windows_write_event_rate_limiter_max_allowed:
    node_type: setting
    type: integer
    default: 4096
    tags:
    - no-env
  windows_write_event_rate_limiter_period:
    node_type: setting
    type: string
    default: 1s
    tags:
    - no-env
