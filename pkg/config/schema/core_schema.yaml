  reverse_dns_enrichment:
    node_type: section
    type: object
    visibility: public
    description: This section configures the reverse DNS enrichment component that
      can be used by other components in the Datadog Agent.
    tags:
    - template_section:CoreAgent
    properties:
      workers:
        node_type: setting
        visibility: public
        description: The number of concurrent workers used to perform reverse DNS
          lookups.
        example: '10'
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - no-env
        - template_section:CoreAgent
      chan_size:
        node_type: setting
        visibility: public
        description: The size of the channel used to send reverse DNS lookup requests
          to the workers.
        example: '5000'
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - no-env
        - template_section:CoreAgent
      cache:
        node_type: section
        type: object
        visibility: public
        description: This section configures the cache used by the reverse DNS enrichment
          component.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Set to true to enable reverse DNS enrichment caching.
            example: 'true'
            tags:
            - template_section:CoreAgent
          entry_ttl:
            node_type: setting
            type: number
            default: 24h0m0s
            format: duration
            visibility: public
            description: The amount of time that a cache entry remains valid before
              it is expired and removed from the cache.
            example: 24h
            tags:
            - golang_type:duration
            - template_section:CoreAgent
          clean_interval:
            node_type: setting
            type: number
            default: 2h0m0s
            format: duration
            visibility: public
            description: An interval that specifies how often expired entries are
              removed from the cache to free space.
            example: 2h
            tags:
            - golang_type:duration
            - template_section:CoreAgent
          persist_interval:
            node_type: setting
            type: number
            default: 2h0m0s
            format: duration
            visibility: public
            description: An interval that specifies how often the cache is persisted
              to disk so the cache can be reloaded when the Agent is upgraded or restarted.
            example: 2h
            tags:
            - golang_type:duration
            - template_section:CoreAgent
          max_retries:
            node_type: setting
            type: number
            default: 10
            visibility: public
            description: The maximum number of retries to perform when a DNS lookup
              operation fails, after which the hostname "" is returned and cached
              for the IP address.
            example: '10'
            tags:
            - template_section:CoreAgent
          max_size:
            node_type: setting
            visibility: public
            description: The maximum size in entries of the cache, above which additional
              entries will not be cached.
            example: '1000000'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
      rate_limiter:
        node_type: section
        type: object
        visibility: public
        description: This section configures the rate limiter used by the reverse
          DNS enrichment component.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Set to true to enable the reverse DNS enrichment rate limiter.
            example: 'true'
            tags:
            - template_section:CoreAgent
          limit_per_sec:
            node_type: setting
            visibility: public
            description: The maximum number of reverse DNS lookups allowed per second
              by the rate limiter.
            example: '1000'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
          limit_throttled_per_sec:
            node_type: setting
            visibility: public
            description: The maximum number of reverse DNS lookups allowed per second
              when the rate limiter is throttled due to errors exceeding the threshold.
            example: '1'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
          throttle_error_threshold:
            node_type: setting
            visibility: public
            description: The number of consecutive errors that will trigger the rate
              limiter to throttle down to limit_throttled_per_sec.
            example: '10'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
          recovery_intervals:
            node_type: setting
            visibility: public
            description: The number of intervals over which to increase the rate limit
              back to limit_per_sec when lookups are again successful after being
              throttled due to errors.
            example: '5'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
          recovery_interval:
            node_type: setting
            type: number
            default: 5s
            format: duration
            visibility: public
            description: |-
              The interval between incrementally increasing the rate limit back to limit_per_sec when lookups are again successful after being throttled due to errors.
              The rate limit will be increased by (limit_per_sec - limit_throttled_per_sec) / recovery_intervals every recovery_interval, until it reaches
              limit_per_sec.  For example, with limit_per_sec=1000, limit_throttled_per_sec=1, recovery_intervals=5, recovery_interval=5s, the limit will
              be increased by 200 every 5 seconds until reaching 1000.
            example: '"5s"'
            tags:
            - golang_type:duration
            - template_section:CoreAgent
  ha_agent:
    node_type: section
    type: object
    visibility: public
    description: This section configures High Availability Agent feature.
    tags:
    - template_section:CoreAgent
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable High Availability Agent feature.
        example: 'false'
        tags:
        - template_section:CoreAgent
      group:
        node_type: setting
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
  config_id:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      The config_id configuration is used by High Availability Agent to assign a specific config ID to an Agent.
      When used with `ha_agent.enabled: true`, all Agents with the same config_id will be part of the same group of Agents;
      meaning that, one Agent within this group is designated as primary and others as standby.
    example: '""'
    tags:
    - template_section:CoreAgent
  otlp_config:
    node_type: section
    title: 'OpenTelemetry Configuration  '
    type: object
    visibility: public
    description: This section configures OTLP ingest in the Datadog Agent.
    tags:
    - template_section:CoreAgent
    properties:
      receiver:
        node_type: section
        type: object
        visibility: public
        description: |-
          The receiver configuration. It follows the OpenTelemetry Collector's OTLP Receiver Configuration.
          This template lists the most commonly used settings; see the OpenTelemetry Collector documentation
          for a full list of available settings:
          https://github.com/open-telemetry/opentelemetry-collector/blob/main/receiver/otlpreceiver/config.md
        tags:
        - template_section:CoreAgent
        properties:
          protocols:
            node_type: section
            type: object
            visibility: public
            description: Configuration for the supported protocols.
            tags:
            - template_section:CoreAgent
            properties:
              grpc:
                node_type: section
                type: object
                visibility: public
                description: |-
                  Configuration for OTLP/gRPC listener.
                  Setting this as an empty section enables the OTLP/gRPC listener with default options.
                tags:
                - template_section:CoreAgent
                properties:
                  endpoint:
                    node_type: setting
                    type: string
                    default: localhost:4317
                    visibility: public
                    description: The OTLP/gRPC listener endpoint.
                    example: '"localhost:4317"'
                    tags:
                    - template_section:CoreAgent
                  transport:
                    node_type: setting
                    type: string
                    default: tcp
                    visibility: public
                    description: |-
                      The OTLP/gRPC listener transport protocol.
                      Known protocols are "tcp", "udp", "ip", "unix", "unixgram", and "unixpacket".
                    example: '"tcp"'
                    tags:
                    - template_section:CoreAgent
                  max_recv_msg_size_mib:
                    node_type: setting
                    type: number
                    default: 0
                    visibility: public
                    description: |-
                      The maximum size (in MiB) of messages accepted by the OTLP/gRPC endpoint.
                      When set to 0 (the default), grpc-go applies its built-in 4 MiB limit.
                    example: '0'
                    tags:
                    - template_section:CoreAgent
                  include_metadata:
                    node_type: setting
                    type: boolean
                    default: false
                  keepalive:
                    node_type: section
                    type: object
                    properties:
                      enforcement_policy:
                        node_type: section
                        type: object
                        properties:
                          min_time:
                            node_type: setting
                            type: string
                            default: 5m
                  max_concurrent_streams:
                    node_type: setting
                    type: number
                    default: 0
                  read_buffer_size:
                    node_type: setting
                    type: number
                    default: 524288
                  write_buffer_size:
                    node_type: setting
                    type: number
                    default: 0
              http:
                node_type: section
                type: object
                visibility: public
                description: |-
                  Configuration for OTLP/HTTP listener.
                  Setting this as an empty section enables the OTLP/HTTP listener with default options.
                tags:
                - template_section:CoreAgent
                properties:
                  endpoint:
                    node_type: setting
                    type: string
                    default: localhost:4318
                    visibility: public
                    description: The OTLP/HTTP listener endpoint.
                    example: '"localhost:4318"'
                    tags:
                    - template_section:CoreAgent
                  cors:
                    node_type: section
                    type: object
                    properties:
                      allowed_headers:
                        node_type: setting
                        type: array
                        default: []
                        items:
                          type: string
                      allowed_origins:
                        node_type: setting
                        type: array
                        default: []
                        items:
                          type: string
                  include_metadata:
                    node_type: setting
                    type: boolean
                    default: false
                  max_request_body_size:
                    node_type: setting
                    type: number
                    default: 0
      metrics:
        node_type: section
        type: object
        visibility: public
        description: Metrics-specific configuration for OTLP ingest in the Datadog
          Agent.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: |-
              Set to false to disable metrics support in the OTLP ingest endpoint.
              To enable the OTLP ingest, the otlp_config.receiver section must be set.
            example: 'true'
            tags:
            - template_section:CoreAgent
          resource_attributes_as_tags:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              Set to true to add resource attributes of a metric to its metric tags. Please note that any of
              the subset of resource attributes in this list https://docs.datadoghq.com/opentelemetry/guide/semantic_mapping/
              are converted to Datadog conventions and set to to metric tags whether this option is enabled or not.
            example: 'false'
            tags:
            - template_section:CoreAgent
          instrumentation_scope_metadata_as_tags:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Set to true to add metadata about the instrumentation scope
              that created a metric.
            example: 'true'
            tags:
            - template_section:CoreAgent
          tag_cardinality:
            node_type: setting
            type: string
            default: low
            env_vars:
            - DD_OTLP_CONFIG_METRICS_TAG_CARDINALITY
            - DD_OTLP_TAG_CARDINALITY
            visibility: public
            description: |-
              Configure the level of granularity of tags to send for OTLP metrics. Choices are:
                * low: add tags about low-cardinality objects (clusters, hosts, deployments, container images, ...)
                * orchestrator: add tags about pod, (in Kubernetes), or task (in ECS or Mesos) -level of cardinality
                * high: add tags about high-cardinality objects (individual containers, user IDs in requests, ...)
              WARNING: sending container tags for checks metrics may create more metrics
              (one per container instead of one per host). This may impact your custom metrics billing.
            example: '"low"'
            tags:
            - template_section:CoreAgent
          delta_ttl:
            node_type: setting
            type: number
            default: 3600
            visibility: public
            description: |-
              The amount of time (in seconds) that values are kept in memory for
              calculating deltas for cumulative monotonic metrics.
            example: '3600'
            tags:
            - template_section:CoreAgent
          histograms:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configuration for OTLP Histograms.
              See https://docs.datadoghq.com/metrics/otlp/?tab=histogram for details.
            tags:
            - template_section:CoreAgent
            properties:
              mode:
                node_type: setting
                type: string
                default: distributions
                visibility: public
                description: |-
                  How to report histograms. Valid values are:

                  - `distributions` to report metrics as Datadog distributions (recommended).
                  - `nobuckets` to not report bucket metrics,
                  - `counters` to report one metric per histogram bucket.
                example: '"distributions"'
                tags:
                - template_section:CoreAgent
              send_count_sum_metrics:
                node_type: setting
                type: boolean
                default: false
                visibility: public
                description: |-
                  Deprecated - use `send_aggregation_metrics` instead. This flag will override `send_aggregation_metrics` if both are set.

                  Whether to report sum, count, min, and max as separate histogram metrics.
                example: 'false'
                tags:
                - template_section:CoreAgent
              send_aggregation_metrics:
                node_type: setting
                type: boolean
                default: false
                visibility: public
                description: Whether to report sum, count, min, and max as separate
                  histogram metrics.
                example: 'false'
                tags:
                - template_section:CoreAgent
          sums:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configuration for OTLP Sums.
              See https://docs.datadoghq.com/metrics/otlp/?tab=sum for details.
            tags:
            - template_section:CoreAgent
            properties:
              cumulative_monotonic_mode:
                node_type: setting
                type: string
                default: to_delta
                visibility: public
                description: |-
                  How to report cumulative monotonic sums. Valid values are:

                  - `to_delta` to calculate delta for sum in the client side and report as Datadog counts.
                  - `raw_value` to report the raw value as a Datadog gauge.
                example: '"to_delta"'
                tags:
                - template_section:CoreAgent
              initial_cumulative_monotonic_value:
                node_type: setting
                type: string
                default: auto
                visibility: public
                description: |-
                  How to report the initial value for cumulative monotonic sums. Valid values are:

                  - `auto` reports the initial value if its start timestamp is set and it happens after the process was started.
                  - `drop` always drops the initial value.
                  - `keep` always reports the initial value.
                example: '"auto"'
                tags:
                - template_section:CoreAgent
          summaries:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configuration for OTLP Summaries.
              See https://docs.datadoghq.com/metrics/otlp/?tab=summary for more details.
            tags:
            - template_section:CoreAgent
            properties:
              mode:
                node_type: setting
                type: string
                default: gauges
                visibility: public
                description: |-
                  How to report summaries. Valid values are:

                  - `noquantiles` to not report quantile metrics.
                  - `gauges` to report one gauge metric per quantile.
                example: '"gauges"'
                tags:
                - template_section:CoreAgent
          batch:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configuration for the OTLP sending queue (batch settings).
              See https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/exporterhelper#sending-queue-batch-settings for more details.
            tags:
            - template_section:CoreAgent
            properties:
              min_size:
                node_type: setting
                type: number
                default: 8192
                visibility: public
                description: The minimum number of metrics to batch before sending.
                example: '8192'
                tags:
                - template_section:CoreAgent
              max_size:
                node_type: setting
                type: number
                default: 0
                visibility: public
                description: The maximum number of metrics to batch before sending.
                  0 means no limit on the maximum number.
                example: '0'
                tags:
                - template_section:CoreAgent
              flush_timeout:
                node_type: setting
                type: string
                default: 200ms
                visibility: public
                description: The timeout for flushing the batch.
                example: '"200ms"'
                tags:
                - template_section:CoreAgent
          tags:
            node_type: setting
            type: string
            default: ''
      traces:
        node_type: section
        type: object
        visibility: public
        description: Traces-specific configuration for OTLP ingest in the Datadog
          Agent.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: |-
              Set to false to disable traces support in the OTLP ingest endpoint.
              To enable the OTLP ingest, the otlp_config.receiver section must be set.
            example: 'true'
            tags:
            - template_section:CoreAgent
          span_name_as_resource_name:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              If set to true the OpenTelemetry span name will used in the Datadog resource name.
              If set to false the resource name will be filled with the instrumentation library name + span kind.
            example: 'false'
            tags:
            - template_section:CoreAgent
          span_name_remappings:
            node_type: setting
            type: object
            default: {}
            additionalProperties:
              type: string
            visibility: public
            description: |-
              Defines a map of span names and preferred names to map to. This can be used to automatically map Datadog Span
              Operation Names to an updated value.
              span_name_remappings:
                "io.opentelemetry.javaagent.spring.client": "spring.client"
                "instrumentation:express.server": "express"
                "go.opentelemetry.io_contrib_instrumentation_net_http_otelhttp.client": "http.client"
            example: |2-

                <OLD_NAME>: <NEW_NAME>
            tags:
            - template_section:CoreAgent
          probabilistic_sampler:
            node_type: section
            type: object
            visibility: public
            description: |-
              Probabilistic sampler controlling the rate of ingestion. Using this sampler works consistently
              in a distributed system where the sampling rate is shared. Exceptions are made for errors and
              rare traces (if enabled via apm_config.enable_rare_sampler).
            tags:
            - template_section:CoreAgent
            properties:
              sampling_percentage:
                node_type: setting
                type: number
                default: 100
                env_vars:
                - DD_OTLP_CONFIG_TRACES_PROBABILISTIC_SAMPLER_SAMPLING_PERCENTAGE
                visibility: public
                description: |-
                  If `apm_config.probabilistic_sampler.enabled` is enabled, this config is ignored, `apm_config.probabilistic_sampler.enabled.sampling_percentage`
                  is used instead.
                  Percentage of traces to ingest (0 100]. Invalid values (<= 0 || > 100) are disconsidered and the default is used.
                  If incoming spans have a sampling.priority set by the user, it will be followed and the sampling percentage will
                  be overridden.
                example: '100'
                tags:
                - golang_type:float64
                - template_section:CoreAgent
          infra_attributes:
            node_type: section
            type: object
            visibility: public
            description: Controls whether infrastructure attributes (host tags, container
              tags) are attached to OTLP traces ingested by the Agent.
            tags:
            - template_section:CoreAgent
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
                visibility: public
                description: Set to false to disable Infra-Attribute-Processor for
                  traces pipeline in the OTLP ingest endpoint.
                example: 'true'
                tags:
                - template_section:CoreAgent
          internal_port:
            node_type: setting
            type: number
            default: 5003
      logs:
        node_type: section
        type: object
        visibility: public
        description: Logs-specific configuration for OTLP ingest in the Datadog Agent.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              Set to true to enable logs support in the OTLP ingest endpoint.
              To enable the OTLP ingest, the otlp_config.receiver section must be set.
            example: 'true'
            tags:
            - template_section:CoreAgent
          batch:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configuration for OTLP sending queue batch.
              See https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/exporterhelper#sending-queue-batch-settings for more details.
            tags:
            - template_section:CoreAgent
            properties:
              min_size:
                node_type: setting
                type: number
                default: 8192
                visibility: public
                description: The minimum number of metrics to batch before sending.
                example: '8192'
                tags:
                - template_section:CoreAgent
              max_size:
                node_type: setting
                type: number
                default: 0
                visibility: public
                description: The maximum number of logs to batch before sending. 0
                  means no limit on the maximum number.
                example: '0'
                tags:
                - template_section:CoreAgent
              flush_timeout:
                node_type: setting
                type: string
                default: 200ms
                visibility: public
                description: The timeout for flushing the batch.
                example: '"200ms"'
                tags:
                - template_section:CoreAgent
      debug:
        node_type: section
        type: object
        visibility: public
        description: |-
          Debug-specific configuration for OTLP ingest in the Datadog Agent.
          This template lists the most commonly used settings; see the OpenTelemetry Collector documentation
          for a full list of available settings:
          https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/debugexporter#getting-started
        tags:
        - template_section:CoreAgent
        properties:
          verbosity:
            node_type: setting
            type: string
            default: basic
            visibility: public
            description: |-
              Verbosity of debug logs when Datadog Agent receives otlp traces/metrics.
              Valid values are basic, normal, detailed, none.
            example: '"basic"'
            tags:
            - template_section:CoreAgent
      grpc_port:
        node_type: setting
        type: number
        default: 0
      http_port:
        node_type: setting
        type: number
        default: 0
  private_action_runner:
    node_type: section
    title: Private Action Runner Configuration
    type: object
    visibility: public
    description: |-
      Configuration for the Private Action Runner.
      The Private Action Runner allows executing actions within your infrastructure.
      See https://docs.datadoghq.com/actions/private_actions/ for more information.
    tags:
    - template_section:PrivateActionRunner
    properties:
      enabled:
        node_type: setting
