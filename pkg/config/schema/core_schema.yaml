            node_type: setting
            visibility: public
            description: The maximum number of seconds to wait for the NetFlow listeners
              to stop when the Agent shuts down.
            example: '5'
            tags:
            - TODO:fix-no-default
            - TODO:fix-missing-type
            - no-env
            - template_section:CoreAgent
