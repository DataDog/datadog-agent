                  through SQL obfuscation
                example: |2-

                    - val1
                tags:
                - template_section:TraceAgent
          cache:
            node_type: section
            type: object
            visibility: public
            description: Controls caching of obfuscated statements to improve performance.
            tags:
            - template_section:TraceAgent
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: true
                env_vars:
                - DD_APM_OBFUSCATION_CACHE_ENABLED
                visibility: public
                description: |-
                  Enables caching obfuscated statements. Currently supported for SQL and MongoDB queries.
                  Enabled by default.
                example: 'true'
                tags:
                - template_section:TraceAgent
              max_size:
                node_type: setting
                type: number
                default: 5000000
                env_vars:
                - DD_APM_OBFUSCATION_CACHE_MAX_SIZE
                visibility: public
                description: |-
                  The maximum size of the cache in bytes. The maximum allowed resource length is 5000.
                  Datadog stores a minimum of 1000 queries (5000000 / 5000) by default.
                example: '5000000'
                tags:
                - template_section:TraceAgent
      sql_obfuscation_mode:
        node_type: setting
        type: string
        default: ''
        env_vars:
        - DD_APM_SQL_OBFUSCATION_MODE
        visibility: public
        description: |-
          Obfuscator mode for SQL queries.
          Leave empty to use the default obfuscator.
          Set to "obfuscate_only" to obfuscate the query with the new `sqllexer` obfuscator.
          Set to "normalize_only" to normalize the query with the new `sqllexer` obfuscator.
          If you use DBM, set to "obfuscate_and_normalize" to obfuscate and normalize the query for better APM/DBM correlation.
        example: '""'
        tags:
        - template_section:TraceAgent
      filter_tags:
        node_type: section
        type: object
        visibility: public
        description: |-
          Defines rules by which to filter traces based on tags.
           * require - list of key or key/value strings - traces must have those tags in order to be sent to Datadog
           * reject - list of key or key/value strings - traces with these tags are dropped by the Agent
          Please note that:
            1. Rules take into account the intersection of tags defined.
            2. When `filter_tags` and `filter_tags_regex` are used at the same time, all rules are united for filtering.
               In cases where rules in `filter_tags` and `filter_tags_regex` match the same key, the rule from `filter_tags`
               takes precendence over the rule from `filter_tags_regex`.

               For example, in the case of the following configuration:
                 filter_tags:
                   require: ["foo:bar"]
                 filter_tags_regex:
                   require: ["foo:^bar[0-9]{1}$"]
               With these rules, traces with a tag `foo:bar1` will be dropped, and those with a `foo:bar` tag will be kept
        tags:
        - template_section:TraceAgent
        properties:
          require:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_APM_FILTER_TAGS_REQUIRE
            items:
              type: string
            visibility: public
            description: A list of key or key/value strings - traces must have those
              tags in order to be sent to Datadog
            example: '[<LIST_OF_KEY_VALUE_TAGS>]'
            tags:
            - template_section:TraceAgent
          reject:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_APM_FILTER_TAGS_REJECT
            items:
              type: string
            visibility: public
            description: A list of key or key/value strings - traces with these tags
              are dropped by the Agent
            example: '[<LIST_OF_KEY_VALUE_TAGS>]'
            tags:
            - template_section:TraceAgent
      filter_tags_regex:
        node_type: section
        type: object
        visibility: public
        description: |-
          Defines rules by which to filter traces based on tags with regex pattern for tag values.
           * require - list of key or key/value regex pattern strings - traces must have those tags in order to be sent to Datadog
           * reject - list of key or key/value regex pattern strings - traces with these tags are dropped by the Agent
          Note: Rules take into account the intersection of tags defined.
          Using regexp patterns for tag filtering can have performance implications, and is slower than typical tag filtering
          without regexp. However, this regexp is only run on the root span of a trace, so should not have a critical impact
          on overall performance.
          More detailed information can be found in the description of the `filter_tags` parameter above
        tags:
        - template_section:TraceAgent
        properties:
          require:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_APM_FILTER_TAGS_REGEX_REQUIRE
            items:
              type: string
            visibility: public
            description: A list of key or key/value regex pattern strings - traces
              must have those tags in order to be sent to Datadog
            example: '[<LIST_OF_KEY_VALUE_REGEX_TAGS>]    # e.g. ["<key>:<regex>"]'
            tags:
            - template_section:TraceAgent
          reject:
            node_type: setting
            type: array
            default: []
            env_vars:
            - DD_APM_FILTER_TAGS_REGEX_REJECT
            items:
              type: string
            visibility: public
            description: A list of key or key/value regex pattern strings - traces
              with these tags are dropped by the Agent
            example: '[<LIST_OF_KEY_VALUE_REGEX_TAGS>]     # e.g. ["<key>:<regex>"]'
            tags:
            - template_section:TraceAgent
      replace_tags:
        node_type: setting
        env_vars:
        - DD_APM_REPLACE_TAGS
        visibility: public
        description: |-
          Defines a set of rules to replace or remove certain resources, tags containing
          potentially sensitive information.
          Each rules has to contain:
           * name - string - The tag name to replace, for resources use "resource.name".
           * pattern - string - The pattern to match the desired content to replace
           * repl - string - what to inline if the pattern is matched

          See https://docs.datadoghq.com/tracing/setup_overview/configure_data_security/#replace-rules-for-tag-filtering
        example: |2-

            - name: "<TAG_NAME>"
              pattern: "<REGEX_PATTERN>"
              repl: "<PATTERN_TO_INLINE>"
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      ignore_resources:
        node_type: setting
        env_vars:
        - DD_APM_IGNORE_RESOURCES
        - DD_IGNORE_RESOURCE
        visibility: public
        description: |-
          An exclusion list of regular expressions can be provided to disable certain traces based on their resource name
          all entries must be surrounded by double quotes and separated by commas.
        example: '["(GET|POST) /healthcheck"]'
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      log_file:
        node_type: setting
        env_vars:
        - DD_APM_LOG_FILE
        visibility: public
        description: The full path to the file where APM-agent logs are written.
        example: <APM_LOG_FILE_PATH>
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      connection_limit:
        node_type: setting
        env_vars:
        - DD_APM_CONNECTION_LIMIT
        - DD_CONNECTION_LIMIT
        visibility: public
        description: |-
          The APM connection limit for the Agent.
          See https://docs.datadoghq.com/tracing/troubleshooting/agent_rate_limits/#max-connection-limit
        example: '2000'
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      compute_stats_by_span_kind:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_APM_COMPUTE_STATS_BY_SPAN_KIND
        visibility: public
        description: |-
          Enables an additional stats computation check on spans to see they have an eligible `span.kind` (server, consumer, client, producer).
          If enabled, a span with an eligible `span.kind` will have stats computed. If disabled, only top-level and measured spans will have stats computed.
          NOTE: For stats computed from OTel traces, only top-level spans are considered when this option is off.
          If you are sending OTel traces and want stats on non-top-level spans, this flag will need to be enabled.
          If you are sending OTel traces and do not want stats computed by span kind, you need to disable this flag and remove the "enable_otlp_compute_top_level_by_span_kind" APM feature if present.
        example: 'true'
        tags:
        - template_section:TraceAgent
      peer_service_aggregation:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_APM_PEER_SERVICE_AGGREGATION
        visibility: public
        description: DEPRECATED - please use `peer_tags_aggregation` instead.
        example: 'true'
        tags:
        - template_section:TraceAgent
      peer_tags_aggregation:
        node_type: setting
        type: boolean
        default: true
        env_vars:
        - DD_APM_PEER_TAGS_AGGREGATION
        visibility: public
        description: |-
          Enables aggregation of peer related tags (e.g., `peer.service`, `db.instance`, etc.) in the Agent.
          If disabled, aggregated trace stats will not include these tags as dimensions on trace metrics.
          For the best experience with peer tags, Datadog also recommends enabling `compute_stats_by_span_kind`.
          If you are using an OTel tracer, it's best to have both enabled because client/producer spans with relevant peer tags
          may not be marked by the Agent as top-level spans.
          If enabling both causes the Agent to consume too many resources, try disabling `compute_stats_by_span_kind` first.
          A high cardinality of peer tags or APM resources can also contribute to higher CPU and memory consumption.
          You can check for the cardinality of these fields by making trace search queries in the Datadog UI.
          The default list of peer tags can be found in pkg/trace/stats/concentrator.go.
        example: 'true'
        tags:
        - template_section:TraceAgent
      peer_tags:
        node_type: setting
        env_vars:
        - DD_APM_PEER_TAGS
        visibility: public
        description: |-
          Optional list of supplementary peer tags that go beyond the defaults. The Datadog backend validates all tags
          and will drop ones that are unapproved.
        example: '[]'
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      features:
        node_type: setting
        type: array
        default: []
        env_vars:
        - DD_APM_FEATURES
        items:
          type: string
        visibility: public
        description: |-
          Configure additional beta APM features.
          The list of items available under apm_config.features is not guaranteed to persist across versions;
          a feature may eventually be promoted to its own configuration option on the agent, or dropped entirely.
        example: '["error_rare_sample_tracer_drop","table_names","component2name","sqllexer","enable_otlp_compute_top_level_by_span_kind","disable_receive_resource_spans_v2",
          "disable_operation_and_resource_name_logic_v2"]'
        tags:
        - template_section:TraceAgent
      additional_endpoints:
        node_type: setting
        env_vars:
        - DD_APM_ADDITIONAL_ENDPOINTS
        visibility: public
        description: |-
          Enables sending data to multiple endpoints and/or with multiple API keys via dual shipping.
          See https://docs.datadoghq.com/agent/guide/dual-shipping
        example: |2-

            "https://trace.agent.datadoghq.com":
              - apikey2
              - apikey3
            "https://trace.agent.datadoghq.eu":
              - apikey4
        tags:
        - TODO:fix-no-default
        - TODO:fix-missing-type
        - template_section:TraceAgent
      debug:
        node_type: section
        type: object
        visibility: public
        description: Specifies settings for the debug server of the trace agent.
        tags:
        - template_section:TraceAgent
        properties:
          port:
            node_type: setting
            type: number
            default: 5012
            env_vars:
            - DD_APM_DEBUG_PORT
            visibility: public
            description: Port for the debug endpoints for the trace Agent. Set it
              to 0 to disable the server.
            example: '5012'
            tags:
            - template_section:TraceAgent
