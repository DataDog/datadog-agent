  use_dogstatsd:
    node_type: setting
    title: DogStatsD Configuration
    type: boolean
    default: true
    visibility: public
    description: Set this option to false to disable the Agent DogStatsD server.
    example: 'true'
    tags:
    - template_section:Dogstatsd
  dogstatsd_port:
    node_type: setting
    type: number
    default: 8125
    visibility: public
    description: |-
      Override the Agent DogStatsD port.
      Note: Make sure your client is sending to the same UDP port.
    example: '8125'
    tags:
    - template_section:Dogstatsd
  bind_host:
    node_type: setting
    visibility: public
    description: |-
      The host to listen on for Dogstatsd and traces. This is ignored by APM when
      `apm_config.apm_non_local_traffic` is enabled and ignored by DogStatsD when `dogstatsd_non_local_traffic`
      is enabled. The trace-agent uses this host to send metrics to.
      The `localhost` default value is invalid in IPv6 environments where dogstatsd listens on "::1".
      To solve this problem, ensure Dogstatsd is listening on IPv4 by setting this value to "127.0.0.1".
    example: localhost
    tags:
    - TODO:fix-no-default
    - TODO:fix-missing-type
    - template_section:Dogstatsd
  dogstatsd_socket:
    node_type: setting
    type: string
    visibility: public
    description: |-
      Listen for Dogstatsd metrics on a Unix Socket (*nix only).
      Set to a valid and existing filesystem path to enable.
      Set to "" to disable this feature.

      Please note that UDS receiver is not available in Windows.
      Enabling this setting may result in unexpected behavior.
    tags:
    - template_section:Dogstatsd
    platform_default:
      linux: /var/run/datadog/dsd.socket
      other: ''
  dogstatsd_origin_detection:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      When using Unix Socket, DogStatsD can tag metrics with container metadata.
      If running DogStatsD in a container, host PID mode (e.g. with --pid=host) is required.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_origin_detection_client:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Whether the Agent should use a client-provided container ID to enrich the metrics, events and service checks with container tags.
      Note: This requires using a client compatible with DogStatsD protocol version 1.2.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_buffer_size:
    node_type: setting
    type: number
    default: 8192
    visibility: public
    description: The buffer size use to receive statsd packets, in bytes.
    example: '8192'
    tags:
    - template_section:Dogstatsd
  dogstatsd_non_local_traffic:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to true to make DogStatsD listen to non local UDP traffic.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_stats_enable:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Publish DogStatsD's internal stats as Go expvars.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_logging_enabled:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      Set to true to write DogstatsD metrics received by the Agent to dogstats_stats log files.
      Requires `dogstatsd_stats_enable: true`.
    example: 'true'
    tags:
    - template_section:Dogstatsd
  dogstatsd_log_file_max_size:
    node_type: setting
    type: string
    default: 10Mb
    visibility: public
    description: |-
      Maximum size of dogstatsd log file. Use either a size (for example, 10MB) or
      provide value in bytes (for example, 10485760.)
    example: 10MB
    tags:
    - template_section:Dogstatsd
  dogstatsd_queue_size:
    node_type: setting
    type: number
    default: 1024
    visibility: public
    description: |-
      Configure the internal queue size of the Dogstatsd server.
      Reducing the size of this queue will reduce the maximum memory usage of the
      Dogstatsd server but as a trade-off, it could increase the number of packet drops.
    example: '1024'
    tags:
    - template_section:Dogstatsd
  dogstatsd_stats_buffer:
    node_type: setting
    type: number
    default: 10
    visibility: public
    description: Set how many items should be in the DogStatsD's stats circular buffer.
    example: '10'
    tags:
    - template_section:Dogstatsd
  dogstatsd_stats_port:
    node_type: setting
    type: number
    default: 5000
    visibility: public
    description: The port for the go_expvar server.
    example: '5000'
    tags:
    - template_section:Dogstatsd
  dogstatsd_so_rcvbuf:
    node_type: setting
    type: number
    default: 0
    visibility: public
    description: |-
      The number of bytes allocated to DogStatsD's socket receive buffer (POSIX system only).
      By default, the system sets this value. If you need to increase the size of this buffer
      but keep the OS default value the same, you can set DogStatsD's receive buffer size here.
      The maximum accepted value might change depending on the OS.
    example: '0'
    tags:
    - template_section:Dogstatsd
  dogstatsd_metrics_stats_enable:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Set this parameter to true to have DogStatsD collects basic statistics (count/last seen)
      about the metrics it processed. Use the Agent command "dogstatsd-stats" to visualize
      those statistics.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_tags:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Additional tags to append to all metrics, events and service checks received by
      this DogStatsD server.
    example: |2-

        - <TAG_KEY>:<TAG_VALUE>
    tags:
    - template_section:Dogstatsd
  dogstatsd_mapper_profiles:
    node_type: setting
    visibility: public
    description: |-
      The profiles will be used to convert parts of metrics names into tags.
      If a profile prefix is matched, other profiles won't be tried even if that profile matching rules doesn't match.
      The profiles and matching rules are processed in the order defined in this configuration.

      For each profile, following fields are available:
         name (required): profile name
         prefix (required): mapping only applies to metrics with the prefix. If set to `*`, it will match everything.
         mappings: mapping rules, see below.
      For each mapping, following fields are available:
         match (required): pattern for matching the incoming metric name e.g. `test.job.duration.*`
         match_type (optional): pattern type can be `wildcard` (default) or `regex` e.g. `test\.job\.(\w+)\.(.*)`
         name (required): the metric name the metric should be mapped to e.g. `test.job.duration`
         tags (optional): list of key:value pair of tag key and tag value
           The value can use $1, $2, etc, that will be replaced by the corresponding element capture by `match` pattern
           This alternative syntax can also be used: ${1}, ${2}, etc
    example: |2-

        - name: <PROFILE_NAME>                        # e.g. "airflow", "consul", "some_database"
          prefix: <PROFILE_PREFIX>                    # e.g. "airflow.", "consul.", "some_database."
          mappings:
            - match: <METRIC_TO_MATCH>                # e.g. `test.job.duration.*` to match `test.job.duration.my_job_name`
              match_type: <MATCH_TYPE>                # e.g. `wildcard` or `regex`
              name: <MAPPED_METRIC_NAME>              # e.g. `test.job.duration`
              tags:
                <TAG_KEY>: <TAG_VALUE_TO_EXPAND>      # e.g. `job_name: "$1"`, $1 is replaced by value capture by *
            - match: 'test.worker.*.*.start_time'     # to match `test.worker.<worker_type>.<worker_name>.start_time`
              name: 'test.worker.start_time'
              tags:
                worker_type: '$1'
                worker_name: '$2'
            - match: 'test\.task\.duration\.(\w+)\.(.*)'     # no need to escape in yaml context using single quote
              match_type: regex
              name: 'test.task'
              tags:
                task_type: '$1'
                task_name: '$2'
    tags:
    - TODO:fix-no-default
    - TODO:fix-missing-type
    - template_section:Dogstatsd
  dogstatsd_mapper_cache_size:
    node_type: setting
    type: number
    default: 1000
    visibility: public
    description: Size of the cache (max number of mapping results) used by Dogstatsd
      mapping feature.
    example: '1000'
    tags:
    - template_section:Dogstatsd
  dogstatsd_entity_id_precedence:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Disable enriching Dogstatsd metrics with tags from "origin detection"
      when Entity-ID is set.
    example: 'false'
    tags:
    - template_section:Dogstatsd
  dogstatsd_no_aggregation_pipeline:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      Enable the no-aggregation pipeline in DogStatsD: a pipeline receiving metrics
      with timestamp and forwarding them to the intake without extra processing except
      for tagging.
    example: 'true'
    tags:
    - template_section:Dogstatsd
  dogstatsd_no_aggregation_pipeline_batch_size:
    node_type: setting
    type: number
    default: 2048
    visibility: public
    description: How many metrics maximum in payloads sent by the no-aggregation pipeline
      to the intake.
    example: '2048'
    tags:
    - template_section:Dogstatsd
  statsd_forward_host:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Forward every packet received by the DogStatsD server to another statsd server.
      WARNING: Make sure that forwarded packets are regular statsd packets and not "DogStatsD" packets,
      as your other statsd server might not be able to handle them.
    example: '""'
    tags:
    - template_section:Dogstatsd
  statsd_forward_port:
    node_type: setting
    type: number
    default: 0
    visibility: public
    description: Port or the "statsd_forward_host" to forward StatsD packet to.
    example: '0'
    tags:
    - template_section:Dogstatsd
  statsd_metric_namespace:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Set a namespace for all StatsD metrics coming from this host.
      Each metric received is prefixed with the namespace before it's sent to Datadog.
    example: '""'
    tags:
    - template_section:Dogstatsd
  metadata_providers:
    node_type: setting
    type: array
    default: []
    items:
      type: object
    visibility: public
    description: |-
      Metadata providers, add or remove from the list to enable or disable collection.
      Intervals are expressed in seconds. You can also set a provider's interval to 0
      to disable it.
    example: |2-

        - name: k8s
          interval: 60
    tags:
    - no-env
    - template_section:Agent
  jmx_custom_jars:
    node_type: setting
    title: JMX Configuration
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      If you only run Autodiscovery tests, jmxfetch might fail to pick up custom_jar_paths
      set in the check templates. If that is the case, force custom jars here.
    example: |2-

        - /jmx-jars/jboss-cli-client.jar
    tags:
    - template_section:CoreAgent
  jmx_use_cgroup_memory_limit:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      When running in a memory cgroup, openjdk 8u131 and higher can automatically adjust
      its heap memory usage in accordance to the cgroup/container's memory limit.
      The Agent set a Xmx of 200MB if none is configured.
      Note: OpenJDK version < 8u131 or >= 10 as well as other JVMs might fail
      to start if this option is set.
    example: 'false'
    tags:
    - template_section:CoreAgent
  jmx_use_container_support:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      When running in a container, openjdk 10 and higher can automatically detect
      container specific configuration instead of querying the operating system
      to adjust resources allotted to the JVM.
      Note: openjdk versions prior to 10 and other JVMs might fail to start if
      this option is set.
    example: 'false'
    tags:
    - template_section:CoreAgent
  jmx_max_ram_percentage:
    node_type: setting
    type: number
    default: 25
    visibility: public
    description: |-
      When running in a container with jmx_use_container_support enabled, the JVM can
      automatically declare the maximum heap size based off of a percentage of
      total container allocated memory. This option is overwritten if
      you use -Xmx to manually define the size of the heap. This option applies
      to containers with a total memory limit greater than ~250mb. If
      jmx_use_container_support is disabled this option has no effect.
    example: '25.0'
    tags:
    - golang_type:float64
    - template_section:CoreAgent
  jmx_log_file:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: Path of the log file where JMXFetch logs are written.
    example: <JMXFETCH_LOG_FILE_PATH>
    tags:
    - template_section:CoreAgent
  jmx_max_restarts:
    node_type: setting
    type: number
    default: 3
    visibility: public
    description: Number of JMX restarts allowed in the restart-interval before giving
      up.
    example: '3'
    tags:
    - template_section:CoreAgent
  jmx_restart_interval:
    node_type: setting
    type: number
    default: 5
    visibility: public
    description: Duration of the restart interval in seconds.
    example: '5'
    tags:
    - template_section:CoreAgent
  jmx_check_period:
    node_type: setting
    type: number
    default: 15000
    visibility: public
    description: Duration of the period for check collections in milliseconds.
    example: '15000'
    tags:
    - template_section:CoreAgent
  jmx_thread_pool_size:
    node_type: setting
    type: number
    default: 3
    visibility: public
    description: |-
      JMXFetch collects multiples instances concurrently. Defines the maximum level of concurrency:
        * Higher concurrency increases CPU utilization during metric collection.
        * Lower concurrency results in lower CPU usage but may increase the total collection time.
      A value of 1 processes instances serially.
    example: '3'
    tags:
    - template_section:CoreAgent
  jmx_collection_timeout:
    node_type: setting
    type: number
    default: 60
    visibility: public
    description: Defines the maximum waiting period in seconds before timing up on
      metric collection.
    example: '60'
    tags:
    - template_section:CoreAgent
  jmx_reconnection_thread_pool_size:
    node_type: setting
    type: number
    default: 3
    visibility: public
    description: |-
      JMXFetch reconnects to multiples instances concurrently. Defines the maximum level of concurrency:
        * Higher concurrency increases CPU utilization during reconnection.
        * Lower concurrency results in lower CPU usage but may increase the total reconnection time
      A value of 1 processes instance reconnections serially.
    example: '3'
    tags:
    - template_section:CoreAgent
  jmx_reconnection_timeout:
    node_type: setting
    type: number
    default: 60
    visibility: public
    description: Determines the maximum waiting period in seconds before timing up
      on instance reconnection.
    example: '60'
    tags:
    - template_section:CoreAgent
  jmx_statsd_telemetry_enabled:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Specifies whether the JMXFetch statsd client telemetry is enabled.
    example: 'false'
    tags:
    - template_section:CoreAgent
  jmx_telemetry_enabled:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Specifies whether additional JMXFetch telemetry is enabled.
    example: 'false'
    tags:
    - template_section:CoreAgent
  jmx_java_tool_options:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      If you only run Autodiscovery tests, jmxfetch might fail to pick up custom_jar_paths
      set in the check templates. If that is the case, force custom jars here.
    example: -javaagent:/path/to/agent.jar -XX:+UseG1GC
    tags:
    - template_section:CoreAgent
  log_level:
    node_type: setting
    title: Logging Configuration
    type: string
    default: info
    visibility: public
    description: |-
      Minimum log level of the Datadog Agent.
      Valid log levels are: trace, debug, info, warn, error, critical, and off.
      Note: When using the 'off' log level, quotes are mandatory.
    example: '''info'''
    tags:
    - template_section:Logging
  log_file:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Path of the log file for the Datadog Agent.
      See https://docs.datadoghq.com/agent/guide/agent-log-files/
    example: <AGENT_LOG_FILE_PATH>
    tags:
    - template_section:Logging
  log_format_json:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to 'true' to output Agent logs in JSON format.
    example: 'false'
    tags:
    - template_section:Logging
  log_to_console:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Set to 'false' to disable Agent logging to stdout.
    example: 'true'
    tags:
    - template_section:Logging
  disable_file_logging:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to 'true' to disable logging to the log file.
    example: 'false'
    tags:
    - template_section:Logging
  log_file_max_size:
    node_type: setting
    type: string
    default: 10Mb
    visibility: public
    description: |-
      Maximum size of one log file. Use either a size (e.g. 10MB) or
      provide value in bytes: 10485760
    example: 10MB
    tags:
    - template_section:Logging
  log_file_max_rolls:
    node_type: setting
    type: number
    default: 1
    visibility: public
    description: |-
      Maximum amount of "old" log files to keep.
      Set to 0 to not limit the number of files to create.
    example: '1'
    tags:
    - template_section:Logging
  log_to_syslog:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Set to 'true' to enable logging to syslog.
      Note: Even if this option is set to 'false', the service launcher of your environment
      may redirect the Agent process' stdout/stderr to syslog. In that case, if you wish
      to disable logging to syslog entirely, set 'log_to_console' to 'false' as well.
    example: 'false'
    tags:
    - template_section:Logging
  syslog_uri:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Define a custom remote syslog uri if needed. If 'syslog_uri' is left undefined/empty,
      a local domain socket connection is attempted.
    example: <SYSLOG_URI>
    tags:
    - template_section:Logging
  syslog_rfc:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Set to 'true' to output in an RFC 5424-compliant format for Agent
      logs.
    example: 'false'
    tags:
    - template_section:Logging
  log_format_rfc3339:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: If enabled the Agent will log using the RFC3339 format for the log
      time.
    example: 'false'
    tags:
    - template_section:Logging
  log_all_goroutines_when_unhealthy:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      If enabled, when the health probe of an internal component fails, the stack traces
      of all the goroutines are logged.
    example: 'false'
    tags:
    - template_section:Logging
  autoconf_template_dir:
    node_type: setting
    title: Autoconfig Configuration
    type: string
    default: /datadog/check_configs
    visibility: public
    description: Directory containing configuration templates for Autoconfig.
    example: '"/datadog/check_configs"'
    tags:
    - template_section:CoreAgent
  autoconf_config_files_poll:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Should the we check for new/updated integration configuration files on disk.
      WARNING: Only files containing checks configuration are supported (logs configuration are not supported).
    example: 'false'
    tags:
    - template_section:CoreAgent
  autoconf_config_files_poll_interval:
    node_type: setting
    type: number
    default: 60
    visibility: public
    description: |-
      How frequently should the Agent check for new/updated integration configuration files (in seconds).
      This value must be >= 1 (i.e. 1 second).
      WARNING: Only files containing checks configuration are supported (logs configuration are not supported).
    example: '60'
    tags:
    - template_section:CoreAgent
  config_providers:
    node_type: setting
    type: array
    default: []
    items:
      type: object
    visibility: public
    description: |-
      The providers the Agent should call to collect checks configurations. Available providers are:
        * kubelet - The kubelet provider handles templates embedded in pod annotations.
        * docker -  The Docker provider handles templates embedded in container labels.
        * clusterchecks - The clustercheck provider retrieves cluster-level check configurations from the cluster-agent.
        * kube_services - The kube_services provider watches Kubernetes services for cluster-checks

      See https://docs.datadoghq.com/guides/autodiscovery/ to learn more
    example: |2-

        - name: kubelet
          polling: true
        - name: docker
          polling: true
        - name: clusterchecks
          grace_time_seconds: 60
        - name: kube_services     # only when using the cluster Agent
          polling: true
        - name: etcd
          polling: true
          template_dir: /datadog/check_configs
          template_url: http://127.0.0.1
          username:
          password:
        - name: consul
          polling: true
          template_dir: datadog/check_configs
          template_url: http://127.0.0.1
          ca_file:
          ca_path:
          cert_file:
          key_file:
          username:
          password:
          token:
        - name: zookeeper
          polling: true
          template_dir: /datadog/check_configs
          template_url: 127.0.0.1
          username:
          password:
    tags:
    - no-env
    - template_section:CoreAgent
  extra_config_providers:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Add additional config providers by name using their default settings, and pooling enabled.
      This list is available as an environment variable binding.
    example: |2-

        - clusterchecks
    tags:
    - template_section:CoreAgent
  autoconfig_exclude_features:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Exclude features automatically detected and enabled by environment autodiscovery.
      Supported syntax is a list of `(<attribute>:)<regexp>`. Currently only the `name` attribute is supported.
      When no attribute is present, it defaults to `name:` attribute.
    example: |2-

        - cloudfoundry
        - containerd
        - cri
        - docker
        - ecsec2
        - ecsfargate
        - eksfargate
        - kubernetes
        - orchestratorexplorer
        - podman
    tags:
    - template_section:CoreAgent
  autoconfig_include_features:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: Force activation of features (as if they were discovered by environment
      autodiscovery).
    example: |2-

        - cloudfoundry
        - containerd
        - cri
        - docker
        - ecsec2
        - ecsfargate
        - eksfargate
        - kubernetes
        - orchestratorexplorer
        - podman
    tags:
    - template_section:CoreAgent
  container_cgroup_root:
    node_type: setting
    title: Container Autodiscovery Configuration
    type: string
    default: /host/sys/fs/cgroup/
    visibility: public
    description: |-
      Change the root directory to look at to get cgroup statistics.
      Default if environment variable "DOCKER_DD_AGENT" is set to "/host/sys/fs/cgroup"
      and "/sys/fs/cgroup" if not.
    tags:
    - template_section:CoreAgent
  container_proc_root:
    node_type: setting
    type: string
    default: /host/proc
    visibility: public
    description: |-
      Change the root directory to look at to get proc statistics.
      Default if environment variable "DOCKER_DD_AGENT" is set "/host/proc" and "/proc" if not.
    tags:
    - template_section:CoreAgent
  listeners:
    node_type: setting
    type: array
    default: []
    items:
      type: object
    visibility: public
    description: |-
      Choose "auto" if you want to let the Agent find any relevant listener on your host
      At the moment, the only auto listener supported is Docker
      If you have already set Docker anywhere in the listeners, the auto listener is ignored
    example: |2-

        - name: auto
        - name: docker
    tags:
    - no-env
    - template_section:CoreAgent
  extra_listeners:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      You can also add additional listeners by name using their default settings.
      This list is available as an environment variable binding.
    example: |2-

        - kubelet
    tags:
    - template_section:CoreAgent
  ac_exclude:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Exclude containers from metrics and AD based on their name or image.
      If a container matches an exclude rule, it won't be included unless it first matches an include rule.
      An excluded container won't get any individual container metric reported for it.
      See: https://docs.datadoghq.com/agent/guide/autodiscovery-management/
    example: '[]'
    tags:
    - template_section:CoreAgent
  ac_include:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Include containers from metrics and AD based on their name or image:
      See: https://docs.datadoghq.com/agent/guide/autodiscovery-management/
    example: '[]'
    tags:
    - template_section:CoreAgent
  exclude_pause_container:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      Exclude default pause containers from orchestrators.
      By default the Agent doesn't monitor kubernetes/openshift pause container.
      They are still counted in the container count (just like excluded containers).
    example: 'true'
    tags:
    - template_section:CoreAgent
  docker_query_timeout:
    node_type: setting
    type: number
    default: 5
    visibility: public
    description: Set the default timeout value when connecting to the Docker daemon.
    example: '5'
    tags:
    - template_section:CoreAgent
  ad_config_poll_interval:
    node_type: setting
    type: number
    default: 10
    visibility: public
    description: |-
      The default interval in second to check for new autodiscovery configurations
      on all registered configuration providers.
    example: '10'
    tags:
    - template_section:CoreAgent
  ad_allowed_env_vars:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      The list of environment variables that are allowed to be resolved in check
      configurations.
      If the list is not set or is empty, the default behavior applies: all envs
      are allowed.
      This list only applies when `ad_disable_env_var_resolution` is set to false.
    example: |2-

        - <ENV_VAR_1>
        - <ENV_VAR_2>
    tags:
    - template_section:CoreAgent
  ad_disable_env_var_resolution:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: Disable environment variable resolution in check configurations.
    example: 'false'
    tags:
    - template_section:CoreAgent
  cloud_foundry_garden:
    node_type: section
    type: object
    visibility: public
    description: Settings for Cloudfoundry application container autodiscovery.
    tags:
    - template_section:CoreAgent
    properties:
      listen_network:
        node_type: setting
        type: string
        default: unix
        visibility: public
        description: The network on which the garden API is listening. Possible values
          are `unix` or `tcp`
        example: '"unix"'
        tags:
        - template_section:CoreAgent
      listen_address:
        node_type: setting
        type: string
        default: /var/vcap/data/garden/garden.sock
        visibility: public
        description: The address on which the garden API is listening.
        example: '"/var/vcap/data/garden/garden.sock"'
        tags:
        - template_section:CoreAgent
  podman_db_path:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Path(s) to Podman container database file(s) used by the Datadog Agent to collect container metrics.
      Accepts a comma-separated list of paths to support monitoring containers from multiple users
      (e.g. root and rootless users).
      Example: "/var/lib/containers/storage/db.sql,/home/myuser/.local/share/containers/storage/db.sql"
      When left empty, the Agent auto-discovers accessible Podman databases for root and all users under /home/.
    example: '""'
    tags:
    - template_section:CoreAgent
  cluster_agent:
    node_type: section
    title: Cluster Agent Configuration
    type: object
    visibility: public
    description: |-
      Settings for the Cluster Agent.
      See https://docs.datadoghq.com/agent/cluster_agent/
    tags:
    - template_section:ClusterAgent
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable the Cluster Agent.
        example: 'false'
        tags:
        - template_section:ClusterAgent
      auth_token:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: Auth token used to make requests to the Kubernetes API server.
        example: '""'
        tags:
        - template_section:ClusterAgent
      url:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: The Cluster Agent endpoint. There's no need to set it if "kubernetes_service_name"
          is set.
        example: '""'
        tags:
        - template_section:ClusterAgent
      kubernetes_service_name:
        node_type: setting
        type: string
        default: datadog-cluster-agent
        visibility: public
        description: Name of the Kubernetes service for the Cluster Agent.
        example: '"datadog-cluster-agent"'
        tags:
        - template_section:ClusterAgent
      max_leader_connections:
        node_type: setting
        type: number
        default: 100
        visibility: public
        description: Maximum number of connections between a follower and a leader.
        example: '100'
        tags:
        - template_section:ClusterAgent
      client_reconnect_period_seconds:
        node_type: setting
        type: number
        default: 1200
        visibility: public
        description: |-
          Set the refersh period for Agent to Cluster Agent connection (new connection is created, old connection is closed).
          Set to 0 to disable periodic reconnection.
        example: '1200'
        tags:
        - template_section:ClusterAgent
      tagging_fallback:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enabled fallback to local metamapper when the
          connection with the Cluster Agent fails.
        example: 'false'
        tags:
        - template_section:ClusterAgent
      server:
        node_type: section
        type: object
        visibility: public
        description: Sets the connection timeouts
        tags:
        - template_section:ClusterAgent
        properties:
          read_timeout_seconds:
            node_type: setting
            type: number
            default: 2
            visibility: public
            description: Read timeout in seconds.
            example: '2'
            tags:
            - template_section:ClusterAgent
          write_timeout_seconds:
            node_type: setting
            type: number
            default: 2
            visibility: public
            description: Write timeout in seconds.
            example: '2'
            tags:
            - template_section:ClusterAgent
          idle_timeout_seconds:
            node_type: setting
            type: number
            default: 60
            visibility: public
            description: Idle timeout in seconds.
            example: '60'
            tags:
            - template_section:ClusterAgent
      tracing:
        node_type: section
        type: object
        visibility: public
        description: |-
          APM tracing for the Cluster Agent. When enabled, traces internal operations for
          improved debugging. Traces appear in APM with service name "datadog-cluster-agent".
          Covers: cluster check dispatching and rebalancing decisions.
          To view traces: APM -> Services -> datadog-cluster-agent -> Traces
        tags:
        - template_section:ClusterAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enable APM tracing for the Cluster Agent.
            example: 'false'
            tags:
            - template_section:ClusterAgent
          env:
            node_type: setting
            type: string
            default: ''
            visibility: public
            description: The environment tag to apply to all traces emitted by the
              Cluster Agent.
            example: '""'
            tags:
            - template_section:ClusterAgent
          sample_rate:
            node_type: setting
            type: number
            default: 0.1
            visibility: public
            description: |-
              Sample rate for traces emitted by the Cluster Agent (0.0 to 1.0).
              Default is 0.1 (10%) for safety. Set to 1.0 to trace all operations.
            example: '0.1'
            tags:
            - golang_type:float64
            - template_section:ClusterAgent
      allow_legacy_tls:
        node_type: setting
        type: boolean
        default: false
      appsec:
        node_type: section
        type: object
        properties:
          injector:
            node_type: section
            type: object
            properties:
              annotations:
                node_type: setting
                type: object
                default: {}
                additionalProperties:
                  type: string
              base_backoff:
                node_type: setting
                type: string
                default: 5m
              enabled:
                node_type: setting
                type: boolean
                default: false
              istio:
                node_type: section
                type: object
                properties:
                  namespace:
                    node_type: setting
                    type: string
                    default: istio-system
              labels:
                node_type: setting
                type: object
                default: {}
                additionalProperties:
                  type: string
              max_backoff:
                node_type: setting
                type: string
                default: 1h
              mode:
                node_type: setting
                type: string
                default: sidecar
              processor:
                node_type: section
                type: object
                properties:
                  service:
                    node_type: section
                    type: object
                    properties:
                      name:
                        node_type: setting
                        type: string
                        default: ''
                      namespace:
                        node_type: setting
                        type: string
                        default: ''
      cluster_tagger:
        node_type: section
        type: object
        properties:
          grpc_max_message_size:
            node_type: setting
            type: number
            default: 4194304
      cmd_port:
        node_type: setting
        type: number
        default: 5005
      collect_kubernetes_tags:
        node_type: setting
        type: boolean
        default: false
      isolation_segments_tags:
        node_type: setting
        type: boolean
        default: false
      kube_metadata_collection:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          resource_annotations_exclude:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          resources:
            node_type: setting
            type: array
            default: []
            items:
              type: string
      kubernetes_resources_collection:
        node_type: section
        type: object
        properties:
          deployment_annotations_exclude:
            node_type: setting
            type: array
            default:
            - ^kubectl\.kubernetes\.io\/last-applied-configuration$
            - ^ad\.datadoghq\.com\/([[:alnum:]]+\.)?(checks|check_names|init_configs|instances)$
            items:
              type: string
          pod_annotations_exclude:
            node_type: setting
            type: array
            default:
            - ^kubectl\.kubernetes\.io\/last-applied-configuration$
            - ^ad\.datadoghq\.com\/([[:alnum:]]+\.)?(checks|check_names|init_configs|instances)$
            items:
              type: string
      language_detection:
        node_type: section
        type: object
        properties:
          cleanup:
            node_type: section
            type: object
            properties:
              language_ttl:
                node_type: setting
                type: string
                default: 30m
              period:
                node_type: setting
                type: string
                default: 10m
          patcher:
            node_type: section
            type: object
            properties:
              base_backoff:
                node_type: setting
                type: string
                default: 5m
              enabled:
                node_type: setting
                type: boolean
                default: true
              max_backoff:
                node_type: setting
                type: string
                default: 1h
      mcp:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          endpoint:
            node_type: setting
            type: string
            default: /mcp
      refresh_on_cache_miss:
        node_type: setting
        type: boolean
        default: true
      serve_nozzle_data:
        node_type: setting
        type: boolean
        default: false
      service_account_name:
        node_type: setting
        type: string
        default: ''
      sidecars_tags:
        node_type: setting
        type: boolean
        default: false
      token_name:
        node_type: setting
        type: string
        default: datadogtoken
  cluster_checks:
    node_type: section
    title: Cluster check Configuration
    type: object
    visibility: public
    description: |-
      Enter specific configurations for your cluster check.
      The cluster-agent is able to autodiscover cluster resources and dispatch checks on
      the node-agents (provided the clustercheck config provider is enabled on them).
      Uncomment this parameter and the one below to enable them.
      See https://docs.datadoghq.com/agent/kubernetes/cluster/
    tags:
    - template_section:ClusterChecks
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable the dispatching logic on the leader cluster-agent.
        example: 'false'
        tags:
        - template_section:ClusterChecks
      node_expiration_timeout:
        node_type: setting
        type: number
        default: 30
        visibility: public
        description: |-
          Set "node_expiration_timeout" time in second after which Node-agents that have not
          queried the cluster-agent are deleted, and their checks re-dispatched to other nodes.
        example: '30'
        tags:
        - template_section:ClusterChecks
      warmup_duration:
        node_type: setting
        type: number
        default: 30
        visibility: public
        description: |-
          Set the "warmup_duration" duration in second for the cluster-agent to wait for all
          node-agents to report to it before dispatching configurations.
        example: '30'
        tags:
        - template_section:ClusterChecks
      cluster_tag_name:
        node_type: setting
        type: string
        default: cluster_name
        visibility: public
        description: |-
          If a cluster_name value is set or autodetected, a "<CLUSTER_NAME>" tag is added
          to all cluster-check configurations sent to the node-agents.
          Set a custom tag name here, or disable it by setting an empty name.
        example: '"cluster_name"'
        tags:
        - template_section:ClusterChecks
      extra_tags:
        node_type: setting
        type: array
        default: []
        items:
          type: string
        visibility: public
        description: Set a list of additionnal tags can to be added to every cluster-check
          configuration.
        example: |2-

            - <TAG_KEY>:<TAG_VALUE>
        tags:
        - template_section:ClusterChecks
      advanced_dispatching_enabled:
        node_type: setting
        type: boolean
        default: true
        visibility: public
        description: |-
          If advanced_dispatching_enabled is true the leader cluster-agent collects stats
          from the cluster level check runners to optimize the check dispatching logic.
        example: 'true'
        tags:
        - template_section:ClusterChecks
      rebalance_with_utilization:
        node_type: setting
        type: boolean
        default: true
        visibility: public
        description: If rebalance_with_utilization is true, the cluster-agent will
          rebalance cluster checks using node utilization.
        example: 'true'
        tags:
        - template_section:ClusterChecks
      clc_runners_port:
        node_type: setting
        type: number
        default: 5005
        visibility: public
        description: |-
          Set the "clc_runners_port" used by the cluster-agent client to reach cluster level
          check runners and collect their stats.
        example: '5005'
        tags:
        - template_section:ClusterChecks
      crd_collection:
        node_type: setting
        type: boolean
        default: false
      exclude_checks:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      exclude_checks_from_dispatching:
        node_type: setting
        type: array
        default: []
        items:
          type: string
      ksm_sharding_enabled:
        node_type: setting
        type: boolean
        default: false
      rebalance_min_percentage_improvement:
        node_type: setting
        type: number
        default: 10
      rebalance_period:
        node_type: setting
        type: number
        default: 10m0s
        format: duration
        tags:
        - golang_type:duration
      support_hybrid_ignore_ad_tags:
        node_type: setting
        type: boolean
        default: false
      unscheduled_check_threshold:
        node_type: setting
        type: number
        default: 60
  admission_controller:
    node_type: section
    title: Admission controller Configuration
    type: object
    visibility: public
    description: |-
      Enter specific configurations for your admission controller.
      The Datadog admission controller is a component of the Datadog Cluster Agent.
      It has two main functionalities:
      Inject environment variables (DD_AGENT_HOST and DD_ENTITY_ID) to configure DogStatsD and APM tracer libraries into your application containers.
      Inject Datadog reserved tags (env, service, version) from application labels into the container environment variables.
      Uncomment this parameter and the one below to enable it.
      See https://docs.datadoghq.com/agent/cluster_agent/admission_controller/
    tags:
    - template_section:AdmissionController
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Set to true to enable the admission controller in the cluster-agent.
        example: 'false'
        tags:
        - template_section:AdmissionController
      validation:
        node_type: section
        type: object
        visibility: public
        description: The admission controller's validation configuration.
        tags:
        - template_section:AdmissionController
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Set to true to enable validation webhooks controller in the
              cluster-agent.
            example: 'true'
            tags:
            - template_section:AdmissionController
      mutation:
        node_type: section
        type: object
        visibility: public
        description: The admission controller's mutation configuration.
        tags:
        - template_section:AdmissionController
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Set to true to enable mutation webhooks controller in the
              cluster-agent.
            example: 'true'
            tags:
            - template_section:AdmissionController
      mutate_unlabelled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Enable injecting config without having the pod label admission.datadoghq.com/enabled="true".
        example: 'false'
        tags:
        - template_section:AdmissionController
      port:
        node_type: setting
        type: number
        default: 8000
        visibility: public
        description: The admission controller server port.
        example: '8000'
        tags:
        - template_section:AdmissionController
      timeout_seconds:
        node_type: setting
        type: number
        default: 10
        visibility: public
        description: The admission controller server timeout in seconds.
        example: '10'
        tags:
        - template_section:AdmissionController
      service_name:
        node_type: setting
        type: string
        default: datadog-admission-controller
        visibility: public
        description: The name of the Kubernetes service that exposes the admission
          controller.
        example: '"datadog-admission-controller"'
        tags:
        - template_section:AdmissionController
      webhook_name:
        node_type: setting
        type: string
        default: datadog-webhook
        visibility: public
        description: The name of the Kubernetes webhook object.
        example: '"datadog-webhook"'
        tags:
        - template_section:AdmissionController
      pod_owners_cache_validity:
        node_type: setting
        type: number
        default: 10
        visibility: public
        description: The in-memory cache TTL for pod owners in minutes.
        example: '10'
        tags:
        - template_section:AdmissionController
      namespace_selector_fallback:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: |-
          Use namespace selectors instead of object selectors to watch objects.
          For Kubernetes versions from 1.10 to 1.14 (inclusive)
        example: 'false'
        tags:
        - template_section:AdmissionController
      certificate:
        node_type: section
        type: object
        visibility: public
        description: The webhook's certificate configuration.
        tags:
        - template_section:AdmissionController
        properties:
          validity_bound:
            node_type: setting
            type: number
            default: 8760
            visibility: public
            description: The certificate's validity bound in hours, default 1 year
              (365*24).
            example: '8760'
            tags:
            - template_section:AdmissionController
          expiration_threshold:
            node_type: setting
            type: number
            default: 720
            visibility: public
            description: The certificate's refresh threshold in hours, default 1 month
              (30*24).
            example: '720'
            tags:
            - template_section:AdmissionController
          secret_name:
            node_type: setting
            type: string
            default: webhook-certificate
            visibility: public
            description: Name of the Secret object containing the webhook certificate.
            example: '"webhook-certificate"'
            tags:
            - template_section:AdmissionController
      inject_config:
        node_type: section
        type: object
        visibility: public
        description: Configuration injection parameters.
        tags:
        - template_section:AdmissionController
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Enable configuration injection (configure DogStatsD and APM
              tracer libraries).
            example: 'true'
            tags:
            - template_section:AdmissionController
          endpoint:
            node_type: setting
            type: string
            default: /injectconfig
            visibility: public
            description: Admission controller's endpoint responsible for handling
              configuration injection requests.
            example: '"/injectconfig"'
            tags:
            - template_section:AdmissionController
          mode:
            node_type: setting
            type: string
            default: hostip
            visibility: public
            description: The kind of configuration to be injected, it can be "hostip",
              "service", or "socket".
            example: '"hostip"'
            tags:
            - template_section:AdmissionController
          local_service_name:
            node_type: setting
            type: string
            default: datadog
            visibility: public
            description: Configure the local service name that exposes the Datadog
              Agent. Only applicable in "service" mode.
            example: '"datadog"'
            tags:
            - template_section:AdmissionController
          socket_path:
            node_type: setting
            type: string
            default: /var/run/datadog
            visibility: public
            description: Configure Datadog Agent's socket path. Only applicable in
              "socket" mode.
            example: '"/var/run/datadog"'
            tags:
            - template_section:AdmissionController
          type_socket_volumes:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              When enabled, injected volumes are of type "Socket". This means that
              injected pods will not start until the Agent creates the dogstatsd and
              trace-agent sockets. This ensures no lost traces or dogstatsd metrics but
              can cause the pod to wait if the agent has issues creating the sockets.
            example: 'false'
            tags:
            - template_section:AdmissionController
      inject_tags:
        node_type: section
        type: object
        visibility: public
        description: Tags injection parameters.
        tags:
        - template_section:AdmissionController
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Enable standard tags injection.
            example: 'true'
            tags:
            - template_section:AdmissionController
          endpoint:
            node_type: setting
            type: string
            default: /injecttags
            visibility: public
            description: Admission controller's endpoint responsible for handling
              tags injection requests.
            example: '"/injecttags"'
            tags:
            - template_section:AdmissionController
          pod_owners_cache_validity:
            node_type: setting
            type: number
            default: 10
      failure_policy:
        node_type: setting
        type: string
        default: Ignore
        visibility: public
        description: |-
          Set the failure policy for dynamic admission control.
          The default of Ignore means that pods will still be admitted even if the webhook is unavailable to inject them.
          Setting to Fail will require the admission controller to be present and pods to be injected before they are allowed to run.
        example: '"Ignore"'
        tags:
        - template_section:AdmissionController
      reinvocation_policy:
        node_type: setting
        type: string
        default: IfNeeded
        visibility: public
        description: |-
          Set the reinvocation policy for dynamic admission control.
          See https://kubernetes.io/docs/reference/access-authn-authz/extensible-admission-controllers/#reinvocation-policy
        example: '"IfNeeded"'
        tags:
        - template_section:AdmissionController
      add_aks_selectors:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: |-
          Adds in the admission controller webhook the selectors that are required in AKS.
          See https://docs.microsoft.com/en-us/azure/aks/faq#can-i-use-admission-controller-webhooks-on-aks
        example: 'false'
        tags:
        - template_section:AdmissionController
      auto_instrumentation:
        node_type: section
        type: object
        visibility: public
        description: Library injection parameters.
        tags:
        - template_section:AdmissionController
        properties:
          init_resources:
            node_type: section
            type: object
            visibility: public
            description: CPU and Memory resources of the init containers.
            tags:
            - template_section:AdmissionController
            properties:
              cpu:
                node_type: setting
                type: string
                default: ''
                visibility: public
                description: Configures the CPU request that will be applied for the
                  init container's CPU request and limit.
                example: '""'
                tags:
                - template_section:AdmissionController
              memory:
                node_type: setting
                type: string
                default: ''
                visibility: public
                description: Configures the memory request that will be applied for
                  the init container's memory request and limit.
                example: '""'
                tags:
                - template_section:AdmissionController
          init_security_context:
            node_type: setting
            type: string
            default: ''
            visibility: public
            description: |-
              Security context for the init containers in JSON format. Follows the Kubernetes security context spec,
              https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.30/#securitycontext-v1-core,
              ignores unknown properties.

              Env var example: DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_INIT_SECURITY_CONTEXT='{"privileged": false}'
            example: '''{"privileged": false}'''
            tags:
            - template_section:AdmissionController
          asm:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                env_vars:
                - DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_APPSEC_ENABLED
                tags: []
          asm_sca:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                env_vars:
                - DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_APPSEC_SCA_ENABLED
                tags: []
          container_registry:
            node_type: setting
            type: string
            default: ''
          default_dd_registries:
            node_type: setting
            type: array
            default:
            - gcr.io/datadoghq
            - docker.io/datadog
            - public.ecr.aws/datadog
            items:
              type: string
          enabled:
            node_type: setting
            type: boolean
            default: true
          endpoint:
            node_type: setting
            type: string
            default: /injectlib
          gradual_rollout:
            node_type: section
            type: object
            properties:
              cache_ttl:
                node_type: setting
                type: string
                default: 1h
              enabled:
                node_type: setting
                type: boolean
                default: true
          iast:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                env_vars:
                - DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_IAST_ENABLED
                tags: []
          inject_auto_detected_libraries:
            node_type: setting
            type: boolean
            default: true
          patcher:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
              fallback_to_file_provider:
                node_type: setting
                type: boolean
                default: false
              file_provider_path:
                node_type: setting
                type: string
                default: /etc/datadog-agent/patch/auto-instru.json
          profiling:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: string
                default: ''
                env_vars:
                - DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_PROFILING_ENABLED
                tags: []
      agent_sidecar:
        node_type: section
        type: object
        properties:
          cluster_agent:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: string
                default: 'true'
              tls_verification:
                node_type: section
                type: object
                properties:
                  copy_ca_configmap:
                    node_type: setting
                    type: boolean
                    default: false
                  enabled:
                    node_type: setting
                    type: boolean
                    default: false
          container_registry:
            node_type: setting
            type: string
            default: ''
          enabled:
            node_type: setting
            type: boolean
            default: false
          endpoint:
            node_type: setting
            type: string
            default: /agentsidecar
          image_name:
            node_type: setting
            type: string
            default: agent
          image_tag:
            node_type: setting
            type: string
            default: latest
          kubelet_api_logging:
            node_type: section
            type: object
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
          profiles:
            node_type: setting
            type: string
            default: '[]'
          provider:
            node_type: setting
            type: string
            default: ''
          selectors:
            node_type: setting
            type: string
            default: '[]'
      appsec:
        node_type: section
        type: object
        properties:
          sidecar:
            node_type: section
            type: object
            properties:
              body_parsing_size_limit:
                node_type: setting
                type: string
                default: ''
              health_port:
                node_type: setting
                type: number
                default: 8081
              image:
                node_type: setting
                type: string
                default: ghcr.io/datadog/dd-trace-go/service-extensions-callout
              image_tag:
                node_type: setting
                type: string
                default: latest
              port:
                node_type: setting
                type: number
                default: 8080
              resources:
                node_type: section
                type: object
                properties:
                  limits:
                    node_type: section
                    type: object
                    properties:
                      cpu:
                        node_type: setting
                        type: string
                        default: ''
                      memory:
                        node_type: setting
                        type: string
                        default: ''
                  requests:
                    node_type: section
                    type: object
                    properties:
                      cpu:
                        node_type: setting
                        type: string
                        default: 10m
                      memory:
                        node_type: setting
                        type: string
                        default: 128Mi
      container_registry:
        node_type: setting
        type: string
        default: gcr.io/datadoghq
      cws_instrumentation:
        node_type: section
        type: object
        properties:
          command_endpoint:
            node_type: setting
            type: string
            default: /inject-command-cws
          container_registry:
            node_type: setting
            type: string
            default: ''
          enabled:
            node_type: setting
            type: boolean
            default: false
          exclude:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          image_name:
            node_type: setting
            type: string
            default: cws-instrumentation
          image_tag:
            node_type: setting
            type: string
            default: latest
          include:
            node_type: setting
            type: array
            default: []
            items:
              type: string
          init_resources:
            node_type: section
            type: object
            properties:
              cpu:
                node_type: setting
                type: string
                default: ''
              memory:
                node_type: setting
                type: string
                default: ''
          mode:
            node_type: setting
            type: string
            default: remote_copy
          mutate_unlabelled:
            node_type: setting
            type: boolean
            default: false
          pod_endpoint:
            node_type: setting
            type: string
            default: /inject-pod-cws
          remote_copy:
            node_type: section
            type: object
            properties:
              directory:
                node_type: setting
                type: string
                default: /tmp
              mount_volume:
                node_type: setting
                type: boolean
                default: false
          timeout:
            node_type: setting
            type: number
            default: 2
      kubernetes_admission_events:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
      probe:
        node_type: section
        type: object
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
          grace_period:
            node_type: setting
            type: number
            default: 60
          interval:
            node_type: setting
            type: number
            default: 60
  docker_labels_as_tags:
    node_type: setting
    title: Docker tag extraction
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract container label values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with `+`, it will only be added to high cardinality metrics (Docker check).

      Env var example: DD_DOCKER_LABELS_AS_TAGS='{"LABEL_NAME":"tag_key"}'
    example: |2-

        <LABEL_NAME>: <TAG_KEY>
        <HIGH_CARDINALITY_LABEL_NAME>: +<TAG_KEY>
    tags:
    - template_section:DockerTagging
  docker_env_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract environment variables values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with `+`, it will only be added to high cardinality metrics (Docker check).

      Env var example: DD_DOCKER_ENV_AS_TAGS='{"ENVVAR_NAME": "tag_key"}'
    example: |2-

        <ENVVAR_NAME>: <TAG_KEY>
    tags:
    - template_section:DockerTagging
  kubernetes_pod_labels_as_tags:
    node_type: setting
    title: Kubernetes tag extraction
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract pod labels values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with +, it will only be added to high cardinality metrics.

      Env var example: DD_KUBERNETES_POD_LABELS_AS_TAGS='{"LABEL_NAME":"tag_key"}'
    example: |2-

        <POD_LABEL>: <TAG_KEY>
        <HIGH_CARDINALITY_LABEL_NAME>: +<TAG_KEY>
    tags:
    - template_section:KubernetesTagging
  kubernetes_pod_annotations_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract annotations values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with +, it will only be added to high cardinality metrics.

      Env var example: DD_KUBERNETES_POD_ANNOTATIONS_AS_TAGS='{"ANNOTATION_NAME":"tag_key"}'
    example: |2-

        <ANNOTATION>: <TAG_KEY>
        <HIGH_CARDINALITY_ANNOTATION>: +<TAG_KEY>
    tags:
    - template_section:KubernetesTagging
  kubernetes_namespace_labels_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract namespace label values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with +, it will only be added to high cardinality metrics.

      Env var example: DD_KUBERNETES_NAMESPACE_LABELS_AS_TAGS='{"<NAMESPACE_LABEL>": "<TAG_KEY>"}'
    example: |2-

        <NAMESPACE_LABEL>: <TAG_KEY>
        <HIGH_CARDINALITY_NAMESPACE_LABEL_NAME>: +<TAG_KEY>
    tags:
    - template_section:KubernetesTagging
  container_env_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract environment variable values and set them as metric tags values associated to a <TAG_KEY>.
      Requires the container runtime socket to be reachable. (Supported container runtimes: Containerd, Docker)
    example: |2-

        <ENV>: <TAG_KEY>
    tags:
    - template_section:KubernetesTagging
  container_labels_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      The Agent can extract container label values and set them as metric tags values associated to a <TAG_KEY>.
      If you prefix your tag name with `+`, it will only be added to high cardinality metrics. (Supported container
      runtimes: Containerd, Docker).
    example: |2-

        <LABEL_NAME>: <TAG_KEY>
        <HIGH_CARDINALITY_LABEL_NAME>: +<TAG_KEY>
    tags:
    - template_section:KubernetesTagging
  ecs_agent_container_name:
    node_type: setting
    title: ECS integration Configuration
    type: string
    default: ecs-agent
    visibility: public
    description: |-
      The ECS Agent container should be autodetected when running with the
      default (ecs-agent) name. If not, change the container name here:
    example: '"ecs-agent"'
    tags:
    - template_section:ECS
  ecs_agent_url:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      The ECS Agent container should be autodetected when running with the
      default (ecs-agent) name. If not, change the container name the
      Agent should look for with ecs_agent_container_name, or force a fixed url here:
    example: http://localhost:51678
    tags:
    - template_section:ECS
  ecs_collect_resource_tags_ec2:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      The Agent can collect resource tags from the metadata API exposed by the
      ECS Agent for tasks scheduled with the EC2 launch type.
    example: 'false'
    tags:
    - template_section:ECS
  ecs_resource_tags_replace_colon:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: The Agent replaces colon `:` characters in the ECS resource tag keys
      by underscores `_`.
    example: 'false'
    tags:
    - template_section:ECS
  ecs_metadata_timeout:
    node_type: setting
    type: number
    default: 1000
    visibility: public
    description: Timeout in milliseconds on calls to the AWS ECS metadata endpoints.
    example: '1000'
    tags:
    - template_section:ECS
  ecs_task_collection_enabled:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      The Agent can collect detailed task information from the metadata API exposed by the ECS Agent,
      which is used for the orchestrator ECS check.
    example: 'true'
    tags:
    - template_section:ECS
  ecs_deployment_mode:
    node_type: setting
    type: string
    default: auto
    visibility: public
    description: |-
      Controls how the agent collects ECS task metadata:
      - auto: Use daemon mode on EC2, sidecar mode on Fargate (recommended)
      - daemon: Collect all tasks on the host (requires v1 metadata API access)
      - sidecar: Collect only the current task (works on both EC2 and Fargate)

      Use 'sidecar' when running the agent as a task sidecar on EC2 to ensure
      it only reports on its own task, while still correctly identifying the
      launch type as EC2.
    example: '"auto"'
    tags:
    - template_section:ECS
  cri_socket_path:
    node_type: setting
    title: CRI and Containerd integration Configuration
    type: string
    default: ''
    visibility: public
    description: |-
      This setting enabled both CRI and Containerd integration.

      To activate the CRI or Containerd check, indicate the path of the socket you're using
      and mount it in the container if needed.

      For containerd see: https://docs.datadoghq.com/integrations/containerd/
      For CRI see:: https://docs.datadoghq.com/integrations/cri/

      If left empty, the CRI and Containerd checks are disabled.
    example: '""'
    tags:
    - template_section:CoreAgent
  cri_connection_timeout:
    node_type: setting
    type: number
    default: 1
    visibility: public
    description: Configure the initial connection timeout in seconds.
    example: '1'
    tags:
    - template_section:CoreAgent
  cri_query_timeout:
    node_type: setting
    type: number
    default: 5
    visibility: public
    description: Configure the timeout in seconds for querying the CRI or Containerd
      API.
    example: '5'
    tags:
    - template_section:CoreAgent
  containerd_namespace:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Deprecated - use `containerd_namespaces` instead

      Activating the Containerd check also activates the CRI check, as it contains an additional subset of useful metrics.
      Defaults to [] which configures the agent to report metrics and events from all the containerd namespaces.
      To watch specific namespaces, list them here.
      https://github.com/containerd/cri/blob/release/1.2/pkg/constants/constants.go#L22-L23
    example: |2-

        - k8s.io
    tags:
    - template_section:CoreAgent
  containerd_namespaces:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Activating the Containerd check also activates the CRI check, as it contains an additional subset of useful metrics.
      Defaults to [] which configures the agent to report metrics and events from all the containerd namespaces.
      containerd_namespaces acts as an alias for containerd_namespace. When both containerd_namespaces and containerd_namespace
      are configured, the Agent merges the two lists.
    example: |2-

        - k8s.io
    tags:
    - template_section:CoreAgent
  containerd_exclude_namespaces:
    node_type: setting
    type: array
    default:
    - moby
    items:
      type: string
    visibility: public
    description: |-
      When containerd_namespaces is set to [], containerd_exclude_namespaces
      allows the exclusion of containers from specific namespaces. By default it
      excludes "moby", to prevent Docker containers from being detected as
      containerd containers.
    example: |2-

        - moby
    tags:
    - template_section:CoreAgent
  kubernetes_kubelet_host:
    node_type: setting
    title: Kubernetes kubelet connectivity Configuration
    type: string
    default: ''
    visibility: public
    description: |-
      The kubelet host should be autodetected when running inside a pod.
      If you run into connectivity issues, set the host here according to your cluster setup.
    example: <KUBLET_HOST>
    tags:
    - template_section:Kubelet
  kubernetes_http_kubelet_port:
    node_type: setting
    type: number
    default: 10255
    visibility: public
    description: |-
      The kubelet http port should be autodetected when running inside a pod.
      If you run into connectivity issues, set the http port here according to your cluster setup.
    example: '10255'
    tags:
    - template_section:Kubelet
  kubernetes_https_kubelet_port:
    node_type: setting
    type: number
    default: 10250
    visibility: public
    description: |-
      The kubelet https port should be autodetected when running inside a pod.
      If you run into connectivity issues, set the https port here according to your cluster setup.
    example: '10250'
    tags:
    - template_section:Kubelet
  kubelet_tls_verify:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: Set to false if you don't want the Agent to verify the kubelet's
      certificate when using HTTPS.
    example: 'true'
    tags:
    - template_section:Kubelet
  kubelet_client_ca:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: Kublet client CA file path.
    example: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    tags:
    - template_section:Kubelet
  kubelet_auth_token_path:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      If authentication is needed, the Agent uses the pod's service account's
      credentials. If you want to use a different account, or are running the Agent
      on the host, set a custom token file path here.
    example: <TOKEN_FILE_PATH>
    tags:
    - template_section:Kubelet
  kubelet_client_crt:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: Set a custom Client CRT file path.
    example: <CRT_FILE_PATH>
    tags:
    - template_section:Kubelet
  kubelet_client_key:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: Set a custom Client key file path.
    example: <CLIENT_KEY_FILE_PATH>
    tags:
    - template_section:Kubelet
  kubelet_cache_pods_duration:
    node_type: setting
    type: number
    default: 0
    visibility: public
    description: Polling frequency in seconds of the Agent to the kubelet "/pods"
      endpoint.
    example: '0'
    tags:
    - template_section:Kubelet
  kubernetes_pod_expiration_duration:
    node_type: setting
    type: number
    default: 900
    visibility: public
    description: |-
      Set the time in second after which the Agent ignores the pods that have exited.
      Set the duration to 0 to disable this filtering.
    example: '900'
    tags:
    - template_section:Kubelet
  kubernetes_kubeconfig_path:
    node_type: setting
    title: Kubernetes apiserver integration Configuration
    type: string
    default: ''
    visibility: public
    description: |-
      When running in a pod, the Agent automatically uses the pod's service account
      to authenticate with the API server.
      Provide the path to a custom KubeConfig file if you wish to install the Agent out of a pod
      or customize connection parameters.
      See https://kubernetes.io/docs/tasks/access-application-cluster/configure-access-multiple-clusters/
    example: '""'
    tags:
    - template_section:KubeApiServer
  kubernetes_apiserver_ca_path:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      When running in a pod, the Agent automatically uses the pod's service account CA.
      Use this option to keep using the InCluster config but overriding the default CA Path.
      This parameter has no effect if `kubernetes_kubeconfig_path` is set.
    example: '""'
    tags:
    - template_section:KubeApiServer
  kubernetes_apiserver_tls_verify:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      When running in a pod, the Agent automatically uses the pod's service account CA.
      Use this option to keep using the InCluster config but deactivating TLS verification (in case APIServer CA is not ServiceAccount CA)
      This parameter has no effect if `kubernetes_kubeconfig_path` is set.
    example: 'true'
    tags:
    - template_section:KubeApiServer
  kubernetes_apiserver_use_protobuf:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      By default, communication with the apiserver is in json format. Setting the following
      option to true allows communication in the binary protobuf format.
    example: 'false'
    tags:
    - template_section:KubeApiServer
  kubernetes_collect_metadata_tags:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      Set this to false to disable tag collection for the Agent.
      Note: In order to collect Kubernetes service names, the Agent needs certain rights.
      See https://github.com/DataDog/datadog-agent/blob/main/Dockerfiles/agent/README.md#kubernetes
    example: 'true'
    tags:
    - template_section:KubeApiServer
  kubernetes_use_endpoint_slices:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Enable this to map Kubernetes services to EndpointSlices instead of Endpoints. (Requires Cluster Agent 7.62.0+).
      EndpointSlices are GA since 1.21. Kubernetes Endpoint API is depreceated in 1.33.
    example: 'false'
    tags:
    - template_section:KubeApiServer
  auto_team_tag_collection:
    node_type: setting
    type: boolean
    default: true
    visibility: public
    description: |-
      When enabled, the orchestrator check automatically collects the 'team' tag from Kubernetes resources.
      If a resource has a label or annotation with key 'team', and no 'team' tag has been explicitly configured
      via kubernetes_resources_labels_as_tags or kubernetes_resources_annotations_as_tags, the agent will
      automatically add a 'team' tag with the value from the label (preferred) or annotation.
    example: 'true'
    tags:
    - template_section:KubeApiServer
  kubernetes_metadata_tag_update_freq:
    node_type: setting
    type: number
    default: 60
    visibility: public
    description: Set how often in secons the Agent refreshes the internal mapping
      of services to ContainerIDs.
    example: '60'
    tags:
    - template_section:KubeApiServer
  kubernetes_apiserver_client_timeout:
    node_type: setting
    type: number
    default: 10
    visibility: public
    description: Set the timeout for the Agent when connecting to the Kubernetes API
      server.
    example: '10'
    tags:
    - template_section:KubeApiServer
  collect_kubernetes_events:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Set `collect_kubernetes_events` to true to enable collection of kubernetes
      events to be sent to Datadog.
      Note: leader election must be enabled below to collect events.
            Only the leader Agent collects events.
      See https://github.com/DataDog/datadog-agent/blob/main/Dockerfiles/agent/README.md#event-collection
    example: 'false'
    tags:
    - template_section:KubeApiServer
  kubernetes_event_collection_timeout:
    node_type: setting
    type: number
    default: 100
    visibility: public
    description: Set the timeout between two successful event collections in milliseconds.
    example: '100'
    tags:
    - template_section:KubeApiServer
  leader_election:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Set the parameter to true to enable leader election on this node.
      See https://github.com/DataDog/datadog-agent/blob/main/Dockerfiles/agent/README.md#leader-election
    example: 'false'
    tags:
    - template_section:KubeApiServer
  leader_lease_duration:
    node_type: setting
    type: string
    default: '60'
    visibility: public
    description: Set the leader election lease in seconds.
    example: '"60"'
    tags:
    - template_section:KubeApiServer
  kubernetes_node_labels_as_tags:
    node_type: setting
    type: object
    default: {}
    additionalProperties:
      type: string
    visibility: public
    description: |-
      Configure node labels that should be collected and their name as host tags.
      Note: Some of these labels are redundant with metadata collected by cloud provider crawlers (AWS, GCE, Azure)

      Env var example: DD_KUBERNETES_NODE_LABELS_AS_TAGS='{"NODE_LABEL": "TAG_KEY"}'
    example: |2-

        kubernetes.io/hostname: nodename
        beta.kubernetes.io/os: os
    tags:
    - template_section:KubeApiServer
  kubernetes_node_annotations_as_tags:
    node_type: setting
    type: object
    default:
      cluster.k8s.io/machine: kube_machine
    additionalProperties:
      type: string
    visibility: public
    description: |-
      Configure node annotationss that should be collected and their name as host tags.

      Env var example: DD_KUBERNETES_NODE_ANNOTATIONS_AS_TAGS='{"NODE_ANNOTATION": "TAG_KEY"}'
    example: |2-

        cluster.k8s.io/machine: machine
    tags:
    - template_section:KubeApiServer
  kubernetes_node_annotations_as_host_aliases:
    node_type: setting
    type: array
    default:
    - cluster.k8s.io/machine
    items:
      type: string
    visibility: public
    description: |-
      Configure node annotations that should be collected and used as host aliases.

      Env var example: DD_KUBERNETES_NODE_ANNOTATIONS_AS_HOST_ALIASES='["cluster.k8s.io/machine"]'
    example: |2-

        - cluster.k8s.io/machine
    tags:
    - template_section:KubeApiServer
  cluster_name:
    node_type: setting
    type: string
    default: ''
    visibility: public
    description: |-
      Set a custom kubernetes cluster identifier to avoid host alias collisions.
      The cluster name can be up to 40 characters with the following restrictions:
      * Lowercase letters, numbers, and hyphens only.
      * Must start with a letter.
      * Must end with a number or a letter.

      These are the same rules as the ones enforced by GKE:
      https://cloud.google.com/kubernetes-engine/docs/reference/rest/v1beta1/projects.locations.clusters#Cluster.FIELDS.name
    example: <CLUSTER_IDENTIFIER>
    tags:
    - template_section:KubeApiServer
  disable_cluster_name_tag_key:
    node_type: setting
    type: boolean
    default: false
    visibility: public
    description: |-
      Disable using the 'cluster_name' tag key to submit orchestrator cluster name tag.
      The Agent will continue sending the cluster name tag with 'kube|ecs_cluster_name' key
      regardless of the value of this parameter.
    example: 'false'
    tags:
    - template_section:KubeApiServer
  kubernetes_ad_tags_disabled:
    node_type: setting
    type: array
    default: []
    items:
      type: string
    visibility: public
    description: |-
      Can only be set to a single valid value: [ "kube_service" ]
      in order to not attach the kube_service tag on ready pods
    example: |2-

        - kube_service
    tags:
    - template_section:KubeApiServer
  prometheus_scrape:
    node_type: section
    type: object
    visibility: public
    description: This section configures the Autodiscovery based on the Prometheus
      annotations
    tags:
    - template_section:CoreAgent
    properties:
      enabled:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Enables the prometheus config provider
        example: 'false'
        tags:
        - template_section:CoreAgent
      service_endpoints:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Enables Service Endpoints checks in the prometheus config provider
        example: 'false'
        tags:
        - template_section:CoreAgent
      checks:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: Defines any extra prometheus/openmetrics check configurations
          to be handled by the prometheus config provider
        example: '{}'
        tags:
        - template_section:CoreAgent
      version:
        node_type: setting
        type: number
        default: 1
        visibility: public
        description: Version of the openmetrics check to be scheduled by the Prometheus
          auto-discovery
        example: '1'
        tags:
        - template_section:CoreAgent
  cloud_foundry_bbs:
    node_type: section
    title: Cloud Foundry BBS Configuration for Autodiscovery
    type: object
    visibility: public
    description: |-
      This section configures how the Cluster Agent accesses BBS API to gather information
      necessary for autodiscovery on BBS-based Cloud Foundry deployments.
    tags:
    - template_section:CloudFoundry
    properties:
      url:
        node_type: setting
        type: string
        default: https://bbs.service.cf.internal:8889
        visibility: public
        description: URL of the BBS API.
        example: '"https://bbs.service.cf.internal:8889"'
        tags:
        - template_section:CloudFoundry
      poll_interval:
        node_type: setting
        type: number
        default: 15
        visibility: public
        description: |-
          Refresh rate of BBS API, in seconds. Values lower than 10 might influence
          performance of other operations in the cluster.
        example: '15'
        tags:
        - template_section:CloudFoundry
      ca_file:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: PEM-encoded CA certificate used when connecting to the BBS API.
        example: '""'
        tags:
        - template_section:CloudFoundry
      cert_file:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: PEM-encoded client certificate used when connecting to the BBS
          API.
        example: '""'
        tags:
        - template_section:CloudFoundry
      key_file:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: PEM-encoded client key used when connecting to the BBS API.
        example: '""'
        tags:
        - template_section:CloudFoundry
      env_include:
        node_type: setting
        type: array
        default: []
        items:
          type: string
        visibility: public
        description: List of regular expressions to allow a set of environment variables
          to be included as container tags
        example: |-
          []
          # @param env_exclude - list of strings - optional - default: []
          # @env DD_CLOUD_FOUNDRY_BBS_ENV_EXCLUDE - list of strings - optional
          # List of regular expressions to forbid a set of environment variables to be included as container tags

          env_exclude: []
        tags:
        - template_section:CloudFoundry
      env_exclude:
        node_type: setting
        type: array
        default: []
        items:
          type: string
  cloud_foundry_cc:
    node_type: section
    title: Cloud Foundry Cloud Controller Configuration for Autodiscovery
    type: object
    visibility: public
    description: |-
      This section configures how the Cluster Agent accesses CC API to gather information
      necessary for autodiscovery on Cloud Foundry deployments.
    tags:
    - template_section:CloudFoundry
    properties:
      url:
        node_type: setting
        type: string
        default: https://cloud-controller-ng.service.cf.internal:9024
        visibility: public
        description: URL of the CC API.
        example: '"https://cloud-controller-ng.service.cf.internal:9024"'
        tags:
        - template_section:CloudFoundry
      client_id:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: Client ID for oauth with UAA to get a token to access the CC
          API.
        example: <UAA_CLIENT_ID>
        tags:
        - template_section:CloudFoundry
      client_secret:
        node_type: setting
        type: string
        default: ''
        visibility: public
        description: Client secrect for oauth with UAA to get a token to access the
          CC API.
        example: <UAA_CLIENT_SECRET>
        tags:
        - template_section:CloudFoundry
      skip_ssl_validation:
        node_type: setting
        type: boolean
        default: false
        visibility: public
        description: Whether or not to skip SSL validation when interacting with CC
          API.
        example: 'false'
        tags:
        - template_section:CloudFoundry
      poll_interval:
        node_type: setting
        type: number
        default: 60
        visibility: public
        description: |-
          Refresh rate of CC API, in seconds. Values lower than 10 might influence
          performance of other operations in the cluster.
        example: '60'
        tags:
        - template_section:CloudFoundry
      apps_batch_size:
        node_type: setting
        type: number
        default: 5000
        visibility: public
        description: Number of apps per page to collect when calling the list apps
          endpoint of the CC API. Max 5000.
        example: '5000'
        tags:
        - template_section:CloudFoundry
  network_devices:
    node_type: section
    title: Network Devices Configuration
    type: object
    visibility: public
    description: Configuration related to Network Devices Monitoring
    tags:
    - template_section:CoreAgent
    properties:
      namespace:
        node_type: setting
        type: string
        default: default
        visibility: public
        description: |-
          Namespace can be used to disambiguate devices with the same IP.
          Changing namespace will cause devices being recreated in NDM app.
          It should contain less than 100 characters and should not contain any of
          `<`, `>`, `\n`, `\t`, `\r` characters.
          This field is used by NDM features (SNMP check, SNMP Traps listener, etc).
        example: '"default"'
        tags:
        - template_section:CoreAgent
      default_scan:
        node_type: section
        type: object
        visibility: public
        description: |-
          Configuration for automatic SNMP device scanning.
          When enabled, discovered SNMP devices are automatically scanned.
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: |-
              Enable automatic scanning of discovered SNMP devices.
              When enabled, devices discovered via autodiscovery or configured
              directly will be scanned to collect OID data.
            example: 'true'
            tags:
            - template_section:CoreAgent
          excluded_ips:
            node_type: setting
            type: array
            default: []
            items:
              type: string
            visibility: public
            description: |-
              List of IP addresses to exclude from automatic scanning.
              Devices with these IP addresses will be skipped during default scan.
            example: '[]'
            tags:
            - template_section:CoreAgent
      autodiscovery:
        node_type: section
        type: object
        visibility: public
        description: |-
          Creates and schedules a listener to automatically discover your SNMP devices.
          Discovered devices can then be monitored with the SNMP integration by using
          the auto_conf.yaml file provided by default.
        tags:
        - template_section:CoreAgent
        properties:
          workers:
            node_type: setting
            type: number
            default: 2
            visibility: public
            description: |-
              The number of concurrent tasks used to discover SNMP devices. Increasing this value
              discovers devices faster but at the cost of increased resource consumption.
            example: '2'
            tags:
            - template_section:CoreAgent
          discovery_interval:
            node_type: setting
            type: number
            default: 3600
            visibility: public
            description: |-
              How often to discover new SNMP devices, in seconds. Decreasing this value
              discovers devices faster (within the limit of the time taken to scan subnets)
              but at the cost of increased resource consumption.
            example: '3600'
            tags:
            - template_section:CoreAgent
          discovery_allowed_failures:
            node_type: setting
            type: number
            default: 3
            visibility: public
            description: |-
              The number of failed requests to a given SNMP device before removing it from the list of monitored
              devices.
              If a device shuts down, the Agent stops monitoring it after `discovery_interval * discovery_allowed_failures` seconds.
            example: '3'
            tags:
            - template_section:CoreAgent
          loader:
            node_type: setting
            type: string
            default: core
            visibility: public
            description: |-
              Check loader to use. Available loaders:
              - core: (recommended) Uses new corecheck SNMP integration
              - python: Uses legacy python SNMP integration
            example: '"core"'
            tags:
            - template_section:CoreAgent
          min_collection_interval:
            node_type: setting
            type: number
            default: 15
            visibility: public
            description: |-
              This changes the collection interval for the check instances created
              from discovered SNMP devices.
              For more information, see:
              https://docs.datadoghq.com/developers/write_agent_check/#collection-interval
            example: '15'
            tags:
            - template_section:CoreAgent
          use_device_id_as_hostname:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              Use `device:<DEVICE_ID>` (device_id is composed of `<NAMESPACE>:<DEVICE_IP_ADDRESS>`) as `hostname`
              for metrics and service checks (meaning that metrics and services checks will have
              `host:device:<DEVICE_ID>` as tag).
              This option is needed for custom tags.
            example: 'true'
            tags:
            - template_section:CoreAgent
          collect_topology:
            node_type: setting
            type: boolean
            default: true
            visibility: public
            description: Enable the collection of topology (LLDP/CDP) data
            example: 'true'
            tags:
            - template_section:CoreAgent
          collect_vpn:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Enable collection of VPN tunnels and route table data
            example: 'true'
            tags:
            - template_section:CoreAgent
          ping:
            node_type: section
            type: object
            visibility: public
            description: |-
              Configure ICMP pings for all hosts in SNMP autodiscovery
              Devices will be pinged with these settings each time the SNMP
              check is run.

              By default, Datadog tries to use an unprivileged UDP socket to send ICMP
              pings, but some Linux systems require using a raw socket.

              If `linux.use_raw_socket` is set, you must enable the `ping` module
              of system-probe for elevated privileges. See
              system-probe.yaml.example for details.
            tags:
            - template_section:CoreAgent
            properties:
              enabled:
                node_type: setting
                type: boolean
                default: false
                visibility: public
                description: Set to true to enable ICMP ping checks for autodiscovered
                  SNMP devices.
                example: 'false'
                tags:
                - template_section:CoreAgent
              timeout:
                node_type: setting
                type: number
                default: 3000
                visibility: public
                description: Timeout in milliseconds
                example: '3000'
                tags:
                - template_section:CoreAgent
              count:
                node_type: setting
                type: number
                default: 2
                visibility: public
                description: Number of ping packets to send per check run
                example: '2'
                tags:
                - template_section:CoreAgent
              interval:
                node_type: setting
                type: number
                default: 10
                visibility: public
                description: Time between sending pings (up to `count` packets) in
                  milliseconds
                example: '10'
                tags:
                - template_section:CoreAgent
              linux:
                node_type: section
                type: object
                visibility: public
                description: Linux-specific configuration
                tags:
                - template_section:CoreAgent
                properties:
                  use_raw_socket:
                    node_type: setting
                    type: boolean
                    default: false
                    visibility: public
                    description: |-
                      Send pings in a privileged fashion using a raw socket.
                      This may be required if your system doesn't support  sending pings in an unprivileged fashion (using a UDP
                      socket).
                      If `use_raw_socket` is set to true, you MUST also enable system-probe which has elevated privileges. To
                      enable it, see system-probe.yaml.example.
                    example: 'true'
                    tags:
                    - template_section:CoreAgent
          use_deduplication:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: |-
              Deduplicate IP addresses corresponding to the same device.
              The deduplication logic is based on the sysName, sysDesc, sysObjectID and sysUptime
            example: 'false'
            tags:
            - template_section:CoreAgent
          oid_batch_size:
            node_type: setting
            type: number
            default: 5
            visibility: public
            description: |-
              The number of OIDs handled by each batch for all hosts in SNMP autodiscovery.
              Applies to all configurations if not overridden.
              By default, devices dynamically tune their batch size to optimize performance (agent version v7.73+).
            example: '5'
            tags:
            - template_section:CoreAgent
          timeout:
            node_type: setting
            type: number
            default: 5
            visibility: public
            description: The number of seconds before timing out. Applies to all configurations
              if not overridden.
            example: '5'
            tags:
            - template_section:CoreAgent
          retries:
            node_type: setting
            type: number
            default: 3
            visibility: public
            description: The number of retries before failure. Applies to all configurations
              if not overridden.
            example: '3'
            tags:
            - template_section:CoreAgent
          configs:
            node_type: setting
            type: array
            default: []
            items:
              type: object
            visibility: public
            description: |-
              The actual list of configurations used to discover SNMP devices in various subnets.
              Example:
              configs:
               - network_address: 10.0.0.0/24
                 authentications:
                   - snmp_version: 1
                     community_string: public
               - network_address: 10.0.1.0/28
                 authentications:
                   - community_string: public
                 ignored_ip_addresses:
                   - 10.0.1.0
                   - 10.0.1.1
            example: |2-

                # @param network_address - string - required
                # The subnet in CIDR format to scan for SNMP devices.
                # All unignored IP addresses in the CIDR range are scanned.
                # For optimal discovery time, be sure to use the smallest network mask
                # possible as is appropriate for your network topology.
                # Ex: 10.0.1.0/24

                - network_address: <NETWORK>

                  # @param ignored_ip_addresses - list of strings - optional - default: []
                  # A list of IP addresses to ignore when scanning the network.

                  ignored_ip_addresses:
                    - <IP_ADDRESS_1>
                    - <IP_ADDRESS_2>

                  # @param port - integer - optional - default: 161
                  # The UDP port to use when connecting to SNMP devices.

                  port: 161

                  # @param timeout - integer - optional - default: 5
                  # The number of seconds before timing out. Applies to all authentications if not overridden.

                  # timeout: 5

                  # @param retries - integer - optional - default: 3
                  # The number of retries before failure. Applies to all authentications if not overridden.

                  # retries: 3

                  # @param authentications - list of custom objects - optional
                  # A list of authentication configurations to try when connecting to your SNMP devices.
                  # The Agent tries each configuration until it successfully connects.
                  # Example:
                  # authentications:
                  #   - community_string: public-1
                  #   - user: myUser
                  #     authKey: myAuthKey
                  #   - community_string: public-2

                  authentications:
                    # @param snmp_version - integer - optional - default: <BEST_GUESS>
                    # Set the version of the SNMP protocol. Available options are: `1`, `2` or `3`.
                    # If unset, the Agent tries to guess the correct version based on other configuration
                    # parameters, for example: if `user` is set, the Agent uses SNMP v3.

                    - snmp_version: <VERSION>

                      # @param timeout - integer - optional - default: 5
                      # The number of seconds before timing out.

                      # timeout: 5

                      # @param retries - integer - optional - default: 3
                      # The number of retries before failure.

                      # retries: 3

                      # @param community_string - string - optional
                      # Required for SNMP v1 & v2.
                      # Enclose the community string with single quote like below (to avoid special characters being interpreted).
                      # Ex: 'public'

                      community_string: '<COMMUNITY>'

                      # @param user - string - optional
                      # The username to connect to your SNMP devices.
                      # SNMPv3 only.

                      user: <USERNAME>

                      # @param authKey - string - optional
                      # The passphrase to use with your Authentication type.
                      # SNMPv3 only.

                      authKey: <AUTHENTICATION_KEY>

                      # @param authProtocol - string - optional
                      # The authentication protocol to use when connecting to your SNMP devices.
                      # Available options are: MD5, SHA, SHA224, SHA256, SHA384, SHA512
                      # Defaults to MD5 when `authentication_key` is specified.
                      # SNMPv3 only.

                      authProtocol: <AUTHENTICATION_PROTOCOL>

                      # @param privKey - string - optional
                      # The passphrase to use with your privacy protocol.
                      # SNMPv3 only.

                      privKey: <PRIVACY_KEY>

                      # @param privProtocol - string - optional
                      # The privacy protocol to use when connecting to your SNMP devices.
                      # Available options are: DES, AES (128 bits), AES192, AES192C, AES256, AES256C
                      # Defaults to DES when `privacy_key` is specified.
                      # SNMPv3 only.

                      privProtocol: <PRIVACY_PROTOCOL>

                      # @param context_name - string - optional
                      # The name of your context (optional SNMP v3-only parameter).

                      context_name: <CONTEXT_NAME>

                  # @param tags - list of strings - optional - default: []
                  # A list of tags to attach to every metric and service check of all devices discovered in the subnet.
                  #
                  # Learn more about tagging at https://docs.datadoghq.com/tagging

                  tags:
                    - <KEY_1>:<VALUE_1>
                    - <KEY_2>:<VALUE_2>

                  # @param ad_identifier - string - optional - default: snmp
                  # A unique identifier to attach to devices from that subnetwork.
                  # When configuring the SNMP integration in snmp.d/auto_conf.yaml,
                  # specify the corresponding ad_identifier at the top of the file.

                  ad_identifier: snmp

                  # @param loader - string - optional - default: core
                  # Check loader to use. Available loaders:
                  # - core: (recommended) Uses new corecheck SNMP integration
                  # - python: Uses legacy python SNMP integration

                  loader: core

                  # @param min_collection_interval - number - optional - default: 15
                  # This changes the collection interval for the check instances created from
                  # discovered SNMP devices. It applies to each specific config from `snmp_listener.configs`
                  # and has precedence over `snmp_listener.min_collection_interval`.
                  # For more information, see:
                  # https://docs.datadoghq.com/developers/write_agent_check/#collection-interval

                  min_collection_interval: 15

                  # @param use_device_id_as_hostname - boolean - optional - default: false
                  # Use `device:<DEVICE_ID>` (device_id is composed of `<NAMESPACE>:<DEVICE_IP_ADDRESS>`) as `hostname`
                  # for metrics and service checks (meaning that metrics and services checks will have
                  # `host:device:<DEVICE_ID>` as tag).
                  # This option is needed for custom tags.

                  use_device_id_as_hostname: true

                  # @param oid_batch_size - integer - optional - default: 5
                  # The number of OIDs handled by each batch.

                  oid_batch_size: 5

                  # @param interface_configs - map - optional
                  # This option is used to override interface inbound/outbound speed, add interface tags, or disable monitoring for specific interfaces
                  # Example:
                  # interface_configs:
                  #   "10.0.0.1":              # target device IP address
                  #     - match_field: "name"  # (required) the field to match, can be `name` (interface name) or `index` (ifIndex)
                  #       match_value: "eth0"  # (required) the value to match
                  #       in_speed: 50         # (optional) inbound speed value in bits per sec, no value or 0 means no override
                  #       out_speed: 25        # (optional) outbound speed value in bits per sec, no value or 0 means no override
                  #       tags:                # (optional) interface level tags
                  #         - "testTagKey:testTagValue"
                  #         - "tagKey2:tagValue2"
                  #       disabled: true         # (optional) disables monitoring for matched interfaces, default value is false

                  interface_config:
                    "10.0.0.1":
                      - match_field: name
                        match_value: eth0
                        in_speed: 50
                        out_speed: 25
                      - match_field: index
                        match_value: '10'
                        in_speed: 50
                        out_speed: 25
                    "10.0.0.2":
                      - match_field: name
                        match_value: eth3
                        in_speed: 50
                        out_speed: 25
                    "10.0.0.3":
                      - match_field: name
                        match_value: eth4
                        tags:
                          - "monitored:true"
                          - "customKey:customValue"
                    "10.0.0.4":
                      - match_field: index
                        match_value: '2'
                        disabled: true
            tags:
            - template_section:CoreAgent
          allowed_failures:
            node_type: setting
            type: number
            default: 3
          collect_device_metadata:
            node_type: setting
            type: boolean
            default: true
          namespace:
            node_type: setting
            type: string
            default: default
      snmp_traps:
        node_type: section
        type: object
        visibility: public
        description: |-
          This section configures SNMP traps collection.
          Traps are forwarded as logs and can be found in the logs explorer with a source:snmp-traps query
        tags:
        - template_section:CoreAgent
        properties:
          enabled:
            node_type: setting
            type: boolean
            default: false
            visibility: public
            description: Set to true to enable collection of traps.
            example: 'false'
            tags:
            - template_section:CoreAgent
          port:
            node_type: setting
            type: number
            default: 9162
            visibility: public
            description: |-
              The UDP port to use when listening for incoming trap packets.
              Because the Datadog Agent does not run as root, the port cannot be below 1024.
              However, if you run `sudo setcap 'cap_net_bind_service=+ep' /opt/datadog-agent/bin/agent/agent`,
              the Datadog Agent can listen on ports below 1024.
            example: '9162'
            tags:
            - template_section:CoreAgent
          community_strings:
            node_type: setting
            type: array
            default: []
            items:
              type: string
            visibility: public
            description: |-
              A list of known SNMP community strings that devices can use to send traps to the Agent.
              Traps with an unknown community string are ignored.
              Enclose the community string with single quote like below (to avoid special characters being interpreted).
              Must be non-empty.
            example: |2-

                - '<COMMUNITY_1>'
                - '<COMMUNITY_2>'
            tags:
            - template_section:CoreAgent
          users:
            node_type: setting
            type: array
            default: []
            items:
              additionalProperties:
                type: string
              type: object
            visibility: public
            description: |-
              List of SNMPv3 users that can be used to listen for traps.
              Each user can contain:
               * user         - string - The username used by devices when sending Traps to the Agent.
               * authKey      - string - (Optional) The passphrase to use with the given user and authProtocol
               * authProtocol - string - (Optional) The authentication protocol to use when listening for traps from this user.
                                         Available options are: MD5, SHA, SHA224, SHA256, SHA384, SHA512.
                                         Defaults to MD5 when authKey is set.
               * privKey      - string - (Optional) The passphrase to use with the given user privacy protocol.
               * privProtocol - string - (Optional) The privacy protocol to use when listening for traps from this user.
                                         Available options are: DES, AES (128 bits), AES192, AES192C, AES256, AES256C.
                                         Defaults to DES when privKey is set.
            example: |2-

                - user: <USERNAME>
                  authKey: <AUTHENTICATION_KEY>
                  authProtocol: <AUTHENTICATION_PROTOCOL>
                  privKey: <PRIVACY_KEY>
                  privProtocol: <PRIVACY_PROTOCOL>
            tags:
            - template_section:CoreAgent
          bind_host:
            node_type: setting
            type: string
            default: 0.0.0.0
            visibility: public
            description: |-
              The hostname to listen on for incoming trap packets.
              Binds to 0.0.0.0 by default (accepting all packets).
            example: '"0.0.0.0"'
            tags:
            - template_section:CoreAgent
          stop_timeout:
            node_type: setting
            type: number
            default: 5
            visibility: public
            description: |-
              stop_timeout - float - optional - default: 5.0
              The maximum number of seconds to wait for the trap server to stop when the Agent shuts down.
            example: '5.0'
            tags:
            - template_section:CoreAgent
          forwarder:
            node_type: section
            type: object
            properties:
              additional_endpoints:
                node_type: setting
                tags:
                - TODO:fix-no-default
                - TODO:fix-missing-type
              batch_max_concurrent_send:
                node_type: setting
                type: number
                default: 0
              batch_max_content_size:
                node_type: setting
                type: number
                default: 5000000
              batch_max_size:
                node_type: setting
                type: number
                default: 1000
              batch_wait:
                node_type: setting
                type: number
                default: 5
                tags:
                - golang_type:float64
              compression_kind:
                node_type: setting
                type: string
                default: zstd
              compression_level:
                node_type: setting
                type: number
                default: 6
              connection_reset_interval:
                node_type: setting
                type: number
                default: 0
              dd_url:
                node_type: setting
                tags:
                - TODO:fix-no-default
                - TODO:fix-missing-type
              dev_mode_no_ssl:
                node_type: setting
                type: boolean
                default: false
                tags:
                - no-env
              input_chan_size:
                node_type: setting
                type: number
                default: 100
              logs_dd_url:
                node_type: setting
                tags:
                - TODO:fix-no-default
                - TODO:fix-missing-type
              logs_no_ssl:
                node_type: setting
                type: boolean
                default: false
              sender_backoff_base:
                node_type: setting
                type: number
                default: 1
                tags:
                - golang_type:float64
              sender_backoff_factor:
                node_type: setting
                type: number
                default: 2
                tags:
                - golang_type:float64
              sender_backoff_max:
                node_type: setting
                type: number
                default: 120
                tags:
                - golang_type:float64
