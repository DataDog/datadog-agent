[package]
name = "dd-preprocessor-tokenizer"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "dd_preprocessor_tokenizer"
crate-type = ["rlib", "staticlib"]

[dependencies]
aho-corasick = "1"

[dev-dependencies]
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "tokenizer_bench"
harness = false

# Override workspace opt-level=z (size-optimized) for benchmarks.
# The scan loop and AC DFA need opt-level=3 for fair comparison.
[profile.bench]
opt-level = 3
lto = false

[profile.release]
opt-level = 3
lto = false
