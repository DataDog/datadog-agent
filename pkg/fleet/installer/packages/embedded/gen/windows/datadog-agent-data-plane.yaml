description: Datadog Agent Data Plane
command: '__ADP_INSTALL_ROOT__/bin/agent/agent-data-plane.exe'
args:
  - --config
  - '__ADP_ETC_ROOT__/datadog.yaml'
  - run
  - --pidfile
  - '__ADP_ETC_ROOT__/run/agent-data-plane.pid'
auto_start: true
condition_path_exists: '__ADP_INSTALL_ROOT__/bin/agent/agent-data-plane.exe'
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
stdout: inherit
stderr: inherit
