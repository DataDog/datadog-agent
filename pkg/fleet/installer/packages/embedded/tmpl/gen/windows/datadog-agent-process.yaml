description: Datadog Process Agent
command: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
args:
  - --cfgpath
  - '__PROCESS_ETC_ROOT__/datadog.yaml'
  - --sysprobe-config
  - '__PROCESS_ETC_ROOT__/system-probe.yaml'
  - --pid
  - '__PROCESS_INSTALL_ROOT__/run/process-agent.pid'
auto_start: true
condition_path_exists: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
env:
  DD_FLEET_POLICIES_DIR: __PROCESS_FLEET_POLICIES_DIR__
stdout: inherit
stderr: inherit
