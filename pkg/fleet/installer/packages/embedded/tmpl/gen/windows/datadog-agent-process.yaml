description: Datadog Process Agent
command: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
args:
  - --cfgpath
  - '__PROCESS_ETC_ROOT__/datadog.yaml'
auto_start: true
condition_path_exists: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
stdout: inherit
stderr: inherit
