description: Datadog Process Agent
command: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
args:
  - --cfgpath
  - '__PROCESS_ETC_ROOT__/datadog.yaml'
auto_start: true
condition_path_exists: '__PROCESS_INSTALL_ROOT__/bin/agent/process-agent.exe'
condition_config_any:
  - path: '__PROCESS_ETC_ROOT__/datadog.yaml'
    keys:
      - process_config.enabled
      - process_config.process_collection.enabled
      - process_config.container_collection.enabled
      - process_config.process_discovery.enabled
  - path: '__PROCESS_ETC_ROOT__/system-probe.yaml'
    keys:
      - network_config.enabled
      - system_probe_config.enabled
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
stdout: inherit
stderr: inherit
