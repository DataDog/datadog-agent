description: Datadog Distribution of OpenTelemetry Collector
command: /opt/datadog-agent/ext/ddot/embedded/bin/otel-agent
args:
  - run
  - --config
  - ${DD_CONF_DIR}/otel-config.yaml
  - --core-config
  - ${DD_CONF_DIR}/datadog.yaml
  - --pidfile
  - /opt/datadog-agent/run/otel-agent.pid
auto_start: true
condition_path_exists: /opt/datadog-agent/ext/ddot/embedded/bin/otel-agent
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
environment_file: -${DD_CONF_DIR}/environment
env:
  DD_FLEET_POLICIES_DIR: ${DD_CONF_DIR}/managed/datadog-agent/stable
  DD_OTELCOLLECTOR_INSTALLATION_METHOD: bare-metal
stdout: inherit
stderr: inherit
