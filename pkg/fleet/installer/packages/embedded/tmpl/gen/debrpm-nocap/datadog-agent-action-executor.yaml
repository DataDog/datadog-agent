description: Datadog Private Action Runner - On-Demand Executor
command: /opt/datadog-agent/embedded/bin/privateactionrunner
args:
  - run-executor
  - --cfgpath
  - ${DD_CONF_DIR}/datadog.yaml
auto_start: false
condition_path_exists: /opt/datadog-agent/embedded/bin/privateactionrunner
restart: never
stdout: inherit
stderr: inherit
