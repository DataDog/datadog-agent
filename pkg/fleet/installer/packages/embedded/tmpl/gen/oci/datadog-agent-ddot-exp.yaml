description: Datadog Distribution of OpenTelemetry Collector
command: /opt/datadog-packages/datadog-agent/experiment/ext/ddot/embedded/bin/otel-agent
args:
  - run
  - --config
  - /etc/datadog-agent-exp/otel-config.yaml
  - --core-config
  - /etc/datadog-agent-exp/datadog.yaml
  - --pidfile
  - /opt/datadog-packages/datadog-agent/experiment/run/otel-agent.pid
auto_start: true
condition_path_exists: /opt/datadog-packages/datadog-agent/experiment/ext/ddot/embedded/bin/otel-agent
restart: on-failure
restart_sec: 2
start_limit_interval_sec: 10
start_limit_burst: 5
environment_file: -/etc/datadog-agent-exp/environment
env:
  DD_FLEET_POLICIES_DIR: /etc/datadog-agent-exp/managed/datadog-agent/stable
  DD_INVENTORIES_FIRST_RUN_DELAY: "5"
stdout: inherit
stderr: inherit
