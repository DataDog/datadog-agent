syntax = "proto3";

package datadog.api.v1;

import "datadog/model/v1/model.proto";
import "datadog/remoteagent/remoteagent.proto";
import "datadog/remoteconfig/remoteconfig.proto";
import "datadog/workloadmeta/workloadmeta.proto";
import "datadog/workloadfilter/workloadfilter.proto";
import "datadog/autodiscovery/autodiscovery.proto";
import "datadog/kubemetadata/kubemetadata.proto";
import "datadog/healthplatform/healthplatform.proto";
import "google/protobuf/empty.proto";

option go_package = "pkg/proto/pbgo/core"; // golang


// The greeting service definition.
service Agent {
    // get the hostname
    rpc GetHostname (datadog.model.v1.HostnameRequest) returns (datadog.model.v1.HostnameReply);
}

service AgentSecure {
    // subscribes to added, removed, or changed entities in the Tagger
    // and streams them to clients as events.
    rpc TaggerStreamEntities(datadog.model.v1.StreamTagsRequest) returns (stream datadog.model.v1.StreamTagsResponse);;

    // Generates a container ID from Origin Info.
    rpc TaggerGenerateContainerIDFromOriginInfo(datadog.model.v1.GenerateContainerIDFromOriginInfoRequest) returns (datadog.model.v1.GenerateContainerIDFromOriginInfoResponse);;

    // fetches an entity from the Tagger with the desired cardinality tags.
    rpc TaggerFetchEntity(datadog.model.v1.FetchEntityRequest) returns (datadog.model.v1.FetchEntityResponse);;

    // Trigger a dogstatsd capture. Only one capture can be triggered at a time.
    rpc DogstatsdCaptureTrigger(datadog.model.v1.CaptureTriggerRequest) returns (datadog.model.v1.CaptureTriggerResponse);;

    // Set the tagger state for dogstatsd.
    rpc DogstatsdSetTaggerState(datadog.model.v1.TaggerState) returns (datadog.model.v1.TaggerStateResponse);

    rpc ClientGetConfigs(datadog.config.ClientGetConfigsRequest) returns (datadog.config.ClientGetConfigsResponse);

    rpc GetConfigState(google.protobuf.Empty) returns (datadog.config.GetStateConfigResponse);

    rpc ClientGetConfigsHA(datadog.config.ClientGetConfigsRequest) returns (datadog.config.ClientGetConfigsResponse);

    rpc GetConfigStateHA(google.protobuf.Empty) returns (datadog.config.GetStateConfigResponse);

    rpc CreateConfigSubscription(stream datadog.config.ConfigSubscriptionRequest) returns (stream datadog.config.ConfigSubscriptionResponse);

    rpc ResetConfigState(google.protobuf.Empty) returns (datadog.config.ResetStateConfigResponse);

    // Subscribes to added, removed, or changed entities in the Workloadmeta and
    // streams them to clients as events.
    rpc WorkloadmetaStreamEntities(datadog.workloadmeta.WorkloadmetaStreamRequest) returns (stream datadog.workloadmeta.WorkloadmetaStreamResponse);

    // Registers a remote agent.
    rpc RegisterRemoteAgent(datadog.remoteagent.v1.RegisterRemoteAgentRequest) returns (datadog.remoteagent.v1.RegisterRemoteAgentResponse);

    // Refresh a remote agent.
    rpc RefreshRemoteAgent(datadog.remoteagent.v1.RefreshRemoteAgentRequest) returns (datadog.remoteagent.v1.RefreshRemoteAgentResponse);

    // Subscribes to autodiscovery config updates
    rpc AutodiscoveryStreamConfig(google.protobuf.Empty) returns (stream datadog.autodiscovery.AutodiscoveryStreamResponse);

    // Get the host tags
    rpc GetHostTags(datadog.model.v1.HostTagRequest) returns (datadog.model.v1.HostTagReply);

    // Streams config events to the remote agent.
    rpc StreamConfigEvents(datadog.model.v1.ConfigStreamRequest) returns (stream datadog.model.v1.ConfigEvent);

    // Evaluates a workloadfilter rule on behalf of remote agents.
    rpc WorkloadFilterEvaluate(datadog.workloadfilter.WorkloadFilterEvaluateRequest) returns (datadog.workloadfilter.WorkloadFilterEvaluateResponse);

    // Streams pod-to-service metadata for a specific node.
    rpc StreamKubeMetadata(datadog.kubemetadata.KubeMetadataStreamRequest) returns (stream datadog.kubemetadata.KubeMetadataStreamResponse);

    // Reports a fully-built health issue to the core agent's health platform store.
    // Registered remote agents (e.g. ADP) MUST supply remote_agent_session_id so the
    // server can validate the session is live; unregistered sub-agents (system-probe,
    // process-agent, security-agent) that connect over mTLS but do not call
    // RegisterRemoteAgent may leave it empty.
    rpc ReportHealthIssue(datadog.api.v1.ReportHealthIssueRequest) returns (google.protobuf.Empty);

    // Resolves (clears) a previously reported health issue by its unique ID.
    // This is an idempotent delete: OK is returned whether the issue existed or not.
    // Registered remote agents MUST supply remote_agent_session_id (same rules as
    // ReportHealthIssue).
    rpc ResolveHealthIssue(datadog.api.v1.ResolveHealthIssueRequest) returns (google.protobuf.Empty);
}

// ReportHealthIssueRequest carries a health issue from a sub-agent or registered
// remote agent to the core agent's health platform store.
message ReportHealthIssueRequest {
    // session_id issued by RegisterRemoteAgent. Required for registered remote
    // agents (ADP, OTel collector, etc.); the server validates the session is still
    // live and rejects stale or unknown session IDs with UNAUTHENTICATED.
    // Leave empty for sub-agents (system-probe, process-agent, security-agent)
    // that are not registered with the Remote Agent Registry.
    string remote_agent_session_id = 1;
    datadog.healthplatform.Issue issue = 2;
}

// ResolveHealthIssueRequest clears a previously reported health issue.
message ResolveHealthIssueRequest {
    // session_id of the calling remote agent. Same rules as
    // remote_agent_session_id in ReportHealthIssueRequest.
    string remote_agent_session_id = 1;
    // Unique instance id of the issue to resolve.
    string issue_id = 2;
}
