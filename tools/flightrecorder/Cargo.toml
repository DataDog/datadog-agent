[package]
name = "flightrecorder"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "flightrecorder"
path = "src/main.rs"

[[bin]]
name = "reader"
path = "src/reader.rs"

[[bin]]
name = "validate"
path = "src/validate.rs"

[dependencies]
flatbuffers = "25"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
vortex = { version = "0.61", features = ["tokio"] }
bloomfilter = "1"
tikv-jemallocator = "0.6"
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
tempfile = "3"

[[bench]]
name = "transport_bench"
harness = false

[[bench]]
name = "framing_bench"
harness = false

[[bench]]
name = "writer_bench"
harness = false
