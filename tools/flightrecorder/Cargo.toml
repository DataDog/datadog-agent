[package]
name = "flightrecorder"
version = "0.1.0"
edition = "2021"

[lib]
name = "flightrecorder"
path = "src/lib.rs"

[[bin]]
name = "flightrecorder"
path = "src/main.rs"

[[bin]]
name = "reader"
path = "src/reader.rs"

[[bin]]
name = "validate"
path = "src/validate.rs"

[[bin]]
name = "hydrate"
path = "src/hydrate.rs"

[dependencies]
rayon = "1"
bytes = "1"
flatbuffers = "25"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
arrow = { version = "55", default-features = false, features = ["prettyprint"] }
parquet = { version = "55", default-features = false, features = ["snap", "zstd", "arrow"] }
tikv-jemallocator = { version = "0.6", features = ["stats"] }
tikv-jemalloc-ctl = "0.6"
tokio-util = { version = "0.7", features = ["rt"] }
cadence = "1"
const_format = "0.2"
bloomfilter = "1"
atty = "0.2"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
tempfile = "3"

[[bench]]
name = "transport_bench"
harness = false

[[bench]]
name = "framing_bench"
harness = false

[features]
# Enable jemalloc heap profiling. Build with: cargo build --features heap-prof
# Then set _RJEM_MALLOC_CONF=prof:true,lg_prof_sample:17 at runtime.
heap-prof = ["tikv-jemallocator/profiling"]

[profile.release]
# debug = 1  # Uncomment for jeprof symbolization
