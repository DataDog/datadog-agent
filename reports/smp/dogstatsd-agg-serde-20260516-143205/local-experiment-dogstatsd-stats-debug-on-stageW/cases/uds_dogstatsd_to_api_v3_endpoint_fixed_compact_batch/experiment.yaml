optimization_goal: ingress_throughput
erratic: false
target:
  name: datadog-agent
  cpu_allotment: 4
  memory_allotment: 2GiB
  environment:
    DD_API_KEY: a0000001
    DD_HOSTNAME: smp-regression
    DD_DOGSTATSD_METRICS_STATS_ENABLE: true
    DD_DOGSTATSD_LOGGING_ENABLED: false
    DD_DOGSTATSD_EXPERIMENTAL_PARSE_TAGSET_INTERNER: true
    DD_DOGSTATSD_EXPERIMENTAL_COMPACT_IDENTITIES: true
    DD_DOGSTATSD_EXPERIMENTAL_COLUMNAR_V3_DIRECT_PARSE: true
    DD_DOGSTATSD_EXPERIMENTAL_COLUMNAR_V3_COMPACT_ROWS_OMIT_DESCRIPTOR: true
    DD_DOGSTATSD_EXPERIMENTAL_COLUMNAR_V3_FASTLANE: true
    DD_DOGSTATSD_EXPERIMENTAL_DIRECT_SERIALIZER: true
    DD_DOGSTATSD_EXPERIMENTAL_DIRECT_ROWS: true
    DD_DOGSTATSD_EXPERIMENTAL_DIRECT_METRIC_ROWS: true
    DD_DOGSTATSD_EXPERIMENTAL_COLUMNAR_V3: true
    DD_DOGSTATSD_EXPERIMENTAL_COLUMNAR_V3_NATIVE_SERIALIZER: true
    DD_SERIALIZER_EXPERIMENTAL_USE_V3_API_SERIES_ENDPOINTS: '["http://127.0.0.1:9091"]'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_LOG: 'true'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_LOG_SHARDED: 'true'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_RING_UDS: 'true'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_RING_UDS_COMPACT: 'true'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_RING_UDS_BATCH_DRAIN: 'true'
    DD_DOGSTATSD_EXPERIMENTAL_INGRESS_RING_UDS_BATCH_DRAIN_SIZE: '32'
  profiling_environment:
    DD_INTERNAL_PROFILING_BLOCK_PROFILE_RATE: 10000
    DD_INTERNAL_PROFILING_CPU_DURATION: 1m
    DD_INTERNAL_PROFILING_DELTA_PROFILES: true
    DD_INTERNAL_PROFILING_ENABLED: true
    DD_INTERNAL_PROFILING_ENABLE_GOROUTINE_STACKTRACES: true
    DD_INTERNAL_PROFILING_MUTEX_PROFILE_FRACTION: 10
    DD_INTERNAL_PROFILING_PERIOD: 1m
    DD_INTERNAL_PROFILING_UNIX_SOCKET: /smp-host/apm.socket
    DD_PROFILING_EXECUTION_TRACE_ENABLED: true
    DD_PROFILING_EXECUTION_TRACE_PERIOD: 1m
    DD_PROFILING_WAIT_PROFILE: true
    DD_APM_INTERNAL_PROFILING_ENABLED: true
    DD_INTERNAL_PROFILING_EXTRA_TAGS: experiment:uds_dogstatsd_to_api_v3
