receivers:
  hostmetrics:
    collection_interval: 1m
    scrapers:
      load:
      memory:

exporters:
  debug:

service:
  pipelines:
    metrics:
      receivers: [hostmetrics]
      exporters: [debug]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "localhost"
                port: 8888
                without_scope_info: true
                without_type_suffix: true
                without_units: true
