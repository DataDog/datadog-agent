apiVersion: v1
kind: ConfigMap
metadata:
  name: seccomp-profile
  namespace: dd-host-profiler
data:
  host-profiler.json: |
    {
      "defaultAction": "SCMP_ACT_ERRNO",
      "architectures": [
        "SCMP_ARCH_X86_64",
        "SCMP_ARCH_AARCH64"
      ],
      "syscalls": [
        {
          "names": [
            "accept4",
            "access",
            "arch_prctl",
            "bind",
            "bpf",
            "brk",
            "chmod",
            "clone",
            "clone3",
            "close",
            "connect",
            "dup3",
            "epoll_create1",
            "epoll_ctl",
            "epoll_pwait",
            "epoll_wait",
            "eventfd2",
            "execve",
            "exit",
            "exit_group",
            "faccessat2",
            "fcntl",
            "fstat",
            "fstatfs",
            "futex",
            "getcwd",
            "getdents64",
            "getpeername",
            "getpid",
            "getpriority",
            "getrandom",
            "getrlimit",
            "getsockname",
            "getsockopt",
            "gettid",
            "ioctl",
            "listen",
            "lseek",
            "madvise",
            "mmap",
            "mprotect",
            "munmap",
            "nanosleep",
            "newfstatat",
            "openat",
            "openat2",
            "perf_event_open",
            "pidfd_open",
            "pidfd_send_signal",
            "pipe2",
            "prctl",
            "pread64",
            "prlimit64",
            "process_vm_readv",
            "read",
            "readlinkat",
            "rename",
            "renameat",
            "renameat2",
            "recvmsg",
            "restart_syscall",
            "rseq",
            "rt_sigaction",
            "rt_sigprocmask",
            "rt_sigreturn",
            "sched_getaffinity",
            "sched_yield",
            "sendto",
            "set_robust_list",
            "set_tid_address",
            "setrlimit",
            "setsockopt",
            "sigaltstack",
            "socket",
            "statfs",
            "statx",
            "sysinfo",
            "tgkill",
            "umask",
            "uname",
            "unlinkat",
            "wait4",
            "waitid",
            "write"
          ],
          "action": "SCMP_ACT_ALLOW"
        },
        {
          "names": [
            "kill"
          ],
          "action": "SCMP_ACT_ALLOW",
          "args": [
            {
              "index": 1,
              "value": 0,
              "op": "SCMP_CMP_EQ"
            }
          ],
          "comment": "allow process liveness check via kill(pid, 0)"
        }
      ]
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seccomp-installer
  namespace: dd-host-profiler
spec:
  selector:
    matchLabels:
      app: seccomp-installer
  template:
    metadata:
      labels:
        app: seccomp-installer
    spec:
      hostPID: true
      initContainers:
        - name: installer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /host/var/lib/kubelet/seccomp
              cp /profiles/host-profiler.json /host/var/lib/kubelet/seccomp/host-profiler.json
              echo "Seccomp profile installed"
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: profiles
              mountPath: /profiles
      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.1
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
      tolerations:
        - operator: Exists
      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: profiles
          configMap:
            name: seccomp-profile
