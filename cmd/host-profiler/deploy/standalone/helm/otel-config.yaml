alternateConfig:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
    profiling:
      symbol_uploader:
        enabled: true
        symbol_endpoints:
          - site: ${env:DD_SITE}
            api_key: ${env:DD_API_KEY}

  exporters:
    otlp_http:
      endpoint: https://otlp.${env:DD_SITE}
      headers:
        dd-api-key: ${env:DD_API_KEY}
        dd-otel-metric-config: '{"resource_attributes_as_tags": true}'

  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [otlp]
        exporters: [otlp_http]
      profiles:
        receivers: [profiling]
        exporters: [otlp_http]
