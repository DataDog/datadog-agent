# Grants the Host Profiler Collector access to node, kubelet, and Kubernetes
# metadata used for hostname resolution and profile enrichment.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dd-host-profiler-kubelet
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/spec"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
# Binds the RBAC role to the service account created by the OpenTelemetry
# Operator for the dd-host-profiler Collector. If you change the Collector name
# or namespace, update this subject too.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dd-host-profiler-kubelet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dd-host-profiler-kubelet
subjects:
  - kind: ServiceAccount
    name: dd-host-profiler-collector
    namespace: dd-host-profiler
