apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  # Default example name and namespace. If you change either, update
  # operator/rbac.yaml and the network policy selectors to match.
  name: host-profiler
  namespace: host-profiler
spec:
  # Recommended: run as a DaemonSet to collect profiles from every supported node
  # and provide a cluster-wide view.
  mode: daemonset

  # Host Profiler preview image. Update the tag when using a newer preview build.
  image: registry.datadoghq.com/ddot-ebpf:dev-hp-preview-1.0-09ad4bc1-zstd-nydus

  # Required for host-level process visibility.
  hostPID: true

  # Environment variables used by spec.config below.
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    # Node and pod metadata used by the Collector configuration.
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    # Change this if your Datadog site is not datadoghq.com.
    - name: DD_SITE
      value: "datadoghq.com"
    # spec.config references DD_API_KEY for profile export and debug symbol
    # upload. This example reads it from a Kubernetes Secret named datadog-secret
    # with key api-key in the OpenTelemetryCollector namespace.
    # If you use another secret-management mechanism, adapt this block so the
    # Collector still receives DD_API_KEY.
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: datadog-secret
          key: api-key

  # OpenTelemetry Collector configuration. DD_SITE and DD_API_KEY are provided
  # by spec.env above.
  config:
    extensions:
      # Health endpoint for the Collector pod.
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    receivers:
      # Host Profiler receiver.
      profiling:
        symbol_uploader:
          enabled: true
          symbol_endpoints:
            - site: ${env:DD_SITE}
              api_key: ${env:DD_API_KEY}
      # OTLP receiver for Collector self-telemetry metrics forwarded to Datadog.
      otlp:
        protocols:
          grpc: {}
          http: {}
    processors:
      cumulativetodelta: {}
      k8s_attributes:
        extract:
          metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.replicaset.uid
          - k8s.daemonset.name
          - k8s.daemonset.uid
          - k8s.job.name
          - k8s.job.uid
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.statefulset.name
          - k8s.statefulset.uid
          - container.image.tag
          - container.image.name
          - k8s.cluster.uid
          - service.namespace
          - service.name
          - service.version
          - service.instance.id
          otel_annotations: true
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: container.id
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      resourcedetection:
        detectors: ["system"]
        system:
          resource_attributes:
            host.arch:
              enabled: true
            host.name:
              enabled: false
            os.type:
              enabled: false
    exporters:
      # Export profiles and metrics to Datadog through OTLP HTTP.
      otlp_http:
        endpoint: https://otlp.${env:DD_SITE}
        headers:
          dd-api-key: ${env:DD_API_KEY}
          dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [cumulativetodelta, resourcedetection, k8s_attributes]
          exporters: [otlp_http]
        profiles:
          receivers: [profiling]
          processors: [resourcedetection, k8s_attributes]
          exporters: [otlp_http]

  # Resource defaults for the Host Profiler container. Explicit zero requests avoid
  # reserving CPU or memory on every node, while limits cap runaway usage. Set
  # nonzero requests if your cluster policy requires them or you want reserved capacity.
  # Increase the memory limit if the Host Profiler uploads debug symbols for large binaries.
  resources:
    requests:
      cpu: "0"
      memory: "0"
    limits:
      cpu: "500m"
      memory: "1Gi"

  # Required Linux capabilities for host-wide eBPF profiling.
  # The container is not privileged and drops all default capabilities.
  securityContext:
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    # AppArmor is optional. The default is unconfined so this example works on
    # clusters that do not support or manage AppArmor profiles.
    appArmorProfile:
      type: Unconfined
    capabilities:
      add:
        - BPF
        - PERFMON
        - SYS_PTRACE
        - SYS_RESOURCE
        - DAC_READ_SEARCH
        - SYSLOG
        - CHECKPOINT_RESTORE
        - IPC_LOCK
      drop:
        - ALL
    seccompProfile:
      type: Localhost
      localhostProfile: host-profiler.json

  # Install the seccomp profile from the Host Profiler image onto each node.
  # The main container references this profile through securityContext.seccompProfile.
  initContainers:
    - name: seccomp-installer
      image: registry.datadoghq.com/ddot-ebpf:dev-hp-preview-1.0-09ad4bc1-zstd-nydus
      command:
        - cp
        - /etc/dd-host-profiler/seccomp.json
        - /host/var/lib/kubelet/seccomp/host-profiler.json
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        appArmorProfile:
          type: Unconfined
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: host-seccomp
          mountPath: /host/var/lib/kubelet/seccomp

  volumeMounts:
    # /tmp is required because the container uses a read-only root filesystem.
    - name: tmpdir
      mountPath: /tmp
    - name: tracefs
      mountPath: /sys/kernel/tracing

  volumes:
    - name: tmpdir
      emptyDir: {}
    # Host tracefs mount used for eBPF profiling.
    - name: tracefs
      hostPath:
        path: /sys/kernel/tracing
        type: Directory
    # Host path where kubelet reads Localhost seccomp profiles.
    - name: host-seccomp
      hostPath:
        path: /var/lib/kubelet/seccomp
        type: DirectoryOrCreate
