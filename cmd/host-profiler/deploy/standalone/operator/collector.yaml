apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: dd-host-profiler
  namespace: dd-host-profiler
spec:
  mode: daemonset
  image: registry.datadoghq.com/ddot-ebpf:7.81.0-preview-host-profiler-1.0
  hostPID: true

  securityContext:
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    appArmorProfile:
      type: Unconfined
    capabilities:
      add:
        - BPF
        - PERFMON
        - SYS_PTRACE
        - SYS_RESOURCE
        - DAC_READ_SEARCH
        - SYSLOG
        - CHECKPOINT_RESTORE
        - IPC_LOCK
      drop:
        - ALL
    seccompProfile:
      type: Localhost
      localhostProfile: host-profiler.json

  initContainers:
    - name: seccomp-installer
      image: registry.datadoghq.com/ddot-ebpf:7.81.0-preview-host-profiler-1.0
      command:
        - cp
        - /etc/dd-host-profiler/seccomp.json
        - /host/var/lib/kubelet/seccomp/host-profiler.json
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        appArmorProfile:
          type: Unconfined
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: host-seccomp
          mountPath: /host/var/lib/kubelet/seccomp

  volumes:
    - name: tmpdir
      emptyDir: {}
    - name: tracefs
      hostPath:
        path: /sys/kernel/tracing
        type: Directory
    - name: host-seccomp
      hostPath:
        path: /var/lib/kubelet/seccomp
        type: DirectoryOrCreate

  volumeMounts:
    - name: tmpdir
      mountPath: /tmp
    - name: tracefs
      mountPath: /sys/kernel/tracing

  env:
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: datadog-secret
          key: api-key
    - name: DD_SITE
      value: "datadoghq.com"

  config:
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    receivers:
      profiling:
        symbol_uploader:
          enabled: true
          symbol_endpoints:
            - site: ${env:DD_SITE}
              api_key: ${env:DD_API_KEY}
      otlp:
        protocols:
          grpc: {}
          http: {}
    processors:
      cumulativetodelta: {}
      k8s_attributes:
        pod_association:
          - sources:
              - from: resource_attribute
                name: container.id
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: resource_attribute
                name: host.name
      resourcedetection:
        detectors: ["system"]
        system:
          resource_attributes:
            host.arch:
              enabled: true
            host.name:
              enabled: false
            os.type:
              enabled: false
    exporters:
      otlp_http:
        endpoint: https://otlp.${env:DD_SITE}
        headers:
          dd-api-key: ${env:DD_API_KEY}
          dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [cumulativetodelta, resourcedetection, k8s_attributes]
          exporters: [otlp_http]
        profiles:
          receivers: [profiling]
          processors: [resourcedetection, k8s_attributes]
          exporters: [otlp_http]
