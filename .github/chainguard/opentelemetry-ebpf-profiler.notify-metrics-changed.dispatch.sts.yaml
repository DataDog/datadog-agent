# Policy for: .github/workflows/metrics-change-notify.yml in DataDog/opentelemetry-ebpf-profiler
issuer: https://token.actions.githubusercontent.com
subject: repo:DataDog/opentelemetry-ebpf-profiler:ref:refs/heads/datadog

claim_pattern:
  event_name: push
  ref: refs/heads/(datadog|mlevesque/add-ci-test-metrics)
  job_workflow_ref: DataDog/opentelemetry-ebpf-profiler/\.github/workflows/metrics-change-notify\.yml@refs/heads/(datadog|mlevesque/add-ci-test-metrics)
  repository: DataDog/opentelemetry-ebpf-profiler

# most restrictive that still grants permissions for repository_dispatch
permissions:
  contents: write
