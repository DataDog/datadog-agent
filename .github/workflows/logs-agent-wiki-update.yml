name: "Logs agent wiki update"

on:
  push:
    branches:
      - main
    paths:
      - "pkg/logs/**"
      - "comp/logs/**"
      - "comp/logs-library/**"
      - "cmd/agent/subcommands/streamlogs/**"
      - "cmd/agent/subcommands/analyzelogs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-logs-agent-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Derive wiki branch metadata
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Refresh logs-agent wiki
        env:
          LOGS_AGENT_AI_API_KEY: ${{ secrets.LOGS_AGENT_AI_API_KEY }}
          LOGS_AGENT_AI_BASE_URL: ${{ secrets.LOGS_AGENT_AI_BASE_URL }}
          LOGS_AGENT_WIKI_MODEL: ${{ vars.LOGS_AGENT_WIKI_MODEL }}
        run: |
          python3 -m tools.logs_agent_ai ingest \
            --base-sha "${{ github.event.before }}" \
            --head-sha "${{ github.sha }}"

      - name: Create wiki update PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: logs-agent-wiki-${{ steps.vars.outputs.short_sha }}
          commit-message: "chore(logs-agent-ai): refresh logs-agent wiki for ${{ steps.vars.outputs.short_sha }}"
          title: "Update logs-agent wiki for ${{ steps.vars.outputs.short_sha }}"
          body: |
            ### What does this PR do?
            Refreshes `.llm/logs-agent/` after logs-agent source changes on `main`.

            ### Motivation
            Keep the specialized logs-agent review wiki in sync with the latest merged architecture and implementation details.

            ### Validation
            Generated by `python -m tools.logs_agent_ai ingest`.
          add-paths: |
            .llm/logs-agent/**
          draft: true
          labels: team/agent-log-pipelines,changelog/no-changelog,qa/done
