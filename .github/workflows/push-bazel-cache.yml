---
name: "Push Bazel Cache"
on:
  push:
    branches: [main]
    paths: ["**/*MODULE.bazel*"]
  workflow_dispatch:
permissions: {}
jobs:
  push_bazel_cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/bazel-cache
      - name: Fetch Bazel module dependencies
        run: bazel mod deps
