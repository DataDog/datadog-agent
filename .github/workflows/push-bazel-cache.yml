name: "Push Bazel Cache"
on:
  push:
    branches: [main]
    paths: ["**/*MODULE.bazel*"]
  workflow_dispatch:
permissions: {}
jobs:
  push_bazel_cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/bazel-cache
      - name: Fetch Bazel module dependencies
        run: bazel mod deps
