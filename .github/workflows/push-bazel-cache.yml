---
name: "Push Bazel Cache"
on:
  push:
    branches: [main]
    paths: ["**/*MODULE.bazel*"]
  workflow_dispatch:
permissions: {}
jobs:
  push_bazel_cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bazel-cache
      - name: Fetch Bazel module dependencies
        run: bazel mod deps
