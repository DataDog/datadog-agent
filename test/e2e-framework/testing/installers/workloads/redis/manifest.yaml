apiVersion: v1
kind: Namespace
metadata:
  name: {{.Namespace}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{.Namespace}}
  labels:
    app: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        team: container-integrations
    spec:
      {{- if .ImagePullSecret}}
      imagePullSecrets:
      - name: {{.ImagePullSecret}}
      {{- end}}
      containers:
      - name: redis
        image: ghcr.io/datadog/redis:{{.Version}}
        args: ["--loglevel", "verbose"]
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 32Mi
        livenessProbe:
          tcpSocket:
            port: 6379
        readinessProbe:
          tcpSocket:
            port: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis
  namespace: {{.Namespace}}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{.Namespace}}
  labels:
    app: redis
  annotations:
    ad.datadoghq.com/endpoints.checks: |
      {"http_check":{"init_config":{},"instances":[{"name":"My Redis","url":"http://%%host%%:%%port%%","timeout":1}]}}
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: redis
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-query
  namespace: {{.Namespace}}
  labels:
    app: redis-query
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-query
  template:
    metadata:
      labels:
        app: redis-query
    spec:
      {{- if .ImagePullSecret}}
      imagePullSecrets:
      - name: {{.ImagePullSecret}}
      {{- end}}
      containers:
      - name: redis-query
        image: ghcr.io/datadog/apps-redis-client:{{.Version}}
        args: ["-min-tps", "1", "-max-tps", "60", "-period", "20m"]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 32Mi
---
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMetric
metadata:
  name: redis
  namespace: {{.Namespace}}
  labels:
    app: redis
spec:
  query: avg:redis.net.instantaneous_ops_per_sec{kube_cluster_name:%%tag_kube_cluster_name%%,kube_namespace:{{.Namespace}},kube_deployment:redis}.rollup(60)
---
apiVersion: {{.HPAAPIVersion}}
kind: HorizontalPodAutoscaler
metadata:
  name: redis
  namespace: {{.Namespace}}
  labels:
    app: redis
spec:
  minReplicas: 1
  maxReplicas: 5
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redis
  metrics:
  - type: External
    external:
      metric:
        name: datadogmetric@{{.Namespace}}:redis
      target:
        type: AverageValue
        averageValue: "10"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: redis
  namespace: {{.Namespace}}
  labels:
    app: redis
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redis
  updatePolicy:
    updateMode: Auto
