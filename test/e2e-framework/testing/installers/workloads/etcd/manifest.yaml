apiVersion: v1
kind: Namespace
metadata:
  name: {{.Namespace}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-sa
  namespace: {{.Namespace}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: {{.Namespace}}
  labels:
    app: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      serviceAccountName: etcd-sa
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.1
        command: ["etcd"]
        args:
        - --enable-v2
        - --name=etcd-0
        - --data-dir=/var/lib/etcd
        - --listen-client-urls=http://0.0.0.0:2379
        - --advertise-client-urls=http://etcd:2379
        - --listen-peer-urls=http://0.0.0.0:2380
        - --initial-advertise-peer-urls=http://etcd:2380
        - --initial-cluster=etcd-0=http://etcd:2380
        - --initial-cluster-token=etcd-cluster-1
        - --initial-cluster-state=new
        ports:
        - name: etcd
          containerPort: 2379
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 2379
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 2379
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: etcd-data
          mountPath: /var/lib/etcd
      - name: etcd-config
        image: ghcr.io/datadog/apps-alpine:{{.Version}}
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e

          echo "[init] Waiting for etcd to respond on TCP port 2379..."
          until nc -z localhost 2379; do
            sleep 1
          done

          echo "[init] Waiting for etcd v2 API to be ready..."
          until curl -sf http://localhost:2379/v2/keys/; do
            echo "[init] etcd not ready yet..."
            sleep 1
          done

          echo "[init] Setting check configuration keys in etcd v2..."

          curl -sf -XPUT http://localhost:2379/v2/keys/datadog/check_configs/apps-prometheus/check_names \
            --data-urlencode 'value=["openmetrics"]'

          curl -sf -XPUT http://localhost:2379/v2/keys/datadog/check_configs/apps-prometheus/init_configs \
            --data-urlencode 'value=[{}]'

          curl -sf -XPUT http://localhost:2379/v2/keys/datadog/check_configs/apps-prometheus/instances \
            --data-urlencode 'value=[{"openmetrics_endpoint": "http://%%host%%:8080/metrics", "metrics":[{"prom_gauge": "prom_gauge_configured_in_etcd"}]}]'

          echo "[init] Done setting check configuration keys in etcd"
          sleep infinity
      volumes:
      - name: etcd-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: {{.Namespace}}
  labels:
    app: etcd
spec:
  selector:
    app: etcd
  ports:
  - name: client
    port: 2379
    targetPort: 2379
    protocol: TCP
