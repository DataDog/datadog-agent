apiVersion: v1
kind: Namespace
metadata:
  name: {{.Namespace}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-sa
  namespace: {{.Namespace}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx
  namespace: {{.Namespace}}
  labels:
    app: nginx
data:
  nginx.conf: |
    worker_processes  auto;
    events {
        worker_connections  4096;
    }
    http {
        server {
            listen [::]:{{.NginxPort}} ipv6only=off reuseport fastopen=32 default_server;

            location /nginx_status {
              stub_status on;
              access_log  /dev/stdout;
              allow all;
            }
        }
    }
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
  namespace: {{.Namespace}}
  labels:
    app: nginx-rollout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy:
    canary: {}
  template:
    metadata:
      labels:
        app: nginx
    spec:
      {{- if .ImagePullSecret}}
      imagePullSecrets:
      - name: {{.ImagePullSecret}}
      {{- end}}
      serviceAccountName: nginx-sa
      containers:
      - name: nginx
        image: ghcr.io/datadog/apps-nginx-server:{{.Version}}
        ports:
        - name: http
          containerPort: {{.NginxPort}}
          protocol: TCP
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: cache
          mountPath: /var/cache/nginx
        - name: var-run
          mountPath: /var/run
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 32Mi
      volumes:
      - name: conf
        configMap:
          name: nginx
      - name: cache
        emptyDir: {}
      - name: var-run
        emptyDir: {}
