# Lab metadata manifest for the Lustre Agent E2E scenario.
# Generated by agint:generate-lab (iteration 2, deploy: false).
# Canonical deploy contract is the scenario/component Go code + invoke task;
# this manifest is for review and the runtime bridge.

integration: lustre
technology: Lustre
tech_version: "2.15"            # target point release >= 2.15.5 (lctl -y YAML path)
deployment_mode: single-vm-all-in-one
agent_check_name: lustre

generation_profile:
  interfaces:
    - cli-command            # lctl / lnetctl / lfs subprocess invocation (allowlisted absolute paths)
    - host-kernel            # out-of-tree kernel modules: lustre, lnet, ldiskfs, mgs, mdt, ost, obdfilter
    - distributed-filesystem # Lustre parallel FS; params read via /proc/fs/lustre, /sys/fs/lustre
    # storage-cluster also applies; no rest-api/soap-api/snmp/network-listener.
  deployment_feasibility:
    docker_compose: impossible   # out-of-tree kmods + kernel-matched ldiskfs + mkfs.lustre; no faithful container
    single_vm: possible          # CHOSEN MODE: single-vm-all-in-one (MGS+MDS+OSS+client+Agent), upstream-supported (llmount.sh)
    multi_vm: optional           # adds peer-NID realism; NOT required for metric-family coverage
    external_system_required: false
  hard_constraints:
    requires_license: false
    requires_credentials: false
    requires_kernel_modules: true        # lustre, lnet, ldiskfs (osd-ldiskfs), mgs, mdt, ost, obdfilter, ptlrpc
    requires_privileged_host: true        # root for modprobe/losetup/mkfs.lustre/mount -t lustre; dd-agent NOPASSWD sudo for the 3 binaries
    requires_nested_virtualization: false
    storage:
      - ebs-root-30-40gb-gp3              # holds loop backing files for MGT/MDT/OST + packages + DKMS build artifacts
      - loop-devices                       # /dev/loop* over sparse files
    network:
      - default-vpc
      - security-group                     # SSH 22 inbound + all egress; LNet 988/tcp host-local only
    min_nodes: 1
    roles:
      - all-in-one    # single node fulfilling: mgs, mds(+mdt), oss(+ost), client, agent-host
    # extra constraints (not in template schema, preserved):
    #   arch: x86_64 only (Whamcloud el9 server RPMs are x86_64; arm64 servers unsupported)
    #   os: Rocky/RHEL 9 (EL9), kernel pinned to the EL minor matching the chosen 2.15.x build
    #   instance: >= 16GB RAM (m5.xlarge); 5s check timeout drops metrics on slow hosts
    #   selinux: recommend permissive during lab
  generation_strategy:
    create_compose: false                  # impossible/misleading (kernel modules); output-contract forbids fake Compose
    create_agent_e2e_component: true       # component owns Lustre host bootstrap (install/loop/format/mount/sudoers/asset-copy)
    create_pulumi_infra: true              # single EC2 host, RHEL/Rocky 9, x86_64, >=16GB, 30-40GB gp3, SG SSH+egress
    create_host_setup_scripts: true        # repos+e2fsprogs-wc, kernel-devel/DKMS, versionlock, modprobe, LNet, mkfs.lustre loop, mounts, jobstats, sudoers; two-phase (reboot), idempotent
    create_mock_or_simulator: false        # real single-node Lustre is honest; fixtures are CI-only fallback
    create_load_scripts: true              # dd/fio read+write + metadata churn on /mnt/lustre + jobid_var to populate stat families
    create_fixture_replay: false           # only as CI fallback if real install proves infeasible (tests/fixtures/*.txt back fake CLIs)
    create_external_lab_manifest: false    # no external/managed system
    no_component_package: false            # component package is appropriate; not a last-resort case

agent_e2e:
  scenario_package: test/e2e-framework/scenarios/aws/lustre
  component_package: test/e2e-framework/components/datadog/apps/lustre
  registry_key: aws/lustre               # REQUIRES manual registration in registry/scenarios.go (see notes)
  registry_registration_required: true
  scenario_file: run.go
  component_files:
    - component.go
    - scripts/install.sh
    - scripts/configure.sh
    - scripts/load.sh
    - fixtures/lustre-load.service
    - fixtures/lustre.sudoers
    - config/conf.yaml
  task_module: tasks/e2e_framework/aws/lustre.py
  # context.json invoke_create_command / invoke_destroy_command (logical labels):
  create_command: inv e2e.aws.lustre.create
  destroy_command: inv e2e.aws.lustre.destroy
  # Actual runnable commands (aws collection mounts at the ROOT namespace, not under e2e):
  create_command_actual: inv aws.lustre.create
  destroy_command_actual: inv aws.lustre.destroy
  scripts:
    - test/e2e-framework/components/datadog/apps/lustre/scripts/install.sh
    - test/e2e-framework/components/datadog/apps/lustre/scripts/configure.sh
    - test/e2e-framework/components/datadog/apps/lustre/scripts/load.sh
  fixtures:
    - test/e2e-framework/components/datadog/apps/lustre/fixtures/lustre-load.service
    - test/e2e-framework/components/datadog/apps/lustre/fixtures/lustre.sudoers

source_repositories:
  integrations-core:
    url: https://github.com/DataDog/integrations-core.git
    ref: master
    commit: 1577abbceaa955343e89d251a4b4fdfc6c26ab14
  integrations-extras:
    url: https://github.com/DataDog/integrations-extras.git
    ref: master
    commit: 22c275cd6aae37d5fd0238cf9572ae35b5f7b4d1
  claude-marketplace:
    url: https://github.com/DataDog/claude-marketplace.git
    ref: main
    commit: f59bd9299ed28f48a08f1ed953ee4640ae94c09c

required_env:
  - name: DD_API_KEY
    description: >-
      Datadog API key the Agent uses to ship lustre.* payloads. Managed and
      injected by the E2E framework via env.AgentAPIKey() during the Agent
      install; not referenced in any generated file. No integration-specific
      secrets exist (auth_mode: none, secret_env_map: {}).
    example: ${DD_API_KEY}

validation_commands:
  - description: Agent status (lustre check scheduled)
    command: sudo datadog-agent status
  - description: Configcheck (three lustre instances loaded, no errors)
    command: sudo datadog-agent configcheck
  - description: lustre check output (minimal validation path; no fakeintake)
    command: sudo datadog-agent check lustre
  - description: Native Lustre validation - modules loaded
    command: lsmod | grep -E 'lustre|lnet|ldiskfs'
  - description: Native Lustre validation - version >= 2.15.5
    command: lctl get_param -ny version
  - description: Native Lustre validation - targets UP
    command: lctl dl
  - description: Native Lustre validation - LNet up
    command: lnetctl net show
  - description: Native Lustre validation - client mount + capacity
    command: lfs df
  - description: dd-agent passwordless sudo works (integration depends on this)
    command: sudo -u dd-agent sudo /usr/sbin/lctl dl
  - description: Workload service running
    command: systemctl status lustre-load.service
  - description: Workload logs
    command: journalctl -u lustre-load.service -n 50

runtime_observation:
  pup_queries: []          # no fakeintake provisioned; pup N/A unless fakeintake is wired (see run.go TODO)
  host_hooks:
    - description: Confirm filesystem healthy on the EC2 host (RemoteHost stack output)
      command: lctl dl && mountpoint /mnt/lustre && lfs df
      target: exported RemoteHost (vmName "lustre") SSH connection
    - description: Confirm jobstats enabled and changelog user registered
      command: lctl get_param -ny jobid_var && lctl get_param mdd.*.changelog_users
      target: exported RemoteHost (vmName "lustre")
  fakeintake_checks: []    # none this run; scope Datadog queries by tag lustre_lab:all-in-one / lustre_role:{client,mds,oss}

cleanup:
  command: inv aws.lustre.destroy   # runs pulumi destroy on the stack (logical label: inv e2e.aws.lustre.destroy)
  notes: >-
    The component Delete command runs configure.sh teardown (stop load service,
    unmount client + targets, detach loop devices) best-effort before the EC2
    instance is removed. All Lustre targets are loop-backed files on the
    ephemeral instance, so pulumi destroy reclaims everything; no external state
    remains and nothing must be cleaned up by hand. Before first create, the
    scenario must be registered in test/e2e-framework/registry/scenarios.go
    ("aws/lustre": lustre.Run) - documented, not auto-applied.
