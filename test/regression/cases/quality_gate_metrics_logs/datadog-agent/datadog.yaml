auth_token_file_path: /tmp/agent-auth-token

# Disable cloud detection. This stops the Agent from poking around the
# execution environment & network. This is particularly important if the target
# has network access.
cloud_provider_metadata: []

dd_url: http://127.0.0.1:9091

logs_enabled: true
logs_config:
  logs_dd_url: 127.0.0.1:9092
  logs_no_ssl: true
  force_use_http: true

process_config.process_dd_url: http://localhost:9093

telemetry.enabled: true
telemetry.checks: '*'

dogstatsd_socket: '/tmp/dsd.socket'

# Temporary DogStatsD metric lookback SMP probe. The metric name is deliberately
# not present in the generated DogStatsD workload so this measures enabled
# exact-name admission overhead without bucket materialization, retention writes,
# monitor evaluations, or egress.
metric_lookback:
  enabled: true
  dogstatsd:
    enabled: true
    metric_names:
      - "__metric_lookback_unmatched_smp_probe__"
