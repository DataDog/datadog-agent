auth_token_file_path: /tmp/agent-auth-token

# Disable cloud detection. This stops the Agent from poking around the
# execution environment & network. This is particularly important if the target
# has network access.
cloud_provider_metadata: []

dd_url: http://127.0.0.1:9091

# Logs management feature is OFF on purpose. The point of this experiment
# is that the Observer (in the comparison image) ingests container logs
# even when the user has not enabled logs collection. The baseline image
# therefore does no log work at all -- the comparison's overhead is the
# observer ingestion + live anomaly detection cost.
logs_enabled: false

logs_config:
  # Surface container stdout so the comparison image's observer can pick
  # them up. With logs_enabled: false this is a no-op on the baseline.
  container_collect_all: true
  # Kept so anything that does route through the existing logs forwarder
  # has a safe blackhole to send to.
  logs_dd_url: 127.0.0.1:9092
  logs_no_ssl: true
  force_use_http: true

process_config.process_dd_url: http://localhost:9093

telemetry.enabled: true
telemetry.checks: '*'

# NOTE: Observer flags are intentionally NOT set here. They live in
# experiment.yaml `environment` so that the baseline agent (which does not
# recognize the keys) does not break. See the wiki page on running SMP
# experiments for the observer.
