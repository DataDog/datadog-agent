logs:
  - type: file
    path: "/smp-shared/*.log"
    service: "my-service"
    source: "my-client-app"
    log_processing_rules:
      - name: "test"
        type: "mask_sequences"
        pattern: "test"
        replace_placeholder: "REDACTED"
      - name: "test2"
        type: "mask_sequences"
        pattern: "test2"
        replace_placeholder: "REDACTED2"
      - name: "test3"
        type: "mask_sequences"
        pattern: "test3"
        replace_placeholder: "REDACTED3"
      - name: "test4"
        type: "mask_sequences"
        pattern: "test4"
        replace_placeholder: "REDACTED4"
      - name: "all_end_in_test"
        type: "mask_sequences"
        pattern: "(/^.*test$)"
        replace_placeholder: "REDACTED3"
      - name: "all_end_in_test2"
        type: "mask_sequences"
        pattern: "(/^.*test2$)"
        replace_placeholder: "REDACTED4"
      - name: "all_end_in_test3"
        type: "mask_sequences"
        pattern: "(/^.*test3$)"
        replace_placeholder: "REDACTED5"
      - name: "all_end_in_test4"
        type: "mask_sequences"
        pattern: "(/^.*test4$)"
        replace_placeholder: "REDACTED6"
      - name: "all_end_in_test5"
        type: "mask_sequences"
        pattern: "(/^.*test5$)"
        replace_placeholder: "REDACTED7"
      - name: "all_end_in_test6"
        type: "mask_sequences"
        pattern: "(/^[1-2]*test6$)"
        replace_placeholder: "REDACTED8"
      - name: "all_end_in_test7"
        type: "mask_sequences"
        pattern: "(/^.*[a-z]est7$)"
        replace_placeholder: "REDACTED9"
        