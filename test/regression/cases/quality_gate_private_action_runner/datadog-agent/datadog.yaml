auth_token_file_path: /tmp/agent-auth-token

dd_url: http://127.0.0.1:9091

# Disable cloud detection. This stops the Agent from poking around the
# execution environment & network. This is particularly important if the target
# has network access.
cloud_provider_metadata: []

private_action_runner:
  # Enable the Private Action Runner. This experiment runs the runner binary
  # directly (see the target command in experiment.yaml), so this only needs to
  # pass its own enablement gate.
  enabled: true
  # The SMP environment has no real Datadog backend to enroll against (all
  # egress is blackholed), so disable self-enrollment to keep the runner in a
  # steady idle state instead of retrying enrollment in a loop.
  self_enroll: false
