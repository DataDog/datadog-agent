# Container-log workload for the always-on Observer (anomaly detection)
# experiment. Lading spawns busybox containers that emit dynamic
# apache-common log lines on stdout; the Datadog Agent collects them as
# container logs via the docker socket.
#
# Logs management is OFF in datadog.yaml (logs_enabled: false). Only the
# comparison image's Observer ingests logs (always-on path). This isolates
# observer-on-logs overhead vs a baseline agent that does no log work.
#
# DD_OBSERVER_INGEST_METRICS_ENABLED=false disables the metrics ingest path
# in the Observer so this case measures *just* the log codepath.
optimization_goal: cpu
erratic: false

target:
  name: datadog-agent
  cpu_allotment: 4
  # Generous allotment so we don't OOM during ramp-up. The actual quality
  # gate is the memory_usage check below.
  memory_allotment: 8 GiB

  environment:
    DD_API_KEY: a0000001
    DD_HOSTNAME: smp-regression
    # Observer flags live here, NOT in datadog.yaml -- the baseline agent
    # would crash on unknown keys. Unknown env vars are simply ignored.
    DD_OBSERVER_ANALYSIS_ENABLED: "true"
    DD_OBSERVER_INGEST_METRICS_ENABLED: "false"

  profiling_environment:
    DD_INTERNAL_PROFILING_BLOCK_PROFILE_RATE: 10000
    DD_INTERNAL_PROFILING_CPU_DURATION: 1m
    DD_INTERNAL_PROFILING_DELTA_PROFILES: true
    DD_INTERNAL_PROFILING_ENABLED: true
    DD_INTERNAL_PROFILING_ENABLE_GOROUTINE_STACKTRACES: true
    DD_INTERNAL_PROFILING_MUTEX_PROFILE_FRACTION: 10
    DD_INTERNAL_PROFILING_PERIOD: 1m
    DD_INTERNAL_PROFILING_UNIX_SOCKET: /smp-host/apm.socket
    DD_PROFILING_EXECUTION_TRACE_ENABLED: true
    DD_PROFILING_EXECUTION_TRACE_PERIOD: 1m
    DD_PROFILING_WAIT_PROFILE: true
    DD_APM_INTERNAL_PROFILING_ENABLED: true

    DD_INTERNAL_PROFILING_EXTRA_TAGS: experiment:quality_gate_container_logs

checks:
  - name: memory_usage
    description: "Memory usage. Baseline (~220 MiB) + 150 MiB observer budget."
    bounds:
      series: total_pss_bytes
      upper_bound: "370 MiB"

  - name: cpu_usage
    description: "CPU usage. Allows +50% overhead over baseline for observer."
    bounds:
      series: avg(total_cpu_usage_millicores)
      upper_bound: 500

  - name: intake_connections
    description: "Connections established to intake APIs. This puts a bound on total connections per Agent instance."
    bounds:
      series: "connection.current"
      upper_bound: 6

report_links:
  - text: "bounds checks dashboard"
    link: "https://app.datadoghq.com/dashboard/vz3-jd5-bdi?fromUser=true&refresh_mode=paused&tpl_var_experiment%5B0%5D={{ experiment }}&tpl_var_job_id%5B0%5D={{ job_id }}&view=spans&from_ts={{ start_time_ms }}&to_ts={{ end_time_ms }}&live=false"
