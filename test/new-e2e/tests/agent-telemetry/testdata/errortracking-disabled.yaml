agent_telemetry:
  # enabled defaults to true.
  errortracking:
    # enabled is intentionally omitted so it falls back to its default (false):
    # this test asserts error tracking is OFF by default. The short flush interval
    # makes the negative assertion meaningful — if a regression flipped the default
    # to true, the forwarder would flush within 1s and the test would catch it.
    flush_interval_seconds: 1
    bouncer_window_seconds: 0
    startup_jitter_seconds: 0
process_config:
  additional_endpoints:
    "https://127.0.0.1:1":
      - "00000000000000000000000000000000"
  process_discovery:
    enabled: false
