process_config:
  # Adds a second, connection-refused submission target alongside the main
  # process_dd_url (set by the e2e host provisioner). Every check submission
  # fans out to every endpoint, so this one fails deterministically.
  additional_endpoints:
    "https://127.0.0.1:1":
      - "00000000000000000000000000000000"
  process_discovery:
    # Disabled: on Linux this runs embedded in the core agent by default,
    # which would produce a competing agent.flavor:agent log via the same
    # additional_endpoints misconfiguration.
    enabled: false
agent_telemetry:
  enabled: true
  errortracking:
    enabled: true
    flush_interval_seconds: 1
    bouncer_window_seconds: 0
    startup_jitter_seconds: 0
