network_config:
  enabled: true
  direct_send: false
# network_path.collector.filters expects a list of filter objects; a plain string fails
# to unmarshal and triggers a deterministic ERROR log from
# comp/networkpath/npcollector/impl/config.go's newConfig, on every system-probe
# startup, without needing real network activity or a live connections check.
network_path:
  collector:
    filters: "not-a-valid-filter"
