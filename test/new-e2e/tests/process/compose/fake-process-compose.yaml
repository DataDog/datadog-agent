services:
  fake-process:
    container_name: fake-process
    build:
      context: .
      # You can use public ECR or DockerHub for base images, but if your test is going to be running in CI, it is better to pull from our internal registry.
      dockerfile_inline: |
        FROM registry.ddbuild.io/images/mirror/library/alpine:3.20.3

        # generates a synthetic process that consumes CPU and memory
        ENTRYPOINT ["dd", "if=/dev/zero", "of=/tmp/test-process.txt"]
