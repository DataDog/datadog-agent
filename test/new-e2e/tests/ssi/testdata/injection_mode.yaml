---
clusterAgent:
  admissionController:
    configMode: "hostip"
  env:
    # Enable CSI auto-detection so the library injection AutoProvider switches
    # to the CSI provider when the Datadog CSI driver is registered in the
    # cluster (see TestInjectionMode/injection-mode-app-auto).
    - name: DD_APM_INSTRUMENTATION_CSI_DRIVER_DETECTION_ENABLED
      value: "true"
    # Disable gradual rollout so the injector resolves deterministically to the
    # plain image tag (NoOpResolver) rather than a digest.
    - name: DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_GRADUAL_ROLLOUT_ENABLED
      value: "false"

datadog:
  csi:
    enabled: true
  apm:
    instrumentation:
      enabled: true
      injector:
        imageTag: "0.54.0"
      enabledNamespaces: []
      targets:
        - name: "apps"
          namespaceSelector:
            matchNames:
              - "injection-mode"
          ddTraceVersions:
            python: "v3.18.1"
