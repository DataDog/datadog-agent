---
# Default opt-in scenario: no ddTraceVersions means the cluster-agent defaults to
# all languages at their latest major versions (Python: v4, Java: v1, etc.).
# v4 is a mutable major-version tag, so the gradual rollout resolver applies.
clusterAgent:
  volumes:
    - name: mock-registry-ca
      secret:
        secretName: mock-registry-ca
  volumeMounts:
    - name: mock-registry-ca
      mountPath: /etc/ssl/certs/mock-registry-ca.crt
      subPath: ca.crt
      readOnly: true
  env:
    - name: DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_CONTAINER_REGISTRY
      value: "mock-registry.mock-registry.svc.cluster.local:5000"
    - name: DD_ADMISSION_CONTROLLER_AUTO_INSTRUMENTATION_DEFAULT_DD_REGISTRIES
      value: '["mock-registry.mock-registry.svc.cluster.local:5000"]'

datadog:
  apm:
    instrumentation:
      enabled: true
      injector:
        imageTag: "0.54.0"
      enabledNamespaces: []
      targets:
        - name: "python-apps"
          namespaceSelector:
            matchNames:
              - "gradual-rollout-default"
