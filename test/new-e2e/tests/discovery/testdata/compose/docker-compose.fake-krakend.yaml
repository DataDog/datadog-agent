services:
  fake-krakend:
    container_name: fake-krakend
    image: ${DD_REGISTRY:-docker.io}/library/python:3.11-slim
    command:
      - sh
      - -c
      - |
        python3 << 'EOF'
        import http.server, socketserver

        class Handler(http.server.BaseHTTPRequestHandler):
            BODY = (
                b"# HELP krakend_requests_total Total requests.\n"
                b"# TYPE krakend_requests_total counter\n"
                b"krakend_requests_total 42\n"
                b"# HELP go_goroutines Number of goroutines.\n"
                b"# TYPE go_goroutines gauge\n"
                b"go_goroutines 17\n"
            )

            def do_GET(self):
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(self.BODY)))
                self.end_headers()
                self.wfile.write(self.BODY)

            def log_message(self, *args):
                pass

        socketserver.TCPServer(("", 9090), Handler).serve_forever()
        EOF
    labels:
      com.datadoghq.ad.identifiers: '["krakend"]'
    expose:
      - "9090"
