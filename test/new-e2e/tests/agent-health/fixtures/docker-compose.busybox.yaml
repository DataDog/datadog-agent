version: '3.9'

services:
  spam1:
    image: ${DD_REGISTRY:-docker.io}/library/busybox:1.37.0
    container_name: spam1
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    command: sh -c "while true; do echo container-1:$$(date); sleep 0.5; done"

