services:
  tcp-congestion-server:
    image: ubuntu:22.04
    container_name: tcp-congestion-server
    hostname: tcp-congestion-server
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.tcp_ecn=1
    networks:
      tcp-congestion-net:
        ipv4_address: 172.28.0.10
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq iperf3 netcat-openbsd iproute2 python3 > /dev/null &&
      iperf3 -s -p 5201 -D && sleep infinity"
  tcp-congestion-client:
    image: ubuntu:22.04
    container_name: tcp-congestion-client
    hostname: tcp-congestion-client
    cap_add: [NET_ADMIN, SYS_ADMIN]
    sysctls:
      - net.ipv4.tcp_ecn=1
    networks:
      tcp-congestion-net:
        ipv4_address: 172.28.0.20
    depends_on: [tcp-congestion-server]
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq iperf3 iproute2 netcat-openbsd > /dev/null &&
      sleep infinity"
networks:
  tcp-congestion-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
