version: '3.9'
services:
  tcp-lab-server:
    image: ubuntu:22.04
    container_name: tcp-lab-server
    hostname: tcp-lab-server
    cap_add: [NET_ADMIN]
    networks:
      tcp-lab-net:
        ipv4_address: 172.28.0.10
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq iperf3 netcat-openbsd > /dev/null &&
      iperf3 -s -p 5201 -D && sleep infinity"
  tcp-lab-client:
    image: ubuntu:22.04
    container_name: tcp-lab-client
    hostname: tcp-lab-client
    cap_add: [NET_ADMIN]
    networks:
      tcp-lab-net:
        ipv4_address: 172.28.0.20
    depends_on: [tcp-lab-server]
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq iperf3 iproute2 > /dev/null &&
      sleep infinity"
networks:
  tcp-lab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
