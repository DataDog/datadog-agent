---
services:

  syslog-sender:
    image: public.ecr.aws/docker/library/busybox:latest
    container_name: syslog-sender
    command: ["sleep", "infinity"]
    depends_on:
      - agent
    labels:
      com.datadoghq.ad.logs: |
        [
          {
            "type": "tcp",
            "port": 10514,
            "format": "syslog",
            "source": "syslog-e2e",
            "service": "syslog-e2e"
          }
        ]

  agent:
    environment:
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "false"
      DD_LOGS_CONFIG_BATCH_WAIT: "1"
