include:
  - .gitlab/.pre/common/macos.yml

.bazel:test:
  stage: source_test
  rules:
    - when: on_success

.bazel:test:reporting:
  id_tokens:
    CI_IDENTITIES_GITLAB_ID_TOKEN:
      aud: ci-identities
  variables:
    EXTERNAL_LINKS_PATH: external_links_$CI_JOB_ID.json
    FLAVOR: base
    BEP_FILE: $CI_PROJECT_DIR/bazel-bep-$FLAVOR.json
  after_script:
    - dda inv -- -e bazel.collect-junit --flavor=$FLAVOR --output-tgz=junit-${CI_JOB_NAME}.tgz --bep-file=$BEP_FILE || true
    - !reference [.upload_junit_source]
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - junit-*.tgz
      - bazel-bep-*.json
    reports:
      annotations:
        - $EXTERNAL_LINKS_PATH

.bazel:test:reporting:ci_links:
  - dda inv -- -e gitlab.generate-ci-visibility-links --output=$EXTERNAL_LINKS_PATH

bazel:test:linux-amd64:
  extends: [ .bazel:test, .bazel:test:reporting, .bazel:runner:linux-amd64 ]
  script:
    - !reference [.bazel:test:reporting:ci_links]
    - bazel test --jobs=$KUBERNETES_CPU_REQUEST --keep_going --remote_download_outputs=toplevel --build_event_json_file=$BEP_FILE --config=no-dd-agent-go-tests //...

bazel:test:linux-arm64:
  extends: [ .bazel:test, .bazel:test:reporting, .bazel:runner:linux-arm64 ]
  script:
    - !reference [.bazel:test:reporting:ci_links]
    - bazel test --jobs=$KUBERNETES_CPU_REQUEST --keep_going --remote_download_outputs=toplevel --build_event_json_file=$BEP_FILE --config=no-dd-agent-go-tests //...

bazel:test:macos-amd64:
  extends: [ .bazel:test, .bazel:runner:macos-amd64 ]
  parallel: 10
  script:
    - df -h
    - rm -frv $XDG_CACHE_HOME/bazel-repo-contents-cache
    - rm -frv $XDG_CACHE_HOME/bazel/disk-cache
    - if [ -d /Users/ec2-user ]; then
    #   find /Users/ec2-user/cache/DataDog/datadog-agent -mindepth 1 -name 'bazel*' -exec rm -rv {} + || true
    -   find /Users/ec2-user/cache/DataDog/datadog-agent || true
    - fi
    - df -h

bazel:test:macos-arm64:
  extends: [ .bazel:test, .bazel:runner:macos-arm64 ]
  parallel: 10
  script:
    - df -h
    - rm -frv $XDG_CACHE_HOME/bazel-repo-contents-cache
    - rm -frv $XDG_CACHE_HOME/bazel/disk-cache
    - if [ -d /Users/ec2-user ]; then
    #   find /Users/ec2-user/cache/DataDog/datadog-agent -mindepth 1 -name 'bazel*' -exec rm -rv {} + || true
    -   find /Users/ec2-user/cache/DataDog/datadog-agent || true
    - fi
    - df -h

bazel:test:windows-amd64:
  extends: [ .bazel:test, .bazel:runner:windows-amd64 ]
  parallel: 50
  script:
    - Get-Volume | Format-Table -AutoSize
    - if (Test-Path $env:XDG_CACHE_HOME\bazel-repo-contents-cache) { Remove-Item -Recurse -Force -Verbose $env:XDG_CACHE_HOME\bazel-repo-contents-cache }
    - if (Test-Path $env:XDG_CACHE_HOME\bazel\disk-cache) { Remove-Item -Recurse -Force -Verbose $env:XDG_CACHE_HOME\bazel\disk-cache }
    - Get-Volume | Format-Table -AutoSize

# Per-flavor test jobs. Each runs the tests for one agent flavor, mirroring the
# dda inv test --flavor=<f> topology. --config=<flavor> sets
# --test_tag_filters=flavor_<flavor>, selecting only the matching go_test variants.
.bazel:test:flavor:
  extends: [ .bazel:test, .bazel:test:reporting ]
  script:
    - !reference [.bazel:test:reporting:ci_links]
    - bazel test --keep_going --remote_download_outputs=toplevel --test_arg=-test.v=test2json --build_event_json_file=$BEP_FILE --build_tests_only --config=$FLAVOR //pkg/... //comp/... //cmd/...

bazel:test:linux-amd64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: base

bazel:test:linux-amd64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: dogstatsd

bazel:test:linux-amd64:heroku:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: heroku

bazel:test:linux-amd64:iot:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: iot

bazel:test:linux-arm64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: base

bazel:test:linux-arm64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: dogstatsd

bazel:test:linux-arm64:heroku:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: heroku

bazel:test:linux-arm64:iot:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: iot
