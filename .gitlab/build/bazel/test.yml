.bazel:test:
  stage: source_test
  rules:
    - when: on_success

bazel:test:linux-amd64:
  extends: [ .bazel:test, .bazel:runner:linux-amd64 ]
  script:
    - bazel test --keep_going --config=no-dd-agent-go-tests //...

# THROWAWAY: reproduce the edge remote-cache locally-vs-uploaded hit-rate
# question, from inside the k8s cluster where cache:edge is reachable.
# Not meant to be merged.
bazel:edge-cache-repro:
  extends: [ .bazel:test, .bazel:runner:linux-amd64 ]
  script:
    - TARGETS="//pkg/collector/aggregator:aggregator @@gazelle++go_deps+com_github_google_go_containerregistry//pkg/v1/empty:empty @@gazelle++go_deps+com_github_google_go_containerregistry//pkg/v1/mutate:mutate"
    - echo "=== RUN 1: fresh output base, edge cache, upload enabled by default CI config ==="
    - bazel --output_base=/tmp/verify_ob1_$CI_JOB_ID build --disk_cache= $TARGETS
    - echo "=== RUN 2: different fresh output base, edge cache, read-only check ==="
    - bazel --output_base=/tmp/verify_ob2_$CI_JOB_ID build --disk_cache= $TARGETS

bazel:test:linux-arm64:
  extends: [ .bazel:test, .bazel:runner:linux-arm64 ]
  script:
    - bazel test --keep_going --config=no-dd-agent-go-tests //...

bazel:test:macos-amd64:
  extends: [ .bazel:test, .bazel:runner:macos-amd64 ]
  script:
    - bazel test --keep_going --config=no-dd-agent-go-tests //...

bazel:test:macos-arm64:
  extends: [ .bazel:test, .bazel:runner:macos-arm64 ]
  script:
    - bazel test --keep_going --config=no-dd-agent-go-tests //...

bazel:test:windows-amd64:
  extends: [ .bazel:test, .bazel:runner:windows-amd64 ]
  variables:
    POWERSHELL_SCRIPT: >-
      bazel test --keep_going --config=no-dd-agent-go-tests
      //... --
      -//bazel/rules/dd_packaging/...
      -//packages/agent/linux/...

# Per-flavor test jobs. Each runs the tests for one agent flavor, mirroring the
# dda inv test --flavor=<f> topology. --config=<flavor> sets
# --test_tag_filters=flavor_<flavor>, selecting only the matching go_test variants.
.bazel:test:flavor:
  extends: .bazel:test
  script:
    - bazel test --keep_going --build_tests_only --config=$FLAVOR //pkg/... //comp/... //cmd/...

bazel:test:linux-amd64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: base

bazel:test:linux-amd64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: dogstatsd

bazel:test:linux-amd64:heroku:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: heroku

bazel:test:linux-amd64:iot:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-amd64 ]
  variables:
    FLAVOR: iot

bazel:test:linux-arm64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: base

bazel:test:linux-arm64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: dogstatsd

bazel:test:linux-arm64:heroku:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: heroku

bazel:test:linux-arm64:iot:
  extends: [ .bazel:test:flavor, .bazel:runner:linux-arm64 ]
  variables:
    FLAVOR: iot

bazel:test:macos-amd64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:macos-amd64 ]
  variables:
    FLAVOR: base

bazel:test:macos-amd64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:macos-amd64 ]
  variables:
    FLAVOR: dogstatsd

bazel:test:macos-arm64:base:
  extends: [ .bazel:test:flavor, .bazel:runner:macos-arm64 ]
  variables:
    FLAVOR: base

bazel:test:macos-arm64:dogstatsd:
  extends: [ .bazel:test:flavor, .bazel:runner:macos-arm64 ]
  variables:
    FLAVOR: dogstatsd

# Windows can't extend .bazel:test:flavor: the Windows runner template consumes
# POWERSHELL_SCRIPT instead of `script:`, and the test pattern needs to exclude
# Linux-only packaging targets.
bazel:test:windows-amd64:base:
  extends: [ .bazel:test, .bazel:runner:windows-amd64 ]
  variables:
    POWERSHELL_SCRIPT: >-
      bazel test --keep_going --build_tests_only --config=base
      //pkg/... //comp/... //cmd/...

