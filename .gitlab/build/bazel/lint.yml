.bazel:lint:
  stage: lint
  after_script:
    - |-
      if [ $CI_JOB_STATUS = failed ]; then
        echo >&2 "💡 To fix the above problem, please consider running the following command:"
        echo >&2 "$FIX_COMMAND"
      fi

bazel:mod-deps:
  extends: [ .bazel:lint, .bazel:runner:linux-amd64 ]
  script:
    # Why not `bazel mod deps --lockfile_mode=error`:
    # 1. `bazel` servers on persistent runners cache non-local repository rules, causing stale checks (#incident-46079),
    # 2. `--lockfile_mode=error` doesn't print discrepancies exhaustively, especially on rules_* lock files.
    #
    # Instead:
    # 1. use `--lockfile_mode=refresh` to forcibly re-evaluate non-local repository rules,
    # 2. use `git diff --exit-code` to still fail on any discrepancies while printing them exhaustively.
    - bazel mod deps --lockfile_mode=refresh
    - git diff --exit-code
  variables:
    FIX_COMMAND: "bazel mod deps"

bazel:mod-tidy:
  extends: [ .bazel:lint, .bazel:runner:linux-amd64 ]
  script:
    - bazel mod tidy --lockfile_mode=off
    - git diff --exit-code
  variables:
    FIX_COMMAND: "bazel mod tidy"

bazel:run-buildifier-test:
  extends: [ .bazel:lint, .bazel:runner:linux-amd64 ]
  script:
    - bazel run //bazel/buildifier:test
  variables:
    FIX_COMMAND: "bazel run //bazel/buildifier"

bazel:run-gazelle:
  extends: [ .bazel:lint, .bazel:runner:linux-amd64 ]
  script:
    - bazel run //:gazelle -- -mode=diff
  variables:
    FIX_COMMAND: "bazel run //:gazelle"

bazel:run-go-mod-tidy:
  extends: [ .bazel:lint, .bazel:runner:linux-amd64 ]
  script:
    - bazel run //:go_mod_tidy_all -- -diff
  variables:
    FIX_COMMAND: "bazel run //:go_mod_tidy_all"

# TEMPORARY — investigating openssl/python_unix remote-cache misses on edge cache. Remove after use.
bazel:debug-buildbarn-digest-compare:
  extends: [ .bazel:runner:linux-amd64 ]
  stage: lint
  rules:
    - when: on_success
  allow_failure: true
  script:
    - bazel build --//:install_dir=/opt/datadog-agent --execution_log_json_file=/tmp/bb_debug_exec_log.json @cpython//:install
    - |
      python3 - <<'PYEOF'
      import json
      with open('/tmp/bb_debug_exec_log.json') as f:
          data = f.read()
      decoder = json.JSONDecoder()
      idx = 0
      n = len(data)
      targets = {"@@+http_archive+openssl//:openssl", "@@+http_archive+cpython//:python_unix"}
      while idx < n:
          while idx < n and data[idx] in ' \t\r\n':
              idx += 1
          if idx >= n:
              break
          obj, end = decoder.raw_decode(data, idx)
          idx = end
          if obj.get("targetLabel") in targets and obj.get("mnemonic") == "CcConfigureMakeRule":
              print("=== BUILDBARN_DEBUG", obj.get("targetLabel"), "===")
              print("  digest:", obj.get("digest"))
              print("  cacheHit:", obj.get("cacheHit"), "runner:", obj.get("runner"))
      PYEOF
