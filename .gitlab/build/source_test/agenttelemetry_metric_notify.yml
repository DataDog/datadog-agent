---
# Reminds PR authors changing the COAT (Cross-Org Agent Telemetry) default metric profiles
# how to spin up a dev VM built from the current pipeline to validate the change.
# See https://datadoghq.atlassian.net/wiki/spaces/agent/pages/6904120021/COAT+-+Cross-Org+Agent+Telemetry#Report-a-telemetry-metric
#
# Posts a placeholder comment immediately (agenttelemetry_metric_vm_reminder_pending), then
# overwrites it in place (same pr-commenter title, so it edits rather than duplicates) with
# copy-paste `aws.create-vm` commands for both Linux and Windows once at least one of those
# platforms' e2e testing package deploy jobs succeeds. The deploy jobs are declared
# `optional: true` in `needs` since they may not run at all on some pipelines (e.g.
# DEPLOY_AGENT=false) — in that case the corresponding "ready" job just never runs and the
# placeholder comment stays as-is.

.agenttelemetry_metric_vm_notify_rules:
  - !reference [.on_dev_branches]
  - changes:
      paths:
        - comp/core/agenttelemetry/impl/defaultProfiles.yaml
      compare_to: $COMPARE_TO_BRANCH

agenttelemetry_metric_vm_reminder_pending:
  stage: source_test
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/linux$CI_IMAGE_LINUX_SUFFIX:$CI_IMAGE_LINUX
  tags: ["arch:amd64", "specific:true"]
  extends: .dd_octo_sts
  needs: []
  rules:
    - !reference [.agenttelemetry_metric_vm_notify_rules]
  before_script:
    - !reference [.setup_github_token_comment_pr]
  script:
    - dda inv -- -e github.pr-commenter --title="COAT metric validation VM" --body="This PR changes a COAT metric profile. A dev VM build for this pipeline is running — this comment will update with copy-paste \`aws.create-vm\` commands (Linux and Windows) once at least one platform's build finishes."

.agenttelemetry_metric_vm_reminder_ready:
  stage: e2e_deploy
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/linux$CI_IMAGE_LINUX_SUFFIX:$CI_IMAGE_LINUX
  tags: ["arch:amd64", "specific:true"]
  extends: .dd_octo_sts
  rules:
    - !reference [.agenttelemetry_metric_vm_notify_rules]
  before_script:
    - !reference [.setup_github_token_comment_pr]
  script:
    - |
      cat > coat-metric-vm-reminder.md <<'EOF'
      A dev VM build for this pipeline is ready. Pick the command for the platform you need to validate:

      Linux:
      ```
      dda inv aws.create-vm --pipeline-id=__PIPELINE_ID__
      ```

      Windows:
      ```
      dda inv aws.create-vm --os-family=windows --pipeline-id=__PIPELINE_ID__
      ```

      See [Observing telemetry](https://datadoghq.atlassian.net/wiki/spaces/agent/pages/6904120021/COAT+-+Cross-Org+Agent+Telemetry#Observing-telemetry) for how to find the metric once the agent is running. If a command fails because that platform's build hasn't finished yet, wait a bit and retry.
      EOF
    - sed -i "s/__PIPELINE_ID__/${CI_PIPELINE_ID}/" coat-metric-vm-reminder.md
    - dda inv -- -e github.pr-commenter --title="COAT metric validation VM" --body-file=coat-metric-vm-reminder.md

agenttelemetry_metric_vm_reminder_linux:
  extends: .agenttelemetry_metric_vm_reminder_ready
  needs:
    - job: deploy_deb_testing-a7_x64
      optional: true

agenttelemetry_metric_vm_reminder_windows:
  extends: .agenttelemetry_metric_vm_reminder_ready
  needs:
    - job: deploy_windows_testing-a7
      optional: true
