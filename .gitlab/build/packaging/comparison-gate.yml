---
# CI job that diffs the Bazel-built agent deb against the omnibus reference deb.
# This gate is intended to run after the omnibus packaging job has produced its
# artifact so that the comparison is meaningful.
#
# allow_failure: true until the known differences listed in
# packages/installer/MIGRATION_PLAN.md are resolved and the diff is clean.

bazel:packaging:comparison-gate:
  extends: [ .bazel:defs:cache:omnibus-transition, .package_deb_x86 ]
  stage: packaging
  rules:
    - when: on_success
  # Consume the omnibus deb artifact produced earlier in the same pipeline.
  # The deb lands in $OMNIBUS_PACKAGE_DIR on the runner for that job; GitLab
  # copies the entire artifact directory to this job's workspace.
  needs:
    - job: agent_deb-x64-a7
      artifacts: true
    - job: generate_minimized_btfs_x64
      artifacts: true
  variables:
    KUBERNETES_CPU_REQUEST: 8
    KUBERNETES_MEMORY_REQUEST: "16Gi"
    KUBERNETES_MEMORY_LIMIT: "16Gi"
    # Paths that are known/accepted to differ between omnibus and Bazel builds.
    # Lines matching these patterns in the path-set diff are not treated as
    # failures.  Extend this list as each known difference is investigated.
    # Each pattern matches against path-set lines of the form:
    #   "TYPE PATH [-> TARGET]"   (e.g. "- opt/datadog-agent/embedded/lib/libssl.so")
    #
    # Accepted drops (omnibus-only, intentionally absent from Bazel output):
    #   version-manifest.json / version-manifest.txt  — omnibus-specific artefact
    #   LICENSE (aggregated text file)                — pending decision (Phase 6)
    #   libdatadog-agent-rtloader.so.[0-9]            — intentional SOVERSION change
    #                                                    (PR #46720, 2026-02-20); omnibus ref
    #                                                    has .so.2, Bazel emits .so.0 per
    #                                                    VERSION=0.1.0 in rtloader/BUILD.bazel
    #
    # Accepted additions (Bazel-only):
    #   datadog-installer symlinks / package dirs     — installer-symlinks component
    # TODO: fix linux/BUILD.bazel version to "1:7" (epoch mismatch — apt upgrades break without this)
    ACCEPTED_DIFF_PATTERNS: "version-manifest|opt/datadog-packages/|libdatadog-agent-rtloader\\.so"
  script:
    # ── 1. Locate the omnibus reference deb ──────────────────────────────────
    - |
      OMNIBUS_DEB=$(find -L "$OMNIBUS_PACKAGE_DIR" -name "datadog-agent_*.deb" | head -1)
      if [[ -z "$OMNIBUS_DEB" ]]; then
        echo "ERROR: no omnibus deb found in $OMNIBUS_PACKAGE_DIR"
        ls -la "$OMNIBUS_PACKAGE_DIR" || true
        exit 1
      fi
      echo "Omnibus deb: $OMNIBUS_DEB"

    # ── 2. Stage the BTF archive so MINIMIZED_BTFS_PATH is set for Bazel ────
    # The generate_minimized_btfs_x64 artifact lands at $CI_PROJECT_DIR/minimized-btfs.tar.xz.
    # Copy it into a dedicated directory and export MINIMIZED_BTFS_PATH so the
    # @minimized_btfs_archive repo rule picks it up (see bazel/repo/minimized_btfs.bzl).
    # .bazelrc already has `common --repo_env=MINIMIZED_BTFS_PATH`, which forwards
    # the shell env var into Bazel's repo-rule environment automatically.
    - |
      mkdir -p /tmp/minimized-btfs-dir
      cp "$CI_PROJECT_DIR/minimized-btfs.tar.xz" /tmp/minimized-btfs-dir/
      export MINIMIZED_BTFS_PATH=/tmp/minimized-btfs-dir

    # ── 3. Build the Bazel deb ────────────────────────────────────────────────
    - bzl build //packages/agent/linux:debian
    - |
      BAZEL_DEB=$(find -L bazel-bin/packages/agent/linux -name "datadog-agent_*.deb" | head -1)
      if [[ -z "$BAZEL_DEB" ]]; then
        echo "ERROR: Bazel deb not found under bazel-bin/packages/agent/linux"
        find bazel-bin/packages -name "*.deb" || true
        exit 1
      fi
      echo "Bazel deb: $BAZEL_DEB"

    # ── 4. File-tree diff ─────────────────────────────────────────────────────
    # Strategy: compare the *set of paths* (not full tar tv lines).  This
    # avoids false positives from format differences between omnibus and Bazel:
    #   - Leading "./" prefix: omnibus uses "./" before paths; rules_pkg does not.
    #   - Ownership: omnibus uses "root/root"; rules_pkg uses "0/0".
    #   - Symlink permissions: "lrwxrwxrwx" vs "lrw-r--r--".
    #   - Timestamps: real timestamps vs reproducible-build epoch.
    #   - File sizes: same path but different binary version → different size.
    #
    # Path normalization applied before comparison:
    #   - lib*.so.X.Y.Z → lib*.so.X  (major-only; eliminates .so version skew)
    #   - symlink target field (after "->") is included so that renamed targets
    #     are detected as structural differences.
    #
    # The "only in omnibus" list is the actionable set.  The full `diff` on
    # raw `tar tv` output is kept in pkg-diff.txt for human review but is not
    # used for the PASS/FAIL decision.
    - |
      _normalize_so() {
        sed 's|\(lib[^./]*\.so\)\(\.[0-9][0-9]*\)\(\.[0-9][0-9.]*\)|\1\2|g'
      }
      # Extract "TYPE PATH [-> TARGET]" from a tar tv line, stripping leading ./ .
      _path_set() {
        awk '{
          t = substr($1,1,1)
          p = $6
          sub(/^\.\//, "", p)
          if ($7 == "->") print t, p, "->", $8
          else print t, p
        }'
      }
      echo "=== File tree diff (< omnibus  > bazel, raw for review) ==="
      diff \
        <(dpkg-deb --fsys-tarfile "$OMNIBUS_DEB" | tar tv | sort) \
        <(dpkg-deb --fsys-tarfile "$BAZEL_DEB"   | tar tv | sort) \
        | tee pkg-diff.txt || true
      echo ""
      echo "=== Path-set diff (< only-in-omnibus  > only-in-bazel) ==="
      diff \
        <(dpkg-deb --fsys-tarfile "$OMNIBUS_DEB" | tar tv | _normalize_so | _path_set | sort -u) \
        <(dpkg-deb --fsys-tarfile "$BAZEL_DEB"   | tar tv | _normalize_so | _path_set | sort -u) \
        | tee pkg-path-diff.txt || true

    # ── 5. Control / scriptlet diff ──────────────────────────────────────────
    - |
      echo "=== Control section diff ==="
      mkdir -p /tmp/omnibus-ctrl /tmp/bazel-ctrl
      dpkg-deb -e "$OMNIBUS_DEB" /tmp/omnibus-ctrl/
      dpkg-deb -e "$BAZEL_DEB"   /tmp/bazel-ctrl/
      {
        echo "--- control ---"
        diff /tmp/omnibus-ctrl/control  /tmp/bazel-ctrl/control  || true
        echo "--- postinst ---"
        diff /tmp/omnibus-ctrl/postinst /tmp/bazel-ctrl/postinst || true
        echo "--- postrm ---"
        diff /tmp/omnibus-ctrl/postrm   /tmp/bazel-ctrl/postrm   || true
        echo "--- preinst ---"
        diff /tmp/omnibus-ctrl/preinst  /tmp/bazel-ctrl/preinst  || true
        echo "--- prerm ---"
        diff /tmp/omnibus-ctrl/prerm    /tmp/bazel-ctrl/prerm    || true
        echo "=== md5sums diff ==="
        diff /tmp/omnibus-ctrl/md5sums /tmp/bazel-ctrl/md5sums | head -50 || true
      } | tee -a pkg-diff.txt

    # ── 6. Fail on unexpected diffs ───────────────────────────────────────────
    #
    # Use the path-set diff (not the raw diff) for the PASS/FAIL decision so
    # that format differences (ownership, timestamps, permissions, file sizes)
    # do not generate spurious failures.  Strip accepted path patterns, then
    # fail if any path that is only-in-omnibus remains unexplained.
    #
    # The job is allow_failure:true so this produces a visible warning without
    # blocking the pipeline while differences are being resolved.
    - |
      echo "=== Checking for unexpected differences ==="
      UNEXPECTED=$(grep -E '^[<>]' pkg-path-diff.txt \
        | grep -Ev "$ACCEPTED_DIFF_PATTERNS" \
        || true)
      if [[ -n "$UNEXPECTED" ]]; then
        echo "FAIL: unexpected path differences between omnibus and Bazel debs:"
        echo "$UNEXPECTED"
        exit 1
      else
        echo "OK: no unexpected path differences"
      fi
  after_script:
    # Copy the diff reports into the artifact directory so they are easy to find.
    - cp pkg-diff.txt "$OMNIBUS_PACKAGE_DIR/agent-pkg-diff.txt" 2>/dev/null || true
    - cp pkg-path-diff.txt "$OMNIBUS_PACKAGE_DIR/agent-pkg-path-diff.txt" 2>/dev/null || true
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - pkg-diff.txt
      - pkg-path-diff.txt
      - $OMNIBUS_PACKAGE_DIR/agent-pkg-diff.txt
  allow_failure: true
