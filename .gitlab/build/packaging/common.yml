---
.static_quality_gate_package: |
  # Measure package size and generate in-place report. Runs as the last step of
  # the producer's main script so a failure here fails the producer job: the
  # SQG consumer reads these reports from S3 and has no fallback path.
  if [[ -n "$STATIC_QUALITY_GATE_NAME" ]]; then
    echo "📊 Starting package measurement..."

    # SUSE jobs relocate packages from OMNIBUS_PACKAGE_DIR to
    # OMNIBUS_PACKAGE_DIR_SUSE in their script; pick whichever directory
    # actually holds the file so this step works regardless of order.
    if [[ "$STATIC_QUALITY_GATE_NAME" == *"suse"* && -d "$OMNIBUS_PACKAGE_DIR_SUSE" && -n "$(ls -A "$OMNIBUS_PACKAGE_DIR_SUSE" 2>/dev/null)" ]]; then
      BASE_PACKAGE_DIR="$OMNIBUS_PACKAGE_DIR_SUSE"
    else
      BASE_PACKAGE_DIR="$OMNIBUS_PACKAGE_DIR"
    fi

    # Determine package type and set appropriate variables
    # Handle FIPS packages by adjusting project name
    PROJECT_NAME="$DD_PROJECT"
    if [[ "$STATIC_QUALITY_GATE_NAME" == *"fips"* ]]; then
      PROJECT_NAME="fips-${DD_PROJECT}"
    fi

    # RPM uses x86_64 and aarch64 for architecture.
    # If STATIC_QUALITY_GATE_ARCH is set (which is the case for RPM packages), use it,
    # otherwise use PACKAGE_ARCH (which is the architecture of the package)
    ARCH_VAR="${STATIC_QUALITY_GATE_ARCH:-${PACKAGE_ARCH}}"

    # Determine format based on package type
    case "$STATIC_QUALITY_GATE_NAME" in
      *deb*|*heroku*) SEP="_7*"; EXT="deb"; ARCH="${PACKAGE_ARCH}" ;;
      *rpm*|*suse*) SEP="-7*"; EXT="rpm" ;;
      *) echo "⚠️  Unknown package type for gate: $STATIC_QUALITY_GATE_NAME"; exit 1 ;;
    esac

    PACKAGE_PATTERN="${BASE_PACKAGE_DIR}/datadog-${PROJECT_NAME}${SEP}${ARCH_VAR}.${EXT}"

    echo "🔍 Looking for package with pattern: $PACKAGE_PATTERN"

    # Extract report prefix from gate name (e.g. static_quality_gate_agent_rpm_amd64 -> agent_rpm_amd64)
    REPORT_PREFIX="${STATIC_QUALITY_GATE_NAME#static_quality_gate_}"
    REPORT_FILENAME="${REPORT_PREFIX}_size_report_${CI_COMMIT_SHORT_SHA}.yml"

    for package_file in $PACKAGE_PATTERN; do
      if [[ -f "$package_file" ]]; then
        echo "📏 Measuring package: $package_file"

        # Generate measurement report using STATIC_QUALITY_GATE_NAME variable
        dda inv quality-gates.measure-package-local \
          --package-path "$package_file" \
          --gate-name "$STATIC_QUALITY_GATE_NAME" \
          --build-job-name "$CI_JOB_NAME" \
          --output-path "${REPORT_FILENAME}" \
          --debug || { echo "⚠️  Package measurement failed for $package_file"; exit 1; }

        echo "✅ Package measurement completed"

        # Upload under a pipeline-scoped prefix so concurrent pipelines for
        # the same commit (e.g. cross-repo downstream pipelines) don't
        # overwrite each other's reports.
        BUCKET_BASE_PATH="s3://dd-ci-artefacts-build-stable/datadog-agent/static_quality_gates/GATE_REPORTS"
        echo "Uploading report to ${BUCKET_BASE_PATH}/${CI_PIPELINE_ID}/${REPORT_FILENAME}"
        aws s3 cp --only-show-errors --region us-east-1 --sse AES256 \
          "${REPORT_FILENAME}" \
          "${BUCKET_BASE_PATH}/${CI_PIPELINE_ID}/${REPORT_FILENAME}"

        # Optional second upload at the commit-only path for downstream
        # consumers that look up by commit alone (e.g. files_inventory_check
        # parent-report fetch). Skipped on cross-repo sources so the shared
        # path can't be polluted by foreign uploads.
        if [[ "$UPLOAD_GLOBAL_INVENTORY" == "true" ]]; then
          case "$CI_PIPELINE_SOURCE" in
            pipeline|parent_pipeline)
              echo "Pipeline source is '$CI_PIPELINE_SOURCE'; skipping global report upload"
              ;;
            *)
              echo "Uploading global report to ${BUCKET_BASE_PATH}/${CI_COMMIT_SHA}/${REPORT_FILENAME}"
              aws s3 cp --only-show-errors --region us-east-1 --sse AES256 \
                "${REPORT_FILENAME}" \
                "${BUCKET_BASE_PATH}/${CI_COMMIT_SHA}/${REPORT_FILENAME}"
              ;;
          esac
        fi
      else
        echo "⚠️  No package found matching pattern: $PACKAGE_PATTERN"; exit 1;
      fi
    done
  else
    echo "ℹ️  Skipping package measurement (no STATIC_QUALITY_GATE_NAME defined)"
  fi

.static_quality_gate_report_path: "**/*_size_report_*.yml"
