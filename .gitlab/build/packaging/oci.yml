.package_oci:
  stage: packaging
  rules:
    - !reference [.except_mergequeue]
    - when: on_success
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/linux$CI_IMAGE_LINUX_SUFFIX:$CI_IMAGE_LINUX
  tags: ["arch:amd64", "specific:true"]
  before_script:
    - PACKAGE_VERSION="$(dda inv agent.version --url-safe)-1" || exit $?
    - export INSTALL_DIR=${INSTALL_DIR:-/opt/datadog-packages/${OCI_PRODUCT}/${PACKAGE_VERSION}}
    - set +x
  variables:
    KUBERNETES_CPU_REQUEST: 16
    KUBERNETES_MEMORY_REQUEST: "32Gi"
    KUBERNETES_MEMORY_LIMIT: "32Gi"
  script:
    - !reference [.retrieve_linux_go_tools_deps]
    - rm -f $OMNIBUS_PACKAGE_DIR/*-dbg-*.tar.xz
    - ls -l $OMNIBUS_PACKAGE_DIR
    - export PATH="$PATH:$(go env GOPATH)/bin"
    - dda self dep sync -f legacy-tasks
    - OUTPUT_DIR="/tmp/oci_output"
    - mkdir -p ${OUTPUT_DIR}
    - ls $OMNIBUS_PACKAGE_DIR
    # Copy existing OCI (like the Windows one) to the output dir directly to be merged.
    - |
      if [ $(ls $OMNIBUS_PACKAGE_DIR/pipeline-$CI_PIPELINE_ID/*.oci.tar 2> /dev/null | wc -l) -ge 1 ]; then
        echo "Copying already built images to output dir"
        cp $OMNIBUS_PACKAGE_DIR/pipeline-$CI_PIPELINE_ID/*.oci.tar ${OUTPUT_DIR}
      fi
    - |
      # Resolve a glob pattern to a single file path, printed on stdout.
      # Prints a warning to stderr if more than one file matches.
      # Usage: resolve_artifact LABEL PATTERN [EXCLUDE]
      #   LABEL:   human-readable name for warning messages
      #   PATTERN: glob string; pass it quoted to prevent expansion at the call site — ls receives it unquoted inside the function
      #   EXCLUDE: optional grep -v filter (e.g. "ddot" to exclude ddot files)
      # Returns 0 and prints the path if a file was found, returns 1 if not.
      resolve_artifact() {
        local label="$1" pattern="$2" exclude="${3:-}"
        local matches first count
        if [ -n "${exclude}" ]; then
          matches=$(ls ${pattern} 2>/dev/null | grep -v "${exclude}" || true)
        else
          matches=$(ls ${pattern} 2>/dev/null || true)
        fi
        if [ -z "${matches}" ]; then
          echo "ERROR: ${label} artifact not found (pattern: ${pattern})" >&2
          return 1
        fi
        count=$(echo "${matches}" | wc -l)
        first=$(echo "${matches}" | head -1)
        if [ "${count}" -gt 1 ]; then
          echo "WARNING: multiple ${label} artifacts found, using ${first}" >&2
        fi
        echo "${first}"
      }
      for ARCH in "amd64" "arm64"; do
        if [ "${OCI_PRODUCT}" = "datadog-agent" ]; then
          # For the main agent, exclude DDOT files since DDOT is bundled as an extension
          INPUT_FILE=$(resolve_artifact "agent" "${OMNIBUS_PACKAGE_DIR}${OCI_PRODUCT}-*${ARCH}.tar.xz" "ddot") || exit 1
        else
          # For other products (like datadog-agent-ddot), don't filter
          INPUT_FILE=$(resolve_artifact "${OCI_PRODUCT}" "${OMNIBUS_PACKAGE_DIR}${OCI_PRODUCT}-*${ARCH}.tar.xz") || exit 1
        fi
        OUTPUT_FILE="$(basename -a -s .xz ${INPUT_FILE})"
        MERGED_FILE=$(basename "${INPUT_FILE}" | sed "s/-${ARCH}.tar.xz//").oci.tar
        export MERGED_FILE
        INPUT_DIR="/tmp/input_${ARCH}"
        mkdir -p ${INPUT_DIR}
        echo "Generating OCI for $ARCH."
        echo "Extracting to temporary input dir $INPUT_FILE -> $INPUT_DIR"
        tar xJf ${INPUT_FILE} -C ${INPUT_DIR}
        echo "Creating OCI layer -> ${OUTPUT_DIR}/${OUTPUT_FILE}"
        if [ "${OCI_PRODUCT}" = "datadog-agent" ]; then
          INSTALLER_INPUT_FILE=$(resolve_artifact "installer" "${OMNIBUS_PACKAGE_DIR}datadog-installer-*${ARCH}.tar.xz") || exit 1
          INSTALLER_INPUT_DIR="/tmp/input_installer_${ARCH}"
          mkdir -p ${INSTALLER_INPUT_DIR}
          echo "Extracting installer to temporary input dir $INSTALLER_INPUT_FILE -> $INSTALLER_INPUT_DIR"
          tar xJf ${INSTALLER_INPUT_FILE} -C ${INSTALLER_INPUT_DIR}

          # Extract DDOT
          DDOT_INPUT_FILE=$(resolve_artifact "DDOT" "${OMNIBUS_PACKAGE_DIR}datadog-agent-ddot-*${ARCH}.tar.xz") || exit 1
          DDOT_EXTENSION_DIR="/tmp/ddot_extension_${ARCH}"
          mkdir -p "${DDOT_EXTENSION_DIR}/etc"
          echo "Extracting DDOT ${DDOT_INPUT_FILE} -> ${DDOT_EXTENSION_DIR}"
          tar xJf "${DDOT_INPUT_FILE}" --strip-components=2 -C "${DDOT_EXTENSION_DIR}" opt/
          tar xJf "${DDOT_INPUT_FILE}" --strip-components=1 -C "${DDOT_EXTENSION_DIR}/etc" etc/
          EXTRA_FLAGS="--configs ${INPUT_DIR}/etc/datadog-agent --installer ${INSTALLER_INPUT_DIR}/opt/datadog-packages/datadog-installer/${PACKAGE_VERSION}/bin/installer/installer --extension ddot=${DDOT_EXTENSION_DIR}"

          # Extract DDOT FIPS — only bundled into the FIPS variant manifest, not the base manifest
          DDOT_FIPS_INPUT_FILE=$(resolve_artifact "DDOT FIPS" "${OMNIBUS_PACKAGE_DIR}datadog-fips-agent-ddot-*${ARCH}.tar.xz") || exit 1
          DDOT_FIPS_EXTENSION_DIR="/tmp/ddot_fips_extension_${ARCH}"
          mkdir -p "${DDOT_FIPS_EXTENSION_DIR}/etc"
          echo "Extracting DDOT FIPS ${DDOT_FIPS_INPUT_FILE} -> ${DDOT_FIPS_EXTENSION_DIR}"
          tar xJf "${DDOT_FIPS_INPUT_FILE}" --strip-components=2 -C "${DDOT_FIPS_EXTENSION_DIR}" opt/
          tar xJf "${DDOT_FIPS_INPUT_FILE}" --strip-components=1 -C "${DDOT_FIPS_EXTENSION_DIR}/etc" etc/
        fi
        if [ "${OCI_PRODUCT}" = "datadog-installer" ]; then
          EXTRA_FLAGS="--installer ${INPUT_DIR}/${INSTALL_DIR}/bin/installer/installer"
        fi
        if [ "${OCI_PRODUCT}" = "datadog-agent-ddot" ]; then
          EXTRA_FLAGS="--configs ${INPUT_DIR}/etc/datadog-agent"
        fi
        datadog-package create \
          --version ${PACKAGE_VERSION} \
          --package ${OCI_PRODUCT} \
          --os linux \
          --arch ${ARCH} \
          --archive --archive-path "${OUTPUT_DIR}/${OUTPUT_FILE}" \
          ${EXTRA_FLAGS} \
          ${INPUT_DIR}/${INSTALL_DIR}/

        # Build the FIPS-flavored variant (Platform.Variant="fips") into the same OCI index.
        # The installer selects this variant when DD_FIPS_MODE=true.
        if [ "${OCI_PRODUCT}" = "datadog-agent" ]; then
          FIPS_INPUT_FILE=$(resolve_artifact "FIPS agent" "${OMNIBUS_PACKAGE_DIR}datadog-fips-agent-*${ARCH}.tar.xz" "ddot") || exit 1
          FIPS_INPUT_DIR="/tmp/input_fips_${ARCH}"
          FIPS_EXTRA_FLAGS="--configs ${FIPS_INPUT_DIR}/etc/datadog-agent --installer ${FIPS_INPUT_DIR}/${INSTALL_DIR}/embedded/bin/installer --extension ddot=${DDOT_FIPS_EXTENSION_DIR}"
        fi
        if [ "${OCI_PRODUCT}" = "datadog-installer" ]; then
          FIPS_INPUT_FILE=$(resolve_artifact "FIPS installer" "${OMNIBUS_PACKAGE_DIR}datadog-fips-installer-*${ARCH}.tar.xz") || exit 1
          FIPS_INPUT_DIR="/tmp/input_fips_installer_${ARCH}"
          FIPS_EXTRA_FLAGS="--installer ${FIPS_INPUT_DIR}/${INSTALL_DIR}/bin/installer/installer"
        fi
        if [ -n "${FIPS_INPUT_FILE:-}" ]; then
          FIPS_OUTPUT_FILE="$(basename -a -s .xz ${FIPS_INPUT_FILE})"
          mkdir -p ${FIPS_INPUT_DIR}
          echo "Extracting FIPS ${FIPS_INPUT_FILE} -> ${FIPS_INPUT_DIR}"
          tar xJf ${FIPS_INPUT_FILE} -C ${FIPS_INPUT_DIR}
          echo "Creating FIPS OCI layer -> ${OUTPUT_DIR}/${FIPS_OUTPUT_FILE}"
          datadog-package create \
            --version ${PACKAGE_VERSION} \
            --package ${OCI_PRODUCT} \
            --os linux \
            --arch ${ARCH} \
            --variant fips \
            --archive --archive-path "${OUTPUT_DIR}/${FIPS_OUTPUT_FILE}" \
            ${FIPS_EXTRA_FLAGS} \
            ${FIPS_INPUT_DIR}/${INSTALL_DIR}/
          rm -f ${FIPS_INPUT_FILE}
        fi

        rm -f ${INPUT_FILE}
        if [ "${OCI_PRODUCT}" = "datadog-agent" ]; then
          rm -f ${INSTALLER_INPUT_FILE} ${DDOT_INPUT_FILE} ${DDOT_FIPS_INPUT_FILE}
        fi
      done
    - echo "Aggregating all layers into one package -> ${MERGED_FILE}"
    - ls -l ${OUTPUT_DIR}/
    - datadog-package merge ${OUTPUT_DIR}/*.tar
    # We need to propagate the exact version in the pipeline artifact
    - mv merged.tar ${OMNIBUS_PACKAGE_DIR}/${MERGED_FILE}
  artifacts:
    paths:
      - ${OMNIBUS_PACKAGE_DIR}

agent_oci:
  extends: .package_oci
  needs:
    - "datadog-agent-oci-x64-a7"
    - "datadog-agent-oci-arm64-a7"
    - "datadog-agent-oci-x64-a7-fips"
    - "datadog-agent-oci-arm64-a7-fips"
    - "go_tools_deps"
    - "installer-arm64-oci"
    - "installer-amd64-oci"
    - "datadog-otel-agent-x64"
    - "datadog-otel-agent-arm64"
    - "datadog-otel-agent-x64-fips"
    - "datadog-otel-agent-arm64-fips"
    - job: "agent_win_oci"
      optional: true
  variables:
    OCI_PRODUCT: "datadog-agent"

installer_oci:
  extends: .package_oci
  needs:
    [
      "installer-arm64-oci",
      "installer-amd64-oci",
      "installer-fips-arm64-oci",
      "installer-fips-amd64-oci",
      "go_tools_deps",
    ]
  variables:
    OCI_PRODUCT: "datadog-installer"

ddot_oci:
  extends: .package_oci
  needs:
    - "datadog-otel-agent-x64"
    - "datadog-otel-agent-arm64"
    - "go_tools_deps"
    - job: "ddot_win_oci"
      optional: true
  variables:
    OCI_PRODUCT: "datadog-agent-ddot"
    INSTALL_DIR: "/opt/datadog-agent"
  artifacts:
    paths:
      - ${OMNIBUS_PACKAGE_DIR}/*.oci.tar
