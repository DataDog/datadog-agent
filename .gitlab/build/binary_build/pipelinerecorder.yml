---
.build_pipelinerecorder_binary_common:
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/linux$CI_IMAGE_LINUX_SUFFIX:$CI_IMAGE_LINUX
  stage: binary_build
  rules:
    - !reference [.except_mergequeue]
    - when: on_success
  script:
    - mkdir -p bin/pipelinerecorder
    - cargo build --release --manifest-path tools/pipelinerecorder/Cargo.toml
    - cp tools/pipelinerecorder/target/release/pipelinerecorder bin/pipelinerecorder/pipelinerecorder
  variables:
    KUBERNETES_MEMORY_REQUEST: "8Gi"
    KUBERNETES_MEMORY_LIMIT: "8Gi"
  artifacts:
    expire_in: 1 day
    paths:
      - $CI_PROJECT_DIR/bin/pipelinerecorder/pipelinerecorder

build_pipelinerecorder_binary_x64:
  extends: [.build_pipelinerecorder_binary_common]
  tags: ["arch:amd64", "specific:true"]

build_pipelinerecorder_binary_arm64:
  extends: [.build_pipelinerecorder_binary_common]
  tags: ["arch:arm64", "specific:true"]
