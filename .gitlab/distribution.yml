---
stages:
  - deploy_containers
  - deploy_mutable_image_tags
  - deploy_packages
  - deploy_cws_instrumentation
  - deploy_cws_instrumentation_mutable_tags
  - deploy_dca
  - deploy_dca_mutable_tags
  - trigger_release

include:
  - .gitlab/.pre/common/shared.yml
  - .gitlab/.pre/common/container_publish_job_templates.yml
  # Image promotion template from dd-source — provides .image-promotion job definition
  # TODO: pin to a commit on main once merged.
  - project: DataDog/dd-source
    ref: ali.benabdallah/BARX-1709/image-promotion-template
    file: domains/agent_delivery/gitlab-templates/image-promotion.yml
  - .gitlab/deploy/conditions.yml
  - local: .gitlab/deploy/trigger_release/**.yml
  - local: .gitlab/distribute/**.yml
