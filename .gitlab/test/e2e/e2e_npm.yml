---
# e2e stage - cloud-network-monitoring owned jobs
# Owned by: cloud-network-monitoring, agent-devx

new-e2e-npm-packages:
  extends: .new_e2e_template
  rules:
    - !reference [.on_npm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - agent_deb-x64-a7
    - agent_rpm-x64-a7
  variables:
    TARGETS: ./tests/npm
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --run "TestEC2(VM|VMSELinux|VMDirect)Suite"
    ON_NIGHTLY_FIPS: "true"

new-e2e-npm-docker:
  extends: .new_e2e_template
  rules:
    - !reference [.on_npm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_dca
    - qa_agent_linux
  variables:
    TARGETS: ./tests/npm
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --run "Test(ECSVM|EC2VMContainerized)Suite"
    ON_NIGHTLY_FIPS: "true"

new-e2e-npm-eks-init:
  stage: e2e_init
  extends: .new_e2e_template
  needs:
    - go_e2e_deps
    - go_tools_deps
  rules:
    - !reference [.on_npm_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/npm
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --run "TestEKSVMSuite"
    E2E_INIT_ONLY: "true"
    SHOULD_RUN_IN_FLAKES_FINDER: "false"
    PRE_BUILT_BINARIES_FLAG: ""
    KUBERNETES_MEMORY_REQUEST: 12Gi
    KUBERNETES_MEMORY_LIMIT: 16Gi
  allow_failure: true
  retry: !reference [.retry_only_infra_failure, retry]

new-e2e-npm-eks:
  extends: .new_e2e_template
  rules:
    - !reference [.on_npm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - new-e2e-npm-eks-init
    - qa_agent_linux
    - qa_dca
  variables:
    TARGETS: ./tests/npm
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --run "TestEKSVMSuite"
    E2E_PRE_INITIALIZED: "true"
    ON_NIGHTLY_FIPS: "true"
  retry: !reference [.retry_only_infra_failure, retry]

new-e2e-npm:
  extends: .new_e2e_template
  rules:
    - !reference [.on_npm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_agent_linux
    - qa_dca
  variables:
    TARGETS: ./tests/npm
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --run TestCiliumLBConntracker

new-e2e-netpath:
  extends: .new_e2e_template_needs_deb_x64
  needs:
    - !reference [.new_e2e_template_needs_deb_x64, needs]
    # netpath dynamic-tests run the agent as a Docker container, pulling the
    # agent-qa:<pipeline>-<sha>-linux image built by qa_agent_linux
    - qa_agent_linux
  rules:
    - !reference [.on_netpath_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/netpath
    TEAM: cloud-network-monitoring
    EXTRA_PARAMS: --skip "Windows"
    ON_NIGHTLY_FIPS: "true"
