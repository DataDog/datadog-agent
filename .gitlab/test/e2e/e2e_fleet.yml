---
# e2e stage - fleet owned jobs
# Owned by: fleet, agent-devx

.new_e2e_fleet_template:
  extends: .new_e2e_template
  rules:
    - !reference [.on_installer_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - deploy_deb_testing-a7_arm64
    - deploy_deb_testing-a7_x64
    - deploy_rpm_testing-a7_arm64
    - deploy_rpm_testing-a7_x64
    - deploy_suse_rpm_testing_arm64-a7
    - deploy_suse_rpm_testing_x64-a7
    - job: deploy_windows_testing-a7
      optional: true
    - deploy_installer_oci
    - deploy_agent_oci
    - deploy_ddot_oci
    - qa_installer_script_linux
    - job: qa_installer_script_windows
      optional: true
  variables:
    TEAM: fleet
    E2E_USE_AWS_PROFILE: "false"
    MAX_RETRIES_FLAG: "--max-retries=3"
    TARGETS: ./tests/fleet

# Fleet e2e jobs are split by platform group (linux/windows) via E2E_FLEET_PLATFORM_GROUP.
# Linux platforms are fast, so all their tests run in a single job. Windows is the
# wall-clock bottleneck (slow MSI install/uninstall on every test), so each Windows
# suite's test methods are sharded across two jobs (two VMs per platform) to roughly
# halve its duration. Shard 1 runs an explicit subset; shard 2 runs the complement
# (whole suite minus shard 1), so any newly added test still runs on Windows via shard 2.
new-e2e-fleet-config:
  extends: .new_e2e_fleet_template
  parallel:
    matrix:
      - E2E_FLEET_PLATFORM_GROUP: linux
        EXTRA_PARAMS: --run "TestFleetConfig$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetConfig$/.+/(TestConfig|TestConfigFailureCrash|TestSystemProbeConfig|TestConfigWithSecrets|TestConfigFilePermissions)$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetConfig$" --skip "TestFleetConfig$/.+/(TestConfig|TestConfigFailureCrash|TestSystemProbeConfig|TestConfigWithSecrets|TestConfigFilePermissions)$"

new-e2e-fleet-upgrade:
  extends: .new_e2e_fleet_template
  parallel:
    matrix:
      # TestFleetIntegrationPreservation is a separate Linux-only suite (provisions no
      # Windows VMs), so it runs alongside TestFleetUpgrade only in the linux entry.
      - E2E_FLEET_PLATFORM_GROUP: linux
        EXTRA_PARAMS: --run "TestFleetUpgrade$|TestFleetIntegrationPreservation$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetUpgrade$/.+/(TestUpgrade|TestIntegrationPreservationDebToOCI|TestUpgradeFailureHealth)$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetUpgrade$" --skip "TestFleetUpgrade$/.+/(TestUpgrade|TestIntegrationPreservationDebToOCI|TestUpgradeFailureHealth)$"

new-e2e-fleet-extensions:
  extends: .new_e2e_fleet_template
  parallel:
    matrix:
      - E2E_FLEET_PLATFORM_GROUP: linux
        EXTRA_PARAMS: --run "TestFleetExtensions$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetExtensions$/.+/(TestExtensionInstallAndRemove|TestExtensionSurvivesExperiment|TestExtensionSurvivesExperimentManagedByProcmgr)$"
      - E2E_FLEET_PLATFORM_GROUP: windows
        EXTRA_PARAMS: --run "TestFleetExtensions$" --skip "TestFleetExtensions$/.+/(TestExtensionInstallAndRemove|TestExtensionSurvivesExperiment|TestExtensionSurvivesExperimentManagedByProcmgr)$"

new-e2e-installer-script:
  extends: .new_e2e_template
  rules:
    - !reference [.on_installer_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - deploy_deb_testing-a7_arm64
    - deploy_deb_testing-a7_x64
    - deploy_rpm_testing-a7_arm64
    - deploy_rpm_testing-a7_x64
    - deploy_suse_rpm_testing_arm64-a7
    - deploy_suse_rpm_testing_x64-a7
    - deploy_installer_oci
    - deploy_agent_oci
    - qa_installer_script_linux
  variables:
    TARGETS: ./tests/installer/script
    TEAM: fleet
    FLEET_INSTALL_METHOD: "install_script"
    E2E_USE_AWS_PROFILE: "false"
    MAX_RETRIES_FLAG: "--max-retries=3"

new-e2e-installer:
  extends: .new_e2e_template
  rules:
    - !reference [.on_installer_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - deploy_deb_testing-a7_arm64
    - deploy_deb_testing-a7_x64
    - deploy_rpm_testing-a7_arm64
    - deploy_rpm_testing-a7_x64
    - deploy_suse_rpm_testing_arm64-a7
    - deploy_suse_rpm_testing_x64-a7
    - job: deploy_windows_testing-a7
      optional: true
    - deploy_installer_oci
    - deploy_agent_oci
    - qa_installer_script_linux
    - job: qa_installer_script_windows
      optional: true
    - deploy_ddot_oci
  variables:
    TARGETS: ./tests/installer/unix
    TEAM: fleet
    FLEET_INSTALL_METHOD: "install_script"
    E2E_LOGS_PROCESSING_TEST_DEPTH: 2
    E2E_USE_AWS_PROFILE: "false"
    MAX_RETRIES_FLAG: "--max-retries=3"

new-e2e-installer-ansible:
  extends: .new_e2e_template
  rules:
    - !reference [.on_installer_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - deploy_deb_testing-a7_arm64
    - deploy_deb_testing-a7_x64
    - deploy_rpm_testing-a7_arm64
    - deploy_rpm_testing-a7_x64
    - deploy_suse_rpm_testing_arm64-a7
    - deploy_suse_rpm_testing_x64-a7
    - job: deploy_windows_testing-a7
      optional: true
    - deploy_installer_oci
    - deploy_agent_oci
    - job: qa_installer_script_windows
      optional: true
  variables:
    TARGETS: ./tests/installer/unix
    TEAM: fleet
    FLEET_INSTALL_METHOD: "ansible"
    E2E_USE_AWS_PROFILE: "false"
    MAX_RETRIES_FLAG: "--max-retries=3"
