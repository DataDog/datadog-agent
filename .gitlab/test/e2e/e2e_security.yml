---
# e2e stage - security owned jobs (csm-threats-agent and agent-cspm)
# Owned by: csm-threats-agent, agent-cspm, agent-devx

.on_sbom_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - pkg/sbom/**/*
        - test/new-e2e/tests/sbom/**/*
      compare_to: $COMPARE_TO_BRANCH
    when: on_success

.on_cspm_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - pkg/security/**/*
        - pkg/compliance/**/*
        - test/new-e2e/tests/cspm/**/*
        # The host-benchmark suite validates the bundled benchmark content, whose
        # version is pinned by SECURITY_AGENT_POLICIES_VERSION in release.json, so a
        # policy bump must run the suite before it can break the main pipeline.
        - release.json
      compare_to: $COMPARE_TO_BRANCH
    when: on_success

new-e2e-cws:
  extends: .new_e2e_template
  rules:
    - !reference [.on_cws_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - agent_deb-x64-a7
    - qa_cws_instrumentation
    - qa_agent_linux
    - qa_dca
  variables:
    TARGETS: ./tests/cws
    TEAM: csm-threats-agent
    # Temporarily disable the test on FIPS pipeline, as remote-configuration is not available with FIPS Agent yet
    # ON_NIGHTLY_FIPS: "true"
  # Temporary, remove once we made sure the recent changes have no impact on the stability of these tests
  # NOTE: Do not remove this from e2e fips pipeline before remote config is available with fips, you can re-enable on fips pipeline when this test does not rely on remote-configuration
  parallel:
    matrix:
      - EXTRA_PARAMS: --run TestAgentSuiteEC2
      - EXTRA_PARAMS: --run TestAgentSuiteGCP
      - EXTRA_PARAMS: --run TestECSFargate
      - EXTRA_PARAMS: --run TestKindSuite
  allow_failure: true
  retry: !reference [.retry_only_infra_failure, retry]

new-e2e-sbom:
  extends: .new_e2e_template_needs_container_deploy_linux
  rules:
    - !reference [.on_sbom_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/sbom
    TEAM: csm-threats-agent
    ON_NIGHTLY_FIPS: "true"
  parallel:
    matrix:
      - EXTRA_PARAMS: --run "TestSBOMKindSuite"
      - EXTRA_PARAMS: --run "TestSBOMKubeadmSuite"
      - EXTRA_PARAMS: --run "TestSBOMKubeadmCrioSuite"
      - EXTRA_PARAMS: --run "TestSBOMPackageInUseKubeadmSuite"
      - EXTRA_PARAMS: --run "TestSBOMDockerHostSuite"

new-e2e-cspm:
  extends: .new_e2e_template
  rules:
    - !reference [.on_cspm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_agent_linux
    - qa_dca
    - agent_deb-x64-a7
    - agent_rpm-x64-a7
  variables:
    TARGETS: ./tests/cspm
    TEAM: cspm
    ON_NIGHTLY_FIPS: "true"
  parallel:
    matrix:
      - EXTRA_PARAMS: --run TestCSPM
      - EXTRA_PARAMS: --run TestDockerHostCSPM
      - EXTRA_PARAMS: --run TestHostBenchmarksRHEL8
      - EXTRA_PARAMS: --run TestHostBenchmarksRHEL9
      - EXTRA_PARAMS: --run TestHostBenchmarksRHEL10
      - EXTRA_PARAMS: --run TestHostBenchmarksUbuntu2404
      - EXTRA_PARAMS: --run TestHostBenchmarksAmazonLinux2023
      - EXTRA_PARAMS: --run TestHostBenchmarksAlmaLinux9
      - EXTRA_PARAMS: --run TestContainerizedHostBenchmarksRHEL9
      - EXTRA_PARAMS: --run TestContainerizedHostBenchmarksRHEL10
      - EXTRA_PARAMS: --run TestContainerizedHostBenchmarksUbuntu2404
      - EXTRA_PARAMS: --run TestContainerizedHostBenchmarksAmazonLinux2023
      - EXTRA_PARAMS: --run TestContainerizedHostBenchmarksAlmaLinux9
  timeout: 35m
