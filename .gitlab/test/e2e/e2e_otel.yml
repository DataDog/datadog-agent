---
# e2e stage - otel owned jobs
# Owned by: otel, agent-devx

new-e2e-otel-eks-init:
  stage: e2e_init
  extends: .new_e2e_template
  rules:
    - !reference [.on_otel_or_e2e_changes]
    - !reference [.manual]
  needs:
    - go_e2e_deps
    - go_tools_deps
  variables:
    TARGETS: ./tests/otel
    TEAM: otel
    EXTRA_PARAMS: --run "TestOTelAgentIA(EKS|USTEKS)"
    E2E_INIT_ONLY: "true"
    SHOULD_RUN_IN_FLAKES_FINDER: "false"
    PRE_BUILT_BINARIES_FLAG: ""
    KUBERNETES_MEMORY_REQUEST: 12Gi
    KUBERNETES_MEMORY_LIMIT: 16Gi
  allow_failure: true
  retry: !reference [.retry_only_infra_failure, retry]

new-e2e-otel-eks:
  extends: .new_e2e_template
  rules:
    - !reference [.on_otel_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_dca
    - qa_agent_full
    - qa_ot_agent_standalone
    - new-e2e-otel-eks-init
  variables:
    TARGETS: ./tests/otel
    EXTRA_PARAMS: --run "TestOTelAgentIA(EKS|USTEKS)"
    TEAM: otel
    E2E_PRE_INITIALIZED: "true"
  retry: !reference [.retry_only_infra_failure, retry]

new-e2e-otel:
  extends: .new_e2e_template
  rules:
    - !reference [.on_otel_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_dca
    - qa_agent_full
    - qa_ot_agent_standalone
    - qa_agent_linux
  variables:
    TARGETS: ./tests/otel
    EXTRA_PARAMS: --skip "TestOTelAgentIA(EKS|USTEKS)"
    TEAM: otel
    ON_NIGHTLY_FIPS: "true"
