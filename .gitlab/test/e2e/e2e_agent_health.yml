---
# e2e stage - agent-health owned jobs
# Owned by: agent-health, agent-devx

.on_healthplatform_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - comp/healthplatform/**/*
        - test/new-e2e/tests/agent-health/**/*
      compare_to: $COMPARE_TO_BRANCH
    when: on_success

new-e2e-agent-health:
  extends: .new_e2e_template
  needs:
    - !reference [.new_e2e_template_needs_container_deploy_linux, needs]
    - agent_deb-x64-a7
  rules:
    - !reference [.on_healthplatform_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/agent-health
    TEAM: agent-health
