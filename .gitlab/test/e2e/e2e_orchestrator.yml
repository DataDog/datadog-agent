---
# e2e stage - kubernetes-experiences and container-autoscaling owned jobs
# Owned by: kubernetes-experiences, container-autoscaling, agent-devx

.on_orchestrator_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - comp/forwarder/defaultforwarder/**/*
        - pkg/collector/corechecks/cluster/orchestrator/**/*
        - pkg/collector/corechecks/orchestrator/**/*
        - test/new-e2e/tests/orchestrator/**/*
      compare_to: $COMPARE_TO_BRANCH

new-e2e-orchestrator-ecs:
  extends: .new_e2e_template_needs_container_deploy_linux
  rules:
    - !reference [.on_orchestrator_or_e2e_changes]
    - !reference [.manual]
  variables:
    EXTRA_PARAMS: --run TestECSSuite
    TARGETS: ./tests/orchestrator
    TEAM: kubernetes-experiences
    ON_NIGHTLY_FIPS: "true"
  timeout: 55m

new-e2e-orchestrator:
  extends: .new_e2e_template_needs_container_deploy_linux
  rules:
    - !reference [.on_orchestrator_or_e2e_changes]
    - !reference [.manual]
  variables:
    EXTRA_PARAMS: --skip TestECSSuite
    TARGETS: ./tests/orchestrator
    TEAM: kubernetes-experiences
    ON_NIGHTLY_FIPS: "true"

.on_autoscaling_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - test/new-e2e/tests/autoscaling/**/*
        - pkg/clusteragent/autoscaling/cluster/**/*
      compare_to: $COMPARE_TO_BRANCH

new-e2e-autoscaling:
  extends: .new_e2e_template
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_dca
  rules:
    - !reference [.on_autoscaling_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/autoscaling
    TEAM: container-autoscaling
  retry: !reference [.retry_only_infra_failure, retry]
