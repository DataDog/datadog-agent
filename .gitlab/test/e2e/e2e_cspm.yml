---
# e2e stage - cspm owned jobs
# Owned by: cspm, agent-devx

.on_cspm_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - pkg/security/**/*
        - test/new-e2e/tests/cspm/**/* #TODO: Add other paths that should trigger the execution of CSPM e2e tests
      compare_to: $COMPARE_TO_BRANCH
    when: on_success

new-e2e-cspm:
  extends: .new_e2e_template
  rules:
    - !reference [.on_cspm_or_e2e_changes]
    - !reference [.manual]
  needs:
    - !reference [.needs_new_e2e_template]
    - qa_agent_linux
    - qa_dca
    - agent_deb-x64-a7
  variables:
    TARGETS: ./tests/cspm
    TEAM: cspm
    ON_NIGHTLY_FIPS: "true"
  timeout: 35m
