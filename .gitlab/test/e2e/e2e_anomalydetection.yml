---
# e2e stage - q-branch owned jobs
# Owned by: q-branch, agent-devx

.on_anomalydetection_or_e2e_changes:
  - !reference [.on_e2e_main_release_or_rc]
  - changes:
      paths:
        - comp/anomalydetection/**/*
        - test/new-e2e/tests/anomalydetection/**/*
        - test/new-e2e/go.mod
      compare_to: $COMPARE_TO_BRANCH
    when: on_success

new-e2e-anomalydetection:
  extends: .new_e2e_template_needs_deb_x64
  rules:
    - !reference [.on_anomalydetection_or_e2e_changes]
    - !reference [.manual]
  variables:
    TARGETS: ./tests/anomalydetection
    TEAM: q-branch
