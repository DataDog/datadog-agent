static_quality_gates:
  inherit:
    default: false
  stage: functional_test
  rules:
    - !reference [.except_coverage_pipeline] # Coverage pipeline creates a special artifact that will not pass the quality gate
    - !reference [.on_main_or_release_branch]
    - !reference [.on_mergequeue]
    - !reference [.on_dev_branches_with_artifact_changes]
    - changes:
        paths:
          - test/static/static_quality_gates.yml
        compare_to: $COMPARE_TO_BRANCH
    - when: manual
      allow_failure: true
  id_tokens:
    DDOCTOSTS_ID_TOKEN:
      aud: dd-octo-sts
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/docker_x64$CI_IMAGE_DOCKER_X64_SUFFIX:$CI_IMAGE_DOCKER_X64
  tags: ["arch:amd64", "specific:true"]
  needs:
    - agent_deb-x64-a7
    - agent_deb-x64-a7-fips
    - agent_rpm-x64-a7
    - agent_rpm-x64-a7-fips
    - agent_rpm-arm64-a7
    - agent_rpm-arm64-a7-fips
    - agent_suse-x64-a7
    - agent_suse-x64-a7-fips
    - agent_suse-arm64-a7
    - agent_suse-arm64-a7-fips
    - agent_heroku_deb-x64-a7
    - docker_build_agent7
    - docker_build_agent7_arm64
    - docker_build_agent7_jmx
    - docker_build_agent7_jmx_arm64
    - docker_build_cluster_agent_amd64
    - docker_build_cluster_agent_arm64
    - docker_build_cws_instrumentation_amd64
    - docker_build_cws_instrumentation_arm64
    - docker_build_dogstatsd_amd64
    - docker_build_dogstatsd_arm64
    - dogstatsd_deb-x64
    - dogstatsd_deb-arm64
    - dogstatsd_rpm-x64
    - dogstatsd_suse-x64
    - iot_agent_deb-x64
    - iot_agent_deb-arm64
    - iot_agent_deb-armhf
    - iot_agent_rpm-x64
    - iot_agent_suse-x64
    - job: windows_msi_and_bosh_zip_x64-a7
      optional: true
  before_script:
    - export GITHUB_TOKEN=$(dd-octo-sts token --scope DataDog/datadog-agent --policy self.gitlab.pr-comment)
  script:
    - !reference [.login_to_docker_readonly_crane]
    # `datadog-ci` relies on `DATADOG_API_KEY` so we get that here.
    - DATADOG_API_KEY="$("$CI_PROJECT_DIR"/tools/ci/fetch_secret.sh "$AGENT_API_KEY_ORG2" token)" || exit $?; export DATADOG_API_KEY
    - export DD_API_KEY="$DATADOG_API_KEY"
    # DD_APP_KEY is required for querying metrics (e.g., fetching ancestor metrics for relative size calculation)
    - DD_APP_KEY="$("$CI_PROJECT_DIR"/tools/ci/fetch_secret.sh "$AGENT_APP_KEY_ORG2" token)" || exit $?; export DD_APP_KEY
    - SLACK_DATADOG_AGENT_BOT_TOKEN=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SLACK_AGENT token) || exit $?; export SLACK_DATADOG_AGENT_BOT_TOKEN
    - dda inv -- quality-gates.parse-and-trigger-gates || exit $?
  retry:
    max: 2
    exit_codes:
      - 42
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
      - api_failure
      - scheduler_failure
      - stale_schedule
      - data_integrity_failure
  artifacts:
    when: always
    paths:
      - extract_rpm_package_report
      - static_gate_report.json
    expire_in: 1 week
  variables:
    GIT_DEPTH: 0
    OVERRIDE_GIT_STRATEGY: "clone" # needed because this job uses git merge-base
    KUBERNETES_CPU_REQUEST: 8

manual_gate_threshold_update:
  stage: functional_test
  rules:
    - !reference [.except_coverage_pipeline] # Coverage pipeline creates a special artifact that will not pass the quality gate
    - !reference [.on_main_manual]
    - !reference [.on_dev_branches_with_artifact_changes_manual]
    - when: manual
      allow_failure: true
  id_tokens:
    DDOCTOSTS_ID_TOKEN:
      aud: dd-octo-sts
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/docker_x64$CI_IMAGE_DOCKER_X64_SUFFIX:$CI_IMAGE_DOCKER_X64
  tags: ["arch:amd64", "specific:true"]
  needs:
    - static_quality_gates
  before_script:
    - export GITHUB_TOKEN=$(dd-octo-sts token --scope DataDog/datadog-agent --policy self.gitlab.write)
  script:
    - !reference [.login_to_docker_readonly_crane]
    - SLACK_DATADOG_AGENT_BOT_TOKEN=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SLACK_AGENT token) || exit $?; export SLACK_DATADOG_AGENT_BOT_TOKEN
    - dda inv -- quality-gates.manual-threshold-update || exit $?
