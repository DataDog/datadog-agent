single_machine_performance-regression_detector-merge_base_check:
  stage: functional_test
  timeout: 10m
  rules:
    - !reference [.except_coverage_pipeline]
    # On main: wait for the agent image to land in ECR before checking for baselines.
    - if: $CI_COMMIT_BRANCH == "main"
      needs:
        - job: single_machine_performance-full-amd64-a7
          artifacts: false
    # On dev branches: no needs — runs at the start of functional_test for fast feedback.
    - !reference [.on_dev_branches_with_artifact_changes]
  needs: []
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/docker_x64$CI_IMAGE_DOCKER_X64_SUFFIX:$CI_IMAGE_DOCKER_X64
  tags: ["arch:amd64", "specific:true"]
  artifacts:
    expire_in: 1 day
    paths:
      - regression_detector.env
    reports:
      dotenv: regression_detector.env  # Expose BASELINE_SHA as a CI variable for the trigger job
  variables:
    GIT_DEPTH: 0  # Ensure we can fetch full history for merge-base calculation
  script:
    # `datadog-ci` relies on `DATADOG_API_KEY` so we get that here.
    - DATADOG_API_KEY="$("$CI_PROJECT_DIR"/tools/ci/fetch_secret.sh "$AGENT_API_KEY_ORG2" token)" || exit $?; export DATADOG_API_KEY
    # Fetch origin to ensure we have latest main branch
    - git fetch origin
    # Get the base branch from release.json
    - SMP_BASE_BRANCH=$(dda inv release.get-release-json-value base_branch --no-worktree)
    # Compute four days before now as UNIX timestamp
    - FOUR_DAYS_BEFORE_NOW=$(date --date="-4 days +1 hour" "+%s")
    # Determine baseline SHA based on whether we're on the base branch or a dev branch
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$SMP_BASE_BRANCH" ]]; then
          # On the base branch, use the parent commit as the baseline
          BASELINE_SHA=$(git rev-parse "${CI_COMMIT_SHA}^")
          echo "On base branch, using parent commit ${BASELINE_SHA} as initial baseline"
      else
          # On a dev branch, compute the merge base with the base branch
          echo "Looking for merge base for branch ${SMP_BASE_BRANCH}"
          SMP_MERGE_BASE=$(git merge-base ${CI_COMMIT_SHA} origin/${SMP_BASE_BRANCH})
          echo "Merge base is ${SMP_MERGE_BASE}"
          BASELINE_SHA="${SMP_MERGE_BASE}"
      fi
    - BASELINE_COMMIT_TIME=$(git -c log.showSignature=false show --no-patch --format=%ct ${BASELINE_SHA})
    # Setup AWS credentials for single-machine-performance AWS account to check ECR images
    - AWS_NAMED_PROFILE="single-machine-performance"
    - SMP_ACCOUNT_ID=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT account_id) || exit $?
    - SMP_AGENT_TEAM_ID=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT agent_team_id) || exit $?
    - SMP_BOT_ID=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT bot_login) || exit $?
    - SMP_BOT_KEY=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT bot_token) || exit $?
    - aws configure set aws_access_key_id "$SMP_BOT_ID" --profile ${AWS_NAMED_PROFILE}
    - aws configure set aws_secret_access_key "$SMP_BOT_KEY" --profile ${AWS_NAMED_PROFILE}
    - aws configure set region us-west-2 --profile ${AWS_NAMED_PROFILE}

    # Check if image exists for the baseline SHA, walking backwards on the
    # commit graph until a container corresponding to the possible baseline is
    # found, or the possible baseline commit is too old. If the commit is too
    # old, the container corresponding to that commit has probably expired.
    #
    # We intentionally omit checking whether the baseline commit is too old
    # *before* the loop in order to provide ourselves with a break-glass option
    # in scenarios where we would like to use an old commit as a baseline (e.g.,
    # backporting bugfixes to a release branch). In such a scenario, we could
    # run CI on the release branch to generate a baseline image, even if the
    # commit is too old. However, we also only omit the commit age check once so
    # that we can still use it on predecessor commits that are usually older than
    # the current commit under test -- this check gives us a fast-fail condition so
    # we avoid wasting time checking for expired images in common cases.
    - echo "Checking if image exists for commit ${BASELINE_SHA}..."
    - |
      while [[ ! $(aws ecr describe-images --region us-west-2 --profile single-machine-performance --registry-id "${SMP_ACCOUNT_ID}" --repository-name "${SMP_AGENT_TEAM_ID}-agent" --image-ids imageTag="${BASELINE_SHA}-7-full-amd64") ]]
      do
          echo "No image exists for ${BASELINE_SHA} - checking predecessor of ${BASELINE_SHA} next"
          BASELINE_SHA=$(git rev-parse ${BASELINE_SHA}^)
          echo "Checking if commit ${BASELINE_SHA} is recent enough..."
          BASELINE_COMMIT_TIME=$(git -c log.showSignature=false show --no-patch --format=%ct ${BASELINE_SHA})
          if [[ ${BASELINE_COMMIT_TIME} -le ${FOUR_DAYS_BEFORE_NOW} ]]
          then
              echo "ERROR: Merge-base of this branch is too old for SMP. Please update your branch by merging an up-to-date main branch into your branch or by rebasing it on an up-to-date main branch."
              datadog-ci tag --level job --tags smp_merge_base_failure_reason:"branch_too_old"
              exit 1
          fi
          echo "Commit ${BASELINE_SHA} is recent enough"
          echo "Checking if image exists for commit ${BASELINE_SHA}..."
      done
    - echo "Image exists for commit ${BASELINE_SHA}"
    # Save the baseline SHA to an artifact file
    - echo "BASELINE_SHA=${BASELINE_SHA}" > regression_detector.env
    - echo "Merge-base check passed. Baseline SHA saved to artifact."

# Trigger a child pipeline for SMP regression detection.
# The parent pipeline does NOT wait for this child pipeline (no strategy: depend),
# so the main pipeline completes without blocking on the ~1h SMP run.
.trigger-single-machine-performance-regression_detector:
  stage: functional_test
  needs:
    - job: single_machine_performance-regression_detector-merge_base_check
      artifacts: true  # Passes BASELINE_SHA dotenv variable to child pipeline
    - job: single_machine_performance-full-amd64-a7
      artifacts: false  # Ensures comparison image is in ECR before child pipeline starts (dev branches)
      optional: true  # Build job may not run if triggered only via RUN_E2E_TESTS or experiments
  variables:
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
    BASELINE_SHA: $BASELINE_SHA  # Forwarded from the merge_base_check dotenv artifact
    FF_KUBERNETES_HONOR_ENTRYPOINT: false
  trigger:
    include:
      - local: .gitlab/childs/smp-regression-child-pipeline.yml
    # No strategy: depend — parent pipeline does not wait for the child pipeline to finish

# This job is used to run the regression detector on dev branches. On dev branches, we allow the pipeline to continue.
trigger-single-machine-performance-regression_detector:
  extends:
    - .trigger-single-machine-performance-regression_detector
  rules:
    - !reference [.except_coverage_pipeline]
    - !reference [.on_dev_branches_with_artifact_changes]  # Run when artifact-impacting files change
  allow_failure: true

# This job is used to run the regression detector on the main branch. On main, we notify failures 
trigger-single-machine-performance-regression_detector-main:
  extends:
    - .trigger-single-machine-performance-regression_detector
  rules:
    - !reference [.except_coverage_pipeline]
    - !reference [.on_main]  # Run on every main commit
  trigger:
    strategy: depend
  variables:
    SMP_ALLOW_FAILURE: "false"

# SMP Experiment Selection (POC): post/refresh the checkbox comment that drives
# the agent regression_detector run. Every `cases/` directory under
# test/regression (any depth, minus the ebpf suites) is a selectable folder;
# expanding it reveals its individual experiments. The `quality_gates` suite is
# pre-checked (it runs by default). Refreshes on dev-branch pipelines and
# whenever experiment configs change, so adding an experiment on a branch
# updates the list.
#
# Rendering + the state-preserving merge are done by `smp experiments list
# --format github-comment` (the CLI owns discovery, the checkbox format, and the
# merge); this job is just the GitHub-API glue: resolve the PR, read the current
# comment, feed it to the CLI as --previous-comment, and edit the comment in
# place so ticked selections PERSIST across pipelines. The comment is read-
# modify-written directly via the GitHub API (not the pr-commenter service).
# Because it is posted with the octo-sts token, it is authored by the same bot
# as the "Gitlab CI Configuration Changes" comment (which quotes this job's YAML,
# marker included) -- so the comment is identified by the marker on the FIRST
# line of the body (startswith), not by author. The
# `single-machine-performance-regression_detector` job reads it back at run time
# with the same finder and `smp experiments parse-comment`.
smp-experiment-selection-comment:
  stage: functional_test
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/docker_x64$CI_IMAGE_DOCKER_X64_SUFFIX:$CI_IMAGE_DOCKER_X64
  tags: ["arch:amd64", "specific:true"]
  needs: []
  # Child pipelines cannot !reference .dd_octo_sts from .gitlab-ci.yml, so the
  # octo-sts id_token is declared inline (same aud as .dd_octo_sts).
  id_tokens:
    DDOCTOSTS_ID_TOKEN:
      aud: dd-octo-sts
  variables:
    # Needed to fetch the smp CLI (which now renders the comment). SMP_ACCOUNT is
    # a pipeline global (also used by the merge_base_check job).
    SMP_VERSION: dev-pr4640-02fd123f5 # dev build with the `smp experiments` command group (SMP PR 4640)
    BOT_LOGIN: bot_login
    BOT_TOKEN: bot_token
  rules:
    - !reference [.except_coverage_pipeline]
    - !reference [.on_dev_branches_with_artifact_changes]
    - changes:
        paths:
          - test/regression/**/*
        compare_to: main
  allow_failure: true # never block a pipeline on the convenience comment
  script:
    - |
      set +e
      MARKER="<!-- smp-experiment-selection -->"
      ROOT="test/regression"
      # --- Resolve PR + read the existing selection comment (best effort) ---
      GITHUB_TOKEN=$(dd-octo-sts token --scope DataDog/datadog-agent --policy self.gitlab.comment-pr 2>/dev/null)
      PR_NUMBER=""
      if [ -n "${GITHUB_TOKEN}" ]; then
        PR_NUMBER=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/DataDog/datadog-agent/commits/${CI_COMMIT_SHA}/pulls" \
          | jq -r '.[0].number // empty')
      fi
      if [ -z "${PR_NUMBER}" ]; then
        echo "No PR for ${CI_COMMIT_SHA}; nothing to post (dev branch without a PR)."
        exit 0
      fi
      # Our comment is the one whose body STARTS WITH the marker (the CI-config
      # diff comment only contains the marker inside a fenced code block). Grab
      # its id (to edit in place) and body (to feed the CLI merge).
      COMMENTS=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
        "https://api.github.com/repos/DataDog/datadog-agent/issues/${PR_NUMBER}/comments?per_page=100")
      COMMENT_ID=$(printf '%s' "${COMMENTS}" | jq -r --arg m "${MARKER}" 'map(select(.body | startswith($m))) | last | .id // empty')
      printf '%s' "${COMMENTS}" | jq -r --arg m "${MARKER}" 'map(select(.body | startswith($m))) | last | .body // empty' > prev_comment.md
      set -e
      # --- Fetch the smp CLI (needs the single-machine-performance AWS creds) ---
      AWS_NAMED_PROFILE="single-machine-performance"
      SMP_BOT_ID=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT $BOT_LOGIN) || exit $?
      SMP_BOT_KEY=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $SMP_ACCOUNT $BOT_TOKEN) || exit $?
      aws configure set aws_access_key_id "$SMP_BOT_ID" --profile ${AWS_NAMED_PROFILE}
      aws configure set aws_secret_access_key "$SMP_BOT_KEY" --profile ${AWS_NAMED_PROFILE}
      aws configure set region us-west-2 --profile ${AWS_NAMED_PROFILE}
      aws --profile ${AWS_NAMED_PROFILE} s3 cp s3://smp-cli-releases/${SMP_VERSION}/x86_64-unknown-linux-musl/smp smp
      chmod +x smp
      # --- Render the merged comment. The CLI owns discovery, the checkbox
      # format, and the state-preserving merge (via --previous-comment). Only
      # pass --previous-comment when a prior comment exists (else: fresh render,
      # quality_gates ticked by default). --exclude-path drops the ebpf subtree.
      PREV_ARG=""
      if [ -n "${COMMENT_ID}" ]; then PREV_ARG="--previous-comment prev_comment.md"; fi
      ./smp experiments list \
        --target-config-dir "${ROOT}" \
        --exclude-path ebpf \
        --format github-comment \
        --default-select quality_gates \
        ${PREV_ARG} \
        --instructions "Tick a folder to run all of it, or expand it to tick individual experiments, then re-run the single-machine-performance-regression_detector job (it re-reads this comment at run time). The quality_gates suite runs by default." \
        > comment_body.md
      cat comment_body.md
      # --- Edit in place if the comment exists, else create it ---
      PAYLOAD=$(jq -Rs '{body: .}' comment_body.md)
      if [ -n "${COMMENT_ID}" ]; then
        echo "Updating existing selection comment ${COMMENT_ID}"
        curl -s -X PATCH -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/DataDog/datadog-agent/issues/comments/${COMMENT_ID}" \
          -d "${PAYLOAD}" -o /dev/null -w "HTTP %{http_code}\n"
      else
        echo "Creating selection comment on PR #${PR_NUMBER}"
        curl -s -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/DataDog/datadog-agent/issues/${PR_NUMBER}/comments" \
          -d "${PAYLOAD}" -o /dev/null -w "HTTP %{http_code}\n"
      fi
  artifacts:
    expire_in: 1 day
    paths:
      - comment_body.md
    when: always

