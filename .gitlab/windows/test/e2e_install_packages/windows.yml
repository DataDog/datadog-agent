  extends:
    - .new-e2e_windows_a7_x86_64
    - .new-e2e_windows_installer_v7_tests
  rules:
    - !reference [.on_deploy]
    - !reference [.on_e2e_or_windows_installer_changes]
    - !reference [.manual]
