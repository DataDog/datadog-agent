---
#
# Windows install script
#
powershell_script_signing:
  extends: .windows_docker_default
  stage: package_build
  needs: []
  variables:
    ARCH: "x64"
  rules:
    - !reference [.except_mergequeue]
    - when: on_success
  artifacts:
    expire_in: 2 weeks
    paths:
      - $WINDOWS_POWERSHELL_DIR
  script:
    - mkdir $WINDOWS_POWERSHELL_DIR
    # documentation: https://github.com/DataDog/windows-code-signer
    - docker run --rm
      -v "$(Get-Location):c:\mnt"
      -v "${CI_PROJECT_DIR}\.aws\credentials-by-job-id:C:\aws-creds"
      -e "AWS_SHARED_CREDENTIALS_FILE=C:\aws-creds\${CI_JOB_ID}"
      -e AWS_NETWORKING=true
      -e CI
      -e GITLAB_CI
      -e IS_AWS_CONTAINER=true
      -e CI_IDENTITIES_GITLAB_ID_TOKEN
      -e CI_JOB_NAME_SLUG
      -e CI_JOB_ID
      -e CI_PROJECT_NAME
      -e WINDOWS_SIGNING_CERT
      -e WINDOWS_SIGNING_CONFIG
      ${WINBUILDIMAGE}
      powershell -C "if (`$Env:WINDOWS_SIGNING_CERT -and `$Env:WINDOWS_SIGNING_CONFIG) { C:\devtools\windows-code-signer.exe sign --cert `$Env:WINDOWS_SIGNING_CERT --key-info `$Env:WINDOWS_SIGNING_CONFIG '\mnt\tools\windows\DatadogAgentInstallScript\Install-Datadog.ps1' } else { C:\devtools\windows-code-signer.exe sign '\mnt\tools\windows\DatadogAgentInstallScript\Install-Datadog.ps1' }"
    - copy .\tools\windows\DatadogAgentInstallScript\Install-Datadog.ps1 $WINDOWS_POWERSHELL_DIR\Install-Datadog.ps1
