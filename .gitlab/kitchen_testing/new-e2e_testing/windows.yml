# NOTE: If a new job is added, be sure to upate .gitlab/e2e_test_junit_upload.yml

.new-e2e_windows_msi:
  variables:
    TARGETS: ./tests/windows/install-test
    TEAM: windows-agent
    EXTRA_PARAMS: --run "TestMSI/Agent/$E2E_MSI_TEST$"
  extends:
    - .new_e2e_template
  before_script:
    # WINDOWS_AGENT_VERSION is used to verify the installed agent version
    # Must run before new_e2e_template changes the aws profile
    # NOTE: `export VAR=$(cmd)` masks cmd's exit code (export's own status wins),
    # so a failing invoke here used to fail silently, leaving WINDOWS_AGENT_VERSION
    # empty and causing test failures deep inside the test run ("expected '0.0.0'")
    # instead of a clear failure here. Assign first, check, then export.
    # `inv`, not `invoke`, is the entry point on PATH in this image.
    - WINDOWS_AGENT_VERSION=$(inv agent.version --major-version $AGENT_MAJOR_VERSION) || exit $?
    - export WINDOWS_AGENT_VERSION
    # LAST_STABLE_VERSION must be set before tests run (upgrade/rollback tests read it at startup)
    - LAST_STABLE_VERSION=$(inv release.get-release-json-value "last_stable::$AGENT_MAJOR_VERSION") || exit $?
    - export LAST_STABLE_VERSION
    - !reference [.new_e2e_template, before_script]
  script:
    - !reference [.new_e2e_template, script]

.new-e2e_windows_domain_test:
  variables:
    TARGETS: ./tests/windows/domain-test
    TEAM: windows-agent
  extends:
    - .new_e2e_template
  before_script:
    # WINDOWS_AGENT_VERSION is used to verify the installed agent version
    # Must run before new_e2e_template changes the aws profile
    # NOTE: `export VAR=$(cmd)` masks cmd's exit code (export's own status wins),
    # so a failing invoke here used to fail silently, leaving WINDOWS_AGENT_VERSION
    # empty and causing test failures deep inside the test run ("expected '0.0.0'")
    # instead of a clear failure here. Assign first, check, then export.
    # `inv`, not `invoke`, is the entry point on PATH in this image.
    - WINDOWS_AGENT_VERSION=$(inv agent.version --major-version $AGENT_MAJOR_VERSION) || exit $?
    - export WINDOWS_AGENT_VERSION
    # LAST_STABLE_VERSION must be set before tests run (upgrade/rollback tests read it at startup)
    - LAST_STABLE_VERSION=$(inv release.get-release-json-value "last_stable::$AGENT_MAJOR_VERSION") || exit $?
    - export LAST_STABLE_VERSION
    - !reference [.new_e2e_template, before_script]
  script:
    - !reference [.new_e2e_template, script]

.new-e2e_windows_installer_tests:
  parallel:
    matrix:
      - E2E_MSI_TEST: TestInstall
      - E2E_MSI_TEST: TestRepair
      - E2E_MSI_TEST: TestUpgrade
      - E2E_MSI_TEST: TestUpgradeRollback
      - E2E_MSI_TEST: TestAgentUser

# Agent 6
.new-e2e_windows_a6_x86_64:
  variables:
    WINDOWS_AGENT_ARCH: "x86_64"
  extends:
    - .new-e2e_windows_msi
    - .new-e2e_agent_a6
  needs: ["deploy_windows_testing-a6"]

## full tests
new-e2e-windows-agent-msi-windows-server-a6-x86_64:
  stage: kitchen_testing
  extends:
    - .new-e2e_windows_a6_x86_64
    - .new-e2e_windows_installer_tests
  rules:
    - !reference [.on_deploy]
    - !reference [.on_windows_installer_changes_or_manual]

new-e2e-windows-agent-domain-tests-a6-x86_64:
  stage: kitchen_testing
  variables:
    WINDOWS_AGENT_ARCH: "x86_64"
  extends:
    # .new_e2e_template used to be listed here directly too, as a workaround for
    # .new-e2e_windows_domain_test not having its own `extends: [.new_e2e_template]`
    # (unlike .new-e2e_windows_msi). That made it a sibling of equal precedence in
    # extends resolution and could clobber .new-e2e_windows_domain_test's before_script
    # (dropping the LAST_STABLE_VERSION/WINDOWS_AGENT_VERSION exports). Fixed at the
    # source by adding the missing extends to .new-e2e_windows_domain_test above.
    - .new-e2e_windows_domain_test
    - .new-e2e_agent_a6
  needs: ["deploy_windows_testing-a6"]
  rules:
    - !reference [.on_deploy]
    - !reference [.on_windows_installer_changes_or_manual]

## single test for PRs
## skipped if the full tests are running
new-e2e-windows-agent-msi-upgrade-windows-server-a6-x86_64:
  stage: kitchen_testing
  extends:
    - .new-e2e_windows_msi
    - .new-e2e_windows_a6_x86_64
  rules:
    - !reference [.except_main_or_release_branch]
    - !reference [.except_windows_installer_changes]
    - !reference [.on_default_new-e2e_tests]
    # must be last since it ends with when: on_success
    - !reference [.except_deploy]
  variables:
    E2E_MSI_TEST: TestUpgradeRollback
