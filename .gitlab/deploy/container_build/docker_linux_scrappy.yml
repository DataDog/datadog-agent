---
# Scrappy agent image — overlays the standard agent7 image with the scrappy
# live-inference detector assets (native engine + PyTorch checkpoint + vocab).
#
# scrappy-infer is an AVX2/FMA ELF binary (linux/amd64 only).  To allow the
# DataDog/images pipeline to assemble a multi-arch manifest (tmpl-v24 requires
# both amd64 and arm64 source tags), the amd64 build job also re-tags the
# standard agent7 arm64 image with the -scrappy suffix via crane copy.  On
# arm64 hosts that image is the plain agent — scrappy inference is silently
# unavailable there.
#
# Model weights are fetched from the persistent S3 artefacts bucket at
#   s3://dd-ci-persistent-artefacts-build-stable/datadog-agent/scrappy/<VERSION>/
# No GCP credentials are needed; the runner's existing IAM role covers this bucket.
#
# Trigger manually from a branch pipeline after docker_build_agent7 completes.

.docker_build_agent7_scrappy:
  stage: container_build
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/docker_x64$CI_IMAGE_DOCKER_X64_SUFFIX:$CI_IMAGE_DOCKER_X64
  tags: ["arch:amd64", "specific:true"]
  rules:
    - !reference [.except_mergequeue]
    # TODO: make manual before merge to main
    - when: on_success
  timeout: 30m
  retry: 2
  variables:
    ARCH: amd64
    # Output image — same ECR repo as the standard agent, distinct tag suffix.
    IMAGE: registry.ddbuild.io/ci/datadog-agent/agent
    TAG_SUFFIX: -7-scrappy
    # Use the already-built agent image for this pipeline as the base.
    # Overrides the default agent-base-image used by .docker_build_job_definition.
    BASE_IMAGE_NAME: agent
    BASE_IMAGE_TAG_SUFFIX: -7
    # Persistent S3 path for scrappy model checkpoint + manifest.
    SCRAPPY_MODEL_S3_URI: s3://dd-ci-persistent-artefacts-build-stable/datadog-agent/scrappy/v0.4-run-001/
    # Temp directory used as Docker build context.
    SCRAPPY_BUILD_CONTEXT: /tmp/scrappy-build-context
  before_script:
    # ── 1. Prepare build context ──────────────────────────────────────────────
    - mkdir -p ${SCRAPPY_BUILD_CONTEXT}

    # ── 2. Committed scrappy assets (vocab + native inference binary) ─────────
    - cp q_branch/generators/observer-eval/scrappy-assets/vocab.json ${SCRAPPY_BUILD_CONTEXT}/
    - cp q_branch/generators/observer-eval/scrappy-assets/scrappy-infer ${SCRAPPY_BUILD_CONTEXT}/
    # Python scorer used by the .pt backend at runtime
    - cp comp/anomalydetection/observer/impl/scrappy_scorer.py ${SCRAPPY_BUILD_CONTEXT}/

    # ── 3. Fetch model weights from S3 (no GCP auth needed) ───────────────────
    - aws s3 cp --only-show-errors --region us-east-1 ${SCRAPPY_MODEL_S3_URI}epoch_020.pt ${SCRAPPY_BUILD_CONTEXT}/epoch_020.pt
    - aws s3 cp --only-show-errors --region us-east-1 ${SCRAPPY_MODEL_S3_URI}run_manifest.json ${SCRAPPY_BUILD_CONTEXT}/run_manifest.json

    # ── 4. Write the overlay Dockerfile ───────────────────────────────────────
    # Layered on top of the standard agent image built in this same pipeline.
    # All scrappy assets are placed under /opt/scrappy/ for consistency with
    # the entrypoint.sh and agent-values.yaml.tmpl in q_branch/generators/observer-eval/.
    - |
      cat > ${SCRAPPY_BUILD_CONTEXT}/Dockerfile <<'DOCKERFILE'
      ARG AGENT_BASE_IMAGE_TAG
      FROM ${AGENT_BASE_IMAGE_TAG}

      # Native C inference engine (AVX2/FMA/F16C accelerated, linux/amd64)
      COPY scrappy-infer    /opt/scrappy/scrappy-infer
      # PyTorch checkpoint (v0.4-run-001/epoch_020.pt) — used by .pt backend
      COPY epoch_020.pt     /opt/scrappy/model.pt
      # Training run manifest for provenance / vocab compatibility check
      COPY run_manifest.json /opt/scrappy/run_manifest.json
      # BPE vocabulary (must match model training vocab)
      COPY vocab.json       /opt/scrappy/vocab.json
      # Python scorer script (required by the .pt backend)
      COPY scrappy_scorer.py /opt/scrappy/scrappy_scorer.py

      RUN chmod +x /opt/scrappy/scrappy-infer

      # Install PyTorch (CPU-only) for the .pt inference backend
      RUN pip3 install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu

      # Runtime config hints — overridable via env / datadog.yaml
      ENV DD_ANOMALY_DETECTION_DETECTORS_SCRAPPY_DETECTOR_MODEL_PATH=/opt/scrappy/model.pt \
          DD_ANOMALY_DETECTION_DETECTORS_SCRAPPY_DETECTOR_VOCAB_PATH=/opt/scrappy/vocab.json
      DOCKERFILE

    # ── 5. Log what we're building ────────────────────────────────────────────
    - |
      echo "=== Scrappy build context ==="
      ls -lh ${SCRAPPY_BUILD_CONTEXT}/
      echo "=== Dockerfile ==="
      cat ${SCRAPPY_BUILD_CONTEXT}/Dockerfile

  script:
    # Resolve the nightly release suffix the same way .docker_build_job_definition does.
    - |
      if [[ "$BUCKET_BRANCH" == "nightly" && "$IMAGE" =~ "ci/datadog-agent/agent" ]]; then
        export ECR_RELEASE_SUFFIX="-nightly"
      else
        export ECR_RELEASE_SUFFIX=${CI_COMMIT_TAG+-release}
      fi
    - AGENT_BASE_IMAGE_TAG=registry.ddbuild.io/ci/datadog-agent/${BASE_IMAGE_NAME}${ECR_RELEASE_SUFFIX}:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}${BASE_IMAGE_TAG_SUFFIX}-${ARCH}
    - TARGET_TAG=${IMAGE}${ECR_RELEASE_SUFFIX}:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}${TAG_SUFFIX}-${ARCH}
    - echo "Base image  → ${AGENT_BASE_IMAGE_TAG}"
    - echo "Target tag  → ${TARGET_TAG}"
    - |
      docker buildx build --push --pull --platform linux/${ARCH} \
        --build-arg AGENT_BASE_IMAGE_TAG=${AGENT_BASE_IMAGE_TAG} \
        --build-arg CI \
        --build-arg BASE_IMAGE_REGISTRY \
        --file ${SCRAPPY_BUILD_CONTEXT}/Dockerfile \
        --tag ${TARGET_TAG} \
        --label "org.opencontainers.image.created=$(date --rfc-3339=seconds)" \
        --label "org.opencontainers.image.authors=Datadog <package@datadoghq.com>" \
        --label "org.opencontainers.image.source=https://github.com/DataDog/datadog-agent" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.vendor=Datadog, Inc." \
        --label "target=none" \
        ${SCRAPPY_BUILD_CONTEXT}
    # Squash layers to avoid leaking intermediate build state
    - crane flatten -t ${TARGET_TAG} ${TARGET_TAG}
    # Re-tag the standard arm64 image with the -scrappy suffix so that
    # DataDog/images (tmpl-v24) can assemble a multi-arch manifest.  On arm64
    # hosts the container is the plain agent — scrappy inference is not
    # available there since scrappy-infer is an AVX2/FMA ELF binary.
    - ARM64_SRC=${IMAGE}${ECR_RELEASE_SUFFIX}:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}-7-arm64
    - ARM64_DST=${IMAGE}${ECR_RELEASE_SUFFIX}:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}-7-scrappy-arm64
    - echo "Retagging arm64 ${ARM64_SRC} → ${ARM64_DST}"
    - crane copy "${ARM64_SRC}" "${ARM64_DST}"

docker_build_agent7_scrappy:
  extends: [.docker_build_agent7_scrappy]
  needs:
    - job: docker_build_agent7
      artifacts: false
    - job: docker_build_agent7_arm64
      artifacts: false
