# This file contain jobs that tests the KMT tasks code. This doesn't launch any KMT tests themselves,
# that's done in .gitlab/kernel_matrix_testing

.test_kmt_local_setup:
  stage: source_test
  needs: []
  variables:
    KMT_EXCLUDE_REQUIREMENTS: "Compiler,UserInDockerGroup"
  rules:
    - !reference [.on_invoke_tasks_changes]
  script:
    # Avoid rate limits when running kmt.init (some issues with pulumi)
    - GITHUB_TOKEN=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $GITHUB_TOKEN read_api) || exit $?; export GITHUB_TOKEN
    - pip install "git+https://github.com/DataDog/datadog-agent-dev.git@v$(cat .dda/version)" --break-system-packages
    - export KMT_TEST_INFRA_DEFINITIONS_PATH=$(go env GOPATH)/src/github.com/DataDog/test-infra-definitions
    - dda inv -- kmt.init --remote-setup-only --skip-ssh-setup --exclude-requirements $KMT_EXCLUDE_REQUIREMENTS
    - dda inv -- kmt.selfcheck --remote-setup-only --exclude-requirements $KMT_EXCLUDE_REQUIREMENTS

test_kmt_local_setup_linux:
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/linux-glibc-2-17-x64$CI_IMAGE_LINUX_GLIBC_2_17_X64_SUFFIX:$CI_IMAGE_LINUX_GLIBC_2_17_X64
  tags: ["arch:amd64"]
  extends: .test_kmt_local_setup

test_kmt_local_setup_macos:
  extends:
    - .macos_gitlab
    - .test_kmt_local_setup
  tags: ["macos:ventura-amd64", "specific:true"]
