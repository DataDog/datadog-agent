# e2e_pre_test.yml
# Contains jobs which runs e2e tests to validate the new-e2e framework.
e2e_pre_test:
  rules:
    - !reference [.on_e2e_changes_or_manual]
  stage: e2e_pre_test
  extends: .new_e2e_template
  needs: []
  script:
    - inv -e new-e2e-tests.run --targets ./test-infra-definition --junit-tar "junit-${CI_JOB_NAME}.tgz" ${EXTRA_PARAMS} --configparams ddagent:major_version=6
  after_script:
    - DATADOG_API_KEY=$($CI_PROJECT_DIR/tools/ci/fetch_secret.sh $AGENT_API_KEY_ORG2 token) || exit $?; export DATADOG_API_KEY
    - for f in junit*-e2e-*.tgz; do inv -e junit-upload --tgz-path "$f"; done
  variables:
    TEAM: "agent-developer-tools"
    # override to use latest stable agent
    E2E_PIPELINE_ID: ""
