---
#
# Pipeline recorder image tagging & manifest publication
#

.deploy_containers-pipelinerecorder-base:
  extends: .docker_publish_job_definition
  stage: deploy_containers
  before_script:
    - if [[ "$VERSION" == "" ]]; then VERSION="$(dda inv agent.version --url-safe --pipeline-id $PARENT_PIPELINE_ID)" || exit $?; fi
    - if [[ "$PIPELINERECORDER_REPOSITORY" == "" ]]; then export PIPELINERECORDER_REPOSITORY="pipelinerecorder"; fi
    - export IMG_BASE_SRC="${SRC_PIPELINERECORDER}:v${PARENT_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"
    - export IMG_SOURCES="${IMG_BASE_SRC}-amd64,${IMG_BASE_SRC}-arm64"
    - export IMG_DESTINATIONS="${PIPELINERECORDER_REPOSITORY}:${VERSION}"

deploy_containers-pipelinerecorder:
  extends: .deploy_containers-pipelinerecorder-base
  rules: !reference [.on_deploy_manual_auto_on_rc]
  needs: []

deploy_containers-pipelinerecorder_internal-rc:
  extends: .deploy_containers-pipelinerecorder-base
  rules: !reference [.on_deploy_internal_rc]
  needs: []

deploy_containers-pipelinerecorder_internal:
  extends: .deploy_containers-pipelinerecorder-base
  rules: !reference [.on_deploy_internal_manual_final]
