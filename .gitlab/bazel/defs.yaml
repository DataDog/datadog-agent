.bazel:defs:
  cache:
    - key:
        prefix: bazel-$CI_RUNNER_DESCRIPTION
        files: [ .bazelversion ]
      paths:
        - .cache/bazelisk
        - .cache/bazel/install
      policy: pull-push
      when: on_success
    - key: bazel-$CI_RUNNER_DESCRIPTION
      paths:
        - .cache/bazel/cache
        - .cache/bazel/disk
        - .cache/bazel/repo-contents
      policy: pull-push
      when: on_success
  needs: [ ]
  variables:
    BAZELISK_HOME: "$XDG_CACHE_HOME/bazelisk"
    BAZEL_DISK_CACHE: "$BAZEL_OUTPUT_USER_ROOT/disk"
    BAZEL_OUTPUT_USER_ROOT: "$XDG_CACHE_HOME/bazel"
    BAZEL_REPO_CONTENTS_CACHE: "$BAZEL_OUTPUT_USER_ROOT/repo-contents"
    XDG_CACHE_HOME: "$CI_PROJECT_DIR/.cache"

.bazel:ext:windows:
  extends: .windows_docker_default
  variables:
    GIT_DEPTH: 2
  script:
    - |-
      $Preamble = @'
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandUseErrorActionPreference = $true
      Set-StrictMode -Version 3.0
      chcp.com 65001
      $OutputEncoding = $Global:OutputEncoding = [Console]::InputEncoding = [Console]::OutputEncoding = [Text.Encoding]::UTF8
      New-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Nls\CodePage' -Name ACP -Value 65001 -PropertyType String -Force
      New-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Nls\CodePage' -Name MACCP -Value 65001 -PropertyType String -Force
      New-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Nls\CodePage' -Name OEMCP -Value 65001 -PropertyType String -Force
      '@
    - Invoke-Expression $Preamble
    - $Postamble = 'if (-not $?) { exit 1 } elseif ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }'
    - New-Item -Force -ItemType Directory -Path "$XDG_CACHE_HOME" | Out-Null
    - $ScriptPath = Join-Path "$XDG_CACHE_HOME" script.ps1
    - Set-Content -Encoding Unicode -Path $ScriptPath -Value (($Preamble, $SCRIPT, $Postamble) -join [Environment]::NewLine)
    - Get-Content $ScriptPath
    - >-
      docker run
      --env=BAZELISK_HOME
      --env=BAZEL_DISK_CACHE
      --env=BAZEL_OUTPUT_USER_ROOT
      --env=BAZEL_REPO_CONTENTS_CACHE
      --env=CI_PROJECT_DIR
      --env=RUNNER_TEMP_PROJECT_DIR
      --rm
      --volume="${CI_PROJECT_DIR}:$CI_PROJECT_DIR"
      --volume="${RUNNER_TEMP_PROJECT_DIR}:$RUNNER_TEMP_PROJECT_DIR"
      --workdir="$CI_PROJECT_DIR"
      "$WINBUILDIMAGE"
      powershell -NoLogo -NonInteractive -NoProfile -File "$ScriptPath"
    - Invoke-Expression $Postamble
