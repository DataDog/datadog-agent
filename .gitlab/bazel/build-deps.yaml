.bazel:build-deps:
  rules:
    - !reference [ .except_mergequeue ]
    - when: on_success
  stage: deps_build

bazel:build-deps:linux-amd64:
  extends: [ .bazel:build-deps, .bazel:runner:linux-amd64 ]
  script:
    - bazel build //deps/... --platforms=//bazel/platforms:linux_x86_64

bazel:build-deps:linux-arm64:
  extends: [ .bazel:build-deps, .bazel:runner:linux-arm64 ]
  script:
    - bazel build //deps/... --platforms=//bazel/platforms:linux_arm64

bazel:build-deps:macos-amd64:
  extends: [ .bazel:build-deps, .bazel:runner:macos-amd64 ]
  script:
    - bazel build //deps/... --platforms=//bazel/platforms:macos_x86_64

bazel:build-deps:macos-arm64:
  extends: [ .bazel:build-deps, .bazel:runner:macos-arm64 ]
  script:
    - bazel build //deps/... --platforms=//bazel/platforms:macos_arm64

bazel:build-deps:windows-amd64:
  extends: [ .bazel:build-deps, .bazel:runner:windows-amd64 ]
  variables:
    POWERSHELL_SCRIPT: |-
      [Console]::WriteLine("🟡 TODO(regis): compilation errors remain - limiting to a working subset for the time being")
      bazel build '@zlib//...' '@libffi//:ffi' '@xz//...' '@cpython//...' '@openssl//...' --platforms=//bazel/platforms:windows_x86_64
      # bazel build @bzip2//...

bazel:debug-macos-x64:
  extends: [ .bazel:build-deps, .bazel:runner:macos-amd64 ]
  script:
    - bazel build @openssl//:openssl --subcommands --platforms=//bazel/platforms:macos_x86_64
    - bazel run -- @openssl//:install --destdir=/tmp/openssl-prefix
    - otool -LD /tmp/openssl-prefix/lib/*.dylib
    - rm -fr /tmp/openssl-prefix
    - bazel build @cpython//:python_unix --subcommands --platforms=//bazel/platforms:macos_x86_64
    - cp bazel-out/darwin_x86_64-fastbuild/bin/external/+_repo_rules+cpython/python_unix_foreign_cc/Configure.log $CI_PROJECT_DIR
  artifacts:
    paths:
      - Configure.log

bazel:debug-macos-arm64:
  extends: [ .bazel:build-deps, .bazel:runner:macos-arm64 ]
  script:
    - bazel build @openssl//:openssl --subcommands --platforms=//bazel/platforms:macos_arm64
    - bazel build @cpython//:python_unix --subcommands --platforms=//bazel/platforms:macos_arm64 --sandbox_debug || echo failed
    - cp bazel-out/darwin_arm64-fastbuild/bin/external/+_repo_rules+cpython/python_unix_foreign_cc/Configure.log $CI_PROJECT_DIR
    - DEPS_DIR=$(grep "EXT_BUILD_DEPS=" bazel-out/darwin_arm64-fastbuild/bin/external/+_repo_rules+cpython/python_unix_foreign_cc/Configure.log | cut -d '=' -f 2)
    - ls -la $DEPS_DIR
  artifacts:
    paths:
      - Configure.log
