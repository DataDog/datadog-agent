apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply the sidecar strategic-merge patch on top of an existing base.
# The base should reference your agent DaemonSet resource.
#
# Example base reference:
#   bases:
#     - ../../base/datadog-agent
#
# Validate without a live cluster:
#   kustomize build deploy/kubernetes/pipelinerecorder/

patches:
  - path: sidecar-patch.yaml
    target:
      kind: DaemonSet
      name: datadog-agent
