---
fixes:
  - |
    Fixed the Datadog Distribution of OpenTelemetry Collector (DDOT) not restarting
    after a remote configuration update. When DDOT is supervised by ``dd-procmgr``
    (the Linux default), a transient startup failure during the configuration
    experiment stable/experiment handoff could exhaust the process start limit, after
    which ``dd-procmgrd`` permanently stopped restarting the ``otel-agent`` process
    while still reporting healthy. ``dd-procmgr`` now backs off for the start-limit
    interval and keeps retrying instead of giving up, so DDOT recovers on its own, and
    a persistently failing process stays visible (rising ``restart_count`` and a
    recurring warning log) instead of silently staying down.
