---
features:
  - |
    Add Go stack trace aggregation to the auto multi-line log pipeline. When
    enabled, multi-line Go crash dumps (``panic:``, ``fatal error:``,
    ``runtime:`` errors, signal crashes, and unexpected faults) are
    automatically detected and combined into a single log entry using a
    streaming state-machine parser. This is enabled by default and can be
    controlled globally via ``logs_config.auto_multi_line.enable_go_stack_trace_aggregation``
    or per-source with ``enable_go_stack_trace_aggregation`` in auto multi-line
    options.
