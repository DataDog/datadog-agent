---
enhancements:
  - |
    On Windows, the system-probe injector telemetry now negotiates the counter
    version with the ``ddinjector`` driver and collects whatever counters the
    installed driver supports. When the driver reports crash and boot-recovery
    telemetry, the new ``injector.crashes_during_injection``,
    ``injector.crashes_post_injection``,
    ``injector.boot_recovery_crash_boots_detected``,
    ``injector.boot_recovery_driver_self_disabled`` and
    ``injector.boot_recovery_stability_timer_fired`` series are reported.
    Against older drivers the agent degrades gracefully, continuing to report
    the existing counters.
