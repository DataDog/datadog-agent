---
enhancements:
  - |
    The discovery module (``discovery.enabled``) and system-probe-lite
    (``discovery.use_system_probe_lite``) are now enabled by default on Linux.
    When discovery is the only enabled system-probe module, system-probe
    automatically execs into ``system-probe-lite`` to minimize resource usage.
    Set ``discovery.enabled: false`` to disable discovery, or
    ``discovery.use_system_probe_lite: false`` to force full system-probe.
