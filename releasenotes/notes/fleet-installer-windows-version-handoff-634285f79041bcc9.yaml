---
features:
  - |
    On Windows, ``datadog-installer`` now honors the ``DD_AGENT_MAJOR_VERSION``
    and ``DD_AGENT_MINOR_VERSION`` environment variables, matching the Linux
    and macOS install scripts. When a specific Agent version is requested,
    the running installer downloads the matching ``datadog-installer.exe``
    from the OCI package and re-execs from it, so the installer binary
    always matches the Agent version being installed.
