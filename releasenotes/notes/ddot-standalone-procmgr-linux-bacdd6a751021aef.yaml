---
enhancements:
  - |
    On Linux, the **standalone ``datadog-agent-ddot`` package** (fleet OCI and install-script installs) is now supervised by the agent process manager (``dd-procmgrd`` via ``processes.d``) when ``dd-procmgrd`` is present in the agent install, instead of the legacy ``datadog-agent-ddot`` systemd unit alone. **DDOT delivered as an agent extension** is covered separately; this note applies only to the standalone package.

    To revert standalone DDOT to systemd supervision, **delete** ``datadog-agent-ddot.yaml`` from ``processes.d`` (deb/rpm: ``/opt/datadog-agent/processes.d/``; fleet OCI: under the ``datadog-agent-ddot`` package ``processes.d`` tree for your install layout, typically ``/opt/datadog-packages/datadog-agent-ddot/stable/processes.d/``).

    Once the YAML is gone, ``datadog-agent-ddot.service`` is allowed to run again (the unit requires that ``processes.d/datadog-agent-ddot.yaml`` is absent). Restart ``datadog-agent`` so dependent units (including procmgr and DDOT) are refreshed. Standalone package or agent install/upgrade hooks do this automatically when they remove the file.
