# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    OTLP ingestion and the Datadog Distribution of OpenTelemetry Collector (DDOT) now support a new
    ``otlp_config.logs.infra_attributes.tags_as_ddtags`` option (``logs_tags_as_ddtags`` on the
    ``infraattributes`` processor). When enabled, custom tagger-derived tags (for example, tags
    configured via ``kubernetesResourcesLabelsAsTags``/``kubernetesResourcesAnnotationsAsTags``) are
    written as real Datadog log tags instead of log attributes. Default behavior is unchanged.
    (commit 522ee5fe634)
