---
features:
  - |
    APM: The trace-agent can now subscribe to ``APM_SEMANTIC_CORE_DD`` Remote
    Configuration updates and apply span tag equivalence / peer tag mapping
    changes at runtime. The new opt-in flag
    ``remote_configuration.apm_semantics.enabled`` (default ``false``) controls
    this subscription. The Concentrator picks up updated peer-tag keys on its
    next stat-span invocation by comparing its cached snapshot's version
    against the live registry's version, so stats aggregation reflects the new
    mappings without an agent restart. If a previously-applied RC payload is
    later removed or untargeted by the backend, the trace-agent reverts to the
    embedded mappings rather than holding the last-applied registry. Existing
    deployments see no behavior change with default settings; opt in by setting
    ``remote_configuration.apm_semantics.enabled: true``.
  - |
    APM: ``remote_configuration.agent_config.enabled`` is now a settable
    configuration entry that controls the trace-agent's ``AGENT_CONFIG``
    Remote Configuration subscription independently from ``apm_sampling``.
    When the user does not set it explicitly, it inherits
    ``remote_configuration.apm_sampling.enabled`` so existing configurations
    continue to behave exactly as before.
