# Each section from every releasenote are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
fixes:
  - |
    Fix IPv6 address formatting in two URLs built by the logs pipeline:
    the ``agent stream-logs`` subcommand's call to the local agent IPC
    endpoint, and the HTTP logs destination URL when the configured
    endpoint host is an IPv6 literal. Both now use ``net.JoinHostPort``
    so the address is properly bracketed (e.g. ``[fd38::1]:443``) and
    the underlying ``net/url`` and HTTP clients can parse the URL.
