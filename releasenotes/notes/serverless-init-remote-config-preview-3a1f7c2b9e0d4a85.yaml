# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    Added preview support for Remote Configuration in ``serverless-init``. Set
    ``DD_REMOTE_CONFIGURATION_ENABLED_SERVERLESS_INIT_PREVIEW=true`` to opt in.
    When enabled, ``serverless-init`` starts an embedded Remote Configuration
    service that backs the trace agent's ``/v0.7/config`` endpoint, allowing
    tracer libraries running alongside ``serverless-init`` to receive Remote
    Configuration products such as Dynamic Instrumentation (Live Debugger).
