# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    GPU: Added an opt-in ``gpu_monitoring.enable_slurm_job_tagging`` system-probe config option
    that tags GPU-process metrics with the owning Slurm job's identity (``slurm_job_id``,
    ``slurm_job_name``, ``slurm_job_partition``) on Slurm-on-Kubernetes deployments. The identity
    is resolved by system-probe from ``/proc/<pid>/environ`` (reusing the ``SYS_PTRACE`` capability
    it already holds) and delivered to the GPU check over the existing system-probe socket, so no
    additional capability is granted to the core agent.
