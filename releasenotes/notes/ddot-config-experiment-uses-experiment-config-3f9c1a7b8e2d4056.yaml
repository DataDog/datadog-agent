# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
fixes:
  - |
    Fleet Automation: when the DDOT (Datadog Distribution of the OpenTelemetry
    Collector) extension is supervised by the process manager (``dd-procmgr``),
    a configuration experiment that updates ``otel-config.yaml`` now relaunches
    the experiment collector with the experiment configuration instead of the
    stable one. This lets the new collector configuration be validated during
    the experiment, before it is promoted or rolled back.
