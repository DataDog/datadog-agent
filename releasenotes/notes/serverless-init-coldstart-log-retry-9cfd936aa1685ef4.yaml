# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
fixes:
  - |
    serverless-init: Retain and retry serverless log payloads on retryable send
    failures instead of dropping them after a single attempt. On platforms that
    throttle CPU between requests (such as Google Cloud Run), a flush that fires
    while an instance is idle could fail its send purely for lack of CPU and lose
    the logs. The payload is now kept in flight and delivered on the next window
    where CPU is available (the next request, or the shutdown grace period at
    scale to zero). Non-retryable failures (such as 4xx responses) are still
    dropped immediately.
