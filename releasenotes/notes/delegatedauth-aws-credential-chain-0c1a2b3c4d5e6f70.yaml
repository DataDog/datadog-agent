---
enhancements:
  - |
    Agent Cloud Authentication (delegated authentication) now discovers AWS
    credentials using the AWS SDK default credential chain on Agent builds that
    include EC2 metadata support. This adds support for IAM Roles for Service
    Accounts (IRSA, via ``AWS_WEB_IDENTITY_TOKEN_FILE``), ECS task roles, and
    EKS Pod Identity, in addition to the previously supported static
    credentials and EC2 instance metadata. Credentials are resolved through the
    SDK's standard precedence and behavior is governed by the standard AWS SDK
    environment variables (for example ``AWS_REGION``, ``AWS_DEFAULT_REGION``,
    ``AWS_PROFILE``, ``AWS_EC2_METADATA_DISABLED``).
