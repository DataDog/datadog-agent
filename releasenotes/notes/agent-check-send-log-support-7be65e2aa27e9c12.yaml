# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    The `agent check` subcommand now supports Python integrations that
    call `self.send_log(...)`. Previously, running `agent check` against
    such an integration logged `"Log submission failed: no receiver"`
    because the check subcommand wired `option.None` for the logs
    integrations component. A new no-op integrations receiver is wired
    for `agent check` only, echoing each submitted log line to stderr
    so developers can see what their check would send without polluting
    `agent check --json` output on stdout.
