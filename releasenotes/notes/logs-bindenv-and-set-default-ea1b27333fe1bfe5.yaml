---
upgrade:
  - |
    The configuration keys ``<prefix>logs_dd_url``, ``<prefix>dd_url`` and
    ``<prefix>additional_endpoints`` (for every prefix that uses the shared
    logs pipeline config helper: ``logs_config.``, ``database_monitoring.*``,
    ``network_devices.*``, ``network_path.forwarder.``,
    ``network_config_management.forwarder.``, ``container_lifecycle.``,
    ``container_image.``, ``sbom.``, ``synthetics.forwarder.``,
    ``service_discovery.forwarder.``, ``compliance_config.endpoints.``,
    ``runtime_security_config.endpoints.``,
    ``runtime_security_config.activity_dump.remote_storage.endpoints.``,
    ``data_observability.forwarder.``, ``software_inventory.forwarder.``,
    ``event_management.forwarder.``, ``kubeactions.forwarder.``,
    ``agent_telemetry.``, ``data_streams.forwarder.``) now have explicit
    defaults (empty string for the URL keys, empty list for
    ``additional_endpoints``). As a consequence, ``config.IsSet`` will always
    return ``true`` for these keys. Code that needs to detect whether the user
    explicitly configured one of them should use ``config.IsConfigured`` instead.
