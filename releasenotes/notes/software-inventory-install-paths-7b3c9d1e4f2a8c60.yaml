---
enhancements:
  - |
    The host Software Inventory metadata now reports the ``install_paths`` of
    each detected application, i.e. the filesystem location(s) where the
    software is installed. This is populated on macOS (applications, PKG
    receipts, kernel/system extensions, Homebrew) and on Windows (from the
    registry ``InstallLocation`` value). For most sources this is a
    single-element list; for macOS PKG receipts it contains the top-level
    directories the package installed files into. The field is omitted when no
    install location is available.
