# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be formatted as reStructuredText.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    Add support for multiple secret backends via ``multi_secret_backends`` in ``datadog.yaml``.
    Each named backend declares its own ``type``, ``config``, and ``secret_backend_timeout``.
    When ``secret_backend_type`` is unset, secret handles use ``ENC[backendID::secretKey]`` to route to a named backend.
    When ``secret_backend_type`` is set, ``multi_secret_backends`` has no effect on resolution: the full inner ``ENC[...]`` string is the secret key for ``secret_backend_type``.
