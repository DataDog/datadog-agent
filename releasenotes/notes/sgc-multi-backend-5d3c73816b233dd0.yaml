# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    Add support for multiple secret backends via ``extra_secret_backends`` in ``datadog.yaml``.
    Each named backend declares its own ``type`` , ``config``, ``secret_backend_timeout`` and
    secret handles use the ``ENC[backendID::secretKey]`` syntax to route to the correct backend.
    The default backend (``secret_backend_type`` / ``secret_backend_config``) continues to work
    as before, and handles without a ``::`` prefix are routed to it.
