# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    APM: Introduced a new semantic attribute registry (``pkg/trace/semantics``) that provides
    unified access to span attributes across different tracing conventions. The registry maps
    canonical concept names (e.g., ``http.status_code``, ``db.query``, ``peer.hostname``) to their
    equivalent attribute keys in Datadog tracers, OpenTelemetry semantic conventions, and
    framework-specific variants.

    Key capabilities:

    * Precedence-ordered attribute lookups with automatic fallback chains
    * Native support for Datadog spans, OTel Collector pdata, and generic attribute maps
    * Type-aware lookups with automatic coercion between string, float64, and int64 values
    * Declarative JSON configuration embedded at compile time for zero runtime overhead

    This foundation enables consistent attribute handling across trace-agent subsystems
    including obfuscation, stats aggregation, normalization, and sampling.

