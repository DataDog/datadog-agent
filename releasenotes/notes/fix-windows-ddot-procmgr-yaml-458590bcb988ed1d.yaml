---
fixes:
  - |
    On Windows, align the DDOT ``processes.d`` definition with the legacy **datadog-otel-agent** SCM service: run ``otel-agent.exe`` without CLI arguments and set only ``DD_OTELCOLLECTOR_INSTALLATION_METHOD=bare-metal``. The collector resolves ``otel-config.yaml`` and ``datadog.yaml`` from ProgramData when paths are omitted, and reads fleet policies from the registry when ``DD_FLEET_POLICIES_DIR`` is not set in the process environment. This fixes DDOT failing to start under **dd-procmgr** when the baked-in ``processes.d`` args or fleet policies path were stale.
