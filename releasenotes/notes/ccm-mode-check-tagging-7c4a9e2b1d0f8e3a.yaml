# Each section from every release note are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that it
# does not depend on any information only available in another section.
# This may mean repeating some details, but each section must be
# readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
features:
  - |
    When ``infrastructure_mode`` is set to ``cloud_cost_only``, the Agent adds an
    ``infrastructure_mode:cloud_cost_only`` tag to metrics from selected integrations. Use
    ``integration.cloud_cost_only.tagged`` to list which checks receive the tag; when
    the list is empty, all checks are tagged.
    The Agent also filters integration metric names in this mode. DogStatsD metrics,
    metrics from checks whose names start with ``custom_`` (including when the check is
    set via the ``dd.internal.jmx_check_name`` DogStatsD tag), and metrics from checks in
    ``integration.additional`` are forwarded regardless of the allowlist. Other
    integration metrics are forwarded only when they match
    ``integration.cloud_cost_only.metrics`` (allowlist). When the setting is unset,
    a built-in default allowlist applies; when set to an empty list, no integration
    metric names are forwarded (DogStatsD and other bypass paths still apply). Use
    ``integration.cloud_cost_only.metrics_blocked`` to drop additional metric names;
    names on the blocklist are dropped even when they would otherwise match the allowlist.
    Set ``integration.cloud_cost_only.metrics_match_prefix`` for prefix matching on both
    lists. ``metric_filterlist`` continues to apply in all infrastructure modes.
