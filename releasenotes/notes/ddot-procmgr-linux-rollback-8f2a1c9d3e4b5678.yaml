enhancements:
  - |
    On Linux, when the Datadog Agent uses the process manager for the DDOT (Datadog Distribution of OpenTelemetry) collector, you can **roll back** to the legacy **systemd**-managed ``datadog-agent-ddot`` service if needed.

    **Disable only the DDOT process-manager path**

    * Set ``DD_PROCMGR_DDOT_ENABLED`` to a non-enabling value (for example ``0`` or ``false``) in the environment seen by the Agent and installer, **or**
    * Remove ``/etc/datadog-agent/.procmgr-ddot-enabled`` when your deployment will not recreate it.

    With the DDOT gate closed, the Agent stops syncing DDOT into ``processes.d`` under ``dd-procmgrd`` and you can run DDOT from the **datadog-agent-ddot** unit again like on earlier versions.

    **Disable host-wide process-manager integration** (broader than DDOT)

    * Set ``DD_PROCMGR_ENABLED`` to ``0`` or ``false``, **or** remove ``/etc/datadog-agent/.procmgr-enabled``.

    Prefer tightening **DDOT** only unless you intend to turn off process-manager usage for all supervised processes on the host.

    **After you change markers or environment variables**, restart the main Agent service so the host applies the update—for example, on systemd: ``systemctl restart datadog-agent``. If you are returning to systemd-managed DDOT, start or enable ``datadog-agent-ddot`` as you did before the process-manager path.
