---
enhancements:
  - |
    On Linux, **DDOT delivered as an agent extension** is now supervised by the agent process manager (``dd-procmgrd`` via ``processes.d``) when ``dd-procmgrd`` is present in the agent install, instead of the legacy ``datadog-agent-ddot`` systemd unit. Install-script and fleet OCI extension installs are in scope; the standalone ``datadog-agent-ddot`` package is unchanged in this release.

    To revert the extension path to systemd supervision, **delete** ``datadog-agent-ddot.yaml`` from ``processes.d`` (fleet OCI: ``/opt/datadog-packages/datadog-agent/stable/processes.d/``, and ``.../experiment/processes.d/`` when that tree is not the same directory as stable).

    Once the YAML is gone, ``datadog-agent-ddot.service`` is allowed to run again (the unit requires that ``processes.d/datadog-agent-ddot.yaml`` is absent). Restart ``datadog-agent`` so dependent units (including procmgr and DDOT) are refreshed. Agent or extension install/upgrade hooks do this automatically when they remove the file.
