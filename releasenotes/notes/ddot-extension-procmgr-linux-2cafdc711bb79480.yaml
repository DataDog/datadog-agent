---
enhancements:
  - |
    On Linux, **DDOT delivered as an agent extension** is now supervised by the agent process manager (``dd-procmgrd`` via ``processes.d``) when the global process-manager gate is active, instead of the legacy ``datadog-agent-ddot`` systemd unit. Install-script and fleet OCI extension installs are in scope; the standalone ``datadog-agent-ddot`` package is unchanged in this release.

    To revert the extension path to systemd supervision:

    **Disable process-manager integration for the host**

    * Set ``DD_PROCMGR_ENABLED`` to ``0`` or ``false``, **or** remove ``/etc/datadog-agent/.procmgr-enabled``.

    Closing the global gate stops the installer from using procmgr on the **next** install or upgrade hook. It does **not** remove an existing ``processes.d`` file by itself.

    On a host that already has extension DDOT under procmgr, also **delete** ``datadog-agent-ddot.yaml`` from ``processes.d`` (fleet OCI: ``/opt/datadog-packages/datadog-agent/stable/processes.d/``, and ``.../experiment/processes.d/`` when that tree is not the same directory as stable).

    **After you change the global gate or remove the YAML**, restart ``datadog-agent`` (recommended; it restarts dependent units including procmgr). If you are returning to systemd-managed DDOT for the extension, start or enable ``datadog-agent-ddot`` after that. Alternatively, run an agent or extension install/upgrade so installer hooks remove the YAML and resync procmgr for you.
