---
fixes:
  - |
    Fix the kubelet check double-counting ``kubernetes.cpu.usage.total``,
    ``kubernetes.memory.usage``, and ``kubernetes.memory.working_set`` when
    ``use_stats_summary_as_source`` is enabled. The cAdvisor source no
    longer emits the metrics already produced by the kubelet
    ``/stats/summary`` endpoint, so ``sum:`` aggregations no longer roughly
    double when the option is turned on.
