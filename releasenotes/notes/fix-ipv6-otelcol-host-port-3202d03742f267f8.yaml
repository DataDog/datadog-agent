# Each section from every releasenote are combined when the
# CHANGELOG.rst is rendered. So the text needs to be worded so that
# it does not depend on any information only available in another
# section. This may mean repeating some details, but each section
# must be readable independently of the other.
#
# Each section note must be formatted as reStructuredText.
---
fixes:
  - |
    Fix IPv6 address formatting in three URLs / addresses built by the
    OTel-collector integration: the dogtel extension's tagger gRPC
    listener bind address, the OTel status component's Prometheus URL
    used to scrape OTel runtime metrics, and the auto-injected Prometheus
    receiver endpoint in the OTel converter. All three now use
    ``net.JoinHostPort`` so IPv6 hosts are properly bracketed
    (e.g. ``http://[fd38::1]:8888/metrics`` instead of
    ``http://fd38::1:8888/metrics``).
