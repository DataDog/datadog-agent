---
features:
  - |
    Reworked the ``noisy_neighbor`` check into a 3-layer architecture with
    conditional eBPF activation. Layer 1 reads PSI pressure, CPU throttle,
    and steal time from the filesystem to triage contention. Layer 2
    conditionally activates eBPF instrumentation only for cgroups under
    unexplained CPU pressure, reducing idle overhead by approximately 10x.
    Layer 3 identifies which specific neighbor container is responsible for
    preemptions. Adds a new ``noisy_neighbor.impacted`` metric that provides
    a single yes/no signal per container indicating whether it is being
    harmed by another container.
