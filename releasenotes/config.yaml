---
# Configuration for the in-house changelog fragment tool.
# Fragments are YAML files in releasenotes/notes/ with Markdown content.
#
# Template for new fragments (create with: dda inv notes.new <slug>):
#
# ---
# # Fill in the relevant section(s) below. Delete sections that don't apply.
# # Content should be written in Markdown.
#
# # upgrade:
# #   - |
# #     Upgrade Notes: include steps users can follow if affected.
#
# # features:
# #   - |
# #     New Features.
#
# # enhancements:
# #   - |
# #     Enhancement Notes.
#
# # issues:
# #   - |
# #     Known Issues.
#
# # deprecations:
# #   - |
# #     Deprecation Notes.
#
# # security:
# #   - |
# #     Security Notes.
#
# # fixes:
# #   - |
# #     Bug Fixes.
#
# # other:
# #   - |
# #     Other Notes.

sections:
  - [upgrade, Upgrade Notes]
  - [features, New Features]
  - [enhancements, Enhancement Notes]
  - [issues, Known Issues]
  - [deprecations, Deprecation Notes]
  - [security, Security Notes]
  - [fixes, Bug Fixes]
  - [other, Other Notes]
