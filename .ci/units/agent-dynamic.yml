unit:agent-dynamic:generate:
  extends: .unit:dynamic:generate
  variables:
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
    UNIT_ID: agent-dynamic
    UNIT_DISPLAY_NAME: Agent Dynamic CI
    UNIT_GENERATOR_COMMAND: cat .gitlab/pipeline.yml
  rules:
  - if: $TRIGGER_UNITS =~ /(^|,)(agent-dynamic|all)(,|$)/
  - changes:
      paths:
      - .bazelignore
      - .bazelrc
      - .bazelversion
      - .clang-format
      - .custom-gcl.yml
      - .dda/**/*
      - .github/**/*
      - .gitlab/**/*
      - .go-version
      - .golangci.yml
      - .pre-commit-config.yaml
      - .protoc-version
      - .python-version
      - .wwhrd.yml
      - BUILD.bazel
      - Dockerfiles/**/*
      - MODULE.bazel
      - MODULE.bazel.lock
      - bazel/**/*
      - chocolatey/**/*
      - cmd/**/*
      - comp/**/*
      - compliance/**/*
      - datadog-agent.map
      - deps/**/*
      - generate_tools.go
      - go.mod
      - go.sum
      - go.work
      - internal/**/*
      - modules.yml
      - omnibus/**/*
      - packages/**/*
      - pkg/**/*
      - pyproject.toml
      - release.json
      - rtloader/**/*
      - static-analysis.datadog.yml
      - tasks/**/*
      - test/**/*
      - third_party/**/*
      - tools/**/*
      - ci/units/agent-dynamic.toml
unit:agent-dynamic:
  extends: .unit:dynamic:trigger
  variables:
    UNIT_ID: agent-dynamic
    UNIT_DISPLAY_NAME: Agent Dynamic CI
  needs:
  - job: unit:agent-dynamic:generate
  trigger:
    include:
    - artifact: pipeline.yml
      job: unit:agent-dynamic:generate
