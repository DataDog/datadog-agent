exporters:
    otlp_http/datadoghq.com_0:
        compression: zstd
        endpoint: https://otlp.datadoghq.com
        headers:
            dd-api-key: test_api_key_123
            dd-evp-origin: host-profiler-bundled
            dd-evp-origin-version: 7.0.0-test
            dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
extensions:
    hpflare:
        endpoint: localhost:7778
processors:
    infraattributes:
        allow_hostname_override: true
        cardinality: 2
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: profiler_name
              value: host-profiler-bundled
            - action: upsert
              key: profiler_version
              value: 7.0.0-test
receivers:
    profiling:
        symbol_uploader:
            enabled: true
            symbol_endpoints:
                - api_key: test_api_key_123
                  site: datadoghq.com
service:
    extensions:
        - hpflare
    pipelines:
        profiles:
            exporters:
                - otlp_http/datadoghq.com_0
            processors:
                - infraattributes
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
    telemetry:
        metrics:
            level: none
