exporters:
    otlp_http/covered:
        compression: zstd
        headers:
            dd-api-key: test-api-key-covered
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
            dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
        metrics_endpoint: https://custom.metrics.example.com/v1/metrics
        profiles_endpoint: https://intake.profile.datadoghq.com/v1development/profiles
    otlp_http/uncovered:
        compression: zstd
        headers:
            dd-api-key: test-api-key-uncovered
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
            dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
        metrics_endpoint: https://otlp.us3.datadoghq.com/v1/metrics
        profiles_endpoint: https://intake.profile.us3.datadoghq.com/v1development/profiles
processors:
    cumulativetodelta/dd-hp-internal: {}
    ddhostname/dd-autoconfigured: {}
    filter/dd-hp-drop-internal:
        metrics:
            exclude:
                match_type: regexp
                metric_names:
                    - ^scrape_.*$
                    - ^up$
                    - ^promhttp_metric_handler_errors_total$
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: telemetry.distro.name
              value: host-profiler-standalone
            - action: upsert
              key: telemetry.distro.version
              value: 7.0.0-test
    resourcedetection/dd-autoconfigured:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                host.name:
                    enabled: false
                os.type:
                    enabled: false
receivers:
    profiling:
        symbol_uploader:
            enabled: false
    prometheus/dd-hp-internal:
        config:
            scrape_configs:
                - fallback_scrape_protocol: PrometheusText0.0.4
                  job_name: host-profiler-internal
                  metric_name_escaping_scheme: underscores
                  metric_name_validation_scheme: legacy
                  scrape_interval: 60s
                  scrape_protocols:
                    - PrometheusText0.0.4
                  static_configs:
                    - targets:
                        - 127.0.0.1:9999
    prometheus/user-defined:
        config:
            scrape_configs:
                - job_name: collector-internal
                  static_configs:
                    - targets:
                        - 127.0.0.1:9999
service:
    pipelines:
        metrics:
            exporters:
                - otlp_http/covered
            processors: []
            receivers:
                - prometheus/user-defined
        metrics/profiler-internal-health:
            exporters:
                - otlp_http/uncovered
            processors:
                - filter/dd-hp-drop-internal
                - cumulativetodelta/dd-hp-internal
                - resourcedetection/dd-autoconfigured
                - ddhostname/dd-autoconfigured
                - resource/dd-profiler-internal-metadata
            receivers:
                - prometheus/dd-hp-internal
        profiles:
            exporters:
                - otlp_http/covered
                - otlp_http/uncovered
            processors:
                - resourcedetection/dd-autoconfigured
                - ddhostname/dd-autoconfigured
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
    telemetry:
        metrics:
            readers:
                - pull:
                    exporter:
                        prometheus:
                            host: 127.0.0.1
                            port: 9999
