receivers:
  profiling:
    symbol_uploader:
      enabled: true
      symbol_endpoints:
      - api_key: test-key
        app_key: 67890
service:
  pipelines:
    profiles:
      processors: []
      receivers:
      - profiling
      exporters:
      - otlp_http
exporters:
  otlp_http:
    headers:
      dd-api-key: test-api-key
