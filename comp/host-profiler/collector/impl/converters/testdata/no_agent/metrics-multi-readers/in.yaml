receivers:
  profiling:
    symbol_uploader:
      enabled: false
service:
  telemetry:
    metrics:
      readers:
      - periodic:
          exporter:
            otlp:
              endpoint: https://backend.example.com:4318
      - pull:
          exporter:
            prometheus:
              host: 127.0.0.1
              port: 9999
      - pull:
          exporter:
            prometheus:
              host: 127.0.0.1
              port: 10000
  pipelines:
    profiles:
      processors: []
      receivers:
      - profiling
      exporters:
      - otlp_http
exporters:
  otlp_http:
    headers:
      dd-api-key: test-api-key
    profiles_endpoint: https://intake.profile.datadoghq.com/v1development/profiles
