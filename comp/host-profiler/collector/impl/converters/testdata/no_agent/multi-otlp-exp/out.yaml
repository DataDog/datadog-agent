exporters:
    logging: {}
    otlp_http/prod:
        compression: zstd
        headers:
            dd-api-key: "11111"
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
            dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
    otlp_http/staging:
        compression: zstd
        headers:
            dd-api-key: staging-key
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
            dd-otel-metric-config: '{"resource_attributes_as_tags": true}'
processors:
    ddhostname/dd-autoconfigured: {}
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: telemetry.distro.name
              value: host-profiler-standalone
            - action: upsert
              key: telemetry.distro.version
              value: 7.0.0-test
    resourcedetection/dd-autoconfigured:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                host.name:
                    enabled: false
                os.type:
                    enabled: false
receivers:
    profiling:
        symbol_uploader:
            enabled: false
service:
    pipelines:
        profiles:
            exporters:
                - otlp_http/prod
                - otlp_http/staging
                - logging
            processors:
                - resourcedetection/dd-autoconfigured
                - ddhostname/dd-autoconfigured
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
