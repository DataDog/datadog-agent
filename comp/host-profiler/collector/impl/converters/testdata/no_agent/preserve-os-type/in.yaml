receivers:
  profiling:
    symbol_uploader:
      enabled: false
processors:
  resourcedetection:
    detectors: [system]
    system:
      resource_attributes:
        os.type:
          enabled: true
exporters:
  otlp_http:
    headers:
      dd-api-key: "test-key"
service:
  pipelines:
    profiles:
      receivers: [profiling]
      processors: [resourcedetection]
      exporters: [otlp_http]
