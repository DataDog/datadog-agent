receivers:
  profiling:
    symbol_uploader:
      enabled: false
  prometheus/user-defined:
    config:
      scrape_configs:
      - job_name: collector-internal
        scheme: https
        static_configs:
        - targets:
          - 127.0.0.1:9999
service:
  telemetry:
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: 127.0.0.1
              port: 9999
  pipelines:
    metrics:
      receivers:
      - prometheus/user-defined
      processors: []
      exporters:
      - otlp_http
    profiles:
      processors: []
      receivers:
      - profiling
      exporters:
      - otlp_http
exporters:
  otlp_http:
    headers:
      dd-api-key: test-api-key
    profiles_endpoint: https://intake.profile.datadoghq.com/v1development/profiles
    metrics_endpoint: https://custom.metrics.example.com/v1/metrics
