exporters:
    otlp_http:
        compression: zstd
        endpoint: http://localhost:4318
        headers:
            dd-api-key: test-key
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
extensions:
    custom:
        config: value
    ddprofiling:
        config: value
    other:
        config: value
processors:
    batch:
        timeout: 10s
    cumulativetodelta/dd-hp-internal: {}
    ddhostname/default: {}
    filter/dd-hp-drop-internal:
        metrics:
            exclude:
                match_type: regexp
                metric_names:
                    - ^scrape_.*$
                    - ^up$
                    - ^promhttp_metric_handler_errors_total$
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: telemetry.distro.name
              value: host-profiler-standalone
            - action: upsert
              key: telemetry.distro.version
              value: 7.0.0-test
    resourcedetection/default:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                host.name:
                    enabled: false
                os.type:
                    enabled: false
receivers:
    profiling:
        symbol_uploader:
            enabled: false
    prometheus/dd-hp-internal:
        config:
            scrape_configs:
                - fallback_scrape_protocol: PrometheusText0.0.4
                  job_name: host-profiler-internal
                  metric_name_escaping_scheme: underscores
                  metric_name_validation_scheme: legacy
                  scrape_interval: 60s
                  scrape_protocols:
                    - PrometheusText0.0.4
                  static_configs:
                    - targets:
                        - 127.0.0.1:8889
service:
    extensions:
        - ddprofiling
        - custom
        - other
    pipelines:
        metrics:
            processors: []
        metrics/profiler-internal-health:
            exporters:
                - otlphttp
            processors:
                - filter/dd-hp-drop-internal
                - cumulativetodelta/dd-hp-internal
                - batch
                - resourcedetection/default
                - ddhostname/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - prometheus/dd-hp-internal
        profiles:
            exporters:
                - otlp_http
            processors:
                - batch
                - resourcedetection/default
                - ddhostname/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
