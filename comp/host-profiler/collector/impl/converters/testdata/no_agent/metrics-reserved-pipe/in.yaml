receivers:
  profiling:
    symbol_uploader:
      enabled: false
service:
  pipelines:
    metrics/profiler-internal-health:
      receivers: []
      processors: []
      exporters: []
    profiles:
      processors: []
      receivers:
      - profiling
      exporters:
      - otlp_http
exporters:
  otlp_http:
    headers:
      dd-api-key: test-api-key
    profiles_endpoint: https://intake.profile.datadoghq.com/v1development/profiles
