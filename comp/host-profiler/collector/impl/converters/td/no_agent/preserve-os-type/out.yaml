exporters:
    otlphttp:
        compression: zstd
        headers:
            dd-api-key: test-key
            dd-evp-origin: host-profiler-standalone
            dd-evp-origin-version: 7.0.0-test
processors:
    ddhostname/default: {}
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: telemetry.distro.name
              value: host-profiler-standalone
            - action: upsert
              key: telemetry.distro.version
              value: 7.0.0-test
    resourcedetection:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                os.type:
                    enabled: true
receivers:
    profiling:
        symbol_uploader:
            enabled: false
service:
    pipelines:
        metrics:
            processors: []
        profiles:
            exporters:
                - otlphttp
            processors:
                - resourcedetection
                - ddhostname/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
