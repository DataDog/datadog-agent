receivers:
  hostprofiler:
    symbol_uploader:
      enabled: false
processors: {}
exporters:
  otlphttp:
    headers:
      dd-api-key: "test-key"
extensions:
  health_check:
    endpoint: "0.0.0.0:9090"
service:
  pipelines:
    profiles:
      receivers: [hostprofiler]
      processors: []
      exporters: [otlphttp]
