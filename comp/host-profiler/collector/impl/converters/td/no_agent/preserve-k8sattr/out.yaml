exporters:
    otlphttp:
        headers:
            dd-api-key: test-key
extensions:
    health_check:
        endpoint: ${env:MY_POD_IP:-localhost}:13133
processors:
    k8sattributes:
        pod_association:
            - sources:
                - from: connection
            - sources:
                - from: resource_attribute
                  name: container.id
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: profiler_name
              value: full-host-profiler
            - action: upsert
              key: profiler_version
              value: 7.0.0-test
    resourcedetection/default:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                host.name:
                    enabled: false
                os.type:
                    enabled: false
receivers:
    hostprofiler:
        symbol_uploader:
            enabled: false
service:
    extensions:
        - health_check
    pipelines:
        metrics:
            processors: []
        profiles:
            exporters:
                - otlphttp
            processors:
                - k8sattributes
                - resourcedetection/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - hostprofiler
