exporters:
    otlphttp:
        compression: zstd
        headers:
            dd-api-key: test-api-key
            dd-evp-origin: host-profiler
            dd-evp-origin-version: 7.0.0-test
        metrics_endpoint: https://custom.metrics.example.com/v1/metrics
        profiles_endpoint: https://intake.profile.datadoghq.com/v1development/profiles
processors:
    cumulativetodelta/dd-hp-internal: {}
    filter/dd-hp-drop-internal:
        metrics:
            exclude:
                match_type: regexp
                metric_names:
                    - ^scrape_.*$
                    - ^up$
                    - ^promhttp_metric_handler_errors_total$
    resource/dd-profiler-internal-metadata:
        attributes:
            - action: upsert
              key: profiler_name
              value: host-profiler
            - action: upsert
              key: profiler_version
              value: 7.0.0-test
    resourcedetection/default:
        detectors:
            - system
        system:
            resource_attributes:
                host.arch:
                    enabled: true
                host.name:
                    enabled: false
                os.type:
                    enabled: false
receivers:
    profiling:
        symbol_uploader:
            enabled: false
    prometheus/dd-hp-internal:
        config:
            scrape_configs:
                - fallback_scrape_protocol: PrometheusText0.0.4
                  job_name: host-profiler-internal
                  metric_name_escaping_scheme: underscores
                  metric_name_validation_scheme: legacy
                  scrape_interval: 60s
                  scrape_protocols:
                    - PrometheusText0.0.4
                  static_configs:
                    - targets:
                        - 127.0.0.1:8888
service:
    pipelines:
        metrics:
            processors: []
        metrics/profiler-internal-health:
            exporters:
                - otlphttp
            processors:
                - filter/dd-hp-drop-internal
                - cumulativetodelta/dd-hp-internal
                - resourcedetection/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - prometheus/dd-hp-internal
        profiles:
            exporters:
                - otlphttp
            processors:
                - resourcedetection/default
                - resource/dd-profiler-internal-metadata
            receivers:
                - profiling
