receivers:
  hostprofiler:
    symbol_uploader:
      enabled: false
  profiling:
    symbol_uploader:
      enabled: false
service:
  pipelines:
    profiles:
      processors: []
      receivers:
      - hostprofiler
      - profiling
      exporters:
      - otlphttp
exporters:
  otlphttp:
    headers:
      dd-api-key: test-api-key
