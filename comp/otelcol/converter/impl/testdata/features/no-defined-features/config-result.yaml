exporters:
  datadog:
    api:
      key: "ggggg77777"
      site: "datadoghq.eu"

extensions:
  datadog/dd-autoconfigured:
    api:
      key: "ggggg77777"
      site: "datadoghq.eu"
    deployment_type: daemonset
    hostname: test-host
    installation_method: ""
  ddflare/dd-autoconfigured:
  health_check/dd-autoconfigured:
  pprof/dd-autoconfigured:
  zpages/dd-autoconfigured:
    endpoint: "localhost:55679"

processors:
  infraattributes/dd-autoconfigured:

service:
  extensions:
    - pprof/dd-autoconfigured
    - zpages/dd-autoconfigured
    - health_check/dd-autoconfigured
    - ddflare/dd-autoconfigured
    - datadog/dd-autoconfigured
  pipelines:
    logs:
      receivers:
        - "otlp"
      processors:
        - "infraattributes/dd-autoconfigured"
      exporters:
        - "datadog"
    metrics:
      receivers:
        - "otlp"
        - "datadog/connector"
      processors:
        - "infraattributes/dd-autoconfigured"
      exporters:
        - "datadog"
    traces:
      receivers:
        - "otlp"
      processors:
        - "infraattributes/dd-autoconfigured"
      exporters:
        - "datadog/connector"
        - "datadog"
