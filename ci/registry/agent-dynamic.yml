unit:agent-dynamic:generate:
  extends: .unit:dynamic:generate
  variables:
    UNIT_ID: agent-dynamic
    UNIT_DISPLAY_NAME: Agent Dynamic CI
    UNIT_GENERATOR_COMMAND: cat .gitlab/pipeline.yml
  rules:
  - changes:
    - .gitlab/pipeline.yml

